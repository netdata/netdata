[package]
name = "file-lifecycle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[lib]
name = "file_lifecycle"
path = "src/lib.rs"

# Content-agnostic file-lifecycle substrate (registry, rotation/retention,
# catalog manifest, remote upload/download, local read-through cache, recovery,
# the per-signal `Pipeline` shell). It MUST NOT depend on the three log-content
# crates — `sfsq`, `sfst-indexer`, `otel-logs-identity` — so a second signal
# (traces) can reuse it. The omission below is the hard dependency guard
# (cargo makes importing an undeclared crate impossible); a manifest assertion
# in `tests/` backstops it.
[dependencies]
anyhow = { workspace = true }
bridge = { path = "../netdata-plugin/bridge" }
chrono = { workspace = true }
ferryboat = { workspace = true }
file-registry = { workspace = true }
futures = { workspace = true }
moka = { workspace = true }
netdata-plugin-protocol = { path = "../netdata-plugin/protocol" }
opendal = { workspace = true }
otel-catalog = { workspace = true }
sfst = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
uuid = { workspace = true }
wal = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
bytesize = { workspace = true }
tempfile = { workspace = true }
