[package]
name = "sfst-indexer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "SFST index builder: accumulate interned log rows and emit the container"

[lints]
workspace = true

[dependencies]
sfst = { workspace = true }
otel-logs-identity = { workspace = true }

fst-index = { workspace = true, features = ["serde"] }
treight = { workspace = true, features = ["roaring", "serde"] }
file-registry = { workspace = true }

bumpalo = { workspace = true }
hashbrown = { workspace = true }
roaring = { workspace = true }
twox-hash = { workspace = true, features = ["xxhash64"] }

thiserror = { workspace = true }
tracing = { workspace = true }
