[package]
name = "journal-log-writer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
journal-common = { workspace = true }
journal-core = { workspace = true }
journal-registry = { workspace = true }
sd-compat = { workspace = true }
arrayvec = { workspace = true }
cardinality-estimator = { workspace = true }
bumpalo = { workspace = true }

uuid = { workspace = true, features = ["v4"] }
tracing = { workspace = true }
thiserror = { workspace = true }
nix = { workspace = true, features = ["time"] }

serde = { workspace = true, features = ["derive"] }

# Optional serde support for structured logging
serde_json = { workspace = true, optional = true }
flatten-serde-json = { workspace = true, optional = true }

[features]
serde-api = ["serde_json", "flatten-serde-json"]

[dev-dependencies]
tempfile = { workspace = true }
