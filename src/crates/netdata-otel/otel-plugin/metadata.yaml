plugin_name: otel.plugin
modules:
  - meta:
      id: collector-otel.plugin-otel
      plugin_name: otel.plugin
      module_name: otel
      monitored_instance:
        name: OpenTelemetry
        link: https://opentelemetry.io/
        categories:
          - data-collection.cloud-and-devops
        icon_filename: opentelemetry.svg
      alternative_monitored_instances: []
      keywords:
        - opentelemetry
        - otel
        - otlp
        - grpc
        - metrics
        - logs
        - observability
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          This plugin enables the Netdata Agent to receive OpenTelemetry metrics and logs
          via the OTLP/gRPC protocol from any compatible source — collectors, SDKs, or
          instrumented applications.

          Metrics are automatically visualized as Netdata charts with full alerting support.
          Logs are stored in systemd-compatible journal files and can be explored through
          the Netdata Logs tab.
        method_description: |
          The plugin listens on a configurable gRPC endpoint for incoming OTLP data.

          Incoming metrics are mapped to Netdata charts using YAML mapping rules placed in the
          chart configs directory (default `/etc/netdata/otel.d/v1/metrics/`). Each file can
          contain entries that match metrics by instrumentation scope and metric name, and control
          how data point attributes translate to chart instances and dimensions. Per-metric
          overrides for the collection interval and grace period are also supported. Without a
          matching rule, the plugin creates charts using default settings. Charts with no incoming
          data are automatically expired and removed.

          | Mapping file option | Description |
          |:--------------------|:------------|
          | `instrumentation_scope.name` | Regex to match the instrumentation scope name |
          | `instrumentation_scope.version` | Regex to match the instrumentation scope version |
          | `dimension_attribute_key` | Data point attribute whose value becomes the dimension name |
          | `interval_secs` | Per-metric collection interval override (1–3600 seconds) |
          | `grace_period_secs` | Per-metric grace period override |

          Incoming logs are written to journal files with configurable rotation and retention
          policies.
      supported_platforms:
        include:
          - Linux
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The plugin starts automatically and listens on `127.0.0.1:4317` for incoming OTLP/gRPC connections.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list:
          - title: OpenTelemetry data source
            description: |
              An OpenTelemetry Collector, SDK, or instrumented application configured to send OTLP data
              to the Netdata agent's gRPC endpoint.
      configuration:
        file:
          name: otel.yaml
        options:
          description: |
            The plugin is configured via `otel.yaml` in the Netdata configuration directory.
            Only the fields you want to change need to be specified.

            Any option can also be overridden via environment variables with the `NETDATA_OTEL_`
            prefix (highest priority). The variable name is the config option in all caps with
            dots replaced by underscores — e.g. `endpoint.tls_cert_path` becomes
            `NETDATA_OTEL_ENDPOINT_TLS_CERT_PATH`.
          folding:
            title: Config options
            enabled: true
          list:
            - name: endpoint.path
              description: gRPC endpoint to listen on for incoming OTLP data.
              default_value: "127.0.0.1:4317"
              required: false
            - name: endpoint.tls_cert_path
              description: Path to TLS certificate file. Enables TLS when provided.
              default_value: ""
              required: false
            - name: endpoint.tls_key_path
              description: Path to TLS private key file. Required when TLS certificate is provided.
              default_value: ""
              required: false
            - name: endpoint.tls_ca_cert_path
              description: Path to TLS CA certificate file for client authentication.
              default_value: ""
              required: false
            - name: metrics.chart_configs_dir
              description: Directory containing metric mapping YAML files.
              detailed_description: |
                Each file defines how OTLP metrics are mapped to Netdata charts.
                Files can match metrics by instrumentation scope and name, set the
                dimension attribute key, and override timing parameters. The plugin
                ships stock mappings; user files in this directory take priority.
              default_value: "/etc/netdata/otel.d/v1/metrics/"
              required: false
            - name: metrics.interval_secs
              description: Collection interval in seconds (1–3600). Defines the Netdata chart update frequency.
              default_value: 10
              required: false
            - name: metrics.grace_period_secs
              description: Grace period in seconds. After the last data point, the plugin waits this long before gap-filling.
              default_value: 60
              required: false
            - name: metrics.expiry_duration_secs
              description: Expiry duration in seconds. Charts with no data for this long are removed.
              default_value: 900
              required: false
            - name: metrics.max_new_charts_per_request
              description: Maximum new charts created per gRPC request.
              detailed_description: |
                Limits cardinality explosion from high-cardinality label combinations.
              default_value: 100
              required: false
            - name: logs.journal_dir
              description: Directory to store journal files for ingested logs.
              default_value: ""
              required: true
            - name: logs.size_of_journal_file
              description: Maximum file size before rotating to a new journal file.
              default_value: "100MB"
              required: false
            - name: logs.entries_of_journal_file
              description: Maximum log entries per journal file.
              default_value: 50000
              required: false
            - name: logs.duration_of_journal_file
              description: Maximum time span within a single journal file.
              default_value: "2 hours"
              required: false
            - name: logs.number_of_journal_files
              description: Maximum number of journal files to keep.
              default_value: 10
              required: false
            - name: logs.size_of_journal_files
              description: Maximum total size of all journal files.
              default_value: "1GB"
              required: false
            - name: logs.duration_of_journal_files
              description: Maximum age of journal files.
              default_value: "7 days"
              required: false
            - name: logs.store_otlp_json
              description: Store the complete OTLP JSON in each log entry.
              detailed_description: |
                Useful for debugging and reprocessing, but increases storage usage.
              default_value: false
              required: false
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Basic configuration
              folding:
                enabled: false
              description: Listen on default endpoint with default settings.
              config: |
                endpoint:
                  path: "127.0.0.1:4317"
                metrics:
                  chart_configs_dir: /etc/netdata/otel.d/v1/metrics/
                  interval_secs: 10
                  grace_period_secs: 60
                  expiry_duration_secs: 900
                  max_new_charts_per_request: 100
                logs:
                  journal_dir: /var/log/netdata/otel-journals
            - name: Partial user override
              description: |
                Override only specific fields in the user config. All other settings
                are inherited from the stock config. Unknown fields are ignored for
                forward compatibility.
              config: |
                endpoint:
                  path: "0.0.0.0:4317"
                logs:
                  number_of_journal_files: 20
                  duration_of_journal_files: "14 days"
            - name: Metric mapping file
              description: |
                Place YAML files like this in `/etc/netdata/otel.d/v1/metrics/` to control how
                OTLP metrics are mapped to Netdata charts. This example maps metrics from the
                OpenTelemetry Collector hostmetrics receiver.
              config: |
                metrics:
                  "system.network.connections":
                    - instrumentation_scope:
                        name: .*hostmetricsreceiver.*networkscraper$
                      dimension_attribute_key: state

                  "system.cpu.utilization":
                    - instrumentation_scope:
                        name: .*hostmetricsreceiver.*cpuscraper$
                      dimension_attribute_key: state

                  "system.memory.usage":
                    - instrumentation_scope:
                        name: .*hostmetricsreceiver.*memoryscraper$
                      dimension_attribute_key: state
                      interval_secs: 5
            - name: TLS-enabled configuration
              description: Listen with TLS enabled for secure connections.
              config: |
                endpoint:
                  path: "0.0.0.0:4317"
                  tls_cert_path: /etc/netdata/ssl/cert.pem
                  tls_key_path: /etc/netdata/ssl/key.pem
                metrics:
                  chart_configs_dir: /etc/netdata/otel.d/v1/metrics/
                  interval_secs: 10
                  grace_period_secs: 60
                  expiry_duration_secs: 900
                  max_new_charts_per_request: 100
                logs:
                  journal_dir: /var/log/netdata/otel-journals
    troubleshooting:
      problems:
        list:
          - name: 'Failed to write log entry: failed to create journal file'
            description: |
              When the plugin receives OTLP logs it stores them in journal files under the directory set by
              `logs.journal_dir`. If it cannot create a journal file there, the Agent logs the following error
              for every incoming log entry:

              `Failed to write log entry: failed to create journal file: failed to create journal file in <journal_dir>/<machine_id>`

              The trailing segment is the host's machine ID rendered as a 32-character hexadecimal string
              with no hyphens (for example `0123456789abcdef0123456789abcdef`). The error repeats for each OTLP
              log entry, so no logs are stored until the cause is resolved.

              This message means Netdata could not create the journal file it writes incoming logs to, at
              `<journal_dir>/<machine_id>`. The cause is a `logs.journal_dir` that is relative rather than
              an absolute path beginning with `/`. A missing or unwritable directory surfaces at startup
              (see the next entry) rather than as this message. On current builds a relative `journal_dir`
              is caught at startup, so this message most often appears on builds that do not perform that
              startup check; the diagnosis and fix are the same.

              Set `logs.journal_dir` in `otel.yaml` to an absolute path, then make sure the directory exists
              and is owned by the `netdata` user:

              ```bash
              sudo mkdir -p /var/log/netdata/otel/v1
              sudo chown -R netdata:netdata /var/log/netdata/otel/v1
              ```

              Restart the Netdata Agent so it re-reads `otel.yaml`.
          - name: 'Failed to create journal log for directory'
            description: |
              At startup the plugin opens the configured journal directory. If that fails the plugin does not
              start, and the Agent logs:

              `Failed to create journal log for directory: <journal_dir>`

              Common causes:

              - `logs.journal_dir` is relative rather than an absolute path. The value must begin with `/`
                (for example `/var/log/netdata/otel/v1`, not `otel/v1`); a relative value is rejected before
                the plugin starts.
              - `logs.journal_dir` exists but is not a directory.
              - The `netdata` user cannot create or read the directory (permission denied).
              - The host machine ID cannot be read from `/etc/machine-id`.

              Make sure `logs.journal_dir` in `otel.yaml` is an absolute path to a directory the `netdata`
              user can create and write to:

              ```bash
              sudo mkdir -p /var/log/netdata/otel/v1
              sudo chown -R netdata:netdata /var/log/netdata/otel/v1
              ```

              Confirm the machine ID is available:

              ```bash
              ls -l /etc/machine-id
              ```

              If `/etc/machine-id` is missing, recreate it following your distribution's documentation, then
              restart the Netdata Agent.
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: |
        Metrics are dynamically created based on the OpenTelemetry data received.
        The specific metrics depend on the OTLP sources sending data to the plugin.
      availability: []
      scopes: []
