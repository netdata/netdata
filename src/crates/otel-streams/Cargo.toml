[package]
name = "otel-streams"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[[bin]]
name = "certstream"
path = "src/bin/certstream.rs"

[[bin]]
name = "github"
path = "src/bin/github.rs"

[[bin]]
name = "synth"
path = "src/bin/synth.rs"

[[bin]]
name = "jetstream"
path = "src/bin/jetstream.rs"

[[bin]]
name = "ris"
path = "src/bin/ris.rs"

[[bin]]
name = "wikimedia"
path = "src/bin/wikimedia.rs"

# PROOF SCAFFOLD (otel traces-proof SOW; revert with the skeleton).
[[bin]]
name = "synth-traces"
path = "src/bin/synth-traces.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
flate2 = { workspace = true }
futures = { workspace = true }
opentelemetry-proto = { workspace = true }
reqwest = { workspace = true, default-features = true, features = ["stream"] }
rustls = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
url = { workspace = true }
