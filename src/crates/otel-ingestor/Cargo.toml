[package]
name = "otel-ingestor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[lib]
name = "otel_ingestor"
path = "src/lib.rs"

[dependencies]
bridge = { workspace = true }
ferryboat = { workspace = true }
flatten_otel = { workspace = true }
