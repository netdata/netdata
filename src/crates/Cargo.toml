[workspace]
resolver = "2"
exclude = ["jf", "journal-file-index"]
members = [
    # Individual crates
    "journal-common",
    "journal-core",
    "journal-index",
    "chunk-file",
    "fst-index",
    "treight",
    "sfst",
    "journal-log-writer",
    "journal-engine",
    "journal-registry",
    "journal-function",

    # Netdata plugin workspace members
    "netdata-plugin/error",
    "netdata-plugin/protocol",
    "netdata-plugin/rt",
    "netdata-plugin/schema",
    "netdata-plugin/types",
    "netdata-plugin/bridge",
    "netdata-plugin/charts-derive",

    # Netdata OTEL workspace members
    "otel-plugin",
    "otel-ledger",
    "file-lifecycle",
    "otel-catalog",
    "otel-logs-identity",
    "file-cache",
    "flatten-otel",

    # Stress test tools
    "otel-streams",

    # IPC / RPC
    "ferryboat",

    "otel-normalize",
    "otel-ingestor",
    "otel-legacy-logs",

    # WAL
    "file-registry",
    "wal",
    "wal-otap",

    # SFST build + query
    "sfst-indexer",
    "sfsq",
    "sfsq-cli",

    # OTLP→WAL/indexing experiment (SOW-20260627)
    "ng-ingest",
    "ng-index",

    # Netdata NetFlow workspace members
    "netflow-plugin",

    # Plugin IPC library
    "netipc",
]

[workspace.package]
version = "0.1.3"
edition = "2024"
rust-version = "1.85"

[workspace.lints.clippy]
collapsible_if = "allow"

[workspace.dependencies]

# --- merged from master (deps required by master's journal/netflow/rdp crates) ---
arbitrary = "1.3"
async-stream = "0.3"
bitvec = "1.0.1"
duct = "0.13"
foyer = { version = "0.20.0", features = ["serde"] }
hdrhistogram = { version = "7.5" }
hyper-util = "0.1"
indexmap = "2.9"
journal-log-writer = { path = "journal-log-writer" }
netdata-plugin-bridge = { path = "netdata-plugin/bridge" }
netdata-plugin-charts-derive = { path = "netdata-plugin/charts-derive" }
netdata-plugin-rt = { path = "netdata-plugin/rt" }
netdata-plugin-types = { path = "netdata-plugin/types" }
opentelemetry = "0.31.0"
opentelemetry-otlp = { version = "0.31.0", features = ["grpc-tonic", "logs"] }
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio", "logs"] }
tokio-stream = "0.1"
tower = "0.5"
tracing-opentelemetry = "0.32.0"
static_assertions = "1.1"
thiserror = "2"
zerocopy = { version = "0.9.0-alpha.0" }
libc = "0.2"
memmap2 = "0.9"
memchr = "2.7"
uuid = { version = "1.0"}
nix = { version = "0.30" }

ruzstd = "0.8"
siphasher = "1.0"
hashers = "1.0"
twox-hash = { version = "2.1", default-features = false }
rand = "0.9"
lz4_flex = { version = "0.12", default-features = false, features = ["std", "safe-decode", "checked-decode"] }
lzma-rust2 = { version = "0.15", default-features = false, features = ["std", "xz"] }
md5 = "0.7"
arrayvec = "0.7"
cardinality-estimator = "1.0"

fst = { git = "https://github.com/vkalintiris/fst.git", branch="bumpalo" }
roaring = { git = "https://github.com/netdata/roaring-rs.git", branch="allocative" }
serde = { version = "1.0" }
serde_bytes = "0.11"
hashbrown = "0.17"
rustc-hash = "2.1"
rmp-serde = "1.3.1"
bincode = { version = "2.0", features = ["serde"] }
notify = "8.2"

walkdir = "2.4"
crossbeam-channel = "0.5"
regex = "1.10"
moka = { version = "0.12", features = ["future"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4" }


async-trait = "0.1.89"
serde_yaml = "0.9.34"
serde_regex = "1.1.0"
tokio = { version = "1.45", features = ["full"] }
ipnet = "2.11.0"
ipnet-trie = "0.3.0"

# Tracing
console-subscriber = "0.5"
tracing = { version = "0.1" }
tracing-journald = "0.3"
tracing-futures = { version = "0.2.5" }
tracing-subscriber = "0.3"
opentelemetry-proto = "0.31"
prost = "0.14"

# Netdata plugin
schemars = "1.0"

# Journal histogram dependencies
atoi = "2.0"
bitflags = "2.9"
bytes = "1"
futures = "0.3"
phf = { version = "0.12", default-features = false }
phf_codegen = "0.12"
tokio-util = { version = "0.7", features = ["codec"] }
lru = "0.16"
parking_lot = "0.12"
allocative = "0.3.4"
bumpalo = { version = "3", features = ["std"] }
tikv-jemallocator = "0.6"
rayon = "1.11.0"
itoa = "1.0"

base64 = "0.22"

# NetFlow-specific dependencies
jaq-core = "3.0.0"
jaq-json = "2.0.0"
jaq-std = "3.0.0"
maxminddb = "0.27.3"
netflow_parser = "0.9.0"
netgauze-bgp-pkt = "0.11.0"
netgauze-bmp-pkt = "0.11.0"
sflow-parser = "0.6.0"
socket2 = "0.6.3"
tonic-prost = "0.14"
tonic-prost-build = "0.14"
protoc-bin-vendored = "3"
etherparse = "0.20.1"
pcap-file = "2.0.0"

# OTEL-specific dependencies
atty = "0.2"
bytesize = { version = "2.3.1", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
humantime = "2.2"
humantime-serde = "1.1"
tonic = "0.14"

flatten-serde-json = { git = "https://github.com/meilisearch/meilisearch", tag = "v1.22.1" }

# Internal workspace crates
journal-common = { path = "journal-common" }
journal-core = { path = "journal-core" }
journal-index = { path = "journal-index", default-features = false }
chunk-file = { path = "chunk-file" }
journal-engine = { path = "journal-engine" }
journal-registry = { path = "journal-registry" }
journal-function = { path = "journal-function" }
rdp = { path = "rdp" }
fst-index = { path = "fst-index" }
treight = { path = "treight" }
sfst = { path = "sfst" }
sfst-indexer = { path = "sfst-indexer" }
sfsq = { path = "sfsq" }
sfsq-cli = { path = "sfsq-cli" }

# Netdata plugin crates
netdata-plugin-error = { path = "netdata-plugin/error" }
netdata-plugin-protocol = { path = "netdata-plugin/protocol" }
netdata-plugin-schema = { path = "netdata-plugin/schema" }
rt = { path = "netdata-plugin/rt" }

# Netdata OTEL crates

flatten_otel = { path = "flatten-otel" }
otel-normalize = { path = "otel-normalize" }

# Ledger
otel-ledger = { path = "otel-ledger" }
file-lifecycle = { path = "file-lifecycle" }
otel-ingestor = { path = "otel-ingestor" }
otel-catalog = { path = "otel-catalog" }
file-cache = { path = "file-cache" }

# IPC / RPC crates
ferryboat = { path = "ferryboat" }

file-registry = { path = "file-registry" }
otel-logs-identity = { path = "otel-logs-identity" }
wal = { path = "wal" }
wal-otap = { path = "wal-otap" }

opendal = { version = "0.55", default-features = false, features = ["services-fs", "services-s3", "executors-tokio"] }

rustls = { version = "0.23", default-features = false, features = ["ring"] }
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-webpki-roots"] }
url = "2"

crc32fast = "1"
tempfile = { version = "3" }

proptest = "1.9"
zstd = "0.13"
fsst-rs = "0.5"
futures-util = { version = "0.3", features = ["sink"] }
flate2 = "1"
reqwest = { version = "0.13.2", features = ["stream"] }


[profile.dev]
opt-level = 1
debug = true
debug-assertions = true

[profile.release]
# Keep debuginfo in packaged release builds so production crashes remain symbolizable.
debug = true
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.release-min]
inherits = "release"
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

# Profiling builds (perf / heaptrack): optimized like release, but no LTO so
# stack backtraces attribute to the real functions instead of being mangled
# by cross-crate inlining. Build with `cargo build --profile profiling`.
[profile.profiling]
inherits = "release"
lto = false
codegen-units = 16
debug = true
