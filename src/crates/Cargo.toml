[workspace]
resolver = "2"
exclude = ["jf"]
members = [
    # Individual crates
    "journal-common",
    "journal-core",
    "journal-index",
    "journal-file-index",
    "journal-chunk",
    "journal-ts",
    "fst-index",
    "treight",
    "split-fst",
    "journal-log-writer",
    "journal-engine",
    "journal-registry",
    "sd-compat",

    # Netdata plugin workspace members
    "netdata-plugin/error",
    "netdata-plugin/protocol",
    "netdata-plugin/rt",
    "netdata-plugin/schema",
    "netdata-plugin/types",
    "netdata-plugin/bridge",
    "netdata-plugin/charts-derive",

    # Netdata log viewer workspace members
    "journal-function",

    # Netdata OTEL workspace members
    "otel-plugin",
    "otel-ledger",
    "flatten-otel",

    # Stress test tools
    "jetstream-otel-bridge",
    "certstream-otel-bridge",
    "wiki-otel-bridge",
    "github-otel-bridge",
    "tlc-otel-bridge",

    # IPC / RPC
    "ferryboat",

    "otel-flatten",
    "otel-ingestor",

    # WAL
    "wal",
    "wal-explore",
    "log-index",
]

[workspace.package]
version = "0.1.3"
edition = "2024"
rust-version = "1.85"

[workspace.lints.clippy]
collapsible_if = "allow"

[workspace.dependencies]
static_assertions = "1.1"
thiserror = "2"
zerocopy = { version = "0.9.0-alpha.0" }
libc = "0.2"
memmap2 = "0.9"
uuid = { version = "1.0"}
nix = { version = "0.30" }

ruzstd = "0.8"
siphasher = "1.0"
hashers = "1.0"
twox-hash = { version = "2.1", default-features = false }
rand = "0.9"
lz4_flex = { version = "0.12", default-features = false, features = ["std", "safe-decode", "checked-decode"] }
lzma-rust2 = { version = "0.15", default-features = false, features = ["std", "xz"] }
md5 = "0.7"
arrayvec = "0.7"
cardinality-estimator = "1.0"

fst = { git = "https://github.com/vkalintiris/fst.git", branch="bumpalo" }
roaring = { git = "https://github.com/netdata/roaring-rs.git", branch="allocative" }
serde = { version = "1.0" }
hashbrown = "0.15"
rustc-hash = "2.1"
bincode = { version = "2.0", features = ["serde"] }
notify = "8.2"

walkdir = "2.4"
crossbeam-channel = "0.5"
regex = "1.10"
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4" }


async-trait = "0.1.89"
serde_yaml = "0.9.34"
serde_regex = "1.1.0"
tokio = { version = "1.45", features = ["full"] }

# Tracing
console-subscriber = "0.5"
tracing = { version = "0.1" }
tracing-journald = "0.3"
tracing-futures = { version = "0.2.5" }
tracing-subscriber = "0.3"
opentelemetry-proto = "0.31"
prost = "0.14"

# Netdata plugin
schemars = "1.0"

# Journal histogram dependencies
atoi = "2.0"
bitflags = "2.9"
bytes = "1"
futures = "0.3"
phf = { version = "0.12", default-features = false }
phf_codegen = "0.12"
tokio-util = { version = "0.7", features = ["codec"] }
lru = "0.16"
parking_lot = "0.12"
allocative = "0.3.4"
bumpalo = { version = "3", features = ["collections", "std"] }
tikv-jemallocator = "0.6"
rayon = "1.11.0"
itoa = "1.0"

base64 = "0.22"
bytesize = "1.3"
bytesize-serde = "0.2"
clap = { version = "4", features = ["derive"] }
humantime = "2.2"
humantime-serde = "1.1"
tonic = "0.14"

flatten-serde-json = { git = "https://github.com/meilisearch/meilisearch", tag = "v1.22.1" }

# Internal workspace crates
journal-common = { path = "journal-common" }
journal-core = { path = "journal-core" }
journal-index = { path = "journal-index", default-features = false }
journal-chunk = { path = "journal-chunk" }
journal-engine = { path = "journal-engine" }
journal-registry = { path = "journal-registry" }
fst-index = { path = "fst-index" }
treight = { path = "treight" }
split-fst = { path = "split-fst" }
sd-compat = { path = "sd-compat" }

# Netdata plugin crates
netdata-plugin-error = { path = "netdata-plugin/error" }
netdata-plugin-protocol = { path = "netdata-plugin/protocol" }
netdata-plugin-schema = { path = "netdata-plugin/schema" }
rt = { path = "netdata-plugin/rt" }

# Netdata log viewer crates
journal-function = { path = "journal-function" }

# Netdata OTEL crates

flatten_otel = { path = "flatten-otel" }
otel-flatten = { path = "otel-flatten" }

# Ledger
otel-ledger = { path = "otel-ledger" }

# IPC / RPC crates
ferryboat = { path = "ferryboat" }

wal = { path = "wal" }
log-index = { path = "log-index" }

opendal = { version = "0.55", default-features = false, features = ["services-fs", "services-s3", "executors-tokio"] }

rustls = { version = "0.23", default-features = false, features = ["ring"] }
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-webpki-roots"] }
url = "2"

crc32fast = "1"
tempfile = { version = "3" }

proptest = "1.9"
zstd = "0.13"
fsst-rs = "0.5"
gix-chunk = "0.7"
futures-util = { version = "0.3", features = ["sink"] }
flate2 = "1"
reqwest = { version = "0.12", features = ["stream"] }
reqwest-eventsource = "0.6"
pco = "1.0.1"

[profile.dev]
opt-level = 1
debug = true
debug-assertions = true

[profile.release]
debug = true
lto = "fat"
opt-level = 3
codegen-units = 1

[profile.release-min]
inherits = "release"
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
