[package]
name = "journal-engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
allocative = ["dep:allocative", "journal-index/allocative"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
static_assertions = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
parking_lot = { workspace = true, features = ["send_guard"] }
rayon = { workspace = true }

journal-core = { workspace = true }
journal-index = { workspace = true }
journal-registry = { workspace = true }
tokio-util = { workspace = true }
lru = { workspace = true }

allocative = { workspace = true, optional = true }

[dev-dependencies]
chrono = { workspace = true }
clap = { workspace = true }
rand = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tempfile = { workspace = true }
uuid = { workspace = true }
journal-common = { workspace = true }
tikv-jemallocator = { workspace = true }
