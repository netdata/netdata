# NetFlow/IPFIX/sFlow plugin configuration.
#
# This file is loaded by netflow-plugin when running under Netdata from:
# - /etc/netdata/netflow.yaml (user config, preferred)
# - /usr/lib/netdata/conf.d/netflow.yaml (stock fallback)
#
# If listener/protocol/journal values are omitted here, they follow plugin defaults.
#
# If enrichment.geoip paths are omitted, netflow-plugin auto-detects MMDB files from:
# - NETDATA_CACHE_DIR/topology-ip-intel
# - NETDATA_STOCK_DATA_DIR/topology-ip-intel

# Global plugin switch for netflow-plugin itself.
enabled: true

listener:
  # UDP socket for NetFlow/IPFIX/sFlow exporters.
  listen: "0.0.0.0:2055"
  max_packet_size: 9216
  sync_every_entries: 1024
  sync_interval: 1s

protocols:
  v5: true
  v7: true
  v9: true
  ipfix: true
  sflow: true
  # one of: none, srv6, vxlan
  decapsulation_mode: none
  # one of: input, netflow_packet, netflow_first_switched
  timestamp_source: input

journal:
  # Relative paths are resolved against NETDATA_CACHE_DIR.
  # With the default Netdata cache dir this becomes /var/cache/netdata/flows.
  journal_dir: flows

  # Per-tier retention. Each tier has its own size_of_journal_files (hard
  # cap; minimum 100MB; null disables size-based retention) and
  # duration_of_journal_files (time cap; null disables time-based
  # retention). Validation requires at least one positive limit per tier.
  # Internal rotation size derives from size_of_journal_files:
  # clamp(size_of_journal_files / 20, 5MB, 200MB). When size is null,
  # internal rotation defaults to 100MB and retention is controlled only
  # by duration.
  tiers:
    raw:
      size_of_journal_files: 10GB
      duration_of_journal_files: 7d
    minute_1:
      size_of_journal_files: 10GB
      duration_of_journal_files: 7d
    minute_5:
      size_of_journal_files: 10GB
      duration_of_journal_files: 7d
    hour_1:
      size_of_journal_files: 10GB
      duration_of_journal_files: 7d

  # Cap on the number of distinct group keys a single aggregation query
  # can build before extra groups are folded into a synthetic
  # __overflow__ bucket. Protects the worker from accidentally wide
  # group-by combinations exhausting memory.
  query_max_groups: 50000

# Optional advanced enrichment modules.
# Keep disabled unless explicitly configured.
enrichment:
  routing_dynamic:
    bmp:
      enabled: false
    bioris:
      enabled: false
