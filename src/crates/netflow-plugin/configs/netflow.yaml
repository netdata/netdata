# NetFlow/IPFIX/sFlow plugin configuration.
#
# This file is loaded by netflow-plugin when running under Netdata from:
# - /etc/netdata/netflow.yaml (user config, preferred)
# - /usr/lib/netdata/conf.d/netflow.yaml (stock fallback)
#
# If listener/protocol/journal values are omitted here, they follow plugin defaults.
#
# If enrichment.geoip paths are omitted, netflow-plugin auto-detects MMDB files from:
# - NETDATA_CACHE_DIR/topology-ip-intel
# - NETDATA_STOCK_DATA_DIR/topology-ip-intel

# Global plugin switch for netflow-plugin itself.
enabled: true

listener:
  # UDP sockets for NetFlow/IPFIX and sFlow exporters.
  listen:
    - "0.0.0.0:2055"
    - "0.0.0.0:6343"
  max_packet_size: 9216
  # Periodic fsync of the active raw journal. 0 (default) disables it: data
  # reaches disk via kernel writeback, and every journal file is fully synced
  # when rotated and at shutdown. Values > 0 fsync after that many records
  # (and at least once per sync_interval); at high flow rates this stalls the
  # receive path and can cause UDP drops.
  sync_every_entries: 0
  sync_interval: 1s

protocols:
  v5: true
  v7: true
  v9: true
  ipfix: true
  sflow: true
  # one of: none, srv6, vxlan
  decapsulation_mode: none
  # one of: input, netflow_packet, netflow_first_switched
  timestamp_source: input
  # Expire NetFlow v9 templates 90 minutes after the last template refresh.
  # Data records do not refresh this timer. Set to null to disable expiry.
  v9_template_lifetime: 90m
  # Bound learned NetFlow v9/IPFIX sampling rates. The per-stream limit is
  # clamped to the global limit when configured higher.
  sampling_cache_max_entries: 100000
  sampling_cache_max_entries_per_stream: 65536

journal:
  # Relative paths are resolved against NETDATA_CACHE_DIR.
  # With the default Netdata cache dir this becomes /var/cache/netdata/flows.
  journal_dir: flows

  # Per-tier retention. Each tier has its own size_of_journal_files (hard
  # cap; minimum 100MB; null disables size-based retention) and
  # duration_of_journal_files (optional time cap; null disables time-based
  # retention). The stock default is size-only retention: 10GB per tier
  # with no age-based eviction. Validation requires at least one positive
  # limit per tier.
  # Internal rotation size derives from size_of_journal_files:
  # clamp(size_of_journal_files / 20, 5MB, 200MB). When size is null,
  # internal rotation defaults to 100MB and retention is controlled only
  # by duration.
  tiers:
    raw:
      size_of_journal_files: 10GB
      duration_of_journal_files: null
    minute_1:
      size_of_journal_files: 10GB
      duration_of_journal_files: null
    minute_5:
      size_of_journal_files: 10GB
      duration_of_journal_files: null
    hour_1:
      size_of_journal_files: 10GB
      duration_of_journal_files: null

  # Cap on the number of distinct group keys a single aggregation query
  # can build before extra groups are folded into a synthetic
  # __overflow__ bucket. Protects the worker from accidentally wide
  # group-by combinations exhausting memory.
  query_max_groups: 50000

charts:
  # Expensive absolute memory diagnostics. Disabled by default because these
  # charts read process memory maps and estimate in-memory structures. The
  # default production charts still expose lightweight counts/cardinality.
  memory_diagnostics:
    enabled: false
    interval: 10s

# Optional advanced enrichment modules.
# Keep disabled unless explicitly configured.
enrichment:
  routing_dynamic:
    bmp:
      enabled: false
    bioris:
      enabled: false
