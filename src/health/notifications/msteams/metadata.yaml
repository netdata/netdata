# yamllint disable rule:line-length
---
- id: 'notify-teams'
  meta:
    name: 'Microsoft Teams'
    link: 'https://www.microsoft.com/en-us/microsoft-teams/log-in'
    categories:
      - notify.agent
    icon_filename: 'msteams.svg'
  keywords:
    - Microsoft
    - Teams
    - MS teams
  overview:
    notification_description: |
      You can send Netdata alerts to Microsoft Teams using Netdata's Agent alert notification feature, which supports dozens of endpoints, user roles, and more.
    notification_limitations: ''
  setup:
    prerequisites:
      list:
        - title: ''
          description: |
            - The incoming webhook URL as given by Microsoft Teams. You can use the same on all your Netdata servers (or you can have multiple if you like).
            - One or more channels to post the messages to
            - Access to the terminal where Netdata Agent is running
    configuration:
      file:
        name: 'health_alarm_notify.conf'
      options:
        description: 'The following options can be defined for this notification'
        folding:
          title: 'Config Options'
          enabled: true
        list:
          - name: 'SEND_MSTEAMS'
            default_value: 'YES'
            description: "Set `SEND_MSTEAMS` to YES"
            required: true
          - name: 'MSTEAMS_WEBHOOK_URL'
            default_value: ''
            description: "set `MSTEAMS_WEBHOOK_URL` to the incoming webhook URL as given by Microsoft Teams."
            required: true
          - name: 'DEFAULT_RECIPIENT_MSTEAMS'
            default_value: ''
            description: "Set `DEFAULT_RECIPIENT_MSTEAMS` to the encoded Microsoft Teams channel name you want the alert notifications to be sent to."
            required: true
            detailed_description: |
              In Microsoft Teams the channel name is encoded in the URI after `/IncomingWebhook/`. You must replace the encoded channel name in `MSTEAMS_WEBHOOK_URL` with the literal placeholder `CHANNEL`. At runtime, the notification system replaces `CHANNEL` in the webhook URL with the channel name from `DEFAULT_RECIPIENT_MSTEAMS` or `role_recipients_msteams`. You can define multiple channels like this: `CHANNEL1` `CHANNEL2`.

              All roles will default to this variable if left unconfigured.

              You can have different channels per role, by editing `DEFAULT_RECIPIENT_MSTEAMS` with the channel you want, in the following entries at the bottom of the same file:
              ```text
              role_recipients_msteams[sysadmin]="CHANNEL1"
              role_recipients_msteams[domainadmin]="CHANNEL2"
              role_recipients_msteams[dba]="databases CHANNEL3"
              role_recipients_msteams[webmaster]="CHANNEL4"
              role_recipients_msteams[proxyadmin]="CHANNEL5"
              role_recipients_msteams[sitemgr]="CHANNEL6"
              ```

              **Power Automate workflows:** If you are using a Power Automate workflow URL instead of a native Teams webhook, the URL format is different (for example `https://prod-XX.westus.logic.azure.com:443/workflows/...`) and does not contain an encoded channel name. In this case, set `DEFAULT_RECIPIENT_MSTEAMS` to any non-empty descriptive string (for example `alerts` or `powerautomate`). The notification system substitutes the recipient value for the literal string `CHANNEL` in the webhook URL; if `CHANNEL` does not appear in the URL, the URL is used as-is and the recipient value serves as a label.

              For per-role routing with Power Automate, add `&channel=CHANNEL` as a query parameter to the workflow URL so the substitution mechanism works, then use distinct channel names per role in `role_recipients_msteams`.
      examples:
        folding:
          enabled: true
          title: ''
        list:
          - name: 'Basic Configuration'
            folding:
              enabled: false
            description: ''
            config: |
              #------------------------------------------------------------------------------
              # Microsoft Teams (office.com) global notification options

              SEND_MSTEAMS="YES"
              MSTEAMS_WEBHOOK_URL="https://outlook.office.com/webhook/XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX@XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX/IncomingWebhook/CHANNEL/XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX"
              DEFAULT_RECIPIENT_MSTEAMS="XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
          - name: 'Power Automate Configuration'
            folding:
              enabled: true
            description: ''
            config: |
              #------------------------------------------------------------------------------
              # Microsoft Teams via Power Automate workflow

              SEND_MSTEAMS="YES"
              MSTEAMS_WEBHOOK_URL="https://prod-XX.westus.logic.azure.com:443/workflows/XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX/triggers/manual/paths/invoke?api-version=2016-06-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
              DEFAULT_RECIPIENT_MSTEAMS="alerts"
  troubleshooting:
    problems:
      list: []
