# you can disable an alarm notification by setting the 'to' line to: silent

# --- Availability: Collector Backend Unreachable ---

 template: bgp_collector_backend_unreachable
       on: bgp.collector_status
    class: Availability
     type: Network
component: BGP
   lookup: average -2m unaligned of ok,permission_error,timeout,query_error,parse_error
     calc: ($ok == 0 AND ($permission_error + $timeout + $query_error + $parse_error) > 0) ? (1) : (0)
    units: status
    every: 30s
     crit: $this == 1
    delay: down 2m multiplier 1.5 max 30m
  summary: BGP collector cannot collect from ${label:backend} backend at ${label:target}
     info: Netdata cannot collect BGP data from the configured ${label:backend} target ${label:target}; current scrape failure is a permission, timeout, query, or parse error
       to: sysadmin

# --- Availability: RPKI Cache Down ---

 template: bgp_rpki_cache_down
       on: bgp.rpki_cache_state
    class: Availability
     type: Network
component: BGP
   lookup: average -2m unaligned of up,down
     calc: ($up == 0 AND $down > 0) ? (1) : (0)
    units: status
    every: 30s
     crit: $this == 1
    delay: down 2m multiplier 1.5 max 30m
  summary: BGP RPKI cache ${label:cache} down on ${label:backend}
     info: Netdata sees the daemon-native RPKI cache ${label:cache} on ${label:backend} in a non-established state for the full 2-minute evaluation window
       to: sysadmin

# --- Availability: Peer Down ---

 template: bgp_peer_down
       on: bgp.peer_state
    class: Availability
     type: Network
component: BGP
   lookup: countif(==0) -2m unaligned of state
    units: %
    every: 30s
     crit: $this == 100
    delay: down 2m multiplier 1.5 max 30m
  summary: BGP peer ${label:peer} down in ${label:vrf}/${label:afi}/${label:safi}
     info: BGP peer ${label:peer} (AS${label:peer_as}) has remained out of the established state for the full 2-minute evaluation window
       to: sysadmin

# --- Availability: No Established Peers In Family ---

 template: bgp_family_no_established_peers
       on: bgp.family_peer_states
    class: Availability
     type: Network
component: BGP
   lookup: average -2m unaligned of established,admin_down,down
     calc: (($established + $admin_down + $down) > 0 AND $established == 0 AND $down > 0) ? (1) : (0)
    units: status
    every: 30s
     crit: $this == 1
    delay: down 2m multiplier 1.5 max 30m
  summary: No established BGP peers in ${label:vrf}/${label:afi}/${label:safi}
     info: All non-admin-disabled peers are down for the BGP family ${label:vrf}/${label:afi}/${label:safi}
       to: sysadmin

# --- Errors: Received Prefix Drift ---
# Uses Netdata ML anomaly detection so the alert adapts to each peer's normal prefix behavior.

 template: bgp_peer_prefixes_received_anomaly
       on: bgp.peer_prefixes_received
    class: Errors
     type: Network
component: BGP
   lookup: average -15m anomaly-bit of received
     calc: $this
    units: %
    every: 30s
     warn: $this > (($status >= $WARNING)  ? (5) : (15))
     crit: $this > (($status == $CRITICAL) ? (15) : (30))
    delay: down 10m multiplier 1.5 max 1h
  summary: BGP prefix drift on peer ${label:peer} in ${label:vrf}/${label:afi}/${label:safi}
     info: Rolling ML anomaly rate for received prefixes on peer ${label:peer} (AS${label:peer_as}); sustained anomalies usually mean unexpected route loss or route growth
       to: sysadmin

# --- Errors: Message Churn Anomaly ---
# Uses Netdata ML anomaly detection on family-level message rates to highlight unusual churn.

template: bgp_family_messages_anomaly
       on: bgp.family_messages
    class: Errors
     type: Network
component: BGP
   lookup: average -10m anomaly-bit of received,sent
     calc: $this
    units: %
    every: 30s
     warn: $this > (($status >= $WARNING)  ? (5) : (20))
     crit: $this > (($status == $CRITICAL) ? (20) : (40))
    delay: down 10m multiplier 1.5 max 1h
  summary: BGP message churn anomaly in ${label:vrf}/${label:afi}/${label:safi}
     info: Rolling ML anomaly rate for BGP message traffic in ${label:vrf}/${label:afi}/${label:safi}; sustained anomalies usually indicate unstable peers or unusual route churn
       to: sysadmin

# --- Errors: Neighbor Churn Anomaly ---
# Uses Netdata ML anomaly detection on neighbor-scoped churn traffic without keepalives.

 template: bgp_neighbor_churn_anomaly
       on: bgp.neighbor_churn
    class: Errors
     type: Network
component: BGP
   lookup: average -10m anomaly-bit of updates_received,updates_sent,notifications_received,notifications_sent,route_refresh_received,route_refresh_sent
     calc: $this
    units: %
    every: 30s
     warn: $this > (($status >= $WARNING)  ? (5) : (20))
     crit: $this > (($status == $CRITICAL) ? (20) : (40))
    delay: down 10m multiplier 1.5 max 1h
  summary: BGP churn anomaly on peer ${label:peer} in VRF ${label:vrf}
     info: Rolling ML anomaly rate for BGP updates, notifications, and route-refresh traffic on peer ${label:peer} (AS${label:peer_as}); sustained anomalies usually indicate instability or abnormal route churn
       to: sysadmin

# --- Errors: Peer Transition Anomaly ---
# Uses Netdata ML anomaly detection on per-neighbor drop counters to surface sustained flap patterns.

 template: bgp_peer_transitions_anomaly
       on: bgp.neighbor_transitions
    class: Errors
     type: Network
component: BGP
   lookup: average -10m anomaly-bit of dropped
     calc: $this
    units: %
    every: 30s
     warn: $this > (($status >= $WARNING)  ? (5) : (20))
     crit: $this > (($status == $CRITICAL) ? (20) : (40))
    delay: down 10m multiplier 1.5 max 1h
 summary: BGP transition anomaly on peer ${label:peer} in VRF ${label:vrf}
     info: Rolling ML anomaly rate for BGP session drops on peer ${label:peer} (AS${label:peer_as}); sustained anomalies usually indicate flaps or unstable reachability
       to: sysadmin

# --- Errors: Invalid Route Correctness ---
# Triggers only on backends that emit aggregated correctness counts.

 template: bgp_family_correctness_invalid
       on: bgp.family_correctness
    class: Errors
     type: Network
component: BGP
   lookup: average -10m unaligned of invalid
    units: routes
    every: 30s
     crit: $this > 0
    delay: down 10m multiplier 1.5 max 2h
  summary: Invalid BGP routes in ${label:vrf}/${label:afi}/${label:safi}
     info: Netdata sees one or more invalid routes in the aggregated daemon-native correctness view for ${label:vrf}/${label:afi}/${label:safi}
       to: sysadmin
