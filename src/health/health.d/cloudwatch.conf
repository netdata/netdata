# --- MSK ---

# Common practice: ActiveControllerCount below 1 indicates no active controller.

 template: cw_msk_active_controller_missing
       on: cloudwatch.msk_cluster.active_controllers
    class: Availability
     type: Other
component: AWS MSK
   lookup: max -15m unaligned of active
    units: controllers
    every: 1m
     warn: $this != nan AND $this < 1
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK cluster has no active controller on ${label:cluster_name}
     info: MSK cluster ${label:cluster_name} in ${label:region} has had no active controller for a sustained period.
       to: sysadmin

# Common practice: ActiveControllerCount greater than 1 indicates multiple active controllers.

 template: cw_msk_multiple_active_controllers
       on: cloudwatch.msk_cluster.active_controllers
    class: Availability
     type: Other
component: AWS MSK
   lookup: min -15m unaligned of active
    units: controllers
    every: 1m
     warn: $this != nan AND $this > 1
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK cluster has multiple active controllers on ${label:cluster_name}
     info: MSK cluster ${label:cluster_name} in ${label:region} has had more than one active controller for a sustained period.
       to: sysadmin

# Common practice: OfflinePartitionsCount above 0 means partitions are unavailable.

 template: cw_msk_offline_partitions
       on: cloudwatch.msk_cluster.offline_partitions
    class: Availability
     type: Other
component: AWS MSK
   lookup: min -15m unaligned of offline
    units: partitions
    every: 1m
     warn: $this != nan AND $this > 0
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK cluster has offline partitions on ${label:cluster_name}
     info: MSK cluster ${label:cluster_name} in ${label:region} has had offline partitions for a sustained period.
       to: sysadmin

# AWS best practice: keep broker CpuUser + CpuSystem under 60%.

 template: cw_msk_cpu_utilization
       on: cloudwatch.msk.cpu
    class: Utilization
     type: Other
component: AWS MSK
   lookup: min -15m unaligned of user,system
    units: percentage
    every: 1m
     warn: $this != nan AND $this > 60
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK broker CPU utilization high on ${label:cluster_name}/${label:broker_id}
     info: MSK broker ${label:broker_id} in cluster ${label:cluster_name} (${label:region}) has sustained CpuUser plus CpuSystem above the AWS best-practice threshold.
       to: sysadmin

# AWS best practice: create an alarm when KafkaDataLogsDiskUsed reaches 85%.

 template: cw_msk_data_logs_disk_used
       on: cloudwatch.msk.disk_used
    class: Utilization
     type: Other
component: AWS MSK
   lookup: min -15m unaligned of data_logs
    units: percentage
    every: 1m
     warn: $this != nan AND $this >= 85
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK broker data-log disk utilization high on ${label:cluster_name}/${label:broker_id}
     info: MSK broker ${label:broker_id} in cluster ${label:cluster_name} (${label:region}) has sustained data-log disk utilization above the AWS best-practice threshold.
       to: sysadmin

# AWS best practice: alarm when HeapMemoryAfterGC is above 60%.

 template: cw_msk_heap_memory_after_gc
       on: cloudwatch.msk.heap_memory_after_gc
    class: Utilization
     type: Other
component: AWS MSK
   lookup: min -15m unaligned of used
    units: percentage
    every: 1m
     warn: $this != nan AND $this > 60
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK broker heap memory after GC high on ${label:cluster_name}/${label:broker_id}
     info: MSK broker ${label:broker_id} in cluster ${label:cluster_name} (${label:region}) has sustained heap memory after GC above the AWS best-practice threshold.
       to: sysadmin

# Common practice: Kafka UnderReplicatedPartitions above 0 warrants investigation when sustained.
# MSK rolling operations can temporarily increase under-replicated partitions, so this uses a
# longer window than the other MSK warnings.

 template: cw_msk_under_replicated_partitions
       on: cloudwatch.msk.partitions
    class: Availability
     type: Other
component: AWS MSK
   lookup: min -30m unaligned of under_replicated
    units: partitions
    every: 1m
     warn: $this != nan AND $this > 0
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK broker has sustained under-replicated partitions on ${label:cluster_name}/${label:broker_id}
     info: MSK broker ${label:broker_id} in cluster ${label:cluster_name} (${label:region}) has had under-replicated partitions for a sustained period. This can happen during planned MSK rolling maintenance, but outside expected maintenance it means replicas are not fully caught up.
       to: sysadmin

# Common practice: Kafka UnderMinIsrPartitionCount above 0 means partitions are below configured
# minimum in-sync replicas and may affect availability for producers requiring acks=all.

 template: cw_msk_under_min_isr_partitions
       on: cloudwatch.msk.under_min_isr
    class: Availability
     type: Other
component: AWS MSK
   lookup: min -15m unaligned of under_min_isr
    units: partitions
    every: 1m
     warn: $this != nan AND $this > 0
    delay: down 5m multiplier 1.5 max 1h
  summary: MSK broker has partitions below minimum ISR on ${label:cluster_name}/${label:broker_id}
     info: MSK broker ${label:broker_id} in cluster ${label:cluster_name} (${label:region}) has had partitions below the configured minimum in-sync replica count for a sustained period.
       to: sysadmin

