# Alerts for the Linux audit subsystem.
# Monitors audit backlog utilization and failure mode to prevent
# kernel panics caused by audit backlog overflow with failure=2.

# Alert when audit backlog utilization exceeds 50% of the configured limit.
# On systems with failure=2, a full backlog causes an immediate kernel panic.

 template: audit_backlog_utilization
       on: audit.backlog_utilization
    class: Utilization
     type: System
component: Audit
   lookup: max -1m unaligned of utilization
    units: %
    every: 10s
     warn: $this > 50
     crit: $this > 80
    delay: down 5m multiplier 1.5 max 1h
  summary: Audit backlog at ${this}%
     info: Linux audit backlog utilization has reached ${this}% of the configured limit (audit backlog overflow with failure=2 causes a kernel panic)
       to: sysadmin

# Alert when the audit failure mode is set to "panic" (2).
# This is a configuration risk: any audit backlog overflow will crash the system.

 template: audit_failure_mode_panic
       on: audit.status
    class: Errors
     type: System
component: Audit
   lookup: max -10s unaligned of failure
    units: state
    every: 60s
     warn: $this == 2
    delay: down 5m multiplier 1.5 max 1h
  summary: Audit failure mode set to panic
     info: Linux audit failure mode is set to 2 (panic) — any audit backlog overflow will cause an immediate kernel panic
       to: sysadmin

# Alert when audit events are being lost (dropped).
# This indicates the audit backlog is overflowing and events are not being recorded.

 template: audit_lost_events
       on: audit.lost
    class: Errors
     type: System
component: Audit
   lookup: sum -1m unaligned of lost
    units: events
    every: 10s
     warn: $this > 0
    delay: down 5m multiplier 1.5 max 1h
  summary: Audit losing events (${this} lost in last minute)
     info: Linux audit subsystem has lost ${this} events in the last minute due to backlog overflow
       to: sysadmin
