     type: NetworkDevice
component: SNMP traps
   lookup: average -10m unaligned of unknown_oid
    units: errors/s
    every: 1m
     warn: $this > 0
    delay: down 10m multiplier 1.5 max 1h
  summary: SNMP traps with unknown OIDs
     info: The SNMP trap listener ${label:job_name} is receiving traps for OIDs not found in any loaded profile. Add a custom trap profile or update the out-of-band profile pack.
       to: sysadmin

