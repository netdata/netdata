# Dedup suppression rate alert.
 template: snmp_trap_high_dedup_suppression
       on: snmp.trap.dedup_suppressed
    class: Errors
     type: NetworkDevice
component: SNMP traps
   lookup: average -10m unaligned of suppressed
    units: events/s
    every: 1m
     warn: $this > 1000
     crit: $this > 10000
    delay: up 10m down 10m multiplier 1.5 max 1h
  summary: High SNMP trap deduplication suppression rate
     info: The SNMP trap listener ${label:job_name} is suppressing a high volume of duplicate traps. Consider checking whether a trap storm is in progress.
       to: sysadmin
