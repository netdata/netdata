# SNMP trap collector health alerts.
# These templates fire on per-job self-metrics emitted by the snmp_traps plugin.

# Severity-rate alerts. Notice, info, and debug do not alert by default.
 template: snmp_trap_emergency_events
       on: snmp.trap.severity
    class: Errors
     type: NetworkDevice
component: SNMP traps
   lookup: average -5m unaligned of emerg
    units: events/s
    every: 1m
     crit: $this > 0
    delay: down 5m multiplier 1.5 max 1h
  summary: Emergency SNMP traps received
     info: The SNMP trap listener ${label:job_name} is receiving emergency-severity traps. At least one device reports a system-unusable state.
       to: sysadmin

 template: snmp_trap_alert_events
       on: snmp.trap.severity
    class: Errors
     type: NetworkDevice
component: SNMP traps
   lookup: average -5m unaligned of alert
    units: events/s
    every: 1m
     warn: $this > 0
     crit: $this > 5
    delay: up 1m down 5m multiplier 1.5 max 1h
  summary: Alert-severity SNMP traps received
     info: The SNMP trap listener ${label:job_name} is receiving alert-severity traps that require immediate attention on the sending device.
       to: sysadmin

