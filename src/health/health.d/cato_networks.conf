# you can disable an alarm notification by setting the 'to' line to: silent

 template: cato_networks_collector_collection_failed
       on: cato_networks.collector_collection_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -5m unaligned of successful
    units: status
    every: 1m
     crit: $this < 1
    delay: down 10m multiplier 1.5 max 1h
  summary: Cato collector collection failed
     info: Cato Networks collector is failing to complete collection. Check collector operation failure charts for the failing API operation and error class.
       to: sysadmin

 template: cato_networks_collector_events_marker_persistence_unavailable
       on: cato_networks.collector_events_marker_persistence_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of available
    units: status
    every: 1m
     warn: $this < 1
    delay: down 10m multiplier 1.5 max 1h
 summary: Cato events marker persistence unavailable
     info: Cato Networks events are enabled but the collector cannot persist the EventsFeed marker. Event counters can reset after Agent restarts.
       to: sysadmin

 template: cato_networks_collector_cardinality_limit_hit
       on: cato_networks.collector_cardinality_limit_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of hit
    units: status
    every: 1m
     warn: $this > 0
    delay: down 10m multiplier 1.5 max 1h
  summary: Cato collector cardinality limit hit for ${label:entity}
     info: Cato Networks collector skipped ${label:entity} entities because a configured cardinality cap was reached. Check collector skipped entity charts and adjust selectors or limits.
       to: sysadmin

 template: cato_networks_site_disconnected
       on: cato_networks.site_connectivity_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -5m unaligned of disconnected
    units: status
    every: 1m
     crit: $this > 0
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato site ${label:site_name} disconnected
     info: Cato site ${label:site_name} reports disconnected connectivity status
       to: sysadmin

 template: cato_networks_site_degraded
       on: cato_networks.site_connectivity_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of degraded
    units: status
    every: 1m
     warn: $this > 0
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato site ${label:site_name} degraded
     info: Cato site ${label:site_name} reports degraded connectivity status
       to: sysadmin

 template: cato_networks_site_packet_loss
       on: cato_networks.site_packet_loss
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of upstream,downstream
    units: %
    every: 1m
    green: 1
      red: 5
     warn: $this > $green
     crit: $this > $red
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato site ${label:site_name} packet loss
     info: Cato site ${label:site_name} packet loss over the last 10 minutes
       to: sysadmin

 template: cato_networks_bgp_session_down
       on: cato_networks.bgp_session_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of up
    units: status
    every: 1m
     crit: $this < 1
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato BGP session down for ${label:site_name}
     info: Cato BGP session to peer ${label:peer_ip} (${label:peer_asn}) is down
       to: sysadmin
