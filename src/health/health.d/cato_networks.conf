# you can disable an alarm notification by setting the 'to' line to: silent

 template: cato_networks_site_disconnected
       on: cato_networks.site_connectivity_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -5m unaligned of disconnected
    units: status
    every: 1m
     crit: $this > 0
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato site ${label:site_name} disconnected
     info: Cato site ${label:site_name} reports disconnected connectivity status
       to: sysadmin

 template: cato_networks_site_degraded
       on: cato_networks.site_connectivity_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of degraded
    units: status
    every: 1m
     warn: $this > 0
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato site ${label:site_name} degraded
     info: Cato site ${label:site_name} reports degraded connectivity status
       to: sysadmin

 template: cato_networks_site_packet_loss
       on: cato_networks.site_packet_loss
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of upstream,downstream
    units: %
    every: 1m
    green: 1
      red: 5
     warn: $this > $green
     crit: $this > $red
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato site ${label:site_name} packet loss
     info: Cato site ${label:site_name} packet loss over the last 10 minutes
       to: sysadmin

 template: cato_networks_bgp_session_down
       on: cato_networks.bgp_session_status
    class: Errors
     type: Network
component: Cato Networks
   lookup: average -10m unaligned of up
    units: status
    every: 1m
     crit: $this < 1
    delay: down 15m multiplier 1.5 max 1h
  summary: Cato BGP session down for ${label:site_name}
     info: Cato BGP session to peer ${label:peer_ip} (${label:peer_asn}) is down
       to: sysadmin
