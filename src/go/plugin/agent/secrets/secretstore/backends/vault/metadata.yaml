# yamllint disable rule:line-length
---
id: 'secretstore-vault'
meta:
  kind: 'vault'
  name: 'Vault'
  link: 'https://developer.hashicorp.com/vault'
  icon_filename: 'vault.svg'
keywords:
  - 'secretstore'
  - 'secrets'
  - 'vault'
  - 'hashicorp vault'
overview:
  description: |
    Netdata can pull collector credentials directly from HashiCorp Vault at runtime, so you never store passwords or tokens in plain-text configuration files.

    This page covers Vault specific setup. For the full resolver overview and syntax reference, including simpler alternatives like `${env:...}`, `${file:...}`, and `${cmd:...}`, see [Secrets Management](/src/collectors/SECRETS.md).
  limitations: |
    Netdata reads existing secrets from Vault. It does not create or renew Vault tokens. If the configured token expires or becomes invalid, secret resolution fails until Netdata can read a valid token again. If you use `token_file` mode, Netdata re-reads the file on every secret resolution, so an external process (e.g. Vault Agent, a cron job) can renew the token by writing to the file. For KV v2 secrets, Netdata does not add `/data/` to the path automatically.
setup:
  prerequisites:
    list:
      - title: 'Make Vault reachable'
        description: |
          Netdata must be able to reach your Vault server at the address you configure in `addr`.
      - title: 'Provide a Vault token'
        description: |
          Choose one supported authentication mode and make sure Netdata can use it:

          - `token`: store the Vault token directly in the secretstore configuration.
          - `token_file`: store the Vault token in a local file on the Netdata host that is readable by the `netdata` user.

          Prefer `token_file` for production so the Vault token is not embedded directly in the secretstore configuration.
      - title: 'Allow access to the referenced secret paths'
        description: |
          The Vault token used by this secretstore must have a policy that grants `read` capability on the paths you reference from collector configs. Scope the policy to only the paths Netdata needs.
      - title: 'Plan for file-based changes'
        description: |
          If you edit `/etc/netdata/go.d/ss/vault.conf`, restart the Netdata Agent to load the updated secretstore definition.
  configuration:
    file:
      name: 'go.d/ss/vault.conf'
    options:
      description: 'The following options can be defined for this secretstore backend.'
      folding:
        title: 'Config options'
        enabled: true
      list:
        - name: 'mode'
          description: 'How Vault authentication is provided.'
          default_value: 'token'
          required: true
          detailed_description: |
            Supported values:

            - `token`: store the Vault token directly in the secretstore configuration.
            - `token_file`: read the Vault token from a local file on the Netdata host.

            Prefer `token_file` for production so the token is stored separately from the secretstore configuration.
        - name: 'addr'
          description: 'Vault server address / base URL.'
          default_value: ''
          required: true
        - name: 'namespace'
          description: 'Optional Vault Enterprise namespace. Leave it empty for open-source Vault or when your Vault deployment does not use namespaces.'
          default_value: ''
          required: false
        - name: 'tls_skip_verify'
          description: 'Disable TLS certificate verification for Vault requests.'
          default_value: false
          required: false
          detailed_description: |
            This is insecure. Use it only as a temporary workaround or in a non-production environment.
        - name: 'timeout'
          description: 'Timeout in seconds for HTTP requests made by this secretstore backend.'
          default_value: 3
          required: false
        - name: 'mode_token.token'
          group: 'Token'
          description: 'Vault token value. Required when `mode` is `token`.'
          default_value: ''
          required: true
        - name: 'mode_token_file.path'
          group: 'Token File'
          description: 'Path to a file containing the Vault token. Required when `mode` is `token_file`.'
          default_value: ''
          required: true
    examples:
      folding:
        title: 'Example configuration'
        enabled: true
      list:
        - name: 'Token'
          description: 'Store the Vault token directly in the secretstore definition.'
          config: |
            jobs:
              - name: vault_prod
                mode: token
                mode_token:
                  token: your-vault-token
                addr: https://vault.example
        - name: 'Token from environment variable'
          description: 'Use a `${env:...}` resolver for the Vault token to avoid storing it in plain text in the secretstore config file.'
          config: |
            jobs:
              - name: vault_prod
                mode: token
                mode_token:
                  token: "${env:VAULT_TOKEN}"
                addr: https://vault.example
        - name: 'Token file'
          description: 'Read the Vault token from a local file on the Netdata host. Netdata re-reads the file on every secret resolution, so an external process can renew the token by writing to this file.'
          config: |
            jobs:
              - name: vault_prod_file_token
                mode: token_file
                mode_token_file:
                  path: /var/lib/netdata/vault.token
                addr: https://vault.example
        - name: 'Vault Enterprise with namespace'
          description: 'Connect to a Vault Enterprise server using a specific namespace.'
          config: |
            jobs:
              - name: vault_enterprise
                mode: token_file
                mode_token_file:
                  path: /var/lib/netdata/vault.token
                addr: https://vault.example
                namespace: admin
collector_configs:
  description: |
    Use the `${store:vault:...}` syntax to reference Vault secrets in any string field of a collector configuration file.
  summary:
    operand_format: 'path#key'
    example_operand: 'secret/data/netdata/mysql#password'
  format:
    description: |
      The operand is `path#key`.

      Netdata sends the path to Vault as `/v1/<path>` exactly as you provide it. For KV v2 secrets, include `/data/` in the path yourself.
      The `path` must not be empty and must not contain `..`, `?`, or `#`.

      - KV v1 example: `${store:vault:vault_prod:secret/netdata/mysql#password}`.
      - KV v2 example: `${store:vault:vault_prod:secret/data/netdata/mysql#password}` — note the `/data/` segment, Netdata does not add it automatically.
    syntax: '${store:vault:<store-name>:<path#key>}'
    parts:
      list:
        - name: 'vault'
          description: 'The secretstore backend kind.'
        - name: '<store-name>'
          description: 'The name of the configured secretstore, for example `vault_prod`.'
        - name: '<path#key>'
          description: 'The Vault API path and the secret field name, separated by `#`.'
  examples:
    list:
      - name: 'MySQL collector with password from Vault'
        description: |
          This example configures a MySQL collector job in `/etc/netdata/go.d/mysql.conf`.
          The password in the DSN connection string is not stored in plain text. Instead,
          `${store:vault:vault_prod:secret/data/netdata/mysql#password}` tells Netdata to
          read the KV v2 secret at `secret/data/netdata/mysql` from the `vault_prod` store,
          extract the `password` field from the response, and substitute it into the DSN at runtime.
        content: |
          # /etc/netdata/go.d/mysql.conf
          jobs:
            - name: mysql_prod
              dsn: "netdata:${store:vault:vault_prod:secret/data/netdata/mysql#password}@tcp(127.0.0.1:3306)/"
      - name: 'Elasticsearch collector with HTTP basic auth from Vault'
        description: |
          This example configures an Elasticsearch collector job in `/etc/netdata/go.d/elasticsearch.conf`.
          The `password` field uses a secret reference instead of a plain-text value. Netdata reads the
          KV v2 secret at `secret/data/netdata/elasticsearch` from the `vault_prod` store, extracts the
          `password` field, and substitutes it at runtime.
        content: |
          # /etc/netdata/go.d/elasticsearch.conf
          jobs:
            - name: es_prod
              url: https://elasticsearch.example.com:9200
              username: netdata
              password: "${store:vault:vault_prod:secret/data/netdata/elasticsearch#password}"
troubleshooting:
  problems:
    list:
      - name: 'Find the exact error'
        description: |
          Check the Netdata Agent logs when the collector starts or restarts. Vault resolver errors include messages such as `vault returned HTTP 403`, `vault path contains invalid characters`, `operand must be in format 'path#key'`, or `key 'password' not found in vault response`.
      - name: 'Vault returns permission denied or the token has expired'
        description: |
          Check the Vault token policy and, if you use Vault Enterprise namespaces, confirm that `namespace` is correct. If you use a short-lived token, make sure the token is renewed or replaced before it expires.
      - name: 'Secret or key is not found'
        description: |
          Check the operand carefully:

          - Make sure the path is the Vault API path.
          - For KV v2, make sure the path includes `/data/`.
          - Make sure the `key` exists in the returned secret payload.
      - name: 'TLS verification fails'
        description: |
          Make sure the Netdata host trusts the CA that signed the Vault certificate. Use `tls_skip_verify: true` only as an insecure workaround.
      - name: 'Token file cannot be read'
        description: |
          Check the file path, file contents, and that the `netdata` user can read the file.
