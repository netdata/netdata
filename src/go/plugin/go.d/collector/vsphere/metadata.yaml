        - name: resource pool
          description: These metrics refer to the vSphere Resource Pool.
          labels:
            - name: id
              description: vSphere managed object reference ID
            - name: datacenter
              description: Datacenter name
            - name: cluster
              description: Cluster name
            - name: resource_pool
              description: Resource Pool name
            - name: inventory_path
              description: vSphere inventory path; present only when `collect_inventory_path_label` is enabled and the path can be derived
            - name: vsphere_tag_<category>
              description: vSphere tag label; present only for categories matched by `vsphere_tag_categories`; category names are sanitized for label keys and multiple tags in one category are sorted and joined with the pipe character
            - name: vsphere_custom_attribute_<name>
              description: vSphere custom attribute label; present only for attributes matched by `custom_attributes`; attribute names are sanitized for label keys
          metrics:
            - name: vsphere.resource_pool_cpu_usage
              description: Resource Pool CPU usage vs demand
              unit: MHz
              chart_type: line
              dimensions:
                - name: usage
                - name: demand
            - name: vsphere.resource_pool_cpu_entitlement
              description: Resource Pool CPU entitlement
              unit: MHz
              chart_type: line
              dimensions:
                - name: distributed
            - name: vsphere.resource_pool_cpu_allocation
              description: Resource Pool CPU allocation
              unit: MHz
              chart_type: line
              dimensions:
                - name: reservation_used
                - name: unreserved_for_vm
                - name: max_usage
            - name: vsphere.resource_pool_mem_usage
              description: Resource Pool memory usage
              unit: MB
              chart_type: line
              dimensions:
                - name: host
                - name: guest
            - name: vsphere.resource_pool_mem_entitlement
              description: Resource Pool memory entitlement
              unit: MB
              chart_type: line
              dimensions:
                - name: distributed
            - name: vsphere.resource_pool_mem_allocation
              description: Resource Pool memory allocation
              unit: bytes
              chart_type: line
              dimensions:
                - name: reservation_used
                - name: unreserved_for_vm
                - name: max_usage
            - name: vsphere.resource_pool_mem_breakdown
              description: Resource Pool memory state breakdown
              unit: MB
              chart_type: line
              dimensions:
                - name: private
                - name: shared
                - name: swapped
                - name: ballooned
                - name: overhead
                - name: consumed_overhead
                - name: compressed
            - name: vsphere.resource_pool_cpu_config
              description: Resource Pool CPU configured reservation and limit
              unit: MHz
              chart_type: line
              dimensions:
                - name: reservation
                - name: limit
            - name: vsphere.resource_pool_mem_config
              description: Resource Pool memory configured reservation and limit
              unit: MB
              chart_type: line
              dimensions:
                - name: reservation
                - name: limit
            - name: vsphere.resource_pool_overall_status
              description: Resource Pool overall alarm status
              unit: status
              chart_type: line
              dimensions:
                - name: green
                - name: red
                - name: yellow
                - name: gray
