plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-vsphere
      plugin_name: go.d.plugin
      module_name: vsphere
      monitored_instance:
        name: VMware vCenter Server
        link: https://www.vmware.com/products/vcenter-server.html
        icon_filename: vmware.svg
        categories:
          - data-collection.containers-and-vms
      keywords:
        - vmware
        - esxi
        - vcenter
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          Monitors vSphere resources from `vCenter` servers.

          Includes hosts, VMs, datastores, clusters, resource pools,
          and inventory counts.

          Use the `vcsa` collector for vCenter Server Appliance health.

          Use the `snmp` collector with the `vmware-esx` profile for
          ESXi hardware, HBA, and environment sensors.

          Those surfaces are intentionally not duplicated here by default.

          > **Warning**: The `vsphere` collector cannot re-login and continue collecting metrics after a vCenter reboot.
          > go.d.plugin needs to be restarted.
        method_description: ""
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: ""
        limits:
          description: ""
        performance_impact:
          description: |
            The default `update_every` is 20 seconds, and it doesn't make sense to decrease the value.
            **VMware real-time statistics are generated at the 20-second specificity**.

            **Note**: Datastore and cluster performance metrics use 300-second (5-minute) historical intervals because VMware does not support real-time statistics for these entity types. Datastore capacity/status, cluster properties, and resource pool statistics are updated every collection cycle. Host and VM metrics use real-time 20-second intervals.

            It is likely that 20 seconds is not enough for big installations and the value should be tuned.

            To get a better view we recommend running the collector in debug mode and seeing how much time it will take to collect metrics.

            <details>
            <summary>Example (all not related debug lines were removed)</summary>

            ```
            [ilyam@pc]$ ./go.d.plugin -d -m vsphere
            [ DEBUG ] vsphere[vsphere] discover.go:94 discovering : starting resource discovering process
            [ DEBUG ] vsphere[vsphere] discover.go:102 discovering : found 3 dcs, process took 49.329656ms
            [ DEBUG ] vsphere[vsphere] discover.go:109 discovering : found 12 folders, process took 49.538688ms
            [ DEBUG ] vsphere[vsphere] discover.go:116 discovering : found 3 clusters, process took 47.722692ms
            [ DEBUG ] vsphere[vsphere] discover.go:123 discovering : found 2 hosts, process took 52.966995ms
            [ DEBUG ] vsphere[vsphere] discover.go:130 discovering : found 2 vms, process took 49.832979ms
            [ INFO  ] vsphere[vsphere] discover.go:140 discovering : found 3 dcs, 12 folders, 3 clusters (2 dummy), 2 hosts, 3 vms, process took 249.655993ms
            [ DEBUG ] vsphere[vsphere] build.go:12 discovering : building : starting building resources process
            [ INFO  ] vsphere[vsphere] build.go:23 discovering : building : built 3/3 dcs, 12/12 folders, 3/3 clusters, 2/2 hosts, 3/3 vms, process took 63.3µs
            [ DEBUG ] vsphere[vsphere] hierarchy.go:10 discovering : hierarchy : start setting resources hierarchy process
            [ INFO  ] vsphere[vsphere] hierarchy.go:18 discovering : hierarchy : set 3/3 clusters, 2/2 hosts, 3/3 vms, process took 6.522µs
            [ DEBUG ] vsphere[vsphere] filter.go:24 discovering : filtering : starting filtering resources process
            [ DEBUG ] vsphere[vsphere] filter.go:45 discovering : filtering : removed 0 unmatched hosts
            [ DEBUG ] vsphere[vsphere] filter.go:56 discovering : filtering : removed 0 unmatched vms
            [ INFO  ] vsphere[vsphere] filter.go:29 discovering : filtering : filtered 0/2 hosts, 0/3 vms, process took 42.973µs
            [ DEBUG ] vsphere[vsphere] metric_lists.go:14 discovering : metric lists : starting resources metric lists collection process
            [ INFO  ] vsphere[vsphere] metric_lists.go:30 discovering : metric lists : collected metric lists for 2/2 hosts, 3/3 vms, process took 275.60764ms
            [ INFO  ] vsphere[vsphere] discover.go:74 discovering : discovered 2/2 hosts, 3/3 vms, the whole process took 525.614041ms
            [ INFO  ] vsphere[vsphere] discover.go:11 starting discovery process, will do discovery every 5m0s
            [ DEBUG ] vsphere[vsphere] collect.go:11 starting collection process
            [ DEBUG ] vsphere[vsphere] scrape.go:48 scraping : scraped metrics for 2/2 hosts, process took 96.257374ms
            [ DEBUG ] vsphere[vsphere] scrape.go:60 scraping : scraped metrics for 3/3 vms, process took 57.879697ms
            [ DEBUG ] vsphere[vsphere] collect.go:23 metrics collected, process took 154.77997ms
            ```

            </details>

            There you can see that discovering took `525.614041ms`, and collecting metrics took `154.77997ms`. Discovering is a separate thread, it doesn't affect collecting.
            `update_every` and `timeout` parameters should be adjusted based on these numbers.
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: go.d/vsphere.conf
        options:
          description: |
            The following options can be defined globally: update_every, autodetection_retry.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds).
              default_value: 20
              required: false
              group: Collection

            - name: autodetection_retry
              description: Autodetection retry interval (seconds).
              default_value: 60
              required: false
              group: Collection

            - name: url
              description: Target endpoint URL.
              default_value: https://vcenter.local
              required: true
              group: Target
            - name: timeout
              description: HTTP request timeout (seconds).
              default_value: 20
              required: false
              group: Target

            - name: discovery_interval
              description: Hosts, VMs, datastores, clusters, and resource pools discovery interval (seconds).
              default_value: 300
              required: false
              group: Discovery
            - name: host_power_states
              description: ESXi host power states to discover.
              default_value: poweredOn
              required: false
              group: Discovery
              detailed_description: |
                By default, only powered-on hosts are discovered, preserving historical behavior.
                Add `poweredOff`, `standBy`, or `unknown` only when you want non-running hosts
                collected as property/status-only resources. Real-time performance counters are
                skipped for non-powered-on hosts.

                Valid values: `poweredOn`, `poweredOff`, `standBy`, `unknown`.

                ```yaml
                host_power_states:
                  - poweredOn
                  - poweredOff
                  - standBy
                  - unknown
                ```
            - name: vm_power_states
              description: Virtual machine power states to discover.
              default_value: poweredOn
              required: false
              group: Discovery
              detailed_description: |
                By default, only powered-on VMs are discovered, preserving historical behavior.
                Add `poweredOff` or `suspended` only when you want non-running VMs collected as
                property/status/snapshot-only resources. Real-time performance counters are
                skipped for powered-off and suspended VMs.

                Valid values: `poweredOn`, `poweredOff`, `suspended`.

                ```yaml
                vm_power_states:
                  - poweredOn
                  - poweredOff
                  - suspended
                ```
            - name: collect_inventory_path_label
              description: Add an inventory_path label to vSphere resource charts.
              default_value: no
              required: false
              group: Labels
              detailed_description: |
                Disabled by default because inventory paths can expose internal naming
                schemes. When enabled, the collector adds `inventory_path` to VM, host,
                datastore, cluster, and resource-pool charts when the path can be
                derived from discovered inventory.
            - name: vm_guest_labels
              description: VM guest label allowlist.
              default_value: ""
              required: false
              group: Labels
              detailed_description: |
                Disabled by default because guest hostnames, IP addresses, and OS names
                can be sensitive and high cardinality. Valid values are
                `guest_hostname`, `guest_ip`, and `guest_os`.

                ```yaml
                vm_guest_labels:
                  - guest_hostname
                  - guest_ip
                  - guest_os
                ```
            - name: vsphere_tag_categories
              description: vSphere tag category allowlist.
              default_value: ""
              required: false
              group: Labels
              detailed_description: |
                Disabled by default because vSphere tags are user-defined metadata
                and can expose internal names, ownership, business unit, or
                environment details. Each list item is one glob pattern matching
                vSphere tag category names, so names with spaces are supported.
                Use `*` only when every tag category is intentional.

                Matching categories are exposed as labels named
                `vsphere_tag_<sanitized_category>`. When a resource has multiple
                tags in the same category, values are sorted and joined with the
                pipe character.

                ```yaml
                vsphere_tag_categories:
                  - "Environment"
                  - "Business Unit"
                ```
            - name: custom_attributes
              description: vSphere custom attribute allowlist.
              default_value: ""
              required: false
              group: Labels
              detailed_description: |
                Disabled by default because vSphere custom attributes are
                user-defined metadata and can expose internal names, ownership,
                business unit, operational data, or secrets stored by administrators.
                Custom attribute values are sent verbatim as labels. Each list
                item is one glob pattern matching custom attribute names, so names
                with spaces are supported. Use `*` only when every custom attribute
                is intentional and none of the matched values contain secrets.

                Matching attributes are exposed as labels named
                `vsphere_custom_attribute_<sanitized_name>`.

                ```yaml
                custom_attributes:
                  - "Owner"
                  - "Cost Center"
                ```
            - name: collect_vm_disks
              description: Collect VM virtual disk capacity.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits one time series per VM
                virtual disk. Enable it only when vCenter-level disk capacity
                inventory is useful in addition to metrics collected by Agents
                running inside the VMs.
            - name: collect_vm_disk_performance
              description: Collect VM virtual disk performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-virtual-disk I/O,
                IOPS, latency, and outstanding-I/O series and can increase
                vCenter performance-query load. Values are keyed by the
                vSphere `virtualDisk` performance instance, for example
                `scsi0:0`.
            - name: collect_datastore_clusters
              description: Collect datastore cluster capacity and Storage DRS status.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it adds a separate vSphere resource
                class (`StoragePod`) to the collector output. When enabled, the
                collector emits aggregate datastore-cluster capacity, utilization,
                and Storage DRS status.
            - name: datastore_cluster_include
              description: Datastore cluster selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_datastore_clusters` is enabled. Values
                use Netdata simple patterns and match
                `/Datacenter/DatastoreCluster`, the datastore-cluster name, or
                the vSphere managed object ID.

                ```yaml
                datastore_cluster_include:
                  - "/*"
                ```
            - name: vm_disk_include
              description: VM virtual disk selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vm_disks` or
                `collect_vm_disk_performance` is enabled. Values use Netdata
                simple patterns. Capacity collection matches the vSphere disk
                label, the numeric vSphere disk key, or `key:<disk_key>`.
                Performance collection matches the vSphere performance
                instance or `instance:<disk_instance>`.

                ```yaml
                vm_disk_include:
                  - "Hard*"
                  - "key:2000"
                  - "instance:scsi0:0"
                ```
            - name: collect_vm_nic_performance
              description: Collect VM network interface performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-vNIC traffic, packet,
                drop, broadcast, and multicast series and can increase vCenter
                performance-query load. Packet error counters are not emitted
                for VMs because Broadcom's network counter table lists them for
                `HostSystem` only.
            - name: vm_nic_include
              description: VM network interface selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vm_nic_performance` is enabled.
                Values use Netdata simple patterns and match the vSphere
                performance instance or `interface:<interface_instance>`.

                ```yaml
                vm_nic_include:
                  - "*"
                  - "interface:4000"
                ```
            - name: collect_host_nic_performance
              description: Collect host physical network interface performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-host-pNIC traffic,
                packet, drop, error, broadcast, multicast, unknown-protocol,
                and usage series and can increase vCenter performance-query
                load.
            - name: host_nic_include
              description: Host physical network interface selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_host_nic_performance` is enabled.
                Values use Netdata simple patterns and match the vSphere
                performance instance or `interface:<interface_instance>`.

                ```yaml
                host_nic_include:
                  - "vmnic*"
                  - "interface:vmnic0"
                ```
            - name: collect_host_disk_performance
              description: Collect host disk device performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-host-disk/LUN/device
                throughput, IOPS, request, latency, queue-depth, command-event,
                and reservation-conflict series and can increase vCenter
                performance-query load.
            - name: host_disk_include
              description: Host disk device selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_host_disk_performance` is enabled.
                Values use Netdata simple patterns and match the vSphere
                performance instance or `instance:<disk_instance>`.

                ```yaml
                host_disk_include:
                  - "naa.*"
                  - "instance:naa.123"
                ```
            - name: collect_host_storage_adapter_performance
              description: Collect host storage adapter performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-host-storage-adapter
                I/O, command, latency, queue, outstanding I/O percentage,
                throughput, and aggregate maximum-latency series and can
                increase vCenter performance-query load.
            - name: host_storage_adapter_include
              description: Host storage adapter selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_host_storage_adapter_performance` is
                enabled. Values use Netdata simple patterns and match the
                vSphere performance instance, `adapter:<adapter_instance>`, or
                `instance:<adapter_instance>`.

                ```yaml
                host_storage_adapter_include:
                  - "vmhba*"
                  - "adapter:vmhba0"
                ```
            - name: collect_host_storage_path_performance
              description: Collect host storage path performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-host-storage-path I/O,
                command, latency, command-event, throughput, and aggregate
                maximum-latency series and can increase vCenter performance-query
                load.
            - name: host_storage_path_include
              description: Host storage path selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_host_storage_path_performance` is
                enabled. Values use Netdata simple patterns and match the
                vSphere performance instance, `path:<path_instance>`, or
                `instance:<path_instance>`.

                ```yaml
                host_storage_path_include:
                  - "vmhba*:C0:T0:L0"
                  - "path:vmhba0:C0:T0:L0"
                ```
            - name: collect_host_cpu_instance_performance
              description: Collect host CPU instance performance.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it emits per-host CPU/core/logical-CPU
                usage, utilization, core-utilization, used-time, and idle-time
                series and can increase vCenter performance-query load.
            - name: host_cpu_instance_include
              description: Host CPU instance selector.
              default_value: "*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_host_cpu_instance_performance` is
                enabled. Values use Netdata simple patterns and match the
                vSphere performance instance, `cpu:<cpu_instance>`, or
                `instance:<cpu_instance>`.

                ```yaml
                host_cpu_instance_include:
                  - "*"
                  - "cpu:0"
                ```
            - name: collect_power_metrics
              description: Collect host and VM power metrics.
              default_value: no
              required: false
              group: Collection
              detailed_description: |
                Disabled by default to preserve existing collection scope and
                avoid extra vCenter performance queries. When enabled, it emits
                aggregate ESXi host and VM power usage, energy usage, and host
                power-capacity metrics for discovered powered-on resources.
            - name: collect_vsan
              description: Collect vSAN metrics.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it uses the vSAN Management API and
                vSAN Performance Service, and adds extra vCenter queries. When
                enabled, it emits vSAN cluster capacity, vSAN cluster health, and
                vSAN cluster, host, and VM performance metrics for discovered
                vSAN-enabled clusters. Use the vSAN selectors below to choose the
                concrete vSAN performance entity refs queried. vSAN events are
                not collected by this option.
            - name: vsan_cluster_include
              description: vSAN cluster selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vsan` is enabled. Values use Netdata
                simple patterns and match `/Datacenter/Cluster`, the cluster
                name, the vSphere managed object ID, or `vsan_uuid:<uuid>`.

                ```yaml
                vsan_cluster_include:
                  - "/*"
                  - "vsan_uuid:52b..."
                ```
            - name: vsan_host_include
              description: vSAN host selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vsan` is enabled. Values use Netdata
                simple patterns and match `/Datacenter/Cluster/Host`, the host
                name, the vSphere managed object ID, or
                `vsan_node_uuid:<uuid>`.

                ```yaml
                vsan_host_include:
                  - "/*"
                  - "vsan_node_uuid:52b..."
                ```
            - name: vsan_vm_include
              description: vSAN VM selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vsan` is enabled. Values use Netdata
                simple patterns and match `/Datacenter/Cluster/Host/VM`, the VM
                name, the vSphere managed object ID, or
                `instance_uuid:<uuid>`.

                ```yaml
                vsan_vm_include:
                  - "/*"
                  - "instance_uuid:52b..."
                ```
            - name: collect_network_topology
              description: Discover networks for the vSphere Topology function.
              default_value: no
              required: false
              group: Collection
              detailed_description: |
                Disabled by default to avoid extra vCenter discovery calls for
                existing users. When enabled, the collector discovers vSphere
                Network and Distributed Virtual Port Group objects and includes
                their cached accessibility/status and host/VM relationships in
                the vSphere Topology function. It does not create charts or
                metrics.

            - name: host_include
              description: Hosts selector (filter).
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of hosts matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Cluster pattern/Host pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  host_include:
                    - '/DC1/*'           # all hosts from datacenter DC1
                    - '/DC2/*/!Host2 *'  # all hosts from datacenter DC2 except HOST2
                    - '/DC3/Cluster3/*'  # all hosts from DC3, cluster Cluster3
                  ```
            - name: vm_include
              description: VM selector (filter).
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of VMs matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Cluster pattern/Host pattern/VM pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  vm_include:
                    - '/DC1/*'           # all VMs from datacenter DC1
                    - '/DC2/*/*/!VM2 *'  # all VMs from DC2 except VM2
                    - '/DC3/Cluster3/*'  # all VMs from DC3, cluster Cluster3
                  ```
            - name: datastore_include
              description: Datastore selector (filter).
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of datastores matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Datastore pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  datastore_include:
                    - '/DC1/*'           # all datastores from datacenter DC1
                    - '/DC2/!DS2 *'      # all datastores from DC2 except DS2
                  ```
            - name: cluster_include
              description: Cluster selector (filter). Resource pools follow their owning cluster.
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of clusters and their resource pools matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Cluster pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  cluster_include:
                    - '/DC1/*'           # all clusters from datacenter DC1
                    - '/DC2/!Cluster2 *' # all clusters from DC2 except Cluster2
                  ```

            - name: username
              description: Username for Basic HTTP authentication.
              default_value: ""
              required: true
              group: HTTP Auth
            - name: password
              description: Password for Basic HTTP authentication.
              default_value: ""
              required: true
              group: HTTP Auth
            - name: bearer_token_file
              description: "Path to a file containing a bearer token (used for `Authorization: Bearer`)."
              default_value: ""
              required: false
              group: HTTP Auth

            - name: tls_skip_verify
              description: Skip TLS certificate and hostname verification (insecure).
              default_value: no
              required: false
              group: TLS
            - name: tls_ca
              description: Path to CA bundle used to validate the server certificate.
              default_value: ""
              required: false
              group: TLS
            - name: tls_cert
              description: Path to client TLS certificate (for mTLS).
              default_value: ""
              required: false
              group: TLS
            - name: tls_key
              description: Path to client TLS private key (for mTLS).
              default_value: ""
              required: false
              group: TLS

            - name: proxy_url
              description: HTTP proxy URL.
              default_value: ""
              required: false
              group: Proxy
            - name: proxy_username
              description: Username for proxy Basic HTTP authentication.
              default_value: ""
              required: false
              group: Proxy
            - name: proxy_password
              description: Password for proxy Basic HTTP authentication.
              default_value: ""
              required: false
              group: Proxy

            - name: method
              description: HTTP method to use.
              default_value: "GET"
              required: false
              group: Request
            - name: body
              description: Request body (e.g., for POST/PUT).
              default_value: ""
              required: false
              group: Request
            - name: headers
              description: "Additional HTTP headers (one per line as key: value)."
              default_value: ""
              required: false
              group: Request
            - name: not_follow_redirects
              description: Do not follow HTTP redirects.
              default_value: no
              required: false
              group: Request
            - name: force_http2
              description: Force HTTP/2 (including h2c over TCP).
              default_value: no
              required: false
              group: Request

            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Basic
              folding:
                enabled: false
              description: A basic example configuration.
              config: |
                jobs:
                  - name     : vcenter1
                    url      : https://203.0.113.1
                    username : admin@vsphere.local
                    password : somepassword
            - name: Multi-instance
              description: |
                > **Note**: When you define multiple jobs, their names must be unique.

                Collecting metrics from local and remote instances.
              config: |
                jobs:
                  - name     : vcenter1
                    url      : https://203.0.113.1
                    username : admin@vsphere.local
                    password : somepassword

                  - name     : vcenter2
                    url      : https://203.0.113.10
                    username : admin@vsphere.local
                    password : somepassword
    troubleshooting:
      problems:
        list: []
    alerts:
      - name: vsphere_vm_cpu_utilization
        metric: vsphere.vm_cpu_utilization
        info: Virtual Machine CPU utilization
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_vm_mem_utilization
        metric: vsphere.vm_mem_utilization
        info: Virtual Machine memory utilization
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_vm_snapshot_chain_depth
        metric: vsphere.vm_snapshot_max_chain_depth
        info: Virtual Machine snapshot maximum chain depth
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
