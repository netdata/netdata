plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-vsphere
      plugin_name: go.d.plugin
      module_name: vsphere
      monitored_instance:
        name: VMware vCenter Server
        link: https://www.vmware.com/products/vcenter-server.html
        icon_filename: vmware.svg
        categories:
          - data-collection.containers-and-vms
      keywords:
        - vmware
        - esxi
        - vcenter
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          Monitors vSphere resources from `vCenter` servers.

          Includes hosts, VMs, datastores, clusters, resource pools,
          and inventory counts.

          Use the `vcsa` collector for vCenter Server Appliance health.

          Use the `snmp` collector with the `vmware-esx` profile for
          ESXi hardware, HBA, and environment sensors.

          Those surfaces are intentionally not duplicated here by default.

          > **Warning**: The `vsphere` collector cannot re-login and continue collecting metrics after a vCenter reboot.
          > go.d.plugin needs to be restarted.
        method_description: ""
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: ""
        limits:
          description: ""
        performance_impact:
          description: |
            The default `update_every` is 20 seconds, and it doesn't make sense to decrease the value.
            **VMware real-time statistics are generated at the 20-second specificity**.

            **Note**: Datastore and cluster performance metrics use 300-second (5-minute) historical intervals because VMware does not support real-time statistics for these entity types. Datastore capacity/status, cluster properties, and resource pool statistics are updated every collection cycle. Host and VM metrics use real-time 20-second intervals.

            It is likely that 20 seconds is not enough for big installations and the value should be tuned.

            To size a job, run the collector in debug mode and compare the discovery and collection timing lines. Discovery runs in a separate goroutine, while collection timing must stay comfortably below `update_every`.

            Useful log lines include:

            - `discovering : discovered ... the whole process took ...`
            - `scraping : scraped metrics for ... hosts, process took ...`
            - `scraping : scraped metrics for ... vms, process took ...`
            - `metrics collected, process took ...`

            Adjust `update_every` and `timeout` based on those timings and on the number of enabled optional surfaces.
    setup:
      prerequisites:
        list:
          - title: vCenter read-only access
            description: |
              Configure a vCenter account that can read inventory objects, properties, and performance counters for the datacenters, clusters, ESXi hosts, VMs, datastores, and resource pools selected by the include filters.
          - title: Optional vSphere metadata permissions
            description: |
              `tag_categories` requires access to the vSphere Automation/CIS tagging APIs for the selected categories. `custom_attributes` requires access to custom field definitions and values for the selected inventory objects.
          - title: Optional datastore cluster, vSAN, and network data
            description: |
              `collect_datastore_clusters` requires read access to StoragePod objects. `collect_vsan` requires vSAN Management API access and the vSAN Performance Service on the target clusters. `collect_network_topology` requires read access to Network and Distributed Virtual Port Group inventory objects.
      configuration:
        file:
          name: go.d/vsphere.conf
        options:
          description: |
            The following options can be defined globally: update_every, autodetection_retry.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds).
              default_value: 20
              required: false
              group: Collection

            - name: autodetection_retry
              description: Autodetection retry interval (seconds).
              default_value: 60
              required: false
              group: Collection

            - name: url
              description: Target endpoint URL.
              default_value: https://vcenter.local
              required: true
              group: Target
            - name: timeout
              description: HTTP request timeout (seconds).
              default_value: 20
              required: false
              group: Target

            - name: discovery_interval
              description: Hosts, VMs, datastores, clusters, and resource pools discovery interval (seconds).
              default_value: 300
              required: false
              group: Discovery
            - name: tag_categories
              description: vSphere tag category allowlist.
              default_value: ""
              required: false
              group: Labels
              detailed_description: |
                Disabled by default because vSphere tags are user-defined metadata
                and can expose internal names, ownership, business unit, or
                environment details. Each list item is one glob pattern matching
                vSphere tag category names, so names with spaces are supported.
                Use `*` only when every tag category is intentional.

                Matching categories are exposed as labels named
                `vsphere_tag_<sanitized_category>`. When a resource has multiple
                tags in the same category, values are sorted and joined with the
                pipe character.

                ```yaml
                tag_categories:
                  - "Environment"
                  - "Business Unit"
                ```
            - name: custom_attributes
              description: vSphere custom attribute allowlist.
              default_value: ""
              required: false
              group: Labels
              detailed_description: |
                Disabled by default because vSphere custom attributes are
                user-defined metadata and can expose internal names, ownership,
                business unit, operational data, or secrets stored by administrators.
                Custom attribute values are sent verbatim as labels. Each list
                item is one glob pattern matching custom attribute names, so names
                with spaces are supported. Use `*` only when every custom attribute
                is intentional and none of the matched values contain secrets.

                Matching attributes are exposed as labels named
                `vsphere_custom_attribute_<sanitized_name>`.

                ```yaml
                custom_attributes:
                  - "Owner"
                  - "Cost Center"
                ```
            - name: collect_datastore_clusters
              description: Collect datastore cluster capacity and Storage DRS status.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it adds a separate vSphere resource
                class (`StoragePod`) to the collector output. When enabled, the
                collector emits aggregate datastore-cluster capacity, utilization,
                and Storage DRS status.
            - name: datastore_cluster_include
              description: Datastore cluster selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_datastore_clusters` is enabled. Values
                use Netdata simple patterns and match
                `/Datacenter/DatastoreCluster`, the datastore-cluster name, or
                the vSphere managed object ID. Matching datastore clusters are
                included in metrics, labels, cached discovery state, and topology
                function output.

                ```yaml
                datastore_cluster_include:
                  - "/*"
                ```
            - name: collect_vsan
              description: Collect vSAN metrics.
              default_value: no
              required: false
              group: High Cardinality
              detailed_description: |
                Disabled by default because it uses the vSAN Management API and
                vSAN Performance Service, and adds extra vCenter queries. When
                enabled, it emits vSAN cluster capacity, vSAN cluster health, and
                vSAN cluster, host, and VM performance metrics for discovered
                vSAN-enabled clusters. Use the vSAN selectors below to choose the
                concrete vSAN performance entity refs queried. vSAN events are
                not collected by this option.
            - name: vsan_cluster_include
              description: vSAN cluster selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vsan` is enabled. Values use Netdata
                simple patterns and match `/Datacenter/Cluster`, the cluster
                name, the vSphere managed object ID, or `vsan_uuid:<uuid>`.

                ```yaml
                vsan_cluster_include:
                  - "/*"
                  - "vsan_uuid:52b..."
                ```
            - name: vsan_host_include
              description: vSAN host selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vsan` is enabled. Values use Netdata
                simple patterns and match `/Datacenter/Cluster/Host`, the host
                name, the vSphere managed object ID, or
                `vsan_node_uuid:<uuid>`.

                ```yaml
                vsan_host_include:
                  - "/*"
                  - "vsan_node_uuid:52b..."
                ```
            - name: vsan_vm_include
              description: vSAN VM selector.
              default_value: "/*"
              required: false
              group: High Cardinality
              detailed_description: |
                Applies only when `collect_vsan` is enabled. Values use Netdata
                simple patterns and match `/Datacenter/Cluster/Host/VM`, the VM
                name, the vSphere managed object ID, or
                `instance_uuid:<uuid>`.

                ```yaml
                vsan_vm_include:
                  - "/*"
                  - "instance_uuid:52b..."
                ```
            - name: collect_network_topology
              description: Discover networks for the vSphere Topology function.
              default_value: no
              required: false
              group: Collection
              detailed_description: |
                Disabled by default to avoid extra vCenter discovery calls for
                existing users. When enabled, the collector discovers vSphere
                Network and Distributed Virtual Port Group objects and includes
                their cached accessibility/status and host/VM relationships in
                the vSphere Topology function. It does not create charts or
                metrics.

            - name: host_include
              description: Hosts selector (filter).
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of hosts matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Cluster pattern/Host pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  host_include:
                    - '/DC1/*'           # all hosts from datacenter DC1
                    - '/DC2/*/!Host2 *'  # all hosts from datacenter DC2 except HOST2
                    - '/DC3/Cluster3/*'  # all hosts from DC3, cluster Cluster3
                  ```
            - name: vm_include
              description: VM selector (filter).
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of VMs matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Cluster pattern/Host pattern/VM pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  vm_include:
                    - '/DC1/*'           # all VMs from datacenter DC1
                    - '/DC2/*/*/!VM2 *'  # all VMs from DC2 except VM2
                    - '/DC3/Cluster3/*'  # all VMs from DC3, cluster Cluster3
                  ```
            - name: datastore_include
              description: Datastore selector (filter).
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of datastores matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Datastore pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  datastore_include:
                    - '/DC1/*'           # all datastores from datacenter DC1
                    - '/DC2/!DS2 *'      # all datastores from DC2 except DS2
                  ```
            - name: cluster_include
              description: Cluster selector (filter). Resource pools follow their owning cluster.
              default_value: "/*"
              required: false
              group: Filters
              detailed_description: |
                Metrics of clusters and their resource pools matching the selector will be collected.

                - Include pattern syntax: "/Datacenter pattern/Cluster pattern".
                - Match pattern syntax: [simple patterns](/src/libnetdata/simple_pattern/README.md#simple-patterns).
                - Syntax:

                  ```yaml
                  cluster_include:
                    - '/DC1/*'           # all clusters from datacenter DC1
                    - '/DC2/!Cluster2 *' # all clusters from DC2 except Cluster2
                  ```

            - name: username
              description: Username for Basic HTTP authentication.
              default_value: ""
              required: true
              group: HTTP Auth
            - name: password
              description: Password for Basic HTTP authentication.
              default_value: ""
              required: true
              group: HTTP Auth

            - name: tls_skip_verify
              description: Skip TLS certificate and hostname verification (insecure).
              default_value: no
              required: false
              group: TLS
            - name: tls_ca
              description: Path to CA bundle used to validate the server certificate.
              default_value: ""
              required: false
              group: TLS
            - name: tls_cert
              description: Path to client TLS certificate (for mTLS).
              default_value: ""
              required: false
              group: TLS
            - name: tls_key
              description: Path to client TLS private key (for mTLS).
              default_value: ""
              required: false
              group: TLS

            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Basic
              folding:
                enabled: false
              description: A basic example configuration.
              config: |
                jobs:
                  - name     : vcenter1
                    url      : https://203.0.113.1
                    username : admin@vsphere.local
                    password : somepassword
            - name: Multi-instance
              description: |
                > **Note**: When you define multiple jobs, their names must be unique.

                Collecting metrics from local and remote instances.
              config: |
                jobs:
                  - name     : vcenter1
                    url      : https://203.0.113.1
                    username : admin@vsphere.local
                    password : somepassword

                  - name     : vcenter2
                    url      : https://203.0.113.10
                    username : admin@vsphere.local
                    password : somepassword
    troubleshooting:
      problems:
        list:
          - name: Missing performance samples
            description: |
              If the logs show `vsphere:host-no-perf-samples` or `vsphere:vm-no-perf-samples`, verify that the configured account can read vCenter performance counters for the selected hosts and VMs, and that the entities are powered on when performance metrics are expected.
          - name: Periodic discovery errors
            description: |
              If the logs show `vsphere:periodic-discovery-error`, check vCenter reachability, account permissions for the enabled optional surfaces, and whether the configured `timeout` is large enough for the inventory size.
          - name: vCenter reboot recovery
            description: |
              The collector cannot always recover an existing session after a vCenter reboot. Restart `go.d.plugin` if collection does not resume after vCenter becomes available again.
    alerts:
      - name: vsphere_vm_cpu_utilization
        metric: vsphere.vm_cpu_utilization
        info: Virtual Machine CPU utilization
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_vm_mem_utilization
        metric: vsphere.vm_mem_utilization
        info: Virtual Machine memory utilization
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_vm_snapshot_chain_depth
        metric: vsphere.vm_snapshot_max_chain_depth
        info: Virtual Machine snapshot maximum chain depth
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_vm_snapshot_age
        metric: vsphere.vm_snapshot_max_age
        info: Virtual Machine oldest snapshot age
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_host_cpu_utilization
        metric: vsphere.host_cpu_utilization
        info: ESXi Host CPU utilization
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
      - name: vsphere_host_mem_utilization
        metric: vsphere.host_mem_utilization
        info: ESXi Host memory utilization
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/vsphere.conf
    functions:
      description: |
        This collector exposes read-only readiness and topology functions for interactive troubleshooting in the Live tab. Both functions require selecting a configured vSphere collector job.
      list:
        - id: readiness
          name: vSphere Readiness
          description: |
            Reports the collector's current readiness from cached local state:

            - the selected vSphere collector job
            - whether the target URL and credentials are configured
            - whether the vSphere client, discovery cache, and performance-counter lists are initialized
            - discovered inventory counts
            - enabled or disabled optional metric, label, and vSAN groups
            - cached vSAN result counts when `collect_vsan` is enabled

            The function does not expose the configured vCenter URL or credentials, and it does not issue extra vCenter API calls.
          parameters:
            - id: __job
              name: Job
              description: Select which configured vSphere collector job to inspect.
              type: select
              required: true
              default: ""
              options: []
          returns:
            description: Collector readiness checks from cached local state. Each row represents one target, discovery, label, scope, metric, or vSAN readiness check.
            columns:
              - name: check
                type: string
                unit: ""
                description: Stable readiness check identifier.
              - name: scope
                type: string
                unit: ""
                description: Area covered by the check, such as target, discovery, labels, scope, or metrics.
              - name: status
                type: string
                unit: ""
                description: Readiness status. Possible values are ok, warning, disabled, and not_ready.
              - name: details
                type: string
                unit: ""
                description: Human-readable explanation of the current cached state for the check.
          performance: |
            Uses cached collector state only:<br/>• No additional vCenter or ESXi API requests are triggered<br/>• Response size is bounded by the number of configured optional groups and cached inventory summary rows
          security: |
            Does not expose the configured vCenter URL, username, password, or per-object inventory names:<br/>• Shows only configuration presence, resource counts, enabled feature flags, include pattern counts, and cached vSAN result counts<br/>• Access should still be restricted to authorized operators because it reveals enabled collection surfaces
          availability: |
            Available when:<br/>• The vSphere collector job is running<br/>• Returns not_ready rows while the collector is not initialized or discovery has not completed<br/>• Uses the last cached discovery and vSAN scrape state
          require_cloud: true
        - id: topology:vsphere
          name: vSphere Topology
          description: |
            Reports cached vSphere inventory topology for datacenters, clusters, ESXi hosts, VMs, datastores, networks, datastore clusters, and resource pools.

            The public topology function is `topology:vsphere`. The function builds actors and links from the selected job's cached discovery state. It does not issue extra vCenter API calls. vSphere Network and Distributed Virtual Port Group actors are included only when `collect_network_topology` is enabled.
          parameters:
            - id: __job
              name: Job
              description: Select which configured vSphere collector job provides the cached topology.
              type: select
              required: true
              default: ""
              options: []
          returns:
            description: Cached vSphere inventory topology payload. Actors represent discovered inventory objects and links represent parent-child, host-runs-VM, or host/VM-connects-network relationships.
            columns:
              - name: schema_version
                type: string
                unit: ""
                description: Topology payload schema version.
              - name: source
                type: string
                unit: ""
                description: Topology source identifier.
              - name: layer
                type: string
                unit: ""
                description: Topology layer identifier.
              - name: agent_id
                type: string
                unit: ""
                description: Netdata Agent identifier for the node serving the function.
              - name: collected_at
                type: datetime
                unit: ""
                description: Time when the cached topology response was built.
              - name: view
                type: string
                unit: ""
                description: Topology view identifier.
              - name: actors
                type: array
                unit: ""
                description: vSphere inventory actors, including datacenters, clusters, ESXi hosts, VMs, datastores, optional networks, datastore clusters, and resource pools.
              - name: links
                type: array
                unit: ""
                description: Topology links between vSphere inventory actors.
              - name: stats
                type: object
                unit: ""
                description: Counts of discovered inventory objects, actors, and links included in the response.
          performance: |
            Uses cached collector state only:<br/>• No additional vCenter or ESXi API requests are triggered by the function<br/>• Response size grows with discovered inventory object count<br/>• `collect_network_topology` adds Network discovery during normal collector discovery cycles when enabled
          security: |
            Exposes discovered inventory object names and status attributes already visible through vSphere chart labels and metrics:<br/>• Does not expose the configured vCenter URL, username, or password
          availability: |
            Available when:<br/>• The vSphere collector job is running<br/>• Initial discovery has completed successfully<br/>• Returns HTTP 503 while topology data is not cached yet
          require_cloud: true
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: inventory
          description: These metrics refer to the discovered vSphere inventory for this collector job.
          labels:
            - name: id
              description: Static inventory instance ID
          metrics:
            - name: vsphere.inventory_objects
              description: vSphere inventory object count after include filters are applied
              unit: objects
              chart_type: line
              dimensions:
                - name: datacenters
                - name: folders
                - name: clusters
                - name: hosts
                - name: vms
                - name: datastores
                - name: resource_pools
        - name: virtual machine
          description: These metrics refer to the Virtual Machine.
          labels:
            - name: id
              description: vSphere managed object reference ID
            - name: datacenter
              description: Datacenter name
            - name: cluster
              description: Cluster name
            - name: host
              description: Host name
            - name: vm
              description: Virtual Machine name
            - name: vsphere_tag_<category>
              description: vSphere tag label; present only for categories matched by `tag_categories`; category names are sanitized for label keys and multiple tags in one category are sorted and joined with the pipe character
            - name: vsphere_custom_attribute_<name>
              description: vSphere custom attribute label; present only for attributes matched by `custom_attributes`; attribute names are sanitized for label keys
          metrics:
            - name: vsphere.vm_cpu_utilization
              description: Virtual Machine CPU utilization
              unit: percentage
              chart_type: line
              dimensions:
                - name: used
            - name: vsphere.vm_mem_utilization
              description: Virtual Machine memory utilization
              unit: percentage
              chart_type: line
              dimensions:
                - name: used
            - name: vsphere.vm_mem_usage
              description: Virtual Machine memory usage
              unit: KiB
              chart_type: line
              dimensions:
                - name: granted
                - name: consumed
                - name: active
                - name: shared
            - name: vsphere.vm_mem_swap_usage
              description: Virtual Machine VMKernel memory swap usage
              unit: KiB
              chart_type: line
              dimensions:
                - name: swapped
            - name: vsphere.vm_mem_swap_io
              description: Virtual Machine VMKernel memory swap IO
              unit: KiB/s
              chart_type: area
              dimensions:
                - name: in
                - name: out
            - name: vsphere.vm_disk_io
              description: Virtual Machine disk IO
              unit: KiB/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: vsphere.vm_disk_max_latency
              description: Virtual Machine disk max latency
              unit: milliseconds
              chart_type: line
              dimensions:
                - name: latency
            - name: vsphere.vm_net_traffic
              description: Virtual Machine network traffic
              unit: KiB/s
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: vsphere.vm_net_packets
              description: Virtual Machine network packets
              unit: packets
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: vsphere.vm_net_drops
              description: Virtual Machine network dropped packets
              unit: drops
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: vsphere.vm_overall_status
              description: Virtual Machine overall alarm status
              unit: status
              chart_type: line
              dimensions:
                - name: green
                - name: red
                - name: yellow
                - name: gray
            - name: vsphere.vm_power_state
              description: Virtual Machine power state
              unit: status
              chart_type: line
              dimensions:
                - name: powered_on
                - name: powered_off
                - name: suspended
            - name: vsphere.vm_connection_state
              description: Virtual Machine connection state
              unit: status
              chart_type: line
              dimensions:
                - name: connected
                - name: disconnected
                - name: orphaned
                - name: inaccessible
                - name: invalid
            - name: vsphere.vm_tools_running_status
              description: Virtual Machine VMware Tools running status
              unit: status
              chart_type: line
              dimensions:
                - name: running
                - name: not_running
                - name: executing_scripts
                - name: unknown
            - name: vsphere.vm_tools_version_status
              description: Virtual Machine VMware Tools version status
              unit: status
              chart_type: line
              dimensions:
                - name: current
                - name: need_upgrade
                - name: not_installed
                - name: unmanaged
                - name: too_old
                - name: supported_old
                - name: supported_new
                - name: too_new
                - name: blacklisted
                - name: unknown
            - name: vsphere.vm_consolidation_needed
              description: Virtual Machine disk consolidation status
              unit: status
              chart_type: line
              dimensions:
                - name: needed
                - name: not_needed
            - name: vsphere.vm_system_uptime
              description: Virtual Machine system uptime
              unit: seconds
              chart_type: line
              dimensions:
                - name: uptime
            - name: vsphere.vm_config_cpu
              description: Virtual Machine configured CPU
              unit: vCPUs
              chart_type: line
              dimensions:
                - name: vcpus
            - name: vsphere.vm_config_memory
              description: Virtual Machine configured memory
              unit: MiB
              chart_type: line
              dimensions:
                - name: memory
            - name: vsphere.vm_config_devices
              description: Virtual Machine configured devices
              unit: devices
              chart_type: line
              dimensions:
                - name: disks
                - name: nics
            - name: vsphere.vm_storage_usage
              description: Virtual Machine storage usage
              unit: bytes
              chart_type: line
              dimensions:
                - name: committed
                - name: uncommitted
                - name: unshared
            - name: vsphere.vm_snapshot_count
              description: Virtual Machine snapshot count
              unit: snapshots
              chart_type: line
              dimensions:
                - name: count
            - name: vsphere.vm_snapshot_max_age
              description: Virtual Machine oldest snapshot age; zero means no snapshots
              unit: seconds
              chart_type: line
              dimensions:
                - name: age
