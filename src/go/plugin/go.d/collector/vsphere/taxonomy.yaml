taxonomy_version: 1
plugin_name: go.d.plugin
module_name: vsphere
placements:
  - id: vsphere
    section_id: containers-vms
    title: VMware vCenter Server
    icon: cgroup
    properties: { important: false, grouping: true }
    items:
      - type: grid
        id: vsphere-heads
        title: vsphere-heads
        items:
          - type: context
            title: Top Hosts by CPU Usage
            contexts: [vsphere.host_cpu_utilization]
            chart_library: bars
            group_by: [label]
            group_by_label: [host]
            dimensions_sort: valueDesc
            colors: ["#994499", "#22AA99"]
            layout: { left: 0, top: 0, width: 3, height: 4 }
          - type: context
            title: Top Hosts by Memory Usage
            contexts: [vsphere.host_mem_utilization]
            chart_library: bars
            group_by: [label]
            group_by_label: [host]
            dimensions_sort: valueDesc
            colors: ["#DC3912", "#FE3912"]
            layout: { left: 3, top: 0, width: 3, height: 4 }
          - type: context
            title: Top VMs by CPU Usage
            contexts: [vsphere.vm_cpu_utilization]
            chart_library: bars
            group_by: [label]
            group_by_label: [vm]
            dimensions_sort: valueDesc
            colors: ["#994499", "#22AA99"]
            layout: { left: 6, top: 0, width: 3, height: 4 }
          - type: context
            title: Top VMs by Memory Usage
            contexts: [vsphere.vm_mem_utilization]
            chart_library: bars
            group_by: [label]
            group_by_label: [vm]
            dimensions_sort: valueDesc
            colors: ["#990099", "#0099C6"]
            layout: { left: 9, top: 0, width: 3, height: 4 }
      - type: group
        id: inventory
        title: Inventory
        properties: { grouping: false }
        families: false
        items:
          - vsphere.inventory_objects
      - type: group
        id: clusters
        title: Clusters
        properties: { grouping: true }
        items:
          - type: group
            id: cluster-resources
            title: Resources
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_cpu_capacity
              - vsphere.cluster_mem_capacity
              - vsphere.cluster_cpu_topology
          - type: group
            id: cluster-utilization
            title: Utilization
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_cpu_utilization
              - vsphere.cluster_cpu_usage
              - vsphere.cluster_mem_utilization
              - vsphere.cluster_mem_usage
              - vsphere.cluster_usage_cpu
              - vsphere.cluster_usage_mem
          - type: group
            id: cluster-drs
            title: Distributed Resource Scheduler
            short_name: DRS
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_drs_config
              - vsphere.cluster_drs_mode
              - vsphere.cluster_drs_vmotion_rate
              - vsphere.cluster_drs_score
              - vsphere.cluster_drs_balance
              - vsphere.cluster_services_fairness
              - vsphere.cluster_services_effective_cpu
              - vsphere.cluster_services_effective_mem
              - vsphere.cluster_vmotions
          - type: group
            id: cluster-ha
            title: High Availability
            short_name: HA
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_ha_config
              - vsphere.cluster_ha_host_monitoring
              - vsphere.cluster_ha_vm_monitoring
              - vsphere.cluster_ha_vm_component_protection
              - vsphere.cluster_services_failover
          - type: group
            id: cluster-vsan
            title: vSAN
            properties: { grouping: false }
            families: false
            items:
              - vsphere.vsan_cluster_space_usage
              - vsphere.vsan_cluster_space_utilization
              - vsphere.vsan_cluster_operations
              - vsphere.vsan_cluster_throughput
              - vsphere.vsan_cluster_latency
              - vsphere.vsan_cluster_congestions
              - vsphere.vsan_cluster_health_status
          - type: group
            id: cluster-vm-ops
            title: Virtual Machine Operations
            short_name: VM Ops
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_vm_migrations
              - vsphere.cluster_vm_lifecycle
              - vsphere.cluster_vm_management
              - vsphere.cluster_vm_guest_ops
