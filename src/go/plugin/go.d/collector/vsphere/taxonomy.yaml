          - type: group
            id: cluster-inventory
            title: Inventory
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_hosts
              - vsphere.cluster_vm_count
          - type: group
            id: cluster-status
            title: Status
            properties: { grouping: false }
            families: false
            items:
              - vsphere.cluster_overall_status
      - type: group
        id: hosts
        title: Hosts
        properties: { grouping: true }
        items:
          - type: group
            id: host-cpu
            title: CPU
            properties: { grouping: false }
            families: false
