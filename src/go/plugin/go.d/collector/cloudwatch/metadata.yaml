    overview:
      data_collection:
        metrics_description: |
          Monitor AWS infrastructure through Amazon CloudWatch. This collector discovers CloudWatch metrics for a curated set of AWS services and renders them as Netdata charts, with minimal configuration.

          Monitored services:

          - Amazon EC2 (compute)
          - Amazon RDS (relational databases)
          - Elastic Load Balancing -- Classic (ELB), Application (ALB), and Network (NLB) load balancers
          - Amazon S3 (object storage)
          - AWS Lambda (serverless functions)
          - Amazon SQS (message queues)
          - Amazon DynamoDB (NoSQL databases)
          - Amazon API Gateway (REST APIs)
          - AWS Step Functions (workflow orchestration)
          - NAT Gateway (VPC networking)
          - Amazon Kinesis Data Streams (streaming ingestion)
          - Amazon Data Firehose (delivery streams)
          - Amazon SNS (pub/sub messaging)
          - Amazon EBS (block storage volumes)
          - Amazon EFS (elastic file systems)
          - Amazon ECS (container services)
          - Amazon ElastiCache (in-memory cache)
          - Amazon OpenSearch Service (search and analytics)
          - Amazon DocumentDB (document database)
          - Amazon Redshift (data warehouse)
          - Amazon MSK (Kafka streaming)
          - Amazon CloudFront (content delivery network / CDN)
          - AWS Auto Scaling (EC2 Auto Scaling group capacity)
          - Amazon Bedrock (foundation-model invocations and tokens)
          - Amazon EventBridge (event rules)
          - AWS Site-to-Site VPN (VPN connections)
          - Amazon EKS (Kubernetes control plane: API server, scheduler, etcd)
          - AWS Billing (worldwide estimated month-to-date charges; opt-in profiles)

          This collector queries runtime metrics from Amazon CloudWatch. It complements the
          [AWS EC2 Compute instances](/src/go/plugin/go.d/collector/prometheus/integrations/aws_ec2_compute_instances.md)
          integration, which exposes EC2 inventory and capacity information, and the
          [AWS Quota](/src/go/plugin/go.d/collector/prometheus/integrations/aws_quota.md) integration, which exposes
          AWS Service Quotas. These integrations use different AWS data sources and do not replace one another.

          [Each service is defined by a profile](https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default) -- a YAML file declaring its CloudWatch namespace, supported regions, resource dimensions, metrics, statistics, and chart template -- so coverage can be extended without code changes. See the [AWS CloudWatch profile format](/src/go/plugin/go.d/collector/cloudwatch/profile-format.md) for the complete schema and authoring rules.

          :::tip Need a service that isn't listed?

          Request a profile -- it's just a YAML file, no code change. [Open a feature request](https://github.com/netdata/netdata/issues/new/choose) and attach the service's CloudWatch metric schema, captured with this read-only command. It prints only metric and dimension **names** (no resource IDs, ARNs, or metric values), so the output is safe to share:

          ```bash
          aws cloudwatch list-metrics --namespace "AWS/<Service>" --region <your-region> --output json \
            | jq -c '[.Metrics[] | {metric: .MetricName, dimensions: ([.Dimensions[].Name] | sort)}] | unique'
          ```

          Replace `AWS/<Service>` with the service namespace (for example `AWS/AmazonMQ`) and `<your-region>` with a Region where the service runs. The exact metrics and dimensions in the output are what we need to author a correct profile quickly.

          :::
        method_description: |
          The collector compiles named credential sources, monitored targets, and ordered collection rules into an immutable runtime plan. Profiles with identifying dimensions discover available metrics with one CloudWatch `ListMetrics` scan per target, region, and namespace, using the least restrictive recent-activity policy required by the participating selected series, then apply each profile's exact dimension matcher. A profile whose dimensions are all constants compiles a known static instance and skips `ListMetrics`. Optional resource-tag predicates are resolved with the Resource Groups Tagging API before query expansion. Each selected series has a resolved query policy: aggregation period, rolling lookback, and publication delay. `GetMetricData` searches the aligned rolling window for the newest complete finite datapoint, while Netdata receives the retained numeric value on every collection cycle. Each target resolves its AWS account id through `sts:GetCallerIdentity`; target names remain distinct execution identities even when they resolve to the same account. Rule order, then target order within each rule, resolves overlap: the first matching rule/target owns each overlapping exported metric/statistic series.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: |
          Every target requires `cloudwatch:GetMetricData`. It also requires `cloudwatch:ListMetrics` when any selected profile has an identifying dimension and therefore needs discovery; an all-constant profile such as `billing_total` is queried directly. The collector calls `sts:GetCallerIdentity` for account attribution, but [AWS does not require an explicit permission grant for that operation](https://docs.aws.amazon.com/STS/latest/APIReference/API_GetCallerIdentity.html). A credential source used by a target with `assume_role` additionally requires `sts:AssumeRole` for that role ARN. Resource tag filtering (`rule_defaults.filters.resource_tags` or `rules[].filters.resource_tags`) and resource tag labels (`labels.resource_tags`) additionally require `tag:GetResources`.
      default_behavior:
        auto_detection:
          description: |
            A rule that omits `profiles` selects all default-enabled profiles for its targets and regions. A rule that omits `metrics` collects every metric exported by those profiles. When present, `metrics` groups exact AWS MetricNames by profile; group statistics are inherited by included metrics unless a metric supplies a replacement list. The collector emits charts only for profiles with live metrics. Discovery and the query blueprint are cached; discovery refreshes every `discovery.refresh_every` seconds (default 300).
        limits:
          description: |
            - Minimum collection interval is 60 seconds (CloudWatch's minimum metric period).
            - Query timing resolves field-by-field from `rules[].query`, `rule_defaults.query`, nested metric query defaults, nested profile query defaults, and the built-in 10-minute publication delay. The stock daily S3 storage profile uses a conservative one-day collector policy. AWS documents that S3 storage metrics are reported once per day, but does not guarantee publication within one day.
            - A successful sparse query can replay its newest eligible CloudWatch value for up to `lookback`. During transient AWS failures, the retained value can be replayed longer, until a successful query replaces or expires it.
            - Query-plan preflight rejects more than 20,000 selected series, 600,000 all-due datapoints, or 40 packed `GetMetricData` requests before allocating AWS query structures. Billing units of up to five statistics for one structural metric are kept in one request.
            - `limits.max_instances` defaults to 1000 distinct final static or discovered instances after tag filtering and overlap resolution. Exceeding it rejects the refreshed query plan; instances are never silently truncated.
            - `limits.max_discovery_groups` defaults to 64 unique `(target, region, namespace)` groups per job. Compatible rules and profiles share a group. The safeguard catches accidental expansion and can be raised to the hard maximum of 100; larger collection must be split across jobs because one refresh can admit at most 100 groups that reach `ListMetrics`.
            - Each discovery group is independently bounded to 100 `ListMetrics` pages, 50,000 scanned metrics, 1,000,000 residual same-shape profile matches, and 20,000 candidate instances. Overflow fails the group without replacing its previous snapshot.
            - One discovery refresh is additionally bounded to 100 admitted `ListMetrics` SDK operations, 50,000 scanned metrics, 1,000,000 residual profile matches, 20,000 retained candidates, 64 MiB of conservatively weighted candidate storage, and one shared `timeout`. Every non-skipped group that resolves a client runs its first admitted operation before continuations share the remaining budget; skipped groups and client-resolution failures consume no operation budget. Successful replacements and failed-group carry-forward are rechecked as one bounded effective snapshot before installation. The AWS SDK can retry each admitted operation up to five wire attempts.
            - Aggregate discovery-limit, merged effective-snapshot limit, or timeout exhaustion discards the attempted refresh atomically. An existing snapshot remains active and discovery retries after `discovery.refresh_every`. On the first pass, any executable all-constant static profiles continue while dynamic discovery waits for its retry; without static work, total failure makes the collection attempt fail. Parent cancellation always aborts without advancing state.
            - Resources are labeled by their identifying CloudWatch dimensions (for example EC2 `instance_id`). Selected resource tags can additionally be attached as non-identity labels via `labels.resource_tags`; changing those tags updates labels without changing chart identity. (A dimension that is constant across resources, such as CloudFront's `Region=Global`, is used to match and query metrics but is not turned into a label.)
        performance_impact:
          description: |
            AWS bills CloudWatch API usage. `GetMetricData` is the cost driver; `ListMetrics` discovery falls under the free tier and then costs a fraction as much. As a rough anchor, `GetMetricData` is billed at roughly $0.01 per 1,000 metrics requested -- confirm current [CloudWatch pricing](https://aws.amazon.com/cloudwatch/pricing/) for your region. The collector sends one query per selected metric/statistic series, but for AWS billing up to five statistics requested for the same metric count as one metric request. Point-aware batching keeps each such five-statistic billing unit in one request. In normal operation each series is queried once per newly eligible effective-period window, not once per Netdata collection cycle. A transient request or result failure retries that series after one `update_every`; subsequent delays double within the same eligible window and are capped at its effective period. Those retries are also billable, so `update_every` affects failure-time cost even though it does not set normal query cadence. Cost otherwise scales with selected targets, instances, metrics, statistics beyond AWS's grouping, periods, and lookback response work. Longer lookbacks increase requested datapoints and can disable CloudWatch's three-hour recently-active discovery filter. The collector minimizes work with curated profiles, exact metric and resource-tag selection, exact dimension matching, single-statistic defaults, completed-sibling isolation, bounded retry backoff, billing-group-preserving batches, shared compatible discovery scans, cached discovery/query plans, and `recently_active_only`. To reduce cost further, narrow `rules[].targets`, `rules[].profiles`, `rules[].metrics`, `rules[].regions`, or configure resource tag filters.

            The opt-in Billing profiles use a 10-minute period, so each selected single-statistic Billing series normally produces 144 billable metric requests per day before retries. For example, 200 selected Billing series produce 28,800 metric requests per day. Their 24-hour lookback reserves 144 datapoint slots per query (28,800 slots when all 200 are due), but AWS charges `GetMetricData` by metrics requested, not by those reserved datapoint slots. The total profile is static and performs no `ListMetrics`; the three dynamic Billing grains share one namespace discovery stream per target and refresh interval before pagination and SDK retries. Billing cardinality grows with services, linked accounts, and observed account/service pairs, so select only the grains you need.
    setup:
      prerequisites:
        list:
          - title: Create an AWS IAM identity with CloudWatch read access
            description: |
              The collector needs an IAM identity (user or role) allowed to read CloudWatch metrics. It resolves the AWS account identity with `GetCallerIdentity`, which does not require an explicit permission grant.

              Attach a policy such as:

              ```json
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "cloudwatch:ListMetrics",
                      "cloudwatch:GetMetricData"
                    ],
                    "Resource": "*"
                  }
                ]
              }
              ```

              `cloudwatch:ListMetrics` and `cloudwatch:GetMetricData` do not support resource-level permissions, so `"Resource": "*"` is required -- this is already least-privilege for these read actions. A job that selects only profiles whose dimensions are all constants, such as `billing_total`, can omit `cloudwatch:ListMetrics`; every dynamic profile needs it. `GetCallerIdentity` needs no explicit grant. Scope `sts:AssumeRole` to the specific role ARN(s) rather than `*`. To enable resource tag filtering or labels, also grant `tag:GetResources` (it likewise requires `"Resource": "*"`).

              Define one or more named credential sources:

              - `default` -- the AWS SDK default credential chain (environment variables, shared config/credentials files, EC2 instance profile, or EKS IRSA). Recommended when Netdata runs inside AWS.
              - `static` -- an explicit access key ID and secret access key, plus an optional session token. Use go.d secret references rather than plaintext values.

              A target can use either source directly or use it to assume one IAM role. If the role trust policy requires an external ID, the role owner supplies that value; it is not an AWS password or access key. See [AWS guidance for third-party access](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_common-scenarios_third-party.html).
          - title: Enable CloudWatch Billing metrics before selecting Billing profiles
            description: |
              The Billing profiles are opt-in. Before collecting them, enable **Receive CloudWatch Billing Alerts** in AWS Billing Preferences as described in [AWS's Billing alarm documentation](https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/monitor_estimated_charges_with_cloudwatch.html).

              This setup action is separate from the collector's runtime IAM policy:

              - Enabling the preference requires the account root user or an IAM principal allowed to view Billing information. The collector identity still needs only the CloudWatch read permissions described above.
              - Once enabled, AWS says Billing metric data collection cannot be disabled. Deleting CloudWatch alarms does not disable the metric feed.
              - The first data normally appears about 15 minutes after first enablement. AWS then calculates and publishes estimates several times daily, so a working job can legitimately have no chart or can hold the last published value between updates.
              - Billing data is published only in `us-east-1`, represents worldwide charges, and is reported only in USD. The charts show the latest published estimate for the current month, not a forecast.
              - For consolidated billing, enable the preference in the management/payer account. That account can expose the consolidated total plus linked-account views; a standalone/member view can contain fewer grains. If the management/payer account changes, enable the preference again in the new account.
              - AWS does not publish these Billing metrics for Amazon Partner Network (APN) accounts.

              The collector's Billing profiles use a 24-hour retrieval window and sample-and-hold the newest successful value. Around the UTC month boundary, a prior-month observation can remain visible until a successful query replaces or expires it; a transient AWS failure can retain it longer under the collector's general replay policy. Treat the value as latest-published month-to-date data, not an invoice or real-time ledger.
      configuration:
        file:
          name: go.d/cloudwatch.conf
        options:
          description: |
            The following options can be defined globally or per job.

            **Profile file locations:**

            | Type | Path |
            |:-----|:-----|
            | Stock profiles | `/usr/lib/netdata/conf.d/go.d/cloudwatch.profiles/default/` |
            | User overrides | `/etc/netdata/go.d/cloudwatch.profiles/` |

            A user profile file with the same basename as a stock profile overrides it.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds). Must be at least 60 (CloudWatch's minimum period).
              default_value: 60
              required: false
              group: Collection
            - name: autodetection_retry
              description: Recheck interval (seconds) when the job fails to start. Default `0` means no retry; set a positive value to keep retrying.
              default_value: 0
              required: false
              group: Collection
            - name: timeout
              description: AWS operation timeout (seconds). Identity, resource-tag, and query operations use it for their operation scope; discovery shares one timeout across its whole refresh stage.
              default_value: 30
              required: false
              group: Collection
            - name: credentials
              description: List of named credential sources. Every source has a `type` of `default` (AWS SDK default chain) or `static` (explicit access/session credentials in `type_static`). Credential sources are reusable by targets and every defined source must be used.
              default_value: ""
              required: true
              group: Authentication
            - name: credentials[].name
              description: Credential source name referenced by targets.
              default_value: ""
              required: true
              group: Authentication
            - name: credentials[].type
              description: "Credential source type: `default` uses the AWS SDK chain; `static` requires `type_static`."
              default_value: ""
              required: true
              group: Authentication
            - name: credentials[].type_static
              description: Configuration used only when the credential source `type` is `static`.
              default_value: ""
              required: false
              group: Authentication
            - name: credentials[].type_static.access_key_id
              description: AWS access key ID. Required in `type_static`. Use a go.d secret reference such as `${env:AWS_ACCESS_KEY_ID}`.
              default_value: ""
              required: false
              group: Authentication
            - name: credentials[].type_static.secret_access_key
              description: AWS secret access key. Required in `type_static`. Use a go.d secret reference; do not store plaintext credentials in the file.
              default_value: ""
              required: false
              group: Authentication
            - name: credentials[].type_static.session_token
              description: Optional AWS session token in `type_static` for temporary credentials. Use a go.d secret reference.
              default_value: ""
              required: false
              group: Authentication
            - name: targets
              description: Up to 64 named monitored AWS identities. A target uses one credential source directly or uses that source to assume one role. Targets remain distinct even when they resolve to the same AWS account.
              default_value: ""
              required: true
              group: Targets
            - name: targets[].name
              description: Target name referenced by collection rules.
              default_value: ""
              required: true
              group: Targets
            - name: targets[].credentials
              description: Name of the credential source used by this target.
              default_value: ""
              required: true
              group: Targets
            - name: targets[].assume_role.role_arn
              description: Optional IAM role ARN to assume using the target's credential source.
              default_value: ""
              required: false
              group: Targets
            - name: targets[].assume_role.external_id
              description: Optional value supplied by the role owner when the role trust policy requires an external ID. It is not an AWS password or access key.
              default_value: ""
              required: false
              group: Targets
            - name: rules
              description: Ordered collection rules. Each rule selects targets, profiles, optional exact metrics, regions, and optional resource-tag filters. The earliest matching rule and target own each overlapping exported metric/statistic series.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].name
              description: Unique rule name used in diagnostics.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].targets
              description: Ordered names of monitored targets selected by this rule. Order breaks overlap ties within the rule.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].profiles.defaults
              description: Include all default-enabled profiles. Defaults to `true` when `profiles` or `defaults` is omitted.
              default_value: true
              required: false
              group: Rules
            - name: rules[].profiles.include
              description: Profile basenames to add explicitly. Set `defaults` to `false` to collect only this list, including profiles disabled by default. Billing choices are `billing_total`, `billing_service`, `billing_linked_account`, and `billing_linked_account_service`.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].profiles.exclude
              description: Profile basenames to remove from the selected set. A profile cannot be both included and excluded.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].metrics
              description: Optional per-profile exact metric/statistic allowlists that narrow the profiles selected by this rule. Omit `metrics` to collect every metric exported by those profiles. The expanded rule supports at most 256 metric/statistic selections.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].metrics[].profile
              description: Profile basename. It must already be selected by `rules[].profiles` and may appear in only one metrics group per rule.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].metrics[].statistics
              description: Optional non-empty default AWS statistics inherited by included metrics that omit their own list. Named statistics are case-insensitive.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].metrics[].include
              description: Non-empty list of exact, case-sensitive AWS CloudWatch MetricNames exported by this profile. Duplicate names are rejected.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].metrics[].include[].name
              description: Exact, case-sensitive AWS CloudWatch MetricName exported by the profile.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].metrics[].include[].statistics
              description: Optional non-empty replacement for the group statistics. Use `Average`, `Minimum`, `Maximum`, `Sum`, `SampleCount`, or `p<N>`; named statistics are case-insensitive. A metric with no replacement must inherit a group default.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].regions
              description: Canonical lowercase AWS region codes selected by this rule. The compiler intersects them with intrinsic profile restrictions; CloudFront and the Billing profiles support only `us-east-1`.
              default_value: ""
              required: true
              group: Rules
            - name: rule_defaults.query
              description: Shared query timing inherited field-by-field by collection rules. Omitted fields continue to profile or built-in fallbacks.
              default_value: ""
              required: false
              group: Query Policy
            - name: rule_defaults.query.period
              description: Default CloudWatch aggregation period from `1m` through `1d`, as an exact multiple of `1m`. An omitted rule period inherits this value before nested metric and profile query defaults.
              default_value: ""
              required: false
              group: Query Policy
            - name: rule_defaults.query.lookback
              description: Default rolling window searched for the newest eligible datapoint. It must be at least the effective period, an exact period multiple, and no more than 1,440 buckets.
              default_value: ""
              required: false
              group: Query Policy
            - name: rule_defaults.query.publication_delay
              description: Default collector wait after a bucket closes before it becomes eligible. This is a scheduling policy, not an AWS publication guarantee. Omission falls through to the profile value and then the built-in `10m` fallback. Setting this option overrides profile-specific delays for every inheriting rule, including the stock S3 storage profile's conservative `1d`; AWS documents only that S3 storage metrics are reported once per day, so use a shorter default only after verifying each workload's publication timing.
              default_value: ""
              required: false
              group: Query Policy
            - name: rules[].query
              description: Optional query timing overrides for this rule. Each omitted field independently inherits `rule_defaults.query`, then the relevant profile or built-in fallback.
              default_value: ""
              required: false
              group: Query Policy
            - name: rules[].query.period
              description: CloudWatch aggregation period for every series selected by this rule. Rate metrics are normalized using this effective period.
              default_value: ""
              required: false
              group: Query Policy
            - name: rules[].query.lookback
              description: Rolling window searched for the newest complete finite datapoint. Successful queries may present the retained datapoint as current for up to this duration; longer lookbacks increase response work.
              default_value: ""
              required: false
              group: Query Policy
            - name: rules[].query.publication_delay
              description: Collector wait after a bucket closes before querying it. This is a scheduling policy, not an AWS publication guarantee. Explicit `0s` is allowed for metrics known to publish immediately.
              default_value: ""
              required: false
              group: Query Policy
            - name: rule_defaults.filters.resource_tags
              description: Job-wide list of exact, case-sensitive AWS resource tag predicates inherited by rules that omit `rules[].filters.resource_tags`. All keys must match; any listed value for one key may match. The Resource Groups Tagging API performs the focused lookup and requires `tag:GetResources`.
              default_value: ""
              required: false
              group: Resource Filters
            - name: rule_defaults.filters.resource_tags[].key
              description: Exact AWS resource tag key. A filter list supports at most 50 distinct keys.
              default_value: ""
              required: true
              group: Resource Filters
            - name: rule_defaults.filters.resource_tags[].values
              description: One to 20 exact, case-sensitive accepted values for this key. Values for one key are ORed.
              default_value: ""
              required: true
              group: Resource Filters
            - name: rules[].filters.resource_tags
              description: Per-rule replacement for `rule_defaults.filters.resource_tags`. Omit it to inherit the default, provide a non-empty list to replace the default, or set `[]` to disable tag filtering for this rule.
              default_value: ""
              required: false
              group: Resource Filters
            - name: rules[].filters.resource_tags[].key
              description: Exact AWS resource tag key. A filter list supports at most 50 distinct keys.
              default_value: ""
              required: true
              group: Resource Filters
            - name: rules[].filters.resource_tags[].values
              description: One to 20 exact, case-sensitive accepted values for this key. Values for one key are ORed.
              default_value: ""
              required: true
              group: Resource Filters
            - name: labels.resource_tags
              description: Optional AWS resource tags copied to charts as non-identity labels. This is presentation only and does not select resources. Tag values may contain personal data, so expose only keys intended for Netdata. Requires `tag:GetResources`.
              default_value: ""
              required: false
              group: Resource Labels
            - name: labels.resource_tags[].key
              description: Exact, case-sensitive AWS resource tag key.
              default_value: ""
              required: true
              group: Resource Labels
            - name: labels.resource_tags[].label
              description: Optional Netdata label key. When omitted, the AWS key is normalized (`Name` becomes `name`). Use an explicit label to avoid invalid names or collisions with identity labels such as `region`.
              default_value: ""
              required: false
              group: Resource Labels
            - name: limits.max_instances
              description: Maximum distinct final static or discovered CloudWatch instances that emit at least one selected series after filtering and exported-series overlap resolution. Metric/statistic fan-out is not counted. Overflow rejects the refreshed plan; collection never truncates to the first N instances.
              default_value: 1000
              required: false
              group: Limits
            - name: limits.max_discovery_groups
              description: Maximum unique `(target, region, namespace)` discovery groups compiled for the job. Compatible rules and profiles share groups. The default is an accidental-expansion safeguard; raise it only for intentional work. Valid range 1–100. Split larger collection across jobs because one refresh can admit at most 100 groups that reach `ListMetrics`.
              default_value: 64
              required: false
              group: Limits
            - name: discovery.refresh_every
              description: How often (seconds) to re-discover metrics. Minimum 60.
              default_value: 300
              required: false
              group: Discovery
            - name: discovery.recently_active_only
              description: Use CloudWatch's three-hour activity filter only when every selected series sharing a target, region, and namespace scan has `publication_delay + lookback + period` of 3 hours or less. Any longer-horizon participant keeps the shared scan unfiltered.
              default_value: true
              required: false
              group: Discovery
            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Default credentials, single region
              description: Monitor the base AWS identity in `us-east-1` using the SDK default credential chain and all default-enabled profiles.
              config: |
                jobs:
                  - name: default_credentials
                    credentials:
                      - name: sdk_default
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rules:
                      - name: base-defaults
                        targets: [base]
                        regions: [us-east-1]
            - name: Static credentials assume multiple roles
              description: Use one static/session credential source to assume roles for multiple monitored targets. Store credentials in supported secret providers, not in plaintext.
              config: |
                jobs:
                  - name: cross_account
                    credentials:
                      - name: bootstrap
                        type: static
                        type_static:
                          access_key_id: ${env:AWS_ACCESS_KEY_ID}
                          secret_access_key: ${env:AWS_SECRET_ACCESS_KEY}
                          session_token: ${env:AWS_SESSION_TOKEN}
                    targets:
                      - name: production
                        credentials: bootstrap
                        assume_role:
                          role_arn: "arn:aws:iam::[ACCOUNT]:role/[ROLE]"
                          external_id: ${env:AWS_EXTERNAL_ID}
                      - name: staging
                        credentials: bootstrap
                        assume_role:
                          role_arn: "arn:aws:iam::[ACCOUNT]:role/[ROLE]"
                    rules:
                      - name: both-defaults
                        targets: [production, staging]
                        regions: [us-east-1, eu-west-1]
            - name: Different timing for metrics in one profile
              description: Use disjoint exact metric selections when one service needs different query timing. Earlier rules own only the metric/statistic series they select, so these two Lambda rules do not shadow each other.
              config: |
                jobs:
                  - name: lambda_split_policy
                    credentials:
                      - name: sdk_default
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rules:
                      - name: lambda-activity
                        targets: [base]
                        profiles:
                          defaults: false
                          include: [lambda]
                        metrics:
                          - profile: lambda
                            statistics: [Sum]
                            include:
                              - name: Invocations
                        regions: [us-east-1]
                        query:
                          period: 5m
                          lookback: 30m
                          publication_delay: 10m
                      - name: lambda-latency
                        targets: [base]
                        profiles:
                          defaults: false
                          include: [lambda]
                        metrics:
                          - profile: lambda
                            statistics: [Average, p90]
                            include:
                              - name: Duration
                        regions: [us-east-1]
                        query:
                          period: 1m
                          lookback: 5m
                          publication_delay: 5m
            - name: AWS Billing estimated charges
              description: Collect each available exact Billing grain independently. Billing metrics must be enabled first, are published only in `us-east-1`, and do not support resource-tag filters or resource-tag-derived labels. The stock profiles use a 10-minute period and 24-hour retrieval window; a `rules[].query` block would override only the fields it sets.
              config: |
                jobs:
                  - name: billing_estimated_charges
                    credentials:
                      - name: sdk_default
                        type: default
                    targets:
                      - name: billing
                        credentials: sdk_default
                    rules:
                      - name: billing-grains
                        targets: [billing]
                        profiles:
                          defaults: false
                          include:
                            - billing_total
                            - billing_service
                            - billing_linked_account
                            - billing_linked_account_service
                        regions: [us-east-1]
                        filters:
                          # Billing is not an RGTA resource. This explicitly
                          # disables any inherited resource-tag filter.
                          resource_tags: []
            - name: All services including opt-in profiles
              description: Select defaults and explicitly add every disabled opt-in profile, including the four Billing grains. Billing prerequisites and cost/cardinality guidance still apply.
              config: |
                jobs:
                  - name: defaults_and_opt_in
                    credentials:
                      - name: sdk_default
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rules:
                      - name: expanded-services
                        targets: [base]
                        profiles:
                          defaults: true
                          include:
                            - alb_target
                            - dynamodb_operation
                            - s3_requests
                            - ebs_stalled_io
                            - billing_total
                            - billing_service
                            - billing_linked_account
                            - billing_linked_account_service
                        regions: [us-east-1]
            - name: Filter resources by tag and add tag labels
              description: Apply one job-wide exact tag filter, disable it for an unsupported profile, and expose selected AWS tags as mutable non-identity chart labels.
              config: |
                jobs:
                  - name: tagged_resources
                    credentials:
                      - name: sdk_default
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rule_defaults:
                      filters:
                        resource_tags:
                          - key: managed-by
                            values: [platform]
                    rules:
                      - name: filtered-defaults
                        targets: [base]
                        regions: [us-east-1]
                      - name: unfiltered-cloudfront
                        targets: [base]
                        profiles:
                          defaults: false
                          include: [cloudfront]
                        regions: [us-east-1]
                        filters:
                          resource_tags: []
                    labels:
                      resource_tags:
                        - key: Name
                        - key: owner
                          label: resource_owner
                    limits:
                      max_instances: 1000
                      max_discovery_groups: 64
    troubleshooting:
      problems:
        list:
          - name: No metrics are collected
            description: |
              Check the following:

              - **Permissions** -- each target allows `cloudwatch:ListMetrics` and `cloudwatch:GetMetricData`; `GetCallerIdentity` needs no explicit grant. Targets with `assume_role` also require `sts:AssumeRole` on the source identity. Resource tag filtering or labels require `tag:GetResources`.
              - **Rules** -- `rules[].targets`, `rules[].profiles`, optional `rules[].metrics`, and `rules[].regions` select the expected target, service, exact metric/statistic, and region. CloudFront publishes metrics only in `us-east-1`; its profile enforces this automatically.
              - **Resource filters** -- a rule that omits `filters.resource_tags` inherits `rule_defaults.filters.resource_tags`. An explicitly included profile without a safe Resource Groups Tagging API association is rejected; use `filters.resource_tags: []` for a deliberate unfiltered rule.
              - **Resources are active** -- confirm in the AWS CloudWatch console that the resources are publishing metrics.
              - **Collector logs** -- check for authentication or API errors:
                ```bash
                # systemd
                journalctl -u netdata --namespace=netdata --grep cloudwatch --since "5 minutes ago"
                # non-systemd
                grep cloudwatch /var/log/netdata/collector.log
                ```
          - name: Missing metrics for some services
            description: |
              - **Profile selection** -- omit `rules[].profiles` to select defaults, or ensure the service basename appears under `rules[].profiles.include` and is not excluded.
              - **Metric selection** -- omit `rules[].metrics` to collect every metric exported by selected profiles. When configured, verify each profile group names a selected profile, every `include[].name` is an exact AWS MetricName, and every metric has effective statistics from either its replacement list or the group default.
              - **Daily metrics** -- AWS documents that S3 storage metrics are reported once per day, but does not state a publication-within-one-day guarantee. The stock profile therefore uses a conservative `1d` collector delay policy, and `recently_active_only` is automatically disabled for its long query horizon.
              - **Resource activity** -- some metrics only appear when the resource is actively processing data (for example, EventBridge and Bedrock publish a metric only when its value is non-zero).
              - **Auto Scaling group metrics** -- Auto Scaling group metrics (`cloudwatch.auto_scaling.*`) are not published until group-metrics collection is enabled on the group (`aws autoscaling enable-metrics-collection --granularity 1Minute`). Amazon EKS managed node groups have it enabled by default.
              - **EKS control-plane metrics** -- EKS control-plane metrics (`cloudwatch.eks.*`) are published to the `AWS/EKS` namespace automatically, at no additional EKS charge, only for clusters running Kubernetes 1.28 or later; older clusters do not report them. These are distinct from Container Insights / the CloudWatch Observability add-on (agent-based, billed separately).
          - name: Charts have gaps or incomplete data
            description: |
              CloudWatch publishes metrics with a delay.

              - Keep `rules[].query.period` at or above the metric's real publication cadence. A shorter override increases billed query frequency but cannot make AWS publish more often, so it can create empty windows.
              - Set `rules[].query.publication_delay` when a workload publishes completed buckets later than its profile or the built-in `10m` fallback.
              - Check `rule_defaults.query.publication_delay` before overriding an individual rule. A job-wide value replaces profile-specific delays for inheriting rules, including the stock S3 storage profile's conservative `1d`, and a shorter value can query daily data before it is published.
              - Set `rules[].query.lookback` to search a wider rolling window for sparse datapoints. It must be an exact multiple of the effective period.
              - A successful query presents its newest eligible datapoint on every Netdata collection cycle, so an old CloudWatch value can appear current for up to `lookback`. During transient AWS failures, replay can continue longer until a successful query replaces or expires it.
              - Longer lookbacks increase response work and may disable `recently_active_only` for the shared discovery scan.
              - Transient query failures preserve the retained value and retry after one `update_every`; later delays double within the same eligible window up to the effective period. A newly eligible window resets the backoff.
          - name: Discovery group limit exceeded
            description: |
              A discovery group is one unique `(target, region, namespace)` combination. Compatible rules and profiles share the same group. `limits.max_discovery_groups` defaults to 64 to bound accidental `ListMetrics` expansion.

              This can result from accidental target/region/profile expansion or from a legitimate large installation. Verify the derived scope first. For intentional scale, raise the safeguard up to 100. Beyond 100, split the configuration across multiple jobs: one bounded refresh admits at most 100 `ListMetrics` SDK operations, and every non-skipped group that resolves a client reaches its first admitted operation before continuations. Skipped groups and client-resolution failures consume no operation budget. Splitting preserves metric coverage while keeping each job's discovery cost, memory, and completion time bounded.
          - name: Access denied or authentication errors
            description: |
              - Verify the credential source referenced by the failing target is valid and not expired.
              - For a target with `assume_role`, confirm its source identity is allowed to assume the role and that the role trust policy permits it. If the trust policy requires an external ID, use the value supplied by the role owner.
              - For AWS GovCloud or China partitions, ensure each target's selected rule regions match its role ARN partition.
