plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-cloudwatch
      plugin_name: go.d.plugin
      module_name: cloudwatch
      monitored_instance:
        name: Amazon CloudWatch
        link: https://aws.amazon.com/cloudwatch/
        icon_filename: aws.svg
        categories:
          - data-collection.cloud-and-devops
      keywords:
        - aws
        - amazon
        - amazon web services
        - cloudwatch
        - ec2
        - rds
        - elb
        - alb
        - nlb
        - network load balancer
        - s3
        - lambda
        - sqs
        - dynamodb
        - api gateway
        - step functions
        - nat gateway
        - kinesis
        - firehose
        - sns
        - ebs
        - efs
        - ecs
        - elasticache
        - opensearch
        - documentdb
        - redshift
        - msk
        - kafka
        - cloudfront
        - cdn
        - content delivery network
        - auto scaling
        - autoscaling
        - bedrock
        - generative ai
        - eventbridge
        - vpn
        - eks
        - kubernetes
        - k8s
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          Monitor AWS infrastructure through Amazon CloudWatch. This collector discovers CloudWatch metrics for a curated set of AWS services and renders them as Netdata charts, with minimal configuration.

          Monitored services:

          - Amazon EC2 (compute)
          - Amazon RDS (relational databases)
          - Elastic Load Balancing -- Classic (ELB), Application (ALB), and Network (NLB) load balancers
          - Amazon S3 (object storage)
          - AWS Lambda (serverless functions)
          - Amazon SQS (message queues)
          - Amazon DynamoDB (NoSQL databases)
          - Amazon API Gateway (REST APIs)
          - AWS Step Functions (workflow orchestration)
          - NAT Gateway (VPC networking)
          - Amazon Kinesis Data Streams (streaming ingestion)
          - Amazon Data Firehose (delivery streams)
          - Amazon SNS (pub/sub messaging)
          - Amazon EBS (block storage volumes)
          - Amazon EFS (elastic file systems)
          - Amazon ECS (container services)
          - Amazon ElastiCache (in-memory cache)
          - Amazon OpenSearch Service (search and analytics)
          - Amazon DocumentDB (document database)
          - Amazon Redshift (data warehouse)
          - Amazon MSK (Kafka streaming)
          - Amazon CloudFront (content delivery network / CDN)
          - AWS Auto Scaling (EC2 Auto Scaling group capacity)
          - Amazon Bedrock (foundation-model invocations and tokens)
          - Amazon EventBridge (event rules)
          - AWS Site-to-Site VPN (VPN connections)
          - Amazon EKS (Kubernetes control plane: API server, scheduler, etcd)

          [Each service is defined by a profile](https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default) -- a YAML file declaring its CloudWatch namespace, the metrics and statistics to collect, and a chart template -- so coverage can be extended without code changes.

          :::tip Need a service that isn't listed?

          Request a profile -- it's just a YAML file, no code change. [Open a feature request](https://github.com/netdata/netdata/issues/new/choose) and attach the service's CloudWatch metric schema, captured with this read-only command. It prints only metric and dimension **names** (no resource IDs, ARNs, or metric values), so the output is safe to share:

          ```bash
          aws cloudwatch list-metrics --namespace "AWS/<Service>" --region <your-region> --output json \
            | jq -c '[.Metrics[] | {metric: .MetricName, dimensions: ([.Dimensions[].Name] | sort)}] | unique'
          ```

          Replace `AWS/<Service>` with the service namespace (for example `AWS/AmazonMQ`) and `<your-region>` with a Region where the service runs. The exact metrics and dimensions in the output are what we need to author a correct profile quickly.

          :::
        method_description: |
          The collector discovers available metrics with the CloudWatch `ListMetrics` API (one paginated call per account, selected service profile, and region; the collector then keeps only the metrics whose dimension set matches each profile's instance dimensions) and queries them in batches with the `GetMetricData` API. Each configured identity's AWS account id is resolved via `sts:GetCallerIdentity` (one per assumed role, so a single job can monitor several accounts). Note that both discovery and query volume scale with accounts × regions × profiles, so adding many roles multiplies API calls (and `GetMetricData` cost) accordingly. Authentication uses the AWS SDK default credential chain, static access keys, or one or more assumed IAM roles.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: |
          The configured IAM identity requires `cloudwatch:ListMetrics`, `cloudwatch:GetMetricData`, and `sts:GetCallerIdentity`. When `auth.mode` is `assume_role`, it also requires `sts:AssumeRole`. Resource tag enrichment (the optional `tags` option) additionally requires `tag:GetResources`.
      default_behavior:
        auto_detection:
          description: |
            With `profiles.mode: auto` (default), the collector discovers metrics for all built-in service profiles across the configured `regions` and emits charts only for services that have live metrics. Discovery is cached and refreshed every `discovery.refresh_every` seconds (default 300).
        limits:
          description: |
            - Minimum collection interval is 60 seconds (CloudWatch's minimum metric period).
            - CloudWatch publishes metrics with a delay; the effective query offset is `max(query_offset, period)`, so long-period metrics (such as the daily S3 storage metrics) are inherently about one period behind.
            - There is no cap on discovered resources; a warning is logged at 1000 or more discovered instances (collection is never truncated).
            - Resources are labeled by their identifying CloudWatch dimensions (for example EC2 `instance_id`). Selected resource tags can additionally be attached as labels via the opt-in `tags` option (using the Resource Groups Tagging API); tags are enrichment only and never change a resource's identity. (A dimension that is constant across resources, such as CloudFront's `Region=Global`, is used to match and query metrics but is not turned into a label.)
        performance_impact:
          description: |
            AWS bills CloudWatch API usage. `GetMetricData` (the metric queries) is the cost driver, billed per metric requested; `ListMetrics` discovery falls under the free tier and then costs a fraction as much. As a rough anchor, `GetMetricData` is billed at roughly $0.01 per 1,000 metrics requested -- confirm current [CloudWatch pricing](https://aws.amazon.com/cloudwatch/pricing/) for your region. Each combination of instance, metric, and statistic is one billed query, run once per its own period (not once per collection cycle), so cost scales with discovered instances, metrics, statistics, and their periods -- not with `update_every`. The collector already minimizes it with curated per-service profiles, single-statistic defaults, exact dimension filtering, cached discovery, and `recently_active_only`. To reduce it further, restrict services with `profiles.mode: exact` or narrow `regions`.
    setup:
      prerequisites:
        list:
          - title: Create an AWS IAM identity with CloudWatch read access
            description: |
              The collector needs an IAM identity (user or role) allowed to read CloudWatch metrics and resolve the AWS account identity.

              Attach a policy such as:

              ```json
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "cloudwatch:ListMetrics",
                      "cloudwatch:GetMetricData",
                      "sts:GetCallerIdentity"
                    ],
                    "Resource": "*"
                  }
                ]
              }
              ```

              `cloudwatch:ListMetrics`, `cloudwatch:GetMetricData`, and `sts:GetCallerIdentity` do not support resource-level permissions, so `"Resource": "*"` is required -- this is already least-privilege for these read actions. In `assume_role` mode, scope `sts:AssumeRole` to the specific role ARN(s) rather than `*`. To enable resource tag enrichment (the optional `tags` option), also grant `tag:GetResources` (it likewise requires `"Resource": "*"`).

              Then provide credentials with one of the `auth.mode` options:

              - `default` -- the AWS SDK default credential chain (environment variables, shared config/credentials files, EC2 instance profile, or EKS IRSA). Recommended when Netdata runs inside AWS.
              - `access_key` -- a static access key ID and secret access key.
              - `assume_role` -- assume an IAM role by ARN (add `sts:AssumeRole` to the base identity's policy).
      configuration:
        file:
          name: go.d/cloudwatch.conf
        options:
          description: |
            The following options can be defined globally or per job.

            **Profile file locations:**

            | Type | Path |
            |:-----|:-----|
            | Stock profiles | `/usr/lib/netdata/conf.d/go.d/cloudwatch.profiles/default/` |
            | User overrides | `/etc/netdata/go.d/cloudwatch.profiles/` |

            A user profile file with the same basename as a stock profile overrides it.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds). Must be at least 60 (CloudWatch's minimum period).
              default_value: 60
              required: false
              group: Collection
            - name: autodetection_retry
              description: Recheck interval (seconds) when the job fails to start. Default `0` means no retry; set a positive value to keep retrying.
              default_value: 0
              required: false
              group: Collection
            - name: regions
              description: List of AWS regions to collect from. At least one region is required; all regions must be in one AWS partition.
              default_value: ""
              required: true
              group: Collection
            - name: query_offset
              description: Seconds subtracted from the current time when building query windows, to account for CloudWatch publish latency. The effective offset is `max(query_offset, period)`.
              default_value: 600
              required: false
              group: Collection
            - name: timeout
              description: Timeout for AWS API requests (seconds).
              default_value: 30
              required: false
              group: Collection
            - name: auth.mode
              description: "Authentication method: `default`, `access_key`, or `assume_role`."
              default_value: default
              required: true
              group: Authentication
              detailed_description: |
                Determines how the collector authenticates with AWS.

                | Mode | When to use | Required options |
                |:-----|:------------|:-----------------|
                | `default` | Running inside AWS, or with credentials in the environment / shared config | None |
                | `access_key` | Explicit static credentials | `access_key_id`, `secret_access_key` |
                | `assume_role` | Assume an IAM role (cross-account or scoped access) | `roles[].role_arn` |
            - name: auth.mode_access_key.access_key_id
              description: AWS access key ID (used in `access_key` mode).
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_access_key.secret_access_key
              description: AWS secret access key (used in `access_key` mode).
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_access_key.session_token
              description: Optional AWS session token for temporary credentials (used in `access_key` mode).
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_assume_role.roles
              description: IAM roles to assume (used in `assume_role` mode) -- one per AWS account to monitor. Each entry has `role_arn` and an optional `external_id`, and each metric series is labeled with the account id its role resolves to. A role that cannot be assumed is skipped with a warning while the rest keep collecting; two roles resolving to the same account are de-duplicated.
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_assume_role.include_base_account
              description: When `true`, also monitor the base identity's own account (the identity used to assume the roles) alongside the assumed-role accounts. Defaults to `false` -- with roles set, only the assumed-role accounts are monitored; to also cover the base account, enable this or run a separate `default`-mode job.
              default_value: false
              required: false
              group: Authentication
            - name: profiles.mode
              description: "Profile selection: `auto` (default service profiles), `exact` (only the profiles you list, by basename), or `combined` (default profiles plus deep-grain per-target-group / per-operation / per-request-filter profiles)."
              default_value: auto
              required: false
              group: Profiles
            - name: profiles.mode_exact.entries
              description: List of profiles to collect by basename (required when `profiles.mode` is `exact`). Each entry has a `name`, e.g. `ec2` or `alb_target`.
              default_value: ""
              required: false
              group: Profiles
            - name: discovery.refresh_every
              description: How often (seconds) to re-discover metrics. Minimum 60.
              default_value: 300
              required: false
              group: Discovery
            - name: discovery.recently_active_only
              description: List only metrics active in the last 3 hours. Automatically disabled for metrics whose period exceeds 3 hours (such as the daily S3 storage metrics).
              default_value: true
              required: false
              group: Discovery
            - name: tags
              description: |
                Optional allowlist of AWS resource tags to attach as extra labels on collected metrics, looked up via the Resource Groups Tagging API. Empty by default -- with no tags listed, no tag lookup runs and no extra IAM is needed. Each entry has a `name` (the AWS tag key, case-sensitive) and an optional `rename` (the Netdata label name; the default is the sanitized key, so `Name` becomes `name`). Use `rename` when the key is not a valid label (for example an `aws:`-prefixed key) or collides with a built-in label such as `region`. Enabling tags requires the `tag:GetResources` IAM permission. Note: tag values become label values and may contain personal data (such as owner emails), so list only tags you want exposed as labels. Tags apply only to profiles with a supported resource-ARN join; some services are not tag-enriched: Auto Scaling and Bedrock (not taggable via the Resource Groups Tagging API), and -- pending a reliable ARN join -- API Gateway, CloudFront, MSK, and ElastiCache. Tags behave as create-time chart labels: a tag that first appears or changes value after a chart already exists is reflected only when that chart is next recreated.
              default_value: ""
              required: false
              group: Tags
            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Default credentials, single region
              description: Collect from `us-east-1` using the AWS SDK default credential chain. Best when Netdata runs on an EC2 instance or in EKS with an attached IAM role.
              config: |
                jobs:
                  - name: default_credentials
                    regions:
                      - us-east-1
                    auth:
                      mode: default
            - name: Static access key, multiple regions
              description: Collect from two regions using a static access key.
              config: |
                jobs:
                  - name: access_key
                    regions:
                      - us-east-1
                      - eu-west-1
                    auth:
                      mode: access_key
                      mode_access_key:
                        access_key_id: "your-access-key-id"
                        secret_access_key: "your-secret-access-key"
            - name: Assume an IAM role
              description: Assume a CloudWatch read-only role, for example to collect from another account.
              config: |
                jobs:
                  - name: assume_role
                    regions:
                      - us-east-1
                    auth:
                      mode: assume_role
                      mode_assume_role:
                        roles:
                          - role_arn: "arn:aws:iam::123456789012:role/netdata-cloudwatch"
                            # external_id: "your-external-id"   # add if the role's trust policy requires it
            - name: Multiple accounts (assume several roles)
              description: Monitor several AWS accounts from one job by assuming a role in each. Every metric is labeled with the account id its role resolves to. Enable `include_base_account` to also monitor the account the base identity itself belongs to.
              config: |
                jobs:
                  - name: multi_account
                    regions:
                      - us-east-1
                    auth:
                      mode: assume_role
                      mode_assume_role:
                        include_base_account: false
                        roles:
                          - role_arn: "arn:aws:iam::111111111111:role/netdata-cloudwatch"
                          - role_arn: "arn:aws:iam::222222222222:role/netdata-cloudwatch"
            - name: Specific services only
              description: Collect only EC2 and RDS instead of auto-discovering all built-in services.
              config: |
                jobs:
                  - name: ec2_rds
                    regions:
                      - us-east-1
                    profiles:
                      mode: exact
                      mode_exact:
                        entries:
                          - name: ec2
                          - name: rds
                    auth:
                      mode: default
            - name: All services including deep-grain profiles
              description: Use `combined` mode to also collect the opt-in deep-grain profiles (ALB target groups, DynamoDB operations, S3 request metrics).
              config: |
                jobs:
                  - name: combined
                    regions:
                      - us-east-1
                    profiles:
                      mode: combined
                    auth:
                      mode: default
    troubleshooting:
      problems:
        list:
          - name: No metrics are collected
            description: |
              Check the following:

              - **Permissions** -- the IAM identity allows `cloudwatch:ListMetrics`, `cloudwatch:GetMetricData`, and `sts:GetCallerIdentity` (plus `sts:AssumeRole` in `assume_role` mode).
              - **Regions** -- the `regions` list includes the regions where your resources run. Some services are global and report to a single region: **Amazon CloudFront publishes its CloudWatch metrics only in `us-east-1`** (with a constant `Region=Global`), so `regions` must include `us-east-1` to collect it.
              - **Resources are active** -- confirm in the AWS CloudWatch console that the resources are publishing metrics.
              - **Collector logs** -- check for authentication or API errors:
                ```bash
                # systemd
                journalctl -u netdata --namespace=netdata --grep cloudwatch --since "5 minutes ago"
                # non-systemd
                grep cloudwatch /var/log/netdata/collector.log
                ```
          - name: Missing metrics for some services
            description: |
              - **Profile mode** -- ensure `profiles.mode: auto` (default), or that the service's profile basename is listed under `profiles.mode_exact.entries`.
              - **Daily metrics** -- S3 storage metrics are published once per day. They are inherently delayed by about a day, and `recently_active_only` is automatically disabled for them.
              - **Resource activity** -- some metrics only appear when the resource is actively processing data (for example, EventBridge and Bedrock publish a metric only when its value is non-zero).
              - **Auto Scaling group metrics** -- Auto Scaling group metrics (`cloudwatch.auto_scaling.*`) are not published until group-metrics collection is enabled on the group (`aws autoscaling enable-metrics-collection --granularity 1Minute`). Amazon EKS managed node groups have it enabled by default.
              - **EKS control-plane metrics** -- EKS control-plane metrics (`cloudwatch.eks.*`) are published to the `AWS/EKS` namespace automatically, at no additional EKS charge, only for clusters running Kubernetes 1.28 or later; older clusters do not report them. These are distinct from Container Insights / the CloudWatch Observability add-on (agent-based, billed separately).
          - name: Charts have gaps or incomplete data
            description: |
              CloudWatch publishes metrics with a delay.

              - The collector uses `query_offset` (default 600 seconds), and the effective offset is at least one full metric period.
              - If charts still have gaps, increase `query_offset`.
          - name: Access denied or authentication errors
            description: |
              - Verify the credentials selected by `auth.mode` are valid and not expired.
              - For `assume_role`, confirm the base identity is allowed to `sts:AssumeRole` the target role and that the role's trust policy permits it.
              - For AWS GovCloud or China partitions, ensure every region in `regions` belongs to the same partition.
