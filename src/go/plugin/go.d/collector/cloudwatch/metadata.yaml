plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-cloudwatch
      plugin_name: go.d.plugin
      module_name: cloudwatch
      monitored_instance:
        name: Amazon CloudWatch
        link: https://aws.amazon.com/cloudwatch/
        icon_filename: aws.svg
        categories:
          - data-collection.cloud-and-devops
      keywords:
        - aws
        - amazon
        - amazon web services
        - cloudwatch
        - ec2
        - rds
        - elb
        - alb
        - nlb
        - network load balancer
        - s3
        - lambda
        - sqs
        - dynamodb
        - api gateway
        - step functions
        - nat gateway
        - kinesis
        - firehose
        - sns
        - ebs
        - efs
        - ecs
        - elasticache
        - opensearch
        - documentdb
        - redshift
        - msk
        - kafka
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          Monitor AWS infrastructure through Amazon CloudWatch. This collector discovers CloudWatch metrics for a curated set of AWS services and renders them as Netdata charts, with minimal configuration.

          Monitored services:

          - Amazon EC2 (compute)
          - Amazon RDS (relational databases)
          - Elastic Load Balancing -- Classic (ELB), Application (ALB), and Network (NLB) load balancers
          - Amazon S3 (object storage)
          - AWS Lambda (serverless functions)
          - Amazon SQS (message queues)
          - Amazon DynamoDB (NoSQL databases)
          - Amazon API Gateway (REST APIs)
          - AWS Step Functions (workflow orchestration)
          - NAT Gateway (VPC networking)
          - Amazon Kinesis Data Streams (streaming ingestion)
          - Amazon Data Firehose (delivery streams)
          - Amazon SNS (pub/sub messaging)
          - Amazon EBS (block storage volumes)
          - Amazon EFS (elastic file systems)
          - Amazon ECS (container services)
          - Amazon ElastiCache (in-memory cache)
          - Amazon OpenSearch Service (search and analytics)
          - Amazon DocumentDB (document database)
          - Amazon Redshift (data warehouse)
          - Amazon MSK (Kafka streaming)

          [Each service is defined by a profile](https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default) -- a YAML file declaring its CloudWatch namespace, the metrics and statistics to collect, and a chart template -- so coverage can be extended without code changes.
        method_description: |
          The collector discovers available metrics with the CloudWatch `ListMetrics` API (one paginated call per namespace and region; the collector then keeps only the metrics whose dimension set matches each profile's instance dimensions) and queries them in batches with the `GetMetricData` API. Account identity is resolved once at startup via `sts:GetCallerIdentity`. Authentication uses the AWS SDK default credential chain, static access keys, or an assumed IAM role.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: |
          The configured IAM identity requires `cloudwatch:ListMetrics`, `cloudwatch:GetMetricData`, and `sts:GetCallerIdentity`. When `auth.mode` is `assume_role`, it also requires `sts:AssumeRole`.
      default_behavior:
        auto_detection:
          description: |
            With `namespaces.mode: auto` (default), the collector discovers metrics for all built-in service profiles across the configured `regions` and emits charts only for services that have live metrics. Discovery is cached and refreshed every `discovery.refresh_every` seconds (default 300).
        limits:
          description: |
            - Minimum collection interval is 60 seconds (CloudWatch's minimum metric period).
            - CloudWatch publishes metrics with a delay; the effective query offset is `max(query_offset, period)`, so long-period metrics (such as the daily S3 storage metrics) are inherently about one period behind.
            - There is no cap on discovered resources; a warning is logged at 1000 or more discovered instances (collection is never truncated).
            - Resources are labeled by their CloudWatch dimensions (for example EC2 `instance_id`), not by their `Name` tag or other resource tags; tag-based naming and filtering are not currently supported.
        performance_impact:
          description: |
            AWS bills CloudWatch API usage. `GetMetricData` (the metric queries) is the cost driver, billed per metric requested; `ListMetrics` discovery falls under the free tier and then costs a fraction as much. As a rough anchor, `GetMetricData` is billed at roughly $0.01 per 1,000 metrics requested -- confirm current [CloudWatch pricing](https://aws.amazon.com/cloudwatch/pricing/) for your region. Each combination of instance, metric, and statistic is one billed query, run once per its own period (not once per collection cycle), so cost scales with discovered instances, metrics, statistics, and their periods -- not with `update_every`. The collector already minimizes it with curated per-service profiles, single-statistic defaults, exact dimension filtering, cached discovery, and `recently_active_only`. To reduce it further, restrict services with `namespaces.mode: exact` or narrow `regions`.
    setup:
      prerequisites:
        list:
          - title: Create an AWS IAM identity with CloudWatch read access
            description: |
              The collector needs an IAM identity (user or role) allowed to read CloudWatch metrics and resolve the AWS account identity.

              Attach a policy such as:

              ```json
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "cloudwatch:ListMetrics",
                      "cloudwatch:GetMetricData",
                      "sts:GetCallerIdentity"
                    ],
                    "Resource": "*"
                  }
                ]
              }
              ```

              `cloudwatch:ListMetrics`, `cloudwatch:GetMetricData`, and `sts:GetCallerIdentity` do not support resource-level permissions, so `"Resource": "*"` is required -- this is already least-privilege for these read actions. In `assume_role` mode, scope `sts:AssumeRole` to the specific role ARN(s) rather than `*`.

              Then provide credentials with one of the `auth.mode` options:

              - `default` -- the AWS SDK default credential chain (environment variables, shared config/credentials files, EC2 instance profile, or EKS IRSA). Recommended when Netdata runs inside AWS.
              - `access_key` -- a static access key ID and secret access key.
              - `assume_role` -- assume an IAM role by ARN (add `sts:AssumeRole` to the base identity's policy).
      configuration:
        file:
          name: go.d/cloudwatch.conf
        options:
          description: |
            The following options can be defined globally or per job.

            **Profile file locations:**

            | Type | Path |
            |:-----|:-----|
            | Stock profiles | `/usr/lib/netdata/conf.d/go.d/cloudwatch.profiles/default/` |
            | User overrides | `/etc/netdata/go.d/cloudwatch.profiles/` |

            A user profile file with the same basename as a stock profile overrides it.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds). Must be at least 60 (CloudWatch's minimum period).
              default_value: 60
              required: false
              group: Collection
            - name: autodetection_retry
              description: Recheck interval (seconds) when the job fails to start. Default `0` means no retry; set a positive value to keep retrying.
              default_value: 0
              required: false
              group: Collection
            - name: regions
              description: List of AWS regions to collect from. At least one region is required; all regions must be in one AWS partition.
              default_value: ""
              required: true
              group: Collection
            - name: query_offset
              description: Seconds subtracted from the current time when building query windows, to account for CloudWatch publish latency. The effective offset is `max(query_offset, period)`.
              default_value: 600
              required: false
              group: Collection
            - name: timeout
              description: Timeout for AWS API requests (seconds).
              default_value: 30
              required: false
              group: Collection
            - name: auth.mode
              description: "Authentication method: `default`, `access_key`, or `assume_role`."
              default_value: default
              required: true
              group: Authentication
              detailed_description: |
                Determines how the collector authenticates with AWS.

                | Mode | When to use | Required options |
                |:-----|:------------|:-----------------|
                | `default` | Running inside AWS, or with credentials in the environment / shared config | None |
                | `access_key` | Explicit static credentials | `access_key_id`, `secret_access_key` |
                | `assume_role` | Assume an IAM role (cross-account or scoped access) | `roles[].role_arn` |
            - name: auth.mode_access_key.access_key_id
              description: AWS access key ID (used in `access_key` mode).
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_access_key.secret_access_key
              description: AWS secret access key (used in `access_key` mode).
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_access_key.session_token
              description: Optional AWS session token for temporary credentials (used in `access_key` mode).
              default_value: ""
              required: false
              group: Authentication
            - name: auth.mode_assume_role.roles
              description: A single-element list with the IAM role to assume (used in `assume_role` mode); each entry has `role_arn` and an optional `external_id`. Exactly one role is supported per job -- to monitor multiple accounts, run one job per account/role.
              default_value: ""
              required: false
              group: Authentication
            - name: namespaces.mode
              description: "Namespace selection: `auto` (default service profiles), `exact` (only the listed namespaces), or `combined` (default profiles plus deep-grain per-target-group / per-operation / per-request-filter profiles)."
              default_value: auto
              required: false
              group: Namespaces
            - name: namespaces.mode_exact.entries
              description: List of namespaces to collect (required when `namespaces.mode` is `exact`). Each entry has a `name`, e.g. `AWS/EC2`.
              default_value: ""
              required: false
              group: Namespaces
            - name: discovery.refresh_every
              description: How often (seconds) to re-discover metrics. Minimum 60.
              default_value: 300
              required: false
              group: Discovery
            - name: discovery.recently_active_only
              description: List only metrics active in the last 3 hours. Automatically disabled for metrics whose period exceeds 3 hours (such as the daily S3 storage metrics).
              default_value: true
              required: false
              group: Discovery
            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Default credentials, single region
              description: Collect from `us-east-1` using the AWS SDK default credential chain. Best when Netdata runs on an EC2 instance or in EKS with an attached IAM role.
              config: |
                jobs:
                  - name: default_credentials
                    regions:
                      - us-east-1
                    auth:
                      mode: default
            - name: Static access key, multiple regions
              description: Collect from two regions using a static access key.
              config: |
                jobs:
                  - name: access_key
                    regions:
                      - us-east-1
                      - eu-west-1
                    auth:
                      mode: access_key
                      mode_access_key:
                        access_key_id: "your-access-key-id"
                        secret_access_key: "your-secret-access-key"
            - name: Assume an IAM role
              description: Assume a CloudWatch read-only role, for example to collect from another account.
              config: |
                jobs:
                  - name: assume_role
                    regions:
                      - us-east-1
                    auth:
                      mode: assume_role
                      mode_assume_role:
                        roles:
                          - role_arn: "arn:aws:iam::123456789012:role/netdata-cloudwatch"
                            # external_id: "your-external-id"   # add if the role's trust policy requires it
            - name: Specific namespaces only
              description: Collect only EC2 and RDS instead of auto-discovering all built-in services.
              config: |
                jobs:
                  - name: ec2_rds
                    regions:
                      - us-east-1
                    namespaces:
                      mode: exact
                      mode_exact:
                        entries:
                          - name: AWS/EC2
                          - name: AWS/RDS
                    auth:
                      mode: default
            - name: All services including deep-grain profiles
              description: Use `combined` mode to also collect the opt-in deep-grain profiles (ALB target groups, DynamoDB operations, S3 request metrics).
              config: |
                jobs:
                  - name: combined
                    regions:
                      - us-east-1
                    namespaces:
                      mode: combined
                    auth:
                      mode: default
    troubleshooting:
      problems:
        list:
          - name: No metrics are collected
            description: |
              Check the following:

              - **Permissions** -- the IAM identity allows `cloudwatch:ListMetrics`, `cloudwatch:GetMetricData`, and `sts:GetCallerIdentity` (plus `sts:AssumeRole` in `assume_role` mode).
              - **Regions** -- the `regions` list includes the regions where your resources run.
              - **Resources are active** -- confirm in the AWS CloudWatch console that the resources are publishing metrics.
              - **Collector logs** -- check for authentication or API errors:
                ```bash
                # systemd
                journalctl -u netdata --namespace=netdata --grep cloudwatch --since "5 minutes ago"
                # non-systemd
                grep cloudwatch /var/log/netdata/collector.log
                ```
          - name: Missing metrics for some services
            description: |
              - **Namespace mode** -- ensure `namespaces.mode: auto` (default), or that the service's namespace is listed under `namespaces.mode_exact.entries`.
              - **Daily metrics** -- S3 storage metrics are published once per day. They are inherently delayed by about a day, and `recently_active_only` is automatically disabled for them.
              - **Resource activity** -- some metrics only appear when the resource is actively processing data.
          - name: Charts have gaps or incomplete data
            description: |
              CloudWatch publishes metrics with a delay.

              - The collector uses `query_offset` (default 600 seconds), and the effective offset is at least one full metric period.
              - If charts still have gaps, increase `query_offset`.
          - name: Access denied or authentication errors
            description: |
              - Verify the credentials selected by `auth.mode` are valid and not expired.
              - For `assume_role`, confirm the base identity is allowed to `sts:AssumeRole` the target role and that the role's trust policy permits it.
              - For AWS GovCloud or China partitions, ensure every region in `regions` belongs to the same partition.
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: |
        Charts are generated at runtime from the **active service profiles**. Each discovered AWS resource becomes a chart instance identified by its `account_id`, `region`, and the service's own dimensions (for example `instance_id` for EC2, or `bucket_name` and `storage_type` for S3); its contexts live under the `cloudwatch.` namespace. All CloudWatch metrics appear on the node running the collector -- individual AWS resources are distinguished by labels, not as separate Netdata nodes. Because CloudWatch publishes with a delay, allow a few minutes for the first data points.

        Key terms:

        - **Namespace** -- AWS's grouping for a service's metrics (e.g. `AWS/EC2`).
        - **Dimension** -- a name/value pair that identifies a resource within a namespace (e.g. `InstanceId`).
        - **Statistic** -- the CloudWatch aggregation applied per period (e.g. average, sum, maximum).
        - **Profile** -- the Netdata YAML file that maps a namespace's metrics to charts.
        - **Partition** -- an isolated AWS region group (standard `aws`, GovCloud `aws-us-gov`, or China `aws-cn`); all of a job's regions must share one.

        The built-in profiles ship the following charts by default. Each service links to its profile -- the authoritative definition of its exact metrics, statistics, dimensions, and charts:

        | Profile | Metric prefix | Description |
        |:--------|:--------------|:------------|
        | [Amazon EC2](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/ec2.yaml) | `cloudwatch.ec2.*` | CPU utilization, network traffic, disk operations, status-check failures |
        | [Amazon RDS](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/rds.yaml) | `cloudwatch.rds.*` | CPU utilization, database connections, freeable memory, free storage space, disk throughput, IOPS, latency |
        | [Classic Load Balancer (ELB)](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/elb.yaml) | `cloudwatch.elb.*` | request count, backend and load-balancer response codes, backend connection errors, latency, host count, spillover count |
        | [Application Load Balancer (ALB)](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/alb.yaml) | `cloudwatch.alb.*` | request count, target and load-balancer response codes, connection rate, active connections, processed traffic, target response time, consumed LCUs |
        | [Network Load Balancer (NLB)](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/nlb.yaml) | `cloudwatch.nlb.*` | active and new flow counts, processed bytes and packets, consumed LCUs, TCP resets |
        | [Amazon S3](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/s3.yaml) | `cloudwatch.s3.*` | bucket size, number of objects (daily storage metrics) |
        | [AWS Lambda](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/lambda.yaml) | `cloudwatch.lambda.*` | invocations, errors and throttles, duration |
        | [Amazon SQS](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/sqs.yaml) | `cloudwatch.sqs.*` | message throughput, empty receives, queue depth, age of oldest message, sent message size |
        | [Amazon DynamoDB](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/dynamodb.yaml) | `cloudwatch.dynamodb.*` | consumed and provisioned capacity, throttle events |
        | [Amazon API Gateway](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/api_gateway.yaml) | `cloudwatch.api_gateway.*` | requests, errors, latency |
        | [AWS Step Functions](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/step_functions.yaml) | `cloudwatch.step_functions.*` | executions, throttled events, execution time |
        | [NAT Gateway](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/nat_gateway.yaml) | `cloudwatch.nat_gateway.*` | traffic, active connections, connection rate, errors, idle timeouts |
        | [Amazon Kinesis Data Streams](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/kinesis.yaml) | `cloudwatch.kinesis.*` | data throughput, records, GetRecords iterator age, operation latency, throughput exceeded, PutRecords rejected |
        | [Amazon Data Firehose](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/firehose.yaml) | `cloudwatch.firehose.*` | records, throughput, put requests, throttled records, S3 delivery freshness and success |
        | [Amazon SNS](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/sns.yaml) | `cloudwatch.sns.*` | messages published, notifications, published message size |
        | [Amazon EBS](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/ebs.yaml) | `cloudwatch.ebs.*` | volume throughput, IOPS, queue length, idle time, burst balance |
        | [Amazon EFS](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/efs.yaml) | `cloudwatch.efs.*` | I/O throughput, metered vs permitted throughput, percent I/O limit, burst credit balance, client connections |
        | [Amazon ECS](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/ecs.yaml) | `cloudwatch.ecs.*` | service utilization, EBS filesystem utilization, live task count |
        | [Amazon ElastiCache](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/elasticache.yaml) | `cloudwatch.elasticache.*` | CPU utilization, memory, database memory usage, current and new connections, cache hits and misses, evictions, network traffic |
        | [Amazon OpenSearch Service](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/opensearch.yaml) | `cloudwatch.opensearch.*` | cluster status, index writes blocked, nodes, CPU utilization, JVM memory pressure, free storage space, search and indexing rate, search and indexing latency |
        | [Amazon DocumentDB](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/docdb.yaml) | `cloudwatch.docdb.*` | CPU utilization, freeable memory, connections, buffer cache hit ratio, disk IOPS, latency, throughput, replica lag, cursors timed out |
        | [Amazon Redshift](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/redshift.yaml) | `cloudwatch.redshift.*` | health, CPU utilization, disk space used, database connections, disk IOPS, throughput, network throughput |
        | [Amazon MSK](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/msk.yaml) | `cloudwatch.msk.*` | broker throughput, messages in, CPU, disk used, memory, partitions, connections |

        Each profile also carries **optional metrics** that are commented out to keep cost and cardinality low; uncomment a metric and its matching chart, then **restart the Netdata Agent** (profiles are loaded once per go.d process and cached). Stock profiles are shipped at `/usr/lib/netdata/conf.d/go.d/cloudwatch.profiles/default/`. To customize a service, copy its profile into `/etc/netdata/go.d/cloudwatch.profiles/` (keep the same filename) and edit it -- a user profile fully replaces the stock one of the same name -- then restart the Agent.

        With `namespaces.mode: combined`, these deep-grain profiles are collected in addition to the defaults:

        | Profile | Metric prefix | Description |
        |:--------|:--------------|:------------|
        | [ALB Target Groups](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/alb_target.yaml) | `cloudwatch.alb_target.*` | per-target-group host count, requests per target, response time, response codes, connection errors |
        | [DynamoDB Operations](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/dynamodb_operation.yaml) | `cloudwatch.dynamodb_operation.*` | per-operation successful request latency, system errors, throttled requests, returned items |
        | [S3 Request Metrics](https://github.com/netdata/netdata/blob/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default/s3_requests.yaml) | `cloudwatch.s3_requests.*` | requests, request errors, request latency, request data transfer |

        These deep-grain profiles are the highest-cardinality data the collector emits. **S3 Request Metrics** additionally require per-bucket request-metrics configuration in AWS and are billed at CloudWatch custom-metric rates; they collect nothing until enabled on the bucket.
      availability: []
      dynamic_context_prefixes:
        - prefix: cloudwatch.
          reason: CloudWatch chart contexts are generated at runtime from the active service profiles under the cloudwatch namespace.
      scopes: []
