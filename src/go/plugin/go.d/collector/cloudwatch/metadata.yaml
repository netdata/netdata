      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          Monitor AWS infrastructure through Amazon CloudWatch. This collector discovers CloudWatch metrics for a curated set of AWS services and renders them as Netdata charts, with minimal configuration.

          Monitored services:

          - Amazon EC2 (compute)
          - Amazon RDS (relational databases)
          - Elastic Load Balancing -- Classic (ELB), Application (ALB), and Network (NLB) load balancers
          - Amazon S3 (object storage)
          - AWS Lambda (serverless functions)
          - Amazon SQS (message queues)
          - Amazon DynamoDB (NoSQL databases)
          - Amazon API Gateway (REST APIs)
          - AWS Step Functions (workflow orchestration)
          - NAT Gateway (VPC networking)
          - Amazon Kinesis Data Streams (streaming ingestion)
          - Amazon Data Firehose (delivery streams)
          - Amazon SNS (pub/sub messaging)
          - Amazon EBS (block storage volumes)
          - Amazon EFS (elastic file systems)
          - Amazon ECS (container services)
          - Amazon ElastiCache (in-memory cache)
          - Amazon OpenSearch Service (search and analytics)
          - Amazon DocumentDB (document database)
          - Amazon Redshift (data warehouse)
          - Amazon MSK (Kafka streaming)
          - Amazon CloudFront (content delivery network / CDN)
          - AWS Auto Scaling (EC2 Auto Scaling group capacity)
          - Amazon Bedrock (foundation-model invocations and tokens)
          - Amazon EventBridge (event rules)
          - AWS Site-to-Site VPN (VPN connections)
          - Amazon EKS (Kubernetes control plane: API server, scheduler, etcd)

          This collector queries runtime metrics from Amazon CloudWatch. It complements the
          [AWS EC2 Compute instances](/src/go/plugin/go.d/collector/prometheus/integrations/aws_ec2_compute_instances.md)
          integration, which exposes EC2 inventory and capacity information, and the
          [AWS Quota](/src/go/plugin/go.d/collector/prometheus/integrations/aws_quota.md) integration, which exposes
          AWS Service Quotas. These integrations use different AWS data sources and do not replace one another.

          [Each service is defined by a profile](https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/config/go.d/cloudwatch.profiles/default) -- a YAML file declaring its CloudWatch namespace, supported regions, resource dimensions, metrics, statistics, and chart template -- so coverage can be extended without code changes. See the [AWS CloudWatch profile format](/src/go/plugin/go.d/collector/cloudwatch/profile-format.md) for the complete schema and authoring rules.

          :::tip Need a service that isn't listed?

          Request a profile -- it's just a YAML file, no code change. [Open a feature request](https://github.com/netdata/netdata/issues/new/choose) and attach the service's CloudWatch metric schema, captured with this read-only command. It prints only metric and dimension **names** (no resource IDs, ARNs, or metric values), so the output is safe to share:

          ```bash
          aws cloudwatch list-metrics --namespace "AWS/<Service>" --region <your-region> --output json \
            | jq -c '[.Metrics[] | {metric: .MetricName, dimensions: ([.Dimensions[].Name] | sort)}] | unique'
          ```

          Replace `AWS/<Service>` with the service namespace (for example `AWS/AmazonMQ`) and `<your-region>` with a Region where the service runs. The exact metrics and dimensions in the output are what we need to author a correct profile quickly.

          :::
        method_description: |
          The collector compiles named credential sources, monitored targets, and ordered collection rules into an immutable runtime plan. It discovers available metrics with CloudWatch `ListMetrics`, sharing a scan when target, region, namespace, and recent-activity behavior match, then applies each profile's exact dimension matcher. It queries the resulting metric series in `GetMetricData` batches. Each target resolves its AWS account id through `sts:GetCallerIdentity`; target names remain distinct execution identities even when they resolve to the same account. Rule order, then target order within each rule, resolves overlap: the first rule/target that produces a final metric series owns it.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: |
          Every target requires `cloudwatch:ListMetrics` and `cloudwatch:GetMetricData`. The collector calls `sts:GetCallerIdentity` for account attribution, but [AWS does not require an explicit permission grant for that operation](https://docs.aws.amazon.com/STS/latest/APIReference/API_GetCallerIdentity.html). A credential source used by a target with `assume_role` additionally requires `sts:AssumeRole` for that role ARN. Resource tag enrichment (the optional `tags` option) additionally requires `tag:GetResources`.
      default_behavior:
        auto_detection:
          description: |
            A rule that omits `profiles` selects all default-enabled profiles for its targets and regions. The collector emits charts only for profiles with live metrics. Discovery and the query blueprint are cached; discovery refreshes every `discovery.refresh_every` seconds (default 300).
        limits:
          description: |
            - Minimum collection interval is 60 seconds (CloudWatch's minimum metric period).
            - CloudWatch publishes metrics with a delay; the effective query offset is `max(query_offset, period)`, so long-period metrics (such as the daily S3 storage metrics) are inherently about one period behind.
            - There is no cap on discovered resources; a warning is logged at 1000 or more discovered instances (collection is never truncated).
            - Resources are labeled by their identifying CloudWatch dimensions (for example EC2 `instance_id`). Selected resource tags can additionally be attached as labels via the opt-in `tags` option (using the Resource Groups Tagging API); tags are enrichment only and never change a resource's identity. (A dimension that is constant across resources, such as CloudFront's `Region=Global`, is used to match and query metrics but is not turned into a label.)
        performance_impact:
          description: |
            AWS bills CloudWatch API usage. `GetMetricData` (the metric queries) is the cost driver, billed per metric requested; `ListMetrics` discovery falls under the free tier and then costs a fraction as much. As a rough anchor, `GetMetricData` is billed at roughly $0.01 per 1,000 metrics requested -- confirm current [CloudWatch pricing](https://aws.amazon.com/cloudwatch/pricing/) for your region. Each combination of target, instance, metric, and statistic is one billed query, run once per its own period (not once per collection cycle), so cost scales with selected targets, discovered instances, metrics, statistics, and their periods -- not with `update_every`. The collector minimizes it with curated profiles, single-statistic defaults, exact dimension filtering, shared compatible discovery scans, cached discovery/query plans, and `recently_active_only`. To reduce cost further, narrow `rules[].targets`, `rules[].profiles`, or `rules[].regions`.
    setup:
      prerequisites:
        list:
          - title: Create an AWS IAM identity with CloudWatch read access
            description: |
              The collector needs an IAM identity (user or role) allowed to read CloudWatch metrics. It resolves the AWS account identity with `GetCallerIdentity`, which does not require an explicit permission grant.

              Attach a policy such as:

              ```json
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "cloudwatch:ListMetrics",
                      "cloudwatch:GetMetricData"
                    ],
                    "Resource": "*"
                  }
                ]
              }
              ```

              `cloudwatch:ListMetrics` and `cloudwatch:GetMetricData` do not support resource-level permissions, so `"Resource": "*"` is required -- this is already least-privilege for these read actions. `GetCallerIdentity` needs no explicit grant. Scope `sts:AssumeRole` to the specific role ARN(s) rather than `*`. To enable resource tag enrichment (the optional `tags` option), also grant `tag:GetResources` (it likewise requires `"Resource": "*"`).

              Define one or more named credential sources:

              - `default` -- the AWS SDK default credential chain (environment variables, shared config/credentials files, EC2 instance profile, or EKS IRSA). Recommended when Netdata runs inside AWS.
              - `static` -- an explicit access key ID and secret access key, plus an optional session token. Use go.d secret references rather than plaintext values.

              A target can use either source directly or use it to assume one IAM role. If the role trust policy requires an external ID, the role owner supplies that value; it is not an AWS password or access key. See [AWS guidance for third-party access](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_common-scenarios_third-party.html).
      configuration:
        file:
          name: go.d/cloudwatch.conf
        options:
          description: |
            The following options can be defined globally or per job.

            **Profile file locations:**

            | Type | Path |
            |:-----|:-----|
            | Stock profiles | `/usr/lib/netdata/conf.d/go.d/cloudwatch.profiles/default/` |
            | User overrides | `/etc/netdata/go.d/cloudwatch.profiles/` |

            A user profile file with the same basename as a stock profile overrides it.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds). Must be at least 60 (CloudWatch's minimum period).
              default_value: 60
              required: false
              group: Collection
            - name: autodetection_retry
              description: Recheck interval (seconds) when the job fails to start. Default `0` means no retry; set a positive value to keep retrying.
              default_value: 0
              required: false
              group: Collection
            - name: query_offset
              description: Seconds subtracted from the current time when building query windows, to account for CloudWatch publish latency. The effective offset is `max(query_offset, period)`.
              default_value: 600
              required: false
              group: Collection
            - name: timeout
              description: Timeout for AWS API requests (seconds).
              default_value: 30
              required: false
              group: Collection
            - name: credentials
              description: Map of named credential sources. Every source has a `type` of `default` (AWS SDK default chain) or `static` (explicit access/session credentials in `type_static`). Credential sources are reusable by targets and every defined source must be used.
              default_value: ""
              required: true
              group: Authentication
            - name: credentials.NAME.type
              description: "Credential source type: `default` uses the AWS SDK chain; `static` requires `type_static`."
              default_value: ""
              required: true
              group: Authentication
            - name: credentials.NAME.type_static
              description: Configuration used only when the credential source `type` is `static`.
              default_value: ""
              required: false
              group: Authentication
            - name: credentials.NAME.type_static.access_key_id
              description: AWS access key ID. Required in `type_static`. Use a go.d secret reference such as `${env:AWS_ACCESS_KEY_ID}`.
              default_value: ""
              required: false
              group: Authentication
            - name: credentials.NAME.type_static.secret_access_key
              description: AWS secret access key. Required in `type_static`. Use a go.d secret reference; do not store plaintext credentials in the file.
              default_value: ""
              required: false
              group: Authentication
            - name: credentials.NAME.type_static.session_token
              description: Optional AWS session token in `type_static` for temporary credentials. Use a go.d secret reference.
              default_value: ""
              required: false
              group: Authentication
            - name: targets
              description: Up to 64 named monitored AWS identities. A target uses one credential source directly or uses that source to assume one role. Targets remain distinct even when they resolve to the same AWS account.
              default_value: ""
              required: true
              group: Targets
            - name: targets[].name
              description: Target name referenced by collection rules.
              default_value: ""
              required: true
              group: Targets
            - name: targets[].credentials
              description: Name of the credential source used by this target.
              default_value: ""
              required: true
              group: Targets
            - name: targets[].assume_role.role_arn
              description: Optional IAM role ARN to assume using the target's credential source.
              default_value: ""
              required: false
              group: Targets
            - name: targets[].assume_role.external_id
              description: Optional value supplied by the role owner when the role trust policy requires an external ID. It is not an AWS password or access key.
              default_value: ""
              required: false
              group: Targets
            - name: rules
              description: Ordered collection rules. Each rule selects targets, profiles, and regions. Earlier rules own duplicate final metric series; within one rule, the earliest entry in `rules[].targets` owns the series.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].name
              description: Unique rule name used in diagnostics.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].targets
              description: Ordered names of monitored targets selected by this rule. Order breaks overlap ties within the rule.
              default_value: ""
              required: true
              group: Rules
            - name: rules[].profiles.defaults
              description: Include all default-enabled profiles. Defaults to `true` when `profiles` or `defaults` is omitted.
              default_value: true
              required: false
              group: Rules
            - name: rules[].profiles.include
              description: Profile basenames to add explicitly. Set `defaults` to `false` to collect only this list, including profiles disabled by default.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].profiles.exclude
              description: Profile basenames to remove from the selected set. A profile cannot be both included and excluded.
              default_value: ""
              required: false
              group: Rules
            - name: rules[].regions
              description: Canonical lowercase AWS region codes selected by this rule. The compiler intersects them with intrinsic profile restrictions; for example, CloudFront supports only `us-east-1`.
              default_value: ""
              required: true
              group: Rules
            - name: discovery.refresh_every
              description: How often (seconds) to re-discover metrics. Minimum 60.
              default_value: 300
              required: false
              group: Discovery
            - name: discovery.recently_active_only
              description: List only metrics active in the last 3 hours. Automatically disabled for metrics whose period exceeds 3 hours (such as the daily S3 storage metrics).
              default_value: true
              required: false
              group: Discovery
            - name: tags
              description: |
                Optional allowlist of AWS resource tags to attach as extra labels on collected metrics, looked up via the Resource Groups Tagging API. Empty by default -- with no tags listed, no tag lookup runs and no extra IAM is needed. Each entry has a `name` (the AWS tag key, case-sensitive) and an optional `rename` (the Netdata label name; the default is the sanitized key, so `Name` becomes `name`). Use `rename` when the key is not a valid label (for example an `aws:`-prefixed key) or collides with a built-in label such as `region`. Enabling tags requires the `tag:GetResources` IAM permission. Note: tag values become label values and may contain personal data (such as owner emails), so list only tags you want exposed as labels. Tags apply only to profiles with a supported resource-ARN join; some services are not tag-enriched: Auto Scaling and Bedrock (not taggable via the Resource Groups Tagging API), and -- pending a reliable ARN join -- API Gateway, CloudFront, MSK, and ElastiCache. Tags behave as create-time chart labels: a tag that first appears or changes value after a chart already exists is reflected only when that chart is next recreated.
              default_value: ""
              required: false
              group: Tags
            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Default credentials, single region
              description: Monitor the base AWS identity in `us-east-1` using the SDK default credential chain and all default-enabled profiles.
              config: |
                jobs:
                  - name: default_credentials
                    credentials:
                      sdk_default:
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rules:
                      - name: base-defaults
                        targets: [base]
                        regions: [us-east-1]
            - name: Static credentials assume multiple roles
              description: Use one static/session credential source to assume roles for multiple monitored targets. Store credentials in supported secret providers, not in plaintext.
              config: |
                jobs:
                  - name: cross_account
                    credentials:
                      bootstrap:
                        type: static
                        type_static:
                          access_key_id: ${env:AWS_ACCESS_KEY_ID}
                          secret_access_key: ${env:AWS_SECRET_ACCESS_KEY}
                          session_token: ${env:AWS_SESSION_TOKEN}
                    targets:
                      - name: production
                        credentials: bootstrap
                        assume_role:
                          role_arn: "arn:aws:iam::[ACCOUNT]:role/[ROLE]"
                          external_id: ${env:AWS_EXTERNAL_ID}
                      - name: staging
                        credentials: bootstrap
                        assume_role:
                          role_arn: "arn:aws:iam::[ACCOUNT]:role/[ROLE]"
                    rules:
                      - name: both-defaults
                        targets: [production, staging]
                        regions: [us-east-1, eu-west-1]
            - name: Specific services only
              description: Collect only EC2 and RDS for the explicitly visible base target.
              config: |
                jobs:
                  - name: ec2_rds
                    credentials:
                      sdk_default:
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rules:
                      - name: core-services
                        targets: [base]
                        profiles:
                          defaults: false
                          include: [ec2, rds]
                        regions: [us-east-1]
            - name: All services including opt-in profiles
              description: Select defaults and explicitly add disabled opt-in profiles such as broad ALB target groups, DynamoDB operations, S3 request metrics, and EBS stalled I/O.
              config: |
                jobs:
                  - name: defaults_and_opt_in
                    credentials:
                      sdk_default:
                        type: default
                    targets:
                      - name: base
                        credentials: sdk_default
                    rules:
                      - name: expanded-services
                        targets: [base]
                        profiles:
                          defaults: true
                          include: [alb_target, dynamodb_operation, s3_requests, ebs_stalled_io]
                        regions: [us-east-1]
    troubleshooting:
      problems:
        list:
          - name: No metrics are collected
            description: |
              Check the following:

              - **Permissions** -- each target allows `cloudwatch:ListMetrics` and `cloudwatch:GetMetricData`; `GetCallerIdentity` needs no explicit grant. Targets with `assume_role` also require `sts:AssumeRole` on the source identity.
              - **Rules** -- `rules[].targets`, `rules[].profiles`, and `rules[].regions` select the expected target, service, and region. CloudFront publishes metrics only in `us-east-1`; its profile enforces this automatically.
              - **Resources are active** -- confirm in the AWS CloudWatch console that the resources are publishing metrics.
              - **Collector logs** -- check for authentication or API errors:
                ```bash
                # systemd
                journalctl -u netdata --namespace=netdata --grep cloudwatch --since "5 minutes ago"
                # non-systemd
                grep cloudwatch /var/log/netdata/collector.log
                ```
          - name: Missing metrics for some services
            description: |
              - **Profile selection** -- omit `rules[].profiles` to select defaults, or ensure the service basename appears under `rules[].profiles.include` and is not excluded.
              - **Daily metrics** -- S3 storage metrics are published once per day. They are inherently delayed by about a day, and `recently_active_only` is automatically disabled for them.
              - **Resource activity** -- some metrics only appear when the resource is actively processing data (for example, EventBridge and Bedrock publish a metric only when its value is non-zero).
              - **Auto Scaling group metrics** -- Auto Scaling group metrics (`cloudwatch.auto_scaling.*`) are not published until group-metrics collection is enabled on the group (`aws autoscaling enable-metrics-collection --granularity 1Minute`). Amazon EKS managed node groups have it enabled by default.
              - **EKS control-plane metrics** -- EKS control-plane metrics (`cloudwatch.eks.*`) are published to the `AWS/EKS` namespace automatically, at no additional EKS charge, only for clusters running Kubernetes 1.28 or later; older clusters do not report them. These are distinct from Container Insights / the CloudWatch Observability add-on (agent-based, billed separately).
          - name: Charts have gaps or incomplete data
            description: |
              CloudWatch publishes metrics with a delay.

              - The collector uses `query_offset` (default 600 seconds), and the effective offset is at least one full metric period.
              - If charts still have gaps, increase `query_offset`.
          - name: Access denied or authentication errors
            description: |
              - Verify the credential source referenced by the failing target is valid and not expired.
              - For a target with `assume_role`, confirm its source identity is allowed to assume the role and that the role trust policy permits it. If the trust policy requires an external ID, use the value supplied by the role owner.
              - For AWS GovCloud or China partitions, ensure each target's selected rule regions match its role ARN partition.
    alerts:
      - name: aws_cloudwatch_ec2_status_check_failed
        metric: cloudwatch.ec2.status_check_failed
        info: "EC2 status check failed on ${label:instance_id}"
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/cloudwatch.conf
      - name: aws_cloudwatch_ec2_attached_ebs_status_check_failed
        metric: cloudwatch.ec2.status_check_failed
        info: "EC2 attached EBS status check failed on ${label:instance_id}"
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/cloudwatch.conf
      - name: aws_cloudwatch_alb_target_group_unhealthy_hosts
