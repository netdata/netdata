    metrics:
      folding:
        title: Metrics
        enabled: false
      description: |
        Built-in receiver metrics keep per-job totals with the `job_name` label so listener health remains visible even when a packet cannot be attributed to a source device. Built-in source receiver metrics are also emitted for active, attributable sources with bounded `source_id` and `source_kind` labels; when enrichment finds an unambiguous vnode, those source metrics are written under that vnode host scope.

        Profile-defined trap metrics are emitted dynamically when `profile_metrics` enables rules from loaded trap profiles. Device-attributable profile metrics use vnode host scope when enrichment finds an unambiguous vnode; all profile metric series also include bounded `source_id` and `source_kind` labels so generated chart instances keep a stable identity. Resource metrics additionally include `resource_class` and `resource_id`. When vnode enrichment is unavailable, ambiguous, or conflicting, profile metrics use those labels under the listener job.

        Source-attributed receiver metrics are bounded to 2000 active sources per job and expire inactive sources after 60 successful collection cycles. Accepted traps are still committed to the configured backend if source metric attribution fails or the source cap is full; the attribution diagnostic counters expose those cases. Per-job pipeline totals can be greater than the sum of per-source metrics when a packet has no trustworthy source, source attribution fails, or the source cap is full.

        `accepted` and source-attributed error counters are recorded before dedup suppression. `committed`, event/severity counters, and profile-defined metrics are recorded only after successful authoritative output commitment. When both journal and OTLP outputs are enabled, journal is authoritative for commitment and OTLP export failures are reported as `otlp_export_failed` export/source errors. When OTLP is the only output backend, OTLP export failures are terminal write failures and also increment `pipeline.write_failed` and source-attributed `source_pipeline.write_failed` when the source is known.

        **Built-in contexts:**

        - `snmp.trap.pipeline`: Receiver packet and write pipeline progress, grouped per job.
        - `snmp.trap.events`: Trap events received, split by category. The `stacked` chart type gives a visual burst profile across categories.
        - `snmp.trap.severity`: Trap events received, split by severity. The `stacked` chart type gives a visual burst profile across the closed 8-severity taxonomy (`emerg`, `alert`, `crit`, `err`, `warning`, `notice`, `info`, `debug`).
        - `snmp.trap.errors`: Processing errors by type. Stacked chart for quick identification of dominant error categories.
        - `snmp.trap.dedup_suppressed`: Per-second rate of traps suppressed by dedup (only emitted when dedup is enabled on the job).
        - `snmp.trap.sources`: Number of active source metric identities tracked by the job.
        - `snmp.trap.source_attribution`: Per-job attribution diagnostics for vnode matches, fallback labels, ambiguous enrichment, attribution failures, cap overflow, and source identity transitions.
        - `snmp.trap.source_pipeline`: Source-attributed accepted, committed, dedup-suppressed, and write-failed trap events.
        - `snmp.trap.source_errors`: Source-attributed processing errors where a source can be identified.
        - `snmp.trap.source_last_seen`: Seconds since the source last produced an accepted trap.
        - `snmp.trap.profile_metric_diagnostics`: Profile-defined trap metric extraction and attribution diagnostics (only emitted when `profile_metrics` selects at least one rule).

        **Dynamic contexts** (profile metrics):

        Trap profiles may define optional `metrics:` rules and `charts:`. Jobs enable those rules with `profile_metrics.mode` and `profile_metrics.include`; `include` is valid only with `exact` or `combined` mode. Profile metric contexts are generated at runtime from the profile chart definitions under the `snmp.trap.` context namespace. Profile rules can create counters, last trap-reported numeric samples, and trap-derived state gauges. They are updated only after the trap is successfully committed to the authoritative output backend.
      availability: []
      dynamic_context_prefixes:
        - prefix: snmp.trap.
          reason: Profile-defined trap metric charts are emitted at runtime under the snmp.trap prefix when enabled with profile_metrics.
      scopes:
        - name: job
          description: Per-job self-metrics for a SNMP trap listener job.
          labels:
            - name: job_name
              description: The job name as defined in `go.d/snmp_traps.conf`.
          metrics:
            - name: snmp.trap.pipeline
              description: SNMP trap receiver pipeline progress by job
              unit: events/s
              chart_type: line
              dimensions:
                - name: received
                  description: UDP packets accepted by the listener for decoding
                - name: decoded
                  description: Packets decoded into SNMP PDUs
                - name: accepted
                  description: Decoded traps accepted for enrichment, deduplication, and output; this is counted before dedup suppression
                - name: committed
                  description: Traps successfully committed to the authoritative output backend
                - name: dedup_suppressed
                  description: Accepted traps suppressed by deduplication
                - name: dropped
                  description: Packets or traps dropped before successful commitment
                - name: write_failed
                  description: Accepted traps that failed authoritative output commitment
            - name: snmp.trap.events
              description: SNMP trap events received, categorized by type
              unit: events/s
              chart_type: stacked
              dimensions:
                - name: state_change
                  description: Link up/down, operational state transitions
                - name: config_change
                  description: Configuration modifications
                - name: security
                  description: Security events (intrusion, ACL violations, etc.)
                - name: auth
                  description: Authentication and authorization events
                - name: license
                  description: License-state events
                - name: mobility
                  description: Roaming, handoff, wireless client events
                - name: diagnostic
                  description: Tests, health checks, probes
                - name: unknown
                  description: Unmatched or unclassified traps
            - name: snmp.trap.severity
              description: SNMP trap events received, categorized by severity
              unit: events/s
              chart_type: stacked
              dimensions:
                - name: emerg
                  description: System unusable
                - name: alert
                  description: Immediate action required
                - name: crit
                  description: Critical condition
                - name: err
                  description: Error condition
                - name: warning
                  description: Warning condition
                - name: notice
                  description: Normal but significant condition
                - name: info
                  description: Informational
                - name: debug
                  description: Debug-level message
            - name: snmp.trap.errors
              description: SNMP trap processing errors by type
              unit: errors/s
              chart_type: stacked
              dimensions:
                - name: unknown_oid
                  description: Trap OID not found in any loaded profile
                - name: decode_failed
                  description: SNMP BER decode errors
                - name: template_unresolved
                  description: Varbind template resolution failures
                - name: malformed_pdu
                  description: Structurally invalid PDU
                - name: dropped_allowlist
                  description: Traps dropped by source-IP CIDR allowlist
                - name: rate_limited
                  description: Traps dropped or sampled by per-source rate limit
                - name: auth_failures
                  description: SNMPv1/v2c community mismatch
                - name: usm_failures
                  description: SNMPv3 USM authentication or decryption failures
                - name: unknown_engine_id
                  description: SNMPv3 trap from an unknown or unregistered engine ID
                - name: inform_response_failed
                  description: Failed to send INFORM response to sender
                - name: binary_encoded
                  description: Field values written with binary journal encoding for CWE-117 protection
                - name: profile_load_failed
                  description: Trap profile YAML load or parse errors
                - name: journal_write_failed
                  description: Systemd-journal write errors
                - name: otlp_export_failed
                  description: OTLP export errors (only when OTLP is enabled)
                - name: listener_read_failed
                  description: UDP socket read errors after a listener was successfully bound
            - name: snmp.trap.dedup_suppressed
              description: Per-second rate of traps suppressed by deduplication (only emitted when dedup is enabled)
              unit: events/s
              chart_type: line
              dimensions:
                - name: suppressed
                  description: Traps suppressed during the current collection interval
            - name: snmp.trap.sources
              description: Active source metric identities tracked by this listener job
              unit: sources
              chart_type: line
              dimensions:
                - name: active
                  description: Source identities that still have continuous source metrics
            - name: snmp.trap.source_attribution
              description: Source attribution diagnostics for built-in source receiver metrics
              unit: events/s
              chart_type: stacked
              dimensions:
                - name: vnode
                  description: Accepted traps attributed to a vnode host scope
                - name: fallback
                  description: Accepted traps attributed to bounded fallback source labels
                - name: ambiguous
                  description: Accepted traps whose enrichment evidence was ambiguous or conflicting
                - name: failed
                  description: Accepted traps whose source identity could not be derived or accepted
                - name: overflow_dropped
                  description: Accepted traps whose new source metric instance was skipped because the source cap was full
                - name: source_transitions
                  description: Raw source identities that changed metric identity, such as fallback labels later resolving to a vnode
            - name: snmp.trap.profile_metric_diagnostics
              description: Profile-defined trap metric extraction and attribution diagnostics (only emitted when profile_metrics selects at least one rule)
              unit: events/s
              chart_type: stacked
              dimensions:
                - name: rule_missed
                  description: Matching rule predicates did not match, or missing data used missing=drop
                - name: extraction_failed
                  description: A selected rule could not extract a required runtime value
                - name: attribution_failed
                  description: A selected rule could not derive or accept a source identity
                - name: overflow_dropped
                  description: New metric instances skipped because source, resource, chart, or job caps were full
                - name: source_transitions
                  description: Source identity route changes between fallback and vnode/device attribution
        - name: source
          description: Per-source receiver metrics for active, attributable SNMP trap sources.
          labels:
            - name: job_name
              description: The listener job that received the trap.
            - name: source_id
              description: Vnode ID when enrichment resolves a vnode, otherwise a bounded source identifier. Raw source values are hashed by default.
            - name: source_kind
              description: Source identity kind, such as `vnode`, `trusted_trap_address`, `udp_peer`, or `entry_source`.
          metrics:
            - name: snmp.trap.source_pipeline
              description: Source-attributed receiver pipeline progress
              unit: events/s
              chart_type: line
              dimensions:
                - name: accepted
                  description: Decoded traps accepted for this source before dedup suppression
                - name: committed
                  description: Traps from this source committed to the authoritative output backend
                - name: dedup_suppressed
                  description: Accepted traps from this source suppressed by deduplication
                - name: write_failed
                  description: Accepted traps from this source that failed authoritative output commitment
            - name: snmp.trap.source_errors
              description: Source-attributed processing errors
              unit: errors/s
              chart_type: stacked
              dimensions:
                - name: unknown_oid
                  description: Trap OID from this source was not found in any loaded profile
                - name: template_unresolved
                  description: Varbind template resolution failed for this source
                - name: profile_load_failed
                  description: Trap profile YAML load or parse errors seen while processing this source
                - name: journal_write_failed
                  description: Systemd-journal write errors for this source
                - name: otlp_export_failed
                  description: OTLP export errors for this source
            - name: snmp.trap.source_last_seen
              description: Time since this source last produced an accepted trap
              unit: seconds
              chart_type: line
              dimensions:
                - name: seconds_ago
                  description: Seconds since the source was last accepted by this listener job
    troubleshooting:
      problems:
        list:
          - name: Port binding fails (permission denied)
            description: |
              Standard SNMP trap port (UDP/162) requires `CAP_NET_BIND_SERVICE`.

              Netdata packages grant this capability to `go.d.plugin` automatically. If running from source
              or in a custom deployment, grant it manually:
              ```bash
              sudo setcap CAP_NET_BIND_SERVICE=eip /usr/libexec/netdata/plugins.d/go.d.plugin
              ```
              Alternatively, use a port >= 1024 (e.g., `1062`) and redirect traffic through a firewall.
          - name: SNMPv3 traps not decoded (unknown_engine_id)
            description: |
              In static mode, the sender engine ID is not in `engine_id_whitelist`. Add the sender engine ID
              to the whitelist, or switch to `dynamic_engine_id_discovery: true` with an empty whitelist.

              In dynamic mode, the first accepted `(engineID, username)` pair increments this once as
              operator visibility. Repeated or rejected increments usually indicate cap exhaustion,
              invalid sender state, or an unauthorized sender.
          - name: USM authentication failures
            description: |
              Check that the USM user's `auth_proto`, `auth_key`, `priv_proto`, and `priv_key` match the
              sender device's configuration. Verify engine ID matches. Use Netdata secret references for keys.
          - name: journal retention eating disk space
            description: |
              The default direct journal retention uses size-based eviction (`max_size: 10GB`) with no time-based age limit.
              For high-trap environments, reduce `max_size` or enable `max_duration` to age-out old entries.
              OTLP-only jobs can set `journal.enabled: false`; they do not create local journal files and do not appear as sources in the local logs Function.
