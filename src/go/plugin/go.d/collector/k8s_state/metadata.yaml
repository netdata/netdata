plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-k8s_state
      plugin_name: go.d.plugin
      module_name: k8s_state
      monitored_instance:
        name: Kubernetes Cluster State
        link: https://kubernetes.io/
        icon_filename: kubernetes.svg
        categories:
          - data-collection.containers-and-vms
      keywords:
        - kubernetes
        - k8s
      related_resources:
        integrations:
          list:
            - plugin_name: go.d.plugin
              module_name: k8s_apiserver
            - plugin_name: go.d.plugin
              module_name: k8s_kubelet
            - plugin_name: go.d.plugin
              module_name: k8s_kubeproxy
            - plugin_name: cgroups.plugin
              module_name: /sys/fs/cgroup
              monitored_instance_name: "Kubernetes Containers"
            - plugin_name: go.d.plugin
              module_name: coredns
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          This collector monitors Kubernetes Nodes, Pods and Containers.
        method_description: |
          The collector uses the Kubernetes `client-go` library to connect to the API server. It discovers resources through shared informers and collects state metrics for Nodes, Pods, Deployments, CronJobs, and Jobs.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            This collector does not support auto-detection. It is disabled by default and requires manual configuration — add a job to `go.d/k8s_state.conf` or enable it via the Helm chart.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list:
          - title: Enable the collector explicitly
            description: |
              This collector is **disabled by default**. You must add a `k8s_state` job to `go.d/k8s_state.conf` to enable it.
          - title: Network access to the Kubernetes API server
            description: |
              The Netdata Agent must be able to reach the Kubernetes API server.
              When running inside a cluster, this is typically available at `https://kubernetes.default.svc`.
          - title: RBAC permissions (in-cluster)
            description: |
              When running inside a Kubernetes pod (Helm or manifest deployment), the pod's ServiceAccount needs a ClusterRole with `list` and `watch` permissions for `nodes`, `pods`, `deployments`, `cronjobs`, and `jobs` resources.
          - title: Kubeconfig file (out-of-cluster)
            description: |
              When running outside the cluster, a valid kubeconfig file must be available at `~/.kube/config` and the agent process must be running in a terminal (TTY).
      configuration:
        file:
          name: go.d/k8s_state.conf
        options:
          description: ""
          folding:
            title: Config options
            enabled: true
          list: []
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Minimal configuration
              description: |
                The minimal configuration to enable the k8s_state collector.
              config: |
                jobs:
                  - name: k8s_state
            - name: Custom update interval
              description: |
                Collect Kubernetes state metrics every 30 seconds.
              config: |
                jobs:
                  - name: k8s_state
                    update_every: 30
    troubleshooting:
      problems:
        list:
          - name: k8s_state does not appear in the collectors list or Cloud UI
            description: |
              This collector is **disabled by default** and does not support auto-detection.

              **Remediation:**
              1. Add a `k8s_state` job to `go.d/k8s_state.conf`:
                 ```yaml
                 jobs:
                   - name: k8s_state
                 ```
              2. Ensure the pod's ServiceAccount has a ClusterRole granting `list` and `watch` on `nodes`, `pods`, `deployments`, `cronjobs`, and `jobs`.
              3. Restart the Netdata Agent or wait for the next autodetection retry cycle.
          - name: "can not create Kubernetes client: not inside a cluster"
            description: |
              The collector could not detect an in-cluster environment and is not running in a terminal (TTY).

              **Remediation:**
              - If running inside Kubernetes, verify the `KUBERNETES_SERVICE_HOST` and `KUBERNETES_SERVICE_PORT` environment variables are set (they are injected automatically in pods).
              - If running outside the cluster, run the agent in an interactive terminal with a valid `~/.kube/config` file.
    alerts:
      - name: k8s_state_deployment_condition_available
        metric: k8s_state.deployment_conditions
        info: 'Deployment ${label:k8s_deployment_name} does not have the minimum required replicas'
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/k8sstate.conf
      - name: k8s_state_cronjob_last_execution_failed
        metric: k8s_state.cronjob_last_execution_status
        info: 'CronJob ${label:k8s_cronjob_name} in ${label:k8s_namespace} failing'
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/k8sstate.conf
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: node
          description: These metrics refer to the Node.
          labels:
            - name: k8s_cluster_id
              description: Cluster ID. This is equal to the kube-system namespace UID.
            - name: k8s_cluster_name
              description: Cluster name. Cluster name discovery only works in GKE.
            - name: k8s_node_name
              description: Node name.
          metrics:
            - name: k8s_state.node_allocatable_cpu_requests_utilization
              description: CPU requests utilization
              unit: '%'
              chart_type: line
              dimensions:
                - name: requests
            - name: k8s_state.node_allocatable_cpu_requests_used
              description: CPU requests used
              unit: millicpu
              chart_type: line
              dimensions:
                - name: requests
            - name: k8s_state.node_allocatable_cpu_limits_utilization
              description: CPU limits utilization
              unit: '%'
              chart_type: line
              dimensions:
                - name: limits
            - name: k8s_state.node_allocatable_cpu_limits_used
              description: CPU limits used
              unit: millicpu
              chart_type: line
              dimensions:
                - name: limits
            - name: k8s_state.node_allocatable_mem_requests_utilization
              description: Memory requests utilization
              unit: '%'
              chart_type: line
              dimensions:
                - name: requests
            - name: k8s_state.node_allocatable_mem_requests_used
              description: Memory requests used
              unit: bytes
              chart_type: line
              dimensions:
                - name: requests
            - name: k8s_state.node_allocatable_mem_limits_utilization
              description: Memory limits utilization
              unit: '%'
              chart_type: line
              dimensions:
                - name: limits
            - name: k8s_state.node_allocatable_mem_limits_used
              description: Memory limits used
              unit: bytes
              chart_type: line
              dimensions:
                - name: limits
            - name: k8s_state.node_allocatable_pods_utilization
              description: Pods resource utilization
              unit: '%'
              chart_type: line
              dimensions:
                - name: allocated
            - name: k8s_state.node_allocatable_pods_usage
              description: Pods resource usage
              unit: pods
              chart_type: stacked
              dimensions:
                - name: available
                - name: allocated
            - name: k8s_state.node_condition
              description: Condition status
              unit: status
              chart_type: line
              dimensions:
                - name: Ready
                - name: DiskPressure
                - name: MemoryPressure
                - name: NetworkUnavailable
                - name: PIDPressure
            - name: k8s_state.node_schedulability
              description: Schedulability
              unit: state
              chart_type: line
              dimensions:
                - name: schedulable
                - name: unschedulable
            - name: k8s_state.node_pods_readiness
              description: Pods readiness
              unit: '%'
              chart_type: line
              dimensions:
                - name: ready
            - name: k8s_state.node_pods_readiness_state
              description: Pods readiness state
              unit: pods
              chart_type: line
              dimensions:
                - name: ready
                - name: unready
            - name: k8s_state.node_pods_condition
              description: Pods condition
              unit: pods
              chart_type: line
              dimensions:
                - name: pod_ready
                - name: pod_scheduled
                - name: pod_initialized
                - name: containers_ready
            - name: k8s_state.node_pods_phase
              description: Pods phase
              unit: pods
              chart_type: stacked
              dimensions:
                - name: running
                - name: failed
                - name: succeeded
                - name: pending
            - name: k8s_state.node_containers
              description: Containers
              unit: containers
              chart_type: line
              dimensions:
                - name: containers
                - name: init_containers
            - name: k8s_state.node_containers_state
              description: Containers state
              unit: containers
              chart_type: stacked
              dimensions:
                - name: running
                - name: waiting
                - name: terminated
            - name: k8s_state.node_init_containers_state
              description: Init containers state
              unit: containers
              chart_type: stacked
              dimensions:
                - name: running
                - name: waiting
                - name: terminated
            - name: k8s_state.node_age
              description: Age
              unit: seconds
              chart_type: line
              dimensions:
                - name: age
        - name: deployment
          description: These metrics refer to Deployments.
          labels:
            - name: k8s_cluster_id
              description: Cluster ID. This is equal to the kube-system namespace UID.
            - name: k8s_cluster_name
              description: Cluster name. Cluster name discovery only works in GKE.
            - name: k8s_deployment_name
              description: Deployment name.
            - name: k8s_namespace
              description: Namespace.
          metrics:
            - name: k8s_state.deployment_conditions
              description: Deployment Conditions
              unit: 'status'
              chart_type: line
              dimensions:
                - name: available
                - name: replica_failure
                - name: progressing
            - name: k8s_state.deployment_replicas
              description: Deployment Replicas
              unit: 'replicas'
              chart_type: line
              dimensions:
                - name: desired
                - name: current
                - name: ready
            - name: k8s_state.deployment_age
              description: Deployment Age
              unit: 'seconds'
              chart_type: line
              dimensions:
                - name: age
        - name: cronjob
          description: These metrics refer to CronJobs.
          labels:
            - name: k8s_cluster_id
              description: Cluster ID. This is equal to the kube-system namespace UID.
            - name: k8s_cluster_name
              description: Cluster name. Cluster name discovery only works in GKE.
            - name: k8s_cronjob_name
              description: CronJob name.
            - name: k8s_namespace
              description: Namespace.
          metrics:
            - name: k8s_state.cronjob_jobs_count_by_status
              description: CronJob Jobs Count by Status
              unit: 'jobs'
              chart_type: line
              dimensions:
                - name: completed
                - name: failed
                - name: running
                - name: suspended
            - name: k8s_state.cronjob_jobs_failed_by_reason
              description: CronJob Jobs Failed by Reason
              unit: 'jobs'
              chart_type: line
              dimensions:
                - name: pod_failure_policy
                - name: backoff_limit_exceeded
                - name: deadline_exceeded
            - name: k8s_state.cronjob_last_execution_status
              description: CronJob Last Execution Status
              unit: 'status'
              chart_type: line
              dimensions:
                - name: completed
                - name: failed
            - name: k8s_state.cronjob_last_completion_duration
              description: CronJob Last Completion Duration
              unit: 'seconds'
              chart_type: line
              dimensions:
                - name: last_completion
            - name: k8s_state.cronjob_last_completed_time_ago
              description: CronJob Last Completed Time Ago
              unit: 'seconds'
              chart_type: line
              dimensions:
                - name: last_completed_ago
            - name: k8s_state.cronjob_last_schedule_time_ago
              description: CronJob Last Schedule Time Ago
              unit: 'seconds'
              chart_type: line
              dimensions:
                - name: last_schedule_ago
            - name: k8s_state.cronjob_suspend_status
              description: CronJob Suspend Status
              unit: 'status'
              chart_type: line
              dimensions:
                - name: enabled
                - name: suspended
            - name: k8s_state.cronjob_age
              description: CronJob Age
              unit: 'seconds'
              chart_type: line
              dimensions:
                - name: age
        - name: pod
          description: These metrics refer to the Pod.
          labels:
            - name: k8s_cluster_id
              description: Cluster ID. This is equal to the kube-system namespace UID.
            - name: k8s_cluster_name
              description: Cluster name. Cluster name discovery only works in GKE.
            - name: k8s_node_name
              description: Node name.
            - name: k8s_namespace
              description: Namespace.
            - name: k8s_controller_kind
              description: Controller kind (ReplicaSet, DaemonSet, StatefulSet, Job, etc.).
            - name: k8s_controller_name
              description: Controller name.
            - name: k8s_pod_name
              description: Pod name.
            - name: k8s_qos_class
              description: Pod QOS class (burstable, guaranteed, besteffort).
          metrics:
            - name: k8s_state.pod_cpu_requests_used
              description: CPU requests used
              unit: millicpu
              chart_type: line
              dimensions:
                - name: requests
            - name: k8s_state.pod_cpu_limits_used
              description: CPU limits used
              unit: millicpu
              chart_type: line
              dimensions:
                - name: limits
            - name: k8s_state.pod_mem_requests_used
              description: Memory requests used
              unit: bytes
              chart_type: line
              dimensions:
                - name: requests
            - name: k8s_state.pod_mem_limits_used
              description: Memory limits used
              unit: bytes
              chart_type: line
              dimensions:
                - name: limits
            - name: k8s_state.pod_condition
              description: Condition
              unit: state
              chart_type: line
              dimensions:
                - name: pod_ready
                - name: pod_scheduled
                - name: pod_initialized
                - name: containers_ready
            - name: k8s_state.pod_phase
              description: Phase
              unit: state
              chart_type: line
              dimensions:
                - name: running
                - name: failed
                - name: succeeded
                - name: pending
            - name: k8s_state.pod_status_reason
              description: Status reason
              unit: status
              chart_type: line
              dimensions:
                - name: Evicted
                - name: NodeAffinity
                - name: NodeLost
                - name: Shutdown
                - name: UnexpectedAdmissionError
                - name: Other
            - name: k8s_state.pod_age
              description: Age
              unit: seconds
              chart_type: line
              dimensions:
                - name: age
            - name: k8s_state.pod_containers
              description: Containers
              unit: containers
              chart_type: line
              dimensions:
                - name: containers
                - name: init_containers
            - name: k8s_state.pod_containers_state
              description: Containers state
              unit: containers
              chart_type: stacked
              dimensions:
                - name: running
                - name: waiting
                - name: terminated
            - name: k8s_state.pod_init_containers_state
              description: Init containers state
              unit: containers
              chart_type: stacked
              dimensions:
                - name: running
                - name: waiting
                - name: terminated
        - name: container
          description: These metrics refer to the Pod container.
          labels:
            - name: k8s_cluster_id
              description: Cluster ID. This is equal to the kube-system namespace UID.
            - name: k8s_cluster_name
              description: Cluster name. Cluster name discovery only works in GKE.
            - name: k8s_node_name
              description: Node name.
            - name: k8s_namespace
              description: Namespace.
            - name: k8s_controller_kind
              description: Controller kind (ReplicaSet, DaemonSet, StatefulSet, Job, etc.).
            - name: k8s_controller_name
              description: Controller name.
            - name: k8s_pod_name
              description: Pod name.
            - name: k8s_qos_class
              description: Pod QOS class (burstable, guaranteed, besteffort).
            - name: k8s_container_name
              description: Container name.
          metrics:
            - name: k8s_state.pod_container_readiness_state
              description: Readiness state
              unit: state
              chart_type: line
              dimensions:
                - name: ready
            - name: k8s_state.pod_container_restarts
              description: Restarts
              unit: restarts
              chart_type: line
              dimensions:
                - name: restarts
            - name: k8s_state.pod_container_state
              description: Container state
              unit: state
              chart_type: line
              dimensions:
                - name: running
                - name: waiting
                - name: terminated
            - name: k8s_state.pod_container_waiting_state_reason
              description: Container waiting state reason
              unit: state
              chart_type: line
              dimensions:
                - name: ContainerCreating
                - name: CrashLoopBackOff
                - name: CreateContainerConfigError
                - name: CreateContainerError
                - name: ErrImagePull
                - name: ImagePullBackOff
                - name: InvalidImageName
                - name: PodInitializing
                - name: Other
            - name: k8s_state.pod_container_terminated_state_reason
              description: Container terminated state reason
              unit: state
              chart_type: line
              dimensions:
                - name: Completed
                - name: ContainerCannotRun
                - name: DeadlineExceeded
                - name: Error
                - name: Evicted
                - name: OOMKilled
                - name: Other
