plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-runit
      plugin_name: go.d.plugin
      module_name: runit
      monitored_instance:
        name: Runit services
        link: https://smarden.org/runit/
        icon_filename: runit.png
        categories:
          - data-collection.operating-systems
      keywords:
        - runit
        - service
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
      most_popular: false
    overview:
      data_collection:
        metrics_description: |
          This collector monitors the state of Runit services.
          It relies on the [`sv`](https://smarden.org/runit/sv.8) CLI tool but avoids directly executing the binary.
          Instead, it utilizes `ndsudo`, a Netdata helper specifically designed to run privileged commands securely within the Netdata environment.
          This approach eliminates the need to use `sudo`, improving security and potentially simplifying permission management.
        method_description: ""
      supported_platforms:
        include:
          - Linux
          - FreeBSD
          - macOS
        exclude:
          - Windows
      multi_instance: true
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            By default, it detects services running in
            `$SVDIR` or (if `$SVDIR` is empty) /service directory.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list:
          - title: Install sv (included in runit package)
            description: |
              If you want this collector then you already have runit package installed.
              But if you'll run Netdata in a Docker then you need to also install runit in Netdata container.
          - title: Docker volume mounts for runit service directories
            description: |
              Runit services make heavy use of symlinks (e.g. `/service/sshd` → `/etc/sv/sshd`,
              `run` and `finish` scripts inside service dirs, `supervise/` state directories, etc.).

              When running Netdata in Docker, you must bind-mount the runit service directories
              at their **original host paths**, not under a host-prefix mount point.
              Otherwise `sv status` will fail to resolve symlinks and will not report service states.

              For example, if the host uses `/service` as the service directory with actual
              service definitions in `/etc/sv/`:

              ```yaml
              volumes:
                - /service:/service:ro
                - /etc/sv:/etc/sv:ro
              ```

              Do **not** mount them under a prefix like `/host/service` — the symlink targets
              inside the container must match the original host paths.
      configuration:
        file:
          name: go.d/runit.conf
        options:
          description: |
            The following options can be defined globally: update_every, autodetection_retry.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection frequency.
              default_value: 1
              required: false
            - name: autodetection_retry
              description: Recheck interval in seconds. Zero means no recheck will be scheduled.
              default_value: 60
              required: false
            - name: dir
              description: Directory with runit services.
              default_value: "/service"
              required: false
              detailed_description: |
                If environment variable $SVDIR is set to non-empty value then it will be used
                as default instead of /service.
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: System services in non-default dir
              description: Set custom directory for system services.
              config: |
                jobs:
                  - name: system
                    dir: /etc/service
            - name: Some user also run services in addition to system ones
              description: |
                > **Note**: When you define multiple jobs, their names must be unique.

                Add directory with user services.
              config: |
                jobs:
                  - name: system

                  - name: someone
                    dir: /home/someone/service
    troubleshooting:
      problems:
        list: []
    alerts:
      - name: runit_service_failed_state
        metric: runit.service_state
        info: runit service in the failed state (should be running but is not)
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/runit.conf
      - name: runit_service_undesired_running
        metric: runit.service_state
        info: runit service is running but should be down (normally down)
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/runit.conf
      - name: runit_service_paused_state
        metric: runit.service_state
        info: runit service is paused
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/runit.conf
      - name: runit_service_stuck_transitioning
        metric: runit.service_state
        info: runit service stuck in transitioning state (starting or stopping)
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/runit.conf
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: global
          description: These metrics refer to the entire monitored application.
          labels: []
          metrics:
            - name: runit.services
              description: Services
              unit: services
              chart_type: stacked
              dimensions:
                - name: running
                - name: not_running
        - name: service
          description: These metrics refer to the runit service.
          labels:
            - name: service_name
              description: runit service name
          metrics:
            - name: runit.service_state
              description: Service State
              unit: state
              chart_type: line
              dimensions:
                - name: running
                - name: down
                - name: failed
                - name: starting
                - name: stopping
                - name: paused
            - name: runit.service_state_duration
              description: Service State Duration
              unit: seconds
              chart_type: line
              dimensions:
                - name: down
                - name: running
