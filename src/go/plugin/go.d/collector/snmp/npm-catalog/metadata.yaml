    setup: *id001
    troubleshooting: *id002
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Cisco Firepower ASA profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**14 metrics** in 5 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Network / Interface | 4 |\n| Network / VPN | 6 |\n| System / CPU | 1 |\n| System / Memory | 2 |\n| System / Uptime | 1 |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### Network / VPN\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_crasMaxSessionsSupportable` | `{session}` | device | The maximum number of remote access sessions that may be supported on this device |\n| `snmp.device_prof_crasMaxUsersSupportable` | `{user}` | device | The maximum number of remote access users for whom Remote Access sessions may be supported on this device |\n| `snmp.device_prof_crasNumDeclinedSessions` | `{session}/s` | device | Number of session setup attempts which were declined due to authentication or authorization failure |\n| `snmp.device_prof_crasNumSessions` | `{session}` | device | Number of currently active sessions |\n| `snmp.device_prof_crasNumSetupFailInsufResources` | `{session}/s` | device | The number of session setup attempts that failed due to insufficient resources |\n| `snmp.device_prof_crasNumUsers` | `{user}` | device | The number of users who have active sessions |\n\n### System / CPU\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpu_usage` | `%` | per cpu_index | The current CPU utilization |\n\n### System / Memory\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_memory_free` | `By` | device | Number of bytes from the memory pool that are currently unused on the physical entity |\n| `snmp.device_prof_memory_used` | `By` | device | Number of bytes from the memory pool that are currently in use by applications on the physical entity |\n\n### System / Uptime\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_systemUptime` | `s` | device | Time since the system was last rebooted or powered on. |\n"
