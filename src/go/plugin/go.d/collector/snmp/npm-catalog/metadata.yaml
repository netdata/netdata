f_coriant_groove_shelfAdminStatus` | `{status}` | per coriant_groove_shelf_id, coriant_groove_shelf_location, coriant_groove_shelf_alias_name | The administrative state specifies the permission to use or prohibition against using the resource |\n| `snmp.device_prof_coriant_groove_shelfInletTemperature` | `Cel` | per coriant_groove_shelf_id, coriant_groove_shelf_location, coriant_groove_shelf_alias_name | Shelf inlet temperature |\n| `snmp.device_prof_coriant_groove_shelfOperStatus` | `{status}` | per coriant_groove_shelf_id, coriant_groove_shelf_location, coriant_groove_shelf_alias_name | The operational state specifies whether or not a resource is able to provide service |\n| `snmp.device_prof_coriant_groove_shelfOutletTemperature` | `Cel` | per coriant_groove_shelf_id, coriant_groove_shelf_location, coriant_groove_shelf_alias_name | Shelf outlet temperature |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### Network / Optical\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_coriant_groove_ochOsAdminStatus` | `{status}` | per coriant_groove_och_os_alias_name, coriant_groove_och_os_service_label | The administrative state specifies the permission to use or prohibition against using the resource |\n| `snmp.device_prof_coriant_groove_ochOsCD` | `ps/nm` | per coriant_groove_och_os_alias_name, coriant_groove_och_os_service_label | Value of Chromatic Dispersion |\n| `snmp.device_prof_coriant_groove_ochOsOSNR` | `dB` | per coriant_groove_och_os_alias_name,
