|\n| `snmp.device_prof_nimble_diskVolBytesUsedLow` | `By` | device | Total number of bytes used on disk for volumes - low order bytes. |\n\n### Storage / IO\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_nimble_ioReadBytes` | `By/s` | device | Total cumulative number of Read I/O bytes (sequential and random). |\n| `snmp.device_prof_nimble_ioReadTimeMicrosec` | `us` | device | Total cumulative microseconds the system has spent processing Read I/Os. This includes system and disk latency, but not any networ… |\n| `snmp.device_prof_nimble_ioReads` | `{read}/s` | device | Total cumulative number of Read I/Os (sequential and random). |\n| `snmp.device_prof_nimble_ioSeqReadBytes` | `By/s` | device | Total cumulative number of Sequential Read I/O bytes. |\n| `snmp.device_prof_nimble_ioSeqWriteBytes` | `By/s` | device | Total cumulative number of Sequential Write I/O bytes. |\n| `snmp.device_prof_nimble_ioWriteBytes` | `By/s` | device | Total cumulative number of Write I/O bytes (sequential and random). |\n| `snmp.device_prof_nimble_ioWriteTimeMicrosec` | `us` | device | Total cumulative microseconds the system has spent processing Write I/Os. This includes system and disk latency, but not any netwo… |\n| `snmp.device_prof_nimble_ioWrites` | `{write}/s` | device | Total cumulative number of Write I/Os. |\n\n### Storage / Volume\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_nimble_volIoReads` | `{read}/s` | per nimble_vol_name | Total cumulative number of Read I/Os (sequential and random). |\n| `snmp.device_prof_nimble_volIoWrites` | `{write}/s` | per nimble_vol_name | Total cumulative number of Write I/Os. |\n| `snmp.device_prof_nimble_volOnline` | `{status}` | per nimble_vol_name | Indicated whether the volume is online |\n| `snmp.device_prof_nimble_volReserveHigh` | `By` | per nimble_vol_name | Number of bytes reserved for a volume - high order bytes. |\n| `snmp.device_prof_nimble_volReserveLow` | `By` | per nimble_vol_name | Number of bytes reserved for a volume -
        low order bytes. |\n| `snmp.device_prof_nimble_volSizeHigh` | `By` | per nimble_vol_name | Maximum defined size of a volume in bytes - high order bytes. |\n| `snmp.device_prof_nimble_volSizeLow` | `By` | per nimble_vol_name | Maximum defined size of a volume in bytes - low order bytes. |\n| `snmp.device_prof_nimble_volUsageHigh` | `By` | per nimble_vol_name | Current number of bytes a volume is using - high order bytes. |\n| `snmp.device_prof_nimble_volUsageLow` | `By` | per nimble_vol_name | Current number of bytes a volume is using - low order bytes. |\n\n### System / Uptime\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_systemUptime` | `s` | device | Time since the system was last rebooted or powered on. |\n"
