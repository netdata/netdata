        metrics_description: Monitor Cisco Firepower ASA (firewall/firepower) with Netdata over SNMP. Netdata recognizes the device automatically by its `sysObjectID` (recognized across 17 device identifiers) and collects the metrics this profile declares — on top of the generic SNMP baseline — with no manual OID configuration.
