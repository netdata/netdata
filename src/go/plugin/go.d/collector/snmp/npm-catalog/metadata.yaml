      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Juniper Pulse Secure profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**69 metrics** in 11 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Hardware / Temperature | 1 |\n| Network / Interface | 4 |\n| Network / SSL | 1 |\n| Network / VPN | 11 |\n| System / Activity | 2 |\n| System / CPU | 3 |\n| System / Disk | 17 |\n| System / License | 2 |\n| System / Memory | 13 |\n| System / Uptime | 1 |\n| Uncategorized | 14 |\n\n### Hardware / Temperature\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_iveTemperature` | `Cel` | device | The Temperature of MAG application blade |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### Network / SSL\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_iveSSLConnections` | `{connection}` | device | Total number of ssl connection |\n\n### Network / VPN\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_iveAppletHits` | `{hit}/s` | device | The total number of applet hits to the ive sin