      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Cisco Catalyst WLC profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**171 metrics** in 22 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Hardware / FRU | 3 |\n| Hardware / Fan | 1 |\n| Hardware / FanTray | 1 |\n| Hardware / Firewall | 1 |\n| Hardware / PowerSupply | 1 |\n| Hardware / Redundancy | 4 |\n| Hardware / Sensor | 5 |\n| Hardware / StackWise | 4 |\n| Network / Bridge | 2 |\n| Network / Firewall | 1 |\n| Network / IP | 28 |\n| Network / Interface | 42 |\n| Network / RTT | 5 |\n| Network / Routing | 10 |\n| Network / TCP | 12 |\n| Network / UDP | 6 |\n| Network / Wireless | 12 |\n| System / CPU | 6 |\n| System / Memory | 4 |\n| System / Uptime | 1 |\n| System / VirtualSwitch | 1 |\n| Uncategorized | 21 |\n\n### Hardware / FRU\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cefcFRUCurrent` | `A` | per fru_index | Current supplied by the FRU or current required to operate the FRU |\n| `snmp.device_prof_cefcFRUPowerAdminStatus` | `{status}` | per fru_index | Administratively desired FRU power state |\n| `snmp.device_prof_cefcFRUPowerOperStatus` | `{status}` | per fru_index | Operational FRU power state |\n\n### Hardware / Fan\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ciscoEnvMonFanState` | `{status}` | per fan_status_index | Current state of the fan |\n\n### Hardware / FanTray\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cefcFanTrayOperStatus` | `{status}` | per fru_index, cefc_fan_tray_direction | Operational state of the fan or fan tray |\n\n### Hardware /