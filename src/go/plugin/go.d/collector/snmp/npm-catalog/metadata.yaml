      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this NEC Univerge profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**47 metrics** in 7 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Hardware / Sensor | 1 |\n| Hardware / Temperature | 2 |\n| Network / Interface | 4 |\n| Network / VPN | 37 |\n| System / CPU | 1 |\n| System / Memory | 1 |\n| System / Uptime | 1 |\n\n### Hardware / Sensor\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_nec_picoVoltage` | `mV` | device | Indicates the observed voltage |\n\n### Hardware / Temperature\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_nec_picoCelsius` | `Cel` | device | Indicates the temperature of the equipment inside |\n| `snmp.device_prof_nec_picoFahrenheit` | `degF` | device | Indicates the temperature of the equipment inside |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### Network / VPN\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_nec_pikeGlobalActiveTunnels` | `{tunnel}` | device | Currently active IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalAuthFails` | `{failure}/s` | device | Authentications which ended in failure by IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalDecryptFails` | `{failure}/s` | device | Decryptions which ended in failure by IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalHashValidFails` | `{failure}/s` | device | Hash validations which ended in failure by IPsec Phase-1 Tunnels |\n| `snmp.device_prof_nec_pikeGlobalInNotifys` | `{notification}/s` | device | Notifys received by IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalInP1SaDelRequests` | `{request}/s` | device | ISAKMP security association delete requests received by IPsec Phase-1 Tunnels |\n| `snmp.device_prof_nec_pikeGlobalInP2ExchgInvalids` | `{exchange}/s` | device | IPsec Phase-2 exchanges which were received and found to be contain references to unrecognized security parameters |\n| `snmp.device_prof_nec_pikeGlobalInP2ExchgRejects` | `{exchange}/s` | device | IPsec Phase-2 exchanges which were received and validated but were rejected by the local policy |\n| `snmp.device_prof_nec_pikeGlobalInP2Exchgs` | `{exchange}/s` | device | IPsec Phase-2 exchanges received by IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalInP2SaDelRequests` | `{request}/s` | device | IPsec Phase-2 security association delete requests received by IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalInitTunnelFails` | `{tunnel}/s` | device | IPsec Phase-1 IKE Tunnels which were locally initiated and failed to activate |\n| `snmp.device_prof_nec_pikeGlobalInitTunnels` | `{tunnel}` | device | IPSec Phase-1 IKE Tunnels which were locally initiated |\n| `snmp.device_prof_nec_pikeGlobalOutNotifys` | `{notification}/s` | device | Notifys sent by IPsec Phase-1 IKE Tunnels |\n| `snmp.device_prof_nec_pikeGlobalOutP1SaDelRequests` | `{request}/s` | device | ISAKMP security association delete requests sent by IPsec Phase-1 Tunnels |\n| `