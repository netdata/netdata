    overview:
      data_collection:
        metrics_description: Monitor Juniper QFX (switch) with Netdata over SNMP. Netdata recognizes the device automatically by its `sysObjectID` (recognized across 2 device identifiers) and collects the metrics this profile declares — on top of the generic SNMP baseline — with no manual OID configuration.
        method_description: Netdata's SNMP collector matches the device to the **juniper-qfx.yaml** profile via `sysObjectID`/`sysDescr`, then polls the OIDs it declares.
