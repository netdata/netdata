ckets ignored by the interface |\n| `snmp.device_prof_cieIfInOverrunErrs` | `{error}/s` | per interface | Number of overrun error packets received (hardware buffer exhaustion) |\n| `snmp.device_prof_cieIfInRuntsErrs` | `{error}/s` | per interface | Number of runt packets received (frames smaller than 64 bytes) |\n| `snmp.device_prof_cieIfInputQueueDrops` | `{drop}/s` | per interface | Number of input packets which were dropped |\n| `snmp.device_prof_cieIfLastInTime` | `ms` | per interface | Elapsed time in milliseconds since last protocol input packet was received |\n| `snmp.device_prof_cieIfLastOutTime` | `ms` | per interface | Elapsed time in milliseconds since last protocol output packet was transmitted |\n| `snmp.device_prof_cieIfOutputQueueDrops` | `{drop}/s` | per interface | Number of output packets dropped by the interface |\n| `snmp.device_prof_cieIfResetCount` | `{reset}/s` | per interface | Number of times the interface was internally reset and brought up |\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n| `snmp.device_prof_ipIfStatsHCInBcastPkts` | `{packet}/s` | per interface_index, ipversion | The number of IP broadcast datagrams received |\n| `snmp.device_prof_ipIfStatsHCInDelivers` | `{packet}/s` | per interface_index, ipversion | The total number of datagrams successfully delivered to IP user-protocols including ICMP |\n| `snmp.device_prof_ipIfStatsHCInForwDatagrams` | `{forward}/s` | per interface_index, ipversion | The number of input datagrams for which this entity was not their final IP