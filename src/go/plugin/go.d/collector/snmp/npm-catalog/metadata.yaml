      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Dell Sonicwall profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**19 metrics** in 9 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Network / IPSec | 1 |\n| Network / Interface | 4 |\n| Network / NAT | 1 |\n| Network / VPN | 5 |\n| Security / DPI | 3 |\n| Security / Firewall | 2 |\n| System / CPU | 1 |\n| System / Memory | 1 |\n| System / Uptime | 1 |\n\n### Network / IPSec\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_sonicSAStatOutFragPktCount` | `{packet}/s` | per sonic_sa_stat_user_name | Outgoing Fragmented packet count for this phase2 SA |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### Network / NAT\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_sonicNatTranslationCount` | `{translation}` | device | Current number of dynamic NAT translations being performed |\n\n### Network / VPN\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_sonicSAStatDecryptByteCount` | `By/s` | per sonic_sa_stat_user_name 