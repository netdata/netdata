    overview:
      data_collection:
        metrics_description: Monitor Chrysalis Luna HSM (network device) with Netdata over SNMP. Netdata recognizes the device automatically by its `sysObjectID` (recognized across 1 device identifiers) and collects the metrics this profile declares — on top of the generic SNMP baseline — with no manual OID configuration.
        method_description: Netdata's SNMP collector matches the device to the **chrysalis-luna-hsm.yaml** profile via `sysObjectID`/`sysDescr`, then polls the OIDs it declares.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: ''
      default_behavior:
        auto_detection:
          description: Auto-detected as Chrysalis Luna HSM via sysObjectID/sysDescr.
        limits:
          description: ''
        performance_impact:
          description: ''
    setup: *id001
    troubleshooting: *id002
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Chrysalis Luna HSM profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**48 metrics** in 6 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Network / TCP | 12 |\n| Security / HSM | 7 |\n| System / CPU | 2 |\n| System / Disk | 15 |\n| System / Memory | 11 |\n| System / Uptime | 1 |\n\n### Network / TCP\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_tcpActiveOpens` | `{transition}/s` | device | TCP connections transitioning from CLOSED to SYN-SENT |\n| `snmp.device_prof_tcpAttemptFails` | `{failure}/s` | device | Failed TCP connection attempts |\n| `snmp.device_prof_tcpCurrEstab` | `{connection}` | device | Current TCP connections in ESTABLISHED or CLOSE-WAIT state |\n| `snmp.device_prof_tcpEstabResets` | `{reset}/s` | device | TCP connections reset from ESTABLISHED/CLOSE-WAIT |\n| `snmp.device_prof_tcpHCInSegs` | `{packet}/s` | device | TCP segments received |\n| `snmp.device_prof_tcpHCOutSegs` | `{packet}/s` | device | TCP segments sent |\n| `snmp.device_prof_tcpInErrs` | `{error}/s` | device | TCP segments received with errors |\n| `snmp.device_prof_tcpInSegs` | `{packet}/s` | device | TCP segments received |\n| `snmp.device_prof_tcpOutRsts` | `{reset}/s` | device | TCP segments sent with RST flag |\n| `snmp.device_prof_tcpOutSegs` | `{packet}/s` | device | TCP segments sent |\n| `snmp.device_prof_tcpPassiveOpens` | `{transition}/s` | device | TCP connections transitioning from LISTEN to SYN-RCVD |\n| `snmp.device_prof_tcpRetransSegs` | `{retransmit}/s` | device | TCP segments retransmitted |\n\n### Security / HSM\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_hsmOperationErrors` | `{error}` | device | Number of operation errors |\n| `snmp.device_prof_hsmOperationRequests` | `{operation}` | device | Number of operations |\n| `snmp.device_prof_ntlsConnectedClients` | `{client}` | device | The current number of connected clients using NTLS |\n| `snmp.device_prof_ntlsFailedClientConnections` | `{connection}/s` | device | The total number of unsuccessful client connections |\n| `snmp.device_prof_ntlsLinks` | `{link}` | device | The current number of links in NTLS |\n| `snmp.device_prof_ntlsOperStatus` | `{status}` | device | Current operational status of the NTL service |\n| `snmp.device_prof_ntlsSuccessfulClientConnections` | `{connection}/s` | device | The total number of successful client connections |\n\n### System / CPU\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ucd_ssRawContexts` | `{switch}/s` | device | Number of context switches |\n| `snmp.device_prof_ucd_ssRawInterrupts` | `{interrupt}/s` | device | Number of interrupts processed |\n\n### System / Disk\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ucd_diskIOLA1` | `%` | per ucd_disk_io_device | The 1 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIOLA15` | `%` | per ucd_disk_io_device | The 15 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIOLA5` | `%` | per ucd_disk_io_device | The 5 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIONReadX` | `By/s` | per ucd_disk_io_device | The number of bytes read from this device since boot |\n| `snmp.device_prof_ucd_diskIONWrittenX` | `By/s` | per ucd_disk_io_device | The number of bytes written to this device since boot |\n| `snmp.device_prof_ucd_diskIOReads` | `{read}/s` | per ucd_disk_io_device | The number of read accesses from this device since boot |\n| `snmp.device_prof_ucd_diskIOWrites` | `{write}/s` | per ucd_disk_io_device | The number of write accesses to this device since boot |\n| `snmp.device_prof_ucd_dskAvail` | `By`
        | per ucd_dsk_path, ucd_dsk_device | Available space on the disk |\n| `snmp.device_prof_ucd_dskErrorFlag` | `{status}` | per ucd_dsk_path, ucd_dsk_device | Flag signaling that the disk or partition is under the minimum required space configured for it |\n| `snmp.device_prof_ucd_dskPercent` | `%` | per ucd_dsk_path, ucd_dsk_device | Percentage of space used on disk |\n| `snmp.device_prof_ucd_dskPercentNode` | `%` | per ucd_dsk_path, ucd_dsk_device | Percentage of inodes used on disk |\n| `snmp.device_prof_ucd_dskTotal` | `By` | per ucd_dsk_path, ucd_dsk_device | Total size of the disk/partition |\n| `snmp.device_prof_ucd_dskUsed` | `By` | per ucd_dsk_path, ucd_dsk_device | Used space on the disk |\n| `snmp.device_prof_ucd_ssIORawReceived` | `By/s` | device | Amount of data read from disk or other block device |\n| `snmp.device_prof_ucd_ssIORawSent` | `By/s` | device | Amount of data written to disk or other block device |\n\n### System / Memory\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_memory_free` | `By` | device | The amount of real/physical memory currently unused or available |\n| `snmp.device_prof_ucd_memAvailSwap` | `By` | device | The amount of swap space currently unused or available |\n| `snmp.device_prof_ucd_memBuffer` | `By` | device | The total amount of real or virtual memory currently allocated for use as memory buffers |\n| `snmp.device_prof_ucd_memCached` | `By` | device | The total amount of real or virtual memory currently allocated for use as cached memory |\n| `snmp.device_prof_ucd_memMinimumSwap` | `By` | device | The minimum amount of swap space expected to be kept free or available during normal operation of this host |\n| `snmp.device_prof_ucd_memShared` | `By` | device | The total amount of real or virtual memory currently allocated for use as shared memory |\n| `snmp.device_prof_ucd_memTotalFree` | `By` | device | The total amount of memory free or available for use on this host |\n| `snmp.device_prof_ucd_memTotalSwap` | `By` | device | The total amount of swap space configured for this host |\n| `snmp.device_prof_ucd_memoryTotal` | `By` | device | The total amount of real/physical memory installed on this host |\n| `snmp.device_prof_ucd_ssRawSwapIn` | `By/s` | device | Amount of memory swapped in from disk |\n| `snmp.device_prof_ucd_ssRawSwapOut` | `By/s` | device | Amount of memory swapped out to disk |\n\n### System / Uptime\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_systemUptime` | `s` | device | Time since the system was last rebooted or powered on. |\n"
