    overview:
      data_collection:
        metrics_description: Monitor Fireeye (network device) with Netdata over SNMP. Netdata recognizes the device automatically by its `sysObjectID` (recognized across 1 device identifiers) and collects the metrics this profile declares — on top of the generic SNMP baseline — with no manual OID configuration.
        method_description: Netdata's SNMP collector matches the device to the **fireeye.yaml** profile via `sysObjectID`/`sysDescr`, then polls the OIDs it declares.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: ''
