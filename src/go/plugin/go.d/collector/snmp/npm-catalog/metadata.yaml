    overview:
      data_collection:
        metrics_description: Receive, decode, and store SNMP traps and INFORMs from Citrix Systems Inc devices with Netdata. The bundled Citrix Systems Inc trap profile decodes 22 trap definitions across 3 MIBs into structured journal events with named, typed varbinds — searchable and filterable in the Logs tab.
        method_description: Netdata's SNMP trap listener receives traps on UDP/162, matches them to the Citrix Systems Inc enterprise OID space, and decodes the varbinds using the bundled Citrix Systems Inc trap profile. No per-trap configuration.
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: ''
      default_behavior:
        auto_detection:
          description: Traps from Citrix Systems Inc devices are decoded automatically once the device is pointed at the Agent's trap listener.
        limits:
          description: ''
        performance_impact:
          description: ''
    setup: *id001
    troubleshooting: *id002
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: "Netdata decodes **22 trap definitions** from Citrix Systems Inc across **3 MIBs** into structured journal events. A trap is decoded **only if the device actually sends it**; inclusion here means the profile can decode it.\n\n**By severity:** `alert` 3 · `crit` 1 · `warning` 5 · `notice` 13\n\n**By category:** `state_change` 8 · `config_change` 1 · `auth` 2 · `license` 5 · `diagnostic` 6\n\n### Coverage by MIB\n\n| MIB | Trap definitions |\n|:----|----:|\n| `MFAGENT-MIB` | 11 |\n| `APPACCELERATION-STATUS-MIB` | 9 |\n| `CITRIX-NetScaler-SD-WAN-MIB` | 2 |\n\n### Sample decoded traps\n\n- `MFAGENT-MIB::trapSessionLogoff`\n- `MFAGENT-MIB::trapSessionLogon`\n- `MFAGENT-MIB::trapSessionDisc`\n- `MFAGENT-MIB::trapSessionLimitThreshold`\n- `MFAGENT-MIB::trapLicLowThreshold`"
      availability: []
      scopes: []
