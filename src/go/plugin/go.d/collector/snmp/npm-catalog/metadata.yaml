      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this HPE Bladesystem Enclosure profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**65 metrics** in 12 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Hardware / EnclosureManager | 4 |\n| Hardware / Fan | 3 |\n| Hardware / Fuse | 2 |\n| Hardware / Power | 7 |\n| Hardware / PowerEnclosure | 4 |\n| Hardware / Sensor | 2 |\n| Hardware / ServerBlade | 10 |\n| Network / Interface | 4 |\n| System / CPU | 2 |\n| System / Disk | 15 |\n| System / Memory | 11 |\n| System / Uptime | 1 |\n\n### Hardware / EnclosureManager\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackCommonEnclosureManagerCondition` | `{status}` | per cpq_rack_common_enclosure_manager_enclosure_rack, cpq_rack_common_enclosure_manager_enclosure_chassis, cpq_rack_common_enclosure_manager_enclosure_index | The condition of the manager |\n| `snmp.device_prof_cpqRackCommonEnclosureManagerPresent` | `{status}` | per cpq_rack_common_enclosure_manager_enclosure_rack, cpq_rack_common_enclosure_manager_enclosure_chassis, cpq_rack_common_enclosure_manager_enclosure_index | This specifies if the manager described is present in the system |\n| `snmp.device_prof_cpqRackCommonEnclosureManagerRedundant` | `{status}` | per cpq_rack_common_enclosure_manager_enclosure_rack, cpq_rack_common_enclosure_manager_enclosure_chassis, cpq_rack_common_enclosure_manager_enclosure_index | This specifies if the manager is in a redundant configuration |\n| `snmp.device_prof_cpqRackCommonEnclosureManagerRole` | `{status}` | per cpq_rack_common_enclosure_manager_enclosure_rack, cpq_rack_common_enclosure_manager_enclosure_chassis, cpq_rack_common_enclosure_manager_enclosure_index | This specifies the current role of the manager |\n\n### Hardware / Fan\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackCommonEnclosureFanCondition` | `{status}` | per cpq_rack_common_enclosure_fan_rack, cpq_rack_common_enclosure_fan_chassis, cpq_rack_common_enclosure_fan_index | The condition of the fan |\n| `snmp.device_prof_cpqRackCommonEnclosureFanPresent` | `{status}` | per cpq_rack_common_enclosure_fan_rack, cpq_rack_common_enclosure_fan_chassis, cpq_rack_common_enclosure_fan_index | This specifies if the fan described is present in the system |\n| `snmp.device_prof_cpqRackCommonEnclosureFanRedundant` | `{status}` | per cpq_rack_common_enclosure_fan_rack, cpq_rack_common_enclosure_fan_chassis, cpq_rack_common_enclosure_fan_index | This specifies if the fan is in a redundant configuration |\n\n### Hardware / Fuse\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackCommonEnclosureFuseCondition` | `{status}` | per cpq_rack_common_enclosure_fuse_rack, cpq_rack_common_enclosure_fuse_chassis, cpq_rack_common_enclosure_fuse_index, cpq_rack_common_enclosure_fuse_enclosure_name, cpq_rack_common_enclosure_fuse_location | The condition of the fuse |\n| `snmp.device_prof_cpqRackCommonEnclosureFusePresent` | `{status}` | per cpq_rack_common_enclosure_fuse_rack, cpq_rack_common_enclosure_fuse_chassis, cpq_rack_common_enclosure_fuse_index, cpq_rack_common_enclosure_fuse_enclosure_name, cpq_rack_common_enclosure_fuse_location | This specifies if the fuse described is present in the system |\n\n### Hardware / Power\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackPowerSupplyCondition` | `{status}` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis, cpq_rack_power_supply_enclosure_index | The condition of the power supply |\n| `snmp.device_prof_cpqRackPowerSupplyCurPwrOutput` | `W` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis,
        cpq_rack_power_supply_enclosure_index | The current power output of the power supply in watts |\n| `snmp.device_prof_cpqRackPowerSupplyExhaustTemp` | `Cel` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis, cpq_rack_power_supply_enclosure_index | The current air temperature at the exhaust of the power supply in degrees celsius |\n| `snmp.device_prof_cpqRackPowerSupplyInputLineStatus` | `{status}` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis, cpq_rack_power_supply_enclosure_index | The status of line input power |\n| `snmp.device_prof_cpqRackPowerSupplyIntakeTemp` | `Cel` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis, cpq_rack_power_supply_enclosure_index | The current air temperature at the intake of the power supply in degrees celsius |\n| `snmp.device_prof_cpqRackPowerSupplyPresent` | `{status}` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis, cpq_rack_power_supply_enclosure_index | This specifies if the power supply described is present in the enclosure |\n| `snmp.device_prof_cpqRackPowerSupplyStatus` | `{status}` | per cpq_rack_power_supply_enclosure_rack, cpq_rack_power_supply_enclosure_chassis, cpq_rack_power_supply_enclosure_index | The status of the power supply |\n\n### Hardware / PowerEnclosure\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackPowerEnclosureBladeAutopoweron` | `{status}` | per cpq_rack_power_enclosure_rack, cpq_rack_power_enclosure_index, cpq_rack_power_enclosure_input_pwr_type | This indicates current condition of the power enclosure |\n| `snmp.device_prof_cpqRackPowerEnclosureCondition` | `{status}` | per cpq_rack_power_enclosure_rack, cpq_rack_power_enclosure_index, cpq_rack_power_enclosure_input_pwr_type | This indicates current condition of the power enclosure |\n| `snmp.device_prof_cpqRackPowerEnclosureLoadBalanced` | `{status}` | per cpq_rack_power_enclosure_rack, cpq_rack_power_enclosure_index, cpq_rack_power_enclosure_input_pwr_type | This indicates if the power supply enclosure is in a load balanced state |\n| `snmp.device_prof_cpqRackPowerEnclosureRedundant` | `{status}` | per cpq_rack_power_enclosure_rack, cpq_rack_power_enclosure_index, cpq_rack_power_enclosure_input_pwr_type | This indicates if the power supply enclosure is in a redundant state |\n\n### Hardware / Sensor\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackCommonEnclosureTempCondition` | `{status}` | per cpq_rack_common_enclosure_temp_rack, cpq_rack_common_enclosure_temp_chassis, cpq_rack_common_enclosure_temp_sensor_index, cpq_rack_common_enclosure_temp_sensor_enclosure_name, cpq_rack_common_enclosure_temp_location, cpq_rack_common_enclosure_temp_type | The Temperature sensor condition |\n| `snmp.device_prof_cpqRackCommonEnclosureTempCurrent` | `Cel` | per cpq_rack_common_enclosure_temp_rack, cpq_rack_common_enclosure_temp_chassis, cpq_rack_common_enclosure_temp_sensor_index, cpq_rack_common_enclosure_temp_sensor_enclosure_name, cpq_rack_common_enclosure_temp_location, cpq_rack_common_enclosure_temp_type | This is the current temperature sensor reading in degrees celsius |\n\n### Hardware / ServerBlade\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cpqRackServerBladeFaultMajor` | `{fault_code}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | The major fault code of the blade fault reported by the enclosure manager |\n| `snmp.device_prof_cpqRackServerBladeFaultMinor` | `{fault_code}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | The minor fault code of the blade fault reported by the enclosure manager |\n| `snmp.device_prof_cpqRackServerBladeHasFuses` | `{status}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | This specifies if the server blade contains fuses |\n|
        `snmp.device_prof_cpqRackServerBladePOSTStatus` | `{status}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | Blade server power-on self test (POST) status |\n| `snmp.device_prof_cpqRackServerBladePowered` | `{status}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | The power state of the blade |\n| `snmp.device_prof_cpqRackServerBladePresent` | `{status}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | This specifies if the server blade described is present in the enclosure |\n| `snmp.device_prof_cpqRackServerBladeStatus` | `{status}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | The health status of the blade |\n| `snmp.device_prof_cpqRackServerBladeUIDState` | `{status}` | per cpq_rack_server_blade_rack, cpq_rack_server_blade_chassis, cpq_rack_server_blade_index | The Unit Identifier LED status |\n| `snmp.device_prof_cpqRackServerTempSensorCondition` | `{status}` | per cpq_rack_server_temp_sensor_rack, cpq_rack_server_temp_sensor_chassis, cpq_rack_server_temp_sensor_index, cpq_rack_server_temp_sensor_type | The Temperature sensor condition |\n| `snmp.device_prof_cpqRackServerTempSensorCurrent` | `Cel` | per cpq_rack_server_temp_sensor_rack, cpq_rack_server_temp_sensor_chassis, cpq_rack_server_temp_sensor_index, cpq_rack_server_temp_sensor_type | This is the current temperature sensor reading in degrees celsius |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### System / CPU\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ucd_ssRawContexts` | `{switch}/s` | device | Number of context switches |\n| `snmp.device_prof_ucd_ssRawInterrupts` | `{interrupt}/s` | device | Number of interrupts processed |\n\n### System / Disk\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ucd_diskIOLA1` | `%` | per ucd_disk_io_device | The 1 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIOLA15` | `%` | per ucd_disk_io_device | The 15 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIOLA5` | `%` | per ucd_disk_io_device | The 5 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIONReadX` | `By/s` | per ucd_disk_io_device | The number of bytes read from this device since boot |\n| `snmp.device_prof_ucd_diskIONWrittenX` | `By/s` | per ucd_disk_io_device | The number of bytes written to this device since boot |\n| `snmp.device_prof_ucd_diskIOReads` | `{read}/s` | per ucd_disk_io_device | The number of read accesses from this device since boot |\n| `snmp.device_prof_ucd_diskIOWrites` | `{write}/s` | per ucd_disk_io_device | The number of write accesses to this device since boot |\n| `snmp.device_prof_ucd_dskAvail` | `By` | per ucd_dsk_path, ucd_dsk_device | Available space on the disk |\n| `snmp.device_prof_ucd_dskErrorFlag` | `{status}` | per ucd_dsk_path, ucd_dsk_device | Flag signaling that the disk or partition is under the minimum required space configured for it |\n| `snmp.device_prof_ucd_dskPercent` | `%` | per ucd_dsk_path, ucd_dsk_device | Percentage of space used on disk |\n| `snmp.device_prof_ucd_dskPercentNode` | `%` | per ucd_dsk_path, ucd_dsk_device | Percentage of inodes used on disk |\n| `snmp.device_prof_ucd_dskTotal` | `By` | per ucd_dsk_path, ucd_dsk_device | Total size of the disk/partition |\n| `snmp.device_prof_ucd_dskUsed` | `By`
        | per ucd_dsk_path, ucd_dsk_device | Used space on the disk |\n| `snmp.device_prof_ucd_ssIORawReceived` | `By/s` | device | Amount of data read from disk or other block device |\n| `snmp.device_prof_ucd_ssIORawSent` | `By/s` | device | Amount of data written to disk or other block device |\n\n### System / Memory\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_memory_free` | `By` | device | The amount of real/physical memory currently unused or available |\n| `snmp.device_prof_ucd_memAvailSwap` | `By` | device | The amount of swap space currently unused or available |\n| `snmp.device_prof_ucd_memBuffer` | `By` | device | The total amount of real or virtual memory currently allocated for use as memory buffers |\n| `snmp.device_prof_ucd_memCached` | `By` | device | The total amount of real or virtual memory currently allocated for use as cached memory |\n| `snmp.device_prof_ucd_memMinimumSwap` | `By` | device | The minimum amount of swap space expected to be kept free or available during normal operation of this host |\n| `snmp.device_prof_ucd_memShared` | `By` | device | The total amount of real or virtual memory currently allocated for use as shared memory |\n| `snmp.device_prof_ucd_memTotalFree` | `By` | device | The total amount of memory free or available for use on this host |\n| `snmp.device_prof_ucd_memTotalSwap` | `By` | device | The total amount of swap space configured for this host |\n| `snmp.device_prof_ucd_memoryTotal` | `By` | device | The total amount of real/physical memory installed on this host |\n| `snmp.device_prof_ucd_ssRawSwapIn` | `By/s` | device | Amount of memory swapped in from disk |\n| `snmp.device_prof_ucd_ssRawSwapOut` | `By/s` | device | Amount of memory swapped out to disk |\n\n### System / Uptime\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_systemUptime` | `s` | device | Time since the system was last rebooted or powered on. |\n"
