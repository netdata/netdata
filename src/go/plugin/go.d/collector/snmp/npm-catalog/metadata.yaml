      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Cisco ASA profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**156 metrics** in 21 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Hardware / FRU | 3 |\n| Hardware / Fan | 1 |\n| Hardware / FanTray | 1 |\n| Hardware / Firewall | 1 |\n| Hardware / PowerSupply | 1 |\n| Hardware / Redundancy | 4 |\n| Hardware / Sensor | 6 |\n| Hardware / StackWise | 4 |\n| Network / Firewall | 2 |\n| Network / IP | 28 |\n| Network / Interface | 32 |\n| Network / RTT | 5 |\n| Network / Routing | 10 |\n| Network / TCP | 12 |\n| Network / UDP | 6 |\n| Network / VPN | 7 |\n| System / CPU | 6 |\n| System / Memory | 4 |\n| System / Uptime | 1 |\n| System / VirtualSwitch | 1 |\n| Uncategorized | 21 |\n\n### Hardware / FRU\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cefcFRUCurrent` | `A` | per fru_index | Current supplied by the FRU or current required to operate the FRU |\n| `snmp.device_prof_cefcFRUPowerAdminStatus` | `{status}` | per fru_index | Administratively desired FRU power state |\n| `snmp.device_prof_cefcFRUPowerOperStatus` | `{status}` | per fru_index | Operational FRU power state |\n\n### Hardware / Fan\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ciscoEnvMonFanState` | `{status}` | per fan_status_index | Current state of the fan |\n\n### Hardware / FanTray\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cefcFanTrayOperStatus` | `{status}` | per fru_index, cefc_fan_tray_direction | Operational state of the fan or fan tray |\n\n### Hardware / Firewall\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cfwHardwareStatusValue` | `{status}` | per hardware_type, hardware_desc | Current status of the resource |\n\n### Hardware / PowerSupply\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ciscoEnvMonSupplyState` | `{status}` | per power_supply_index | Current state of the power supply |\n\n### Hardware / Redundancy\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cRFStatusDuplexMode` | `{status}` | device | Redundancy duplex mode (simplex=no redundancy, duplex=redundant pair) |\n| `snmp.device_prof_cRFStatusLastSwactReasonCode` | `{reason}` | device | Reason code for the last switchover |\n| `snmp.device_prof_cRFStatusPeerUnitState` | `{status}` | device | Current state of the peer redundancy unit |\n| `snmp.device_prof_cRFStatusUnitState` | `{status}` | device | Current state of this redundancy unit |\n\n### Hardware / Sensor\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ciscoEnvMonTemperatureState` | `{status}` | per temp_index | Current state of the testpoint |\n| `snmp.device_prof_ciscoEnvMonTemperatureStatusValue` | `Cel` | per temp_index | Current measurement of the testpoint |\n| `snmp.device_prof_ciscoEnvMonVoltageState` | `{status}` | per voltage_index | Current state of the voltage testpoint |\n| `snmp.device_prof_ciscoEnvMonVoltageStatusValue` | `mV` | per voltage_index | Current measurement of the voltage testpoint |\n| `snmp.device_prof_entPhySensorOperStatus` | `{status}` | per sensor_index, rm:sensor_type, rm:sensor_scale, rm:sensor_precision | Operational status of the sensor |\n| `snmp.device_prof_entPhySensorValue` | `1` | per sensor_index, rm:sensor_type, rm:sensor_scale, rm:sensor_precision | Most recent measurement obtained by the agent for this sensor |\n\n### Hardware / StackWise\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_cswRingRedundant` | `{status}` | device | Whether
