e_prof_phion_trafficShape_class2Total` | `bit/s` | per connector_name | Total bytes for class2 |\n| `snmp.device_prof_phion_trafficShape_class3Drop` | `{drop}/s` | per connector_name | Dropped packets for class3 |\n| `snmp.device_prof_phion_trafficShape_class3Pakets` | `{packet}/s` | per connector_name | Total packets for class3 |\n| `snmp.device_prof_phion_trafficShape_class3Total` | `bit/s` | per connector_name | Total bytes for class3 |\n| `snmp.device_prof_phion_trafficShape_noDelayDrop` | `{drop}/s` | per connector_name | Dropped packets for no delay |\n| `snmp.device_prof_phion_trafficShape_noDelayPakets` | `{packet}/s` | per connector_name | Total packets for no delay |\n| `snmp.device_prof_phion_trafficShape_noDelayTotal` | `bit/s` | per connector_name | Total bytes for no delay |\n| `snmp.device_prof_phion_trafficShape_rate` | `bit/s` | per connector_name | Traffic shape rate |\n| `snmp.device_prof_phion_trafficShape_sessions` | `{session}/s` | per connector_name | Number of sessions |\n\n### Network / VPN\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_phion_vpnUsers` | `{user}` | device | Number of VPN users |\n| `snmp.device_prof_vpnState` | `{status}` | per vpn_name | VPN state |\n\n### System / CPU\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ucd_ssRawContexts` | `{switch}/s` | device | Number of context switches |\n| `snmp.device_prof_ucd_ssRawInterrupts` | `{interrupt}/s` | device | Number of interrupts processed |\n\n### System / Disk\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ucd_diskIOLA1` | `%` | per ucd_disk_io_device | The 1 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIOLA15` | `%` | per ucd_disk_io_device | The 15 minute average load of disk (%) |\n| `snmp.device_prof_ucd_diskIOLA5` | `%` | per ucd_disk_io_device | The 5 minute average load of disk (%) |\n| `snmp.dev