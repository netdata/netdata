      description: "On top of the **generic SNMP baseline** (the *Generic SNMP Device* integration — interfaces, system, IP/TCP/UDP, host resources), this Fireeye profile adds the metrics below. Each is collected **only where the device exposes the matching OID** — inclusion means the profile requests it; availability depends on the device model and software.\n\n**30 metrics** in 16 groups; each row is a chart context usable in alerts.\n\n| Group | Metrics |\n|---|---|\n| Hardware / Disk | 1 |\n| Hardware / Fan | 1 |\n| Hardware / Power | 1 |\n| Hardware / RAID | 1 |\n| Hardware / Temperature | 1 |\n| Network / Interface | 4 |\n| Security / Attachment | 3 |\n| Security / Email | 5 |\n| Security / Object | 2 |\n| Security / Quarantine | 1 |\n| Security / URL | 3 |\n| System / Activity | 2 |\n| System / CPU | 1 |\n| System / License | 1 |\n| System / Uptime | 1 |\n| Uncategorized | 2 |\n\n### Hardware / Disk\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_fePhysicalDiskIsHealthy` | `{status}` | per fe_physical_disk_name | Whether a physical disk is healthy |\n\n### Hardware / Fan\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_feFanOverallIsHealthy` | `{status}` | device | Whether or not fan is healthy overall |\n\n### Hardware / Power\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_fePowerSupplyOverallIsHealthy` | `{status}` | device | Whether or not power supply is healthy overall |\n\n### Hardware / RAID\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_feRaidIsHealthy` | `{status}` | device | Whether or not RAID is healthy overall |\n\n### Hardware / Temperature\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_feIsTemperatureNormal` | `{status}` | device | Whether or not the temperature is normal |\n\n### Network / Interface\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_ifAdminStatus` | `{status}` | per interface, interface | Current administrative state of the interface |\n| `snmp.device_prof_ifHighSpeed` | `bit/s` | per interface, interface | Estimate of the interface's current bandwidth |\n| `snmp.device_prof_ifNumber` | `{interface}` | device | Number of network interfaces regardless of their current state present on this system |\n| `snmp.device_prof_ifOperStatus` | `{status}` | per interface, interface | Current operational state of the interface |\n\n### Security / Attachment\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_feAnalyzedAttachmentCount` | `{attachment}/s` | device | Cumulative count of all attachments analyzed for maliciousness |\n| `snmp.device_prof_feInfectedAttachmentCount` | `{attachment}/s` | device | Count of all attachments determined to be malicious |\n| `snmp.device_prof_feTotalAttachmentCount` | `{attachment}/s` | device | Count of all attachments received whether processed or not |\n\n### Security / Email\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_feAnalyzedEmailCount` | `{email}/s` | device | Cumulative count of all emails analyzed |\n| `snmp.device_prof_feDeferredEmailCount` | `{email}` | device | Count of deferred emails representing current snapshot value |\n| `snmp.device_prof_feHoldQueueEmailCount` | `{email}` | device | Count of emails in the hold queue representing current snapshot value |\n| `snmp.device_prof_feInfectedEmailCount` | `{email}/s` | device | Count of all emails determined to be malicious |\n| `snmp.device_prof_feTotalEmailCount` | `{email}/s` | device | Count of all emails coming into postfix including those without URL or attachment |\n\n### Security / Object\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_feTotalMaliciousObjectCount` | `{object}/s` | device | Count of all malicious samples detected |\n| `snmp.device_prof_feTotalObjectAnalyzedCount`
