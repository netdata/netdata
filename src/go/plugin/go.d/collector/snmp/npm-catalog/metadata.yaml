f_egBackupDataSpaceConsumedWholeGigabytes` | `By` | device | The amount of consumed retention space scaled to GigaBytes (10^9) bytes |\n\n### Storage / Deduplication\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_egPendingDeduplicationAge` | `ms` | device | The amount of time that data has been available for deduplication, but has not yet been deduplicated |\n| `snmp.device_prof_egPendingDeduplicationFractionalGigabytes` | `By` | device | The amount of data not yet deduplicated below 1 Gigabyte in bytes |\n| `snmp.device_prof_egPendingDeduplicationWholeGigabytes` | `By` | device | The amount of data not yet deduplicated scaled to GigaBytes (10^9) bytes |\n\n### Storage / LandingSpace\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_egLandingSpaceAvailableFractionalGigabytes` | `By` | device | The amount of available landing space below 1 Gigabyte in bytes |\n| `snmp.device_prof_egLandingSpaceAvailableWholeGigabytes` | `By` | device | The amount of available landing space scaled to GigaBytes (10^9) bytes |\n| `snmp.device_prof_egLandingSpaceConfiguredFractionalGigabytes` | `By` | device | The amount of configured landing space below 1 Gigabyte in bytes |\n| `snmp.device_prof_egLandingSpaceConfiguredWholeGigabytes` | `By` | device | The amount of configured landing space scaled to GigaBytes (10^9) bytes |\n\n### Storage / RetentionSpace\n\n| Metric (chart context) | Unit | Scope | Description |\n|---|---|---|---|\n| `snmp.device_prof_egRetentionSpaceAvailableFractionalGigabytes` | `By` | device | The amount of available retention space below 1 Gigabyte in bytes |\n| `snmp.device_prof_egRetentionSpaceAvailableWholeGigabytes` | `By` | device | The amount of available retention space scaled to GigaBytes (10^9) bytes |\n| `snmp.device_prof_egRetentionSpaceConfiguredFractionalGigabytes` | `By` | device | The amount of configured retention space below 1 Gigabyte in bytes |\