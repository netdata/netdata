plugin_name: go.d.plugin
modules:
  - meta:
      id: collector-go.d.plugin-powerstore
      plugin_name: go.d.plugin
      module_name: powerstore
      monitored_instance:
        name: Dell PowerStore
        link: https://www.dell.com/en-us/dt/storage/powerstore-storage-appliance.htm
        icon_filename: dell.svg
        categories:
          - data-collection.storage
      keywords:
        - powerstore
        - dell
        - storage
        - san
        - nas
        - block
        - file
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          This collector monitors Dell PowerStore storage arrays via the PowerStore REST API.

          It collects metrics for the following components:

          - **Cluster Capacity** — physical and logical space usage, efficiency ratios (data reduction, snapshot savings, thin provisioning)
          - **Appliance Performance** — IOPS, bandwidth, latency, CPU utilization, and space usage per appliance
          - **Volume Performance** — IOPS, bandwidth, latency, provisioned/used space, and thin savings per volume
          - **Node Performance** — IOPS, bandwidth, latency, and current login count per node
          - **FC Port Performance** — IOPS, bandwidth, latency, and link status per Fibre Channel port
          - **Ethernet Port Performance** — bytes/packets rate, error rates, and link status per Ethernet port
          - **File System Performance** — IOPS, bandwidth, and latency per file system
          - **Hardware Health** — component-level status counts (fans, PSUs, drives, batteries, nodes) by health state (OK, degraded, failed, unknown)
          - **Active Alerts** — count of currently active alerts by severity (critical, major, minor, info)
          - **Drive Wear** — SSD endurance remaining percentage per drive
          - **NAS Server Status** — operational status counts (started, stopped, degraded, unknown)
          - **Replication** — data remaining, data transferred, and transfer rate across appliances
        method_description: |
          The collector uses the PowerStore REST API (`/api/rest/*` endpoints) to fetch data.
          Authentication uses HTTP Basic Auth — the collector calls `/api/rest/login_session` to obtain
          a session cookie and a `DELL-EMC-TOKEN` CSRF token, which are reused for subsequent requests.
          Sessions are automatically refreshed on HTTP 403 (token expiry).

          Discovery runs on startup and then every 5 collection cycles to refresh the hardware inventory,
          appliances, volumes, nodes, ports, file systems, and NAS servers.

          Performance and space metrics are collected via the `/api/rest/metrics/generate` endpoint using
          the PowerStore metrics generation API. The collector requests `Five_Mins` interval data for
          performance metrics and `One_Day` for cluster space metrics, taking the most recent data point.

          Discovery API calls use pagination (2000 items per page, HTTP 206 for partial results).
          Performance metrics for different entities are collected concurrently (up to 10 parallel API calls).
      supported_platforms:
        include: []
        exclude: []
      multi_instance: true
      additional_permissions:
        description: |
          A user account on the PowerStore array is required. Any role with API read access
          is sufficient (e.g., the built-in `Operator` role). The account does not need write permissions.
      default_behavior:
        auto_detection:
          description: |
            The collector does not auto-detect PowerStore arrays. You must configure the management IP address,
            username, and password explicitly.
        limits:
          description: |
            The collector makes multiple API calls per collection cycle: discovery calls (once every 5 cycles)
            plus per-entity metrics calls (appliances, volumes, nodes, ports, file systems, drives, and
            replication — one API call per entity). With many volumes or ports, the number of API calls
            scales linearly. The default 30-second collection interval provides ample headroom.
        performance_impact:
          description: |
            The PowerStore REST API is lightweight and read-only. The collector uses the metrics generation
            API which returns pre-aggregated data, imposing minimal load on the array. Session tokens and
            CSRF tokens are cached across collection cycles.
    setup:
      prerequisites:
        list:
          - title: PowerStore API access
            description: |
              1. A user account on the PowerStore array with at least read-only access.
                 The built-in `Operator` role is sufficient.
              2. Network connectivity from the Netdata Agent to the PowerStore management IP (HTTPS, port 443).
              3. The PowerStore management REST API must be accessible (enabled by default).
          - title: TLS certificate
            description: |
              PowerStore arrays typically use self-signed TLS certificates. You will likely need to set
              `tls_skip_verify: yes` in the configuration, or provide the array's CA certificate via `tls_ca`.
      configuration:
        file:
          name: go.d/powerstore.conf
        options:
          description: |
            The following options can be defined globally: update_every, autodetection_retry.
          folding:
            title: Config options
            enabled: true
          list:
            - name: update_every
              description: Data collection interval (seconds).
              default_value: 30
              required: false
              group: Collection
            - name: autodetection_retry
              description: Autodetection retry interval (seconds). Set 0 to disable.
              default_value: 0
              required: false
              group: Collection

            - name: url
              description: PowerStore management URL.
              default_value: https://127.0.0.1
              required: true
              group: Target
            - name: timeout
              description: HTTP request timeout (seconds).
              default_value: 30
              required: false
              group: Target

            - name: username
              description: Username for PowerStore API authentication.
              default_value: ""
              required: true
              group: HTTP Auth
            - name: password
              description: Password for PowerStore API authentication.
              default_value: ""
              required: true
              group: HTTP Auth

            - name: volume_selector
              description: |
                Space-separated [simple patterns](https://github.com/netdata/netdata/tree/master/src/libnetdata/simple_pattern#readme)
                to filter which volumes to monitor. Use `*` for wildcards, `!` prefix to exclude.
                An empty value or `*` monitors all volumes.
              default_value: "*"
              required: false
              group: Filtering

            - name: tls_skip_verify
              description: Skip TLS certificate and hostname verification (insecure, but often needed for self-signed certs on storage arrays).
              default_value: no
              required: false
              group: TLS
            - name: tls_ca
              description: Path to CA bundle used to validate the server certificate.
              default_value: ""
              required: false
              group: TLS
            - name: tls_cert
              description: Path to client TLS certificate (for mTLS).
              default_value: ""
              required: false
              group: TLS
            - name: tls_key
              description: Path to client TLS private key (for mTLS).
              default_value: ""
              required: false
              group: TLS

            - name: proxy_url
              description: HTTP proxy URL.
              default_value: ""
              required: false
              group: Proxy
            - name: proxy_username
              description: Username for proxy Basic HTTP authentication.
              default_value: ""
              required: false
              group: Proxy
            - name: proxy_password
              description: Password for proxy Basic HTTP authentication.
              default_value: ""
              required: false
              group: Proxy

            - name: headers
              description: "Additional HTTP headers (one per line as key: value)."
              default_value: ""
              required: false
              group: Request
            - name: not_follow_redirects
              description: Do not follow HTTP redirects.
              default_value: no
              required: false
              group: Request

            - name: vnode
              description: Associates this data collection job with a [Virtual Node](https://learn.netdata.cloud/docs/netdata-agent/configuration/organize-systems-metrics-and-alerts#virtual-nodes).
              default_value: ""
              required: false
              group: Virtual Node
        examples:
          folding:
            title: Config
            enabled: true
          list:
            - name: Basic
              description: A minimal configuration connecting to a PowerStore array with a self-signed certificate.
              config: |
                jobs:
                  - name: ps-lab
                    url: https://10.0.0.1
                    username: monitor
                    password: monitor123
                    tls_skip_verify: yes
            - name: With volume filtering
              description: Monitor only production volumes, excluding temporary and test volumes.
              config: |
                jobs:
                  - name: ps-prod
                    url: https://10.0.0.1
                    username: monitor
                    password: monitor123
                    tls_skip_verify: yes
                    volume_selector: "prod-* !*-temp !*-test"
            - name: Multi-instance
              description: |
                > **Note**: When you define multiple jobs, their names must be unique.

                Monitoring multiple PowerStore arrays.
              config: |
                jobs:
                  - name: ps-site-a
                    url: https://10.0.0.1
                    username: monitor
                    password: monitor123
                    tls_skip_verify: yes

                  - name: ps-site-b
                    url: https://10.0.0.2
                    username: monitor
                    password: monitor456
                    tls_skip_verify: yes
    troubleshooting:
      problems:
        list:
          - name: Authentication failure
            description: |
              If the collector fails with `login failed`:

              1. Verify the username and password are correct.
              2. Ensure the user account has at least `Operator` role privileges.
              3. Check that the account is not locked or expired on the array.
          - name: Connection refused or timeout
            description: |
              If the collector fails with connection errors:

              1. Verify the `url` points to the management IP of the PowerStore array.
              2. Ensure HTTPS port 443 is reachable from the Netdata Agent host.
              3. If using a firewall, allow outbound HTTPS to the array.
              4. Try increasing `timeout` if the array is on a high-latency link.
          - name: TLS certificate errors
            description: |
              PowerStore arrays ship with self-signed certificates. If you see TLS errors:

              1. Set `tls_skip_verify: yes` in the configuration (most common solution).
              2. Alternatively, export the array's certificate and provide it via `tls_ca`.
          - name: HTTP 403 errors
            description: |
              PowerStore returns HTTP 403 when the session/CSRF token is stale. The collector
              automatically re-authenticates on 403, but if you see persistent 403 errors:

              1. Verify the user account still has API access.
              2. Check if the array's security policy has been changed to restrict API access.
              3. Ensure no IP-based access controls are blocking the Netdata Agent host.
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: global
          description: These metrics refer to the entire monitored PowerStore cluster.
          labels: []
          metrics:
            - name: powerstore.cluster_space_usage
              description: Cluster Space Usage
              unit: bytes
              chart_type: line
              dimensions:
                - name: used
                - name: total
            - name: powerstore.cluster_space_logical
              description: Cluster Logical Space
              unit: bytes
              chart_type: line
              dimensions:
                - name: provisioned
                - name: used
                - name: data_physical
                - name: shared
            - name: powerstore.cluster_space_efficiency
              description: Cluster Space Efficiency Ratios
              unit: ratio
              chart_type: line
              dimensions:
                - name: efficiency
                - name: data_reduction
                - name: snapshot_savings
                - name: thin_savings
            - name: powerstore.hardware_health_fan
              description: Fan Health Status
              unit: fans
              chart_type: stacked
              dimensions:
                - name: ok
                - name: degraded
                - name: failed
                - name: unknown
            - name: powerstore.hardware_health_psu
              description: Power Supply Health Status
              unit: PSUs
              chart_type: stacked
              dimensions:
                - name: ok
                - name: degraded
                - name: failed
                - name: unknown
            - name: powerstore.hardware_health_drive
              description: Drive Health Status
              unit: drives
              chart_type: stacked
              dimensions:
                - name: ok
                - name: degraded
                - name: failed
                - name: unknown
            - name: powerstore.hardware_health_battery
              description: Battery Health Status
              unit: batteries
              chart_type: stacked
              dimensions:
                - name: ok
                - name: degraded
                - name: failed
                - name: unknown
            - name: powerstore.hardware_health_node
              description: Node Health Status
              unit: nodes
              chart_type: stacked
              dimensions:
                - name: ok
                - name: degraded
                - name: failed
                - name: unknown
            - name: powerstore.alerts_active
              description: Active Alerts by Severity
              unit: alerts
              chart_type: stacked
              dimensions:
                - name: critical
                - name: major
                - name: minor
                - name: info
            - name: powerstore.nas_server_status
              description: NAS Server Status
              unit: servers
              chart_type: stacked
              dimensions:
                - name: started
                - name: stopped
                - name: degraded
                - name: unknown
            - name: powerstore.copy_data
              description: Replication Data
              unit: bytes
              chart_type: line
              dimensions:
                - name: remaining
                - name: transferred
            - name: powerstore.copy_transfer_rate
              description: Replication Transfer Rate
              unit: bytes/s
              chart_type: line
              dimensions:
                - name: rate
        - name: appliance
          description: These metrics refer to individual PowerStore appliances.
          labels:
            - name: appliance
              description: Appliance name (e.g., `Appliance-WX-D8031`).
          metrics:
            - name: powerstore.appliance_iops
              description: Appliance IOPS
              unit: ops/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.appliance_bandwidth
              description: Appliance Bandwidth
              unit: bytes/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.appliance_latency
              description: Appliance Latency
              unit: microseconds
              chart_type: line
              dimensions:
                - name: read
                - name: write
                - name: avg
            - name: powerstore.appliance_cpu
              description: Appliance IO Workload CPU Utilization
              unit: percentage
              chart_type: line
              dimensions:
                - name: utilization
            - name: powerstore.appliance_space
              description: Appliance Space Usage
              unit: bytes
              chart_type: line
              dimensions:
                - name: used
                - name: total
            - name: powerstore.appliance_space_logical
              description: Appliance Logical Space
              unit: bytes
              chart_type: line
              dimensions:
                - name: provisioned
                - name: used
                - name: data_physical
                - name: shared
            - name: powerstore.appliance_space_efficiency
              description: Appliance Space Efficiency Ratios
              unit: ratio
              chart_type: line
              dimensions:
                - name: efficiency
                - name: data_reduction
                - name: snapshot_savings
                - name: thin_savings
        - name: volume
          description: These metrics refer to individual PowerStore volumes. Volumes can be filtered using the `volume_selector` configuration option.
          labels:
            - name: volume
              description: Volume name (e.g., `prod-db-01`).
          metrics:
            - name: powerstore.volume_iops
              description: Volume IOPS
              unit: ops/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.volume_bandwidth
              description: Volume Bandwidth
              unit: bytes/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.volume_latency
              description: Volume Latency
              unit: microseconds
              chart_type: line
              dimensions:
                - name: read
                - name: write
                - name: avg
            - name: powerstore.volume_space
              description: Volume Space Usage
              unit: bytes
              chart_type: line
              dimensions:
                - name: provisioned
                - name: used
            - name: powerstore.volume_space_savings
              description: Volume Thin Savings
              unit: ratio
              chart_type: line
              dimensions:
                - name: thin_savings
        - name: node
          description: These metrics refer to individual PowerStore nodes within an appliance.
          labels:
            - name: node
              description: Node name (e.g., `Appliance-WX-D8031-node-A`).
          metrics:
            - name: powerstore.node_iops
              description: Node IOPS
              unit: ops/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.node_bandwidth
              description: Node Bandwidth
              unit: bytes/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.node_latency
              description: Node Latency
              unit: microseconds
              chart_type: line
              dimensions:
                - name: read
                - name: write
                - name: avg
            - name: powerstore.node_logins
              description: Node Current Logins
              unit: logins
              chart_type: line
              dimensions:
                - name: logins
        - name: fc port
          description: These metrics refer to individual Fibre Channel ports used for host connectivity.
          labels:
            - name: fc_port
              description: FC port name (e.g., `Appliance-WX-D8031-node-A-Port-0`).
          metrics:
            - name: powerstore.fc_port_iops
              description: FC Port IOPS
              unit: ops/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.fc_port_bandwidth
              description: FC Port Bandwidth
              unit: bytes/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.fc_port_latency
              description: FC Port Latency
              unit: microseconds
              chart_type: line
              dimensions:
                - name: read
                - name: write
                - name: avg
            - name: powerstore.fc_port_link_status
              description: FC Port Link Status
              unit: status
              chart_type: line
              dimensions:
                - name: up
        - name: ethernet port
          description: These metrics refer to individual Ethernet ports (management and iSCSI connectivity).
          labels:
            - name: eth_port
              description: Ethernet port name (e.g., `Appliance-WX-D8031-node-A-Port-eth0`).
          metrics:
            - name: powerstore.eth_port_bytes
              description: Ethernet Port Bytes Rate
              unit: bytes/s
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: powerstore.eth_port_packets
              description: Ethernet Port Packets Rate
              unit: packets/s
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: powerstore.eth_port_errors
              description: Ethernet Port Errors Rate
              unit: errors/s
              chart_type: stacked
              dimensions:
                - name: rx_crc
                - name: rx_no_buffer
                - name: tx_error
            - name: powerstore.eth_port_link_status
              description: Ethernet Port Link Status
              unit: status
              chart_type: line
              dimensions:
                - name: up
        - name: file system
          description: These metrics refer to individual file systems (NFS/SMB shares).
          labels:
            - name: filesystem
              description: File system name (e.g., `nfs-share-01`).
          metrics:
            - name: powerstore.filesystem_iops
              description: File System IOPS
              unit: ops/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.filesystem_bandwidth
              description: File System Bandwidth
              unit: bytes/s
              chart_type: area
              dimensions:
                - name: read
                - name: write
            - name: powerstore.filesystem_latency
              description: File System Latency
              unit: microseconds
              chart_type: line
              dimensions:
                - name: read
                - name: write
                - name: avg
        - name: drive
          description: These metrics refer to individual physical drives (SSDs).
          labels:
            - name: drive
              description: Drive name (e.g., `Drive_0_0_25`).
          metrics:
            - name: powerstore.drive_endurance
              description: Drive Endurance Remaining
              unit: percentage
              chart_type: line
              dimensions:
                - name: remaining
