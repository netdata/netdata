version: v1
context_namespace: powerstore
groups:
  - family: Cluster Capacity
    metrics:
      - cluster_space_physical_total
      - cluster_space_physical_used
      - cluster_space_logical_provisioned
      - cluster_space_logical_used
      - cluster_space_data_physical_used
      - cluster_space_shared_logical_used
      - cluster_space_efficiency_ratio
      - cluster_space_data_reduction
      - cluster_space_snapshot_savings
      - cluster_space_thin_savings
    charts:
      - id: cluster_space_usage
        title: Cluster Space Usage
        context: cluster_space_usage
        units: bytes
        algorithm: absolute
        dimensions:
          - selector: cluster_space_physical_used
            name: used
          - selector: cluster_space_physical_total
            name: total
      - id: cluster_space_logical
        title: Cluster Logical Space
        context: cluster_space_logical
        units: bytes
        algorithm: absolute
        dimensions:
          - selector: cluster_space_logical_provisioned
            name: provisioned
          - selector: cluster_space_logical_used
            name: used
          - selector: cluster_space_data_physical_used
            name: data_physical
          - selector: cluster_space_shared_logical_used
            name: shared
      - id: cluster_space_efficiency
        title: Cluster Space Efficiency Ratios
        context: cluster_space_efficiency
        units: ratio
        algorithm: absolute
        dimensions:
          - selector: cluster_space_efficiency_ratio
            name: efficiency
            options:
              float: true
          - selector: cluster_space_data_reduction
            name: data_reduction
            options:
              float: true
          - selector: cluster_space_snapshot_savings
            name: snapshot_savings
            options:
              float: true
          - selector: cluster_space_thin_savings
            name: thin_savings
            options:
              float: true

  - family: Hardware Health
    metrics:
      - hardware_fan_ok
      - hardware_fan_degraded
      - hardware_fan_failed
      - hardware_fan_unknown
      - hardware_psu_ok
      - hardware_psu_degraded
      - hardware_psu_failed
      - hardware_psu_unknown
      - hardware_drive_ok
      - hardware_drive_degraded
      - hardware_drive_failed
      - hardware_drive_unknown
      - hardware_battery_ok
      - hardware_battery_degraded
      - hardware_battery_failed
      - hardware_battery_unknown
      - hardware_node_ok
      - hardware_node_degraded
      - hardware_node_failed
      - hardware_node_unknown
    charts:
      - id: hardware_health_fan
        title: Fan Health Status
        context: hardware_health_fan
        units: fans
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: hardware_fan_ok
            name: ok
          - selector: hardware_fan_degraded
            name: degraded
          - selector: hardware_fan_failed
            name: failed
          - selector: hardware_fan_unknown
            name: unknown
      - id: hardware_health_psu
        title: Power Supply Health Status
        context: hardware_health_psu
        units: PSUs
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: hardware_psu_ok
            name: ok
          - selector: hardware_psu_degraded
            name: degraded
          - selector: hardware_psu_failed
            name: failed
          - selector: hardware_psu_unknown
            name: unknown
      - id: hardware_health_drive
        title: Drive Health Status
        context: hardware_health_drive
        units: drives
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: hardware_drive_ok
            name: ok
          - selector: hardware_drive_degraded
            name: degraded
          - selector: hardware_drive_failed
            name: failed
          - selector: hardware_drive_unknown
            name: unknown
      - id: hardware_health_battery
        title: Battery Health Status
        context: hardware_health_battery
        units: batteries
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: hardware_battery_ok
            name: ok
          - selector: hardware_battery_degraded
            name: degraded
          - selector: hardware_battery_failed
            name: failed
          - selector: hardware_battery_unknown
            name: unknown
      - id: hardware_health_node
        title: Node Health Status
        context: hardware_health_node
        units: nodes
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: hardware_node_ok
            name: ok
          - selector: hardware_node_degraded
            name: degraded
          - selector: hardware_node_failed
            name: failed
          - selector: hardware_node_unknown
            name: unknown

  - family: Alerts
    metrics:
      - alerts_critical
      - alerts_major
      - alerts_minor
      - alerts_info
    charts:
      - id: alerts_active
        title: Active Alerts by Severity
        context: alerts_active
        units: alerts
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: alerts_critical
            name: critical
          - selector: alerts_major
            name: major
          - selector: alerts_minor
            name: minor
          - selector: alerts_info
            name: info

  - family: NAS
    metrics:
      - nas_started
      - nas_stopped
      - nas_degraded
      - nas_unknown
    charts:
      - id: nas_server_status
        title: NAS Server Status
        context: nas_server_status
        units: servers
        type: stacked
        algorithm: absolute
        dimensions:
          - selector: nas_started
            name: started
          - selector: nas_stopped
            name: stopped
          - selector: nas_degraded
            name: degraded
          - selector: nas_unknown
            name: unknown

  - family: Replication
    metrics:
      - copy_data_remaining
      - copy_data_transferred
      - copy_transfer_rate
    charts:
      - id: copy_data
        title: Replication Data
        context: copy_data
        units: bytes
        algorithm: absolute
        dimensions:
          - selector: copy_data_remaining
            name: remaining
          - selector: copy_data_transferred
            name: transferred
      - id: copy_transfer_rate
        title: Replication Transfer Rate
        context: copy_transfer_rate
        units: bytes/s
        algorithm: absolute
        dimensions:
          - selector: copy_transfer_rate
            name: rate
            options:
              float: true

  - family: Appliance
    metrics:
      - appliance_perf_read_iops
      - appliance_perf_write_iops
      - appliance_perf_read_bandwidth
      - appliance_perf_write_bandwidth
      - appliance_perf_avg_read_latency
      - appliance_perf_avg_write_latency
      - appliance_perf_avg_latency
      - appliance_cpu_utilization
      - appliance_space_physical_used
      - appliance_space_physical_total
      - appliance_space_logical_provisioned
      - appliance_space_logical_used
      - appliance_space_data_physical_used
      - appliance_space_shared_logical_used
      - appliance_space_efficiency_ratio
      - appliance_space_data_reduction
      - appliance_space_snapshot_savings
      - appliance_space_thin_savings
    charts:
      - id: appliance_iops
        title: Appliance IOPS
        context: appliance_iops
        units: ops/s
        type: area
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_perf_read_iops
            name: read
            options:
              float: true
          - selector: appliance_perf_write_iops
            name: write
            options:
              multiplier: -1
              float: true
      - id: appliance_bandwidth
        title: Appliance Bandwidth
        context: appliance_bandwidth
        units: bytes/s
        type: area
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_perf_read_bandwidth
            name: read
            options:
              float: true
          - selector: appliance_perf_write_bandwidth
            name: write
            options:
              multiplier: -1
              float: true
      - id: appliance_latency
        title: Appliance Latency
        context: appliance_latency
        units: microseconds
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_perf_avg_read_latency
            name: read
            options:
              float: true
          - selector: appliance_perf_avg_write_latency
            name: write
            options:
              float: true
          - selector: appliance_perf_avg_latency
            name: avg
            options:
              float: true
      - id: appliance_cpu
        title: Appliance IO Workload CPU Utilization
        context: appliance_cpu
        units: percentage
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_cpu_utilization
            name: utilization
            options:
              float: true
      - id: appliance_space
        title: Appliance Space Usage
        context: appliance_space
        units: bytes
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_space_physical_used
            name: used
          - selector: appliance_space_physical_total
            name: total
      - id: appliance_space_logical
        title: Appliance Logical Space
        context: appliance_space_logical
        units: bytes
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_space_logical_provisioned
            name: provisioned
          - selector: appliance_space_logical_used
            name: used
          - selector: appliance_space_data_physical_used
            name: data_physical
          - selector: appliance_space_shared_logical_used
            name: shared
      - id: appliance_space_efficiency
        title: Appliance Space Efficiency Ratios
        context: appliance_space_efficiency
        units: ratio
        algorithm: absolute
        instances:
          by_labels: [appliance]
        dimensions:
          - selector: appliance_space_efficiency_ratio
            name: efficiency
            options:
              float: true
          - selector: appliance_space_data_reduction
            name: data_reduction
            options:
              float: true
          - selector: appliance_space_snapshot_savings
            name: snapshot_savings
            options:
              float: true
          - selector: appliance_space_thin_savings
            name: thin_savings
