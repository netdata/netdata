#    # instance:<cpu_instance>.
#    #host_cpu_instance_include:
#    #  - "*"
#
#    # Optional safety cap for collect_host_cpu_instance_performance. Defaults
#    # to 1024 CPU instances.
#    #max_host_cpu_instances: 1024
#
#    # Optional. Defaults to false. Adds aggregate ESXi host and VM power
#    # usage, energy usage, and host power-capacity metrics. This is not a
#    # per-device high-cardinality group, but it still adds vCenter performance
#    # counters for every discovered powered-on host and VM.
#    #collect_power_metrics: no
#
#    # Optional. Defaults to false. Adds vSAN cluster capacity, vSAN cluster
