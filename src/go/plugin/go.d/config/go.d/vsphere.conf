#    #  - "*"
#
#    # Optional safety cap for collect_host_storage_path_performance. Defaults
#    # to 1024 storage path instances.
#    #max_host_storage_paths: 1024
#
#    # Optional. Defaults to false. Adds per-host CPU instance usage,
