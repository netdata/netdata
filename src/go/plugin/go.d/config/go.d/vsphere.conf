## VMware vCenter Server collector.
##
## Full option reference:
## https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/collector/vsphere#readme
##
## One job connects to one vCenter endpoint and discovers the included ESXi
## hosts, VMs, datastores, clusters, and resource pools reachable through it.
## By default, inventory include selectors are "/*" and optional instance
## selectors are "*", which means "include all" for their respective surfaces.
## By default, host_power_states and vm_power_states include only poweredOn,
## preserving the historical behavior. Uncomment extra states only when you
## want non-running objects collected as property/status-only resources.
##
## Selector formats:
##   host_include      : /Datacenter/Cluster/Host
##   vm_include        : /Datacenter/Cluster/Host/VM
##   datastore_include : /Datacenter/Datastore
##   cluster_include   : /Datacenter/Cluster
##   datastore_cluster_include : /Datacenter/DatastoreCluster
##
## Selector values use Netdata simple patterns. Resource pools follow their
## owning cluster selector.
##
## Credentials can be plain YAML values, but using Netdata secret resolvers is
## safer:
##   "${env:VSPHERE_PASSWORD}"
##   "${file:/run/secrets/vsphere_password}"
##   "${cmd:/absolute/path/to/command args}"
##   "${store:<kind>:<name>:<operand>}"
##
## Set vnode only if you want all metrics from this job attached to a Netdata
## Virtual Node. Leaving vnode unset preserves the normal local-node behavior.
##
## collect_inventory_path_label, vm_guest_labels, vsphere_tag_categories, and
## custom_attributes are opt-in label enrichment. They are disabled by default
## because inventory paths, guest hostnames, guest IP addresses, guest OS names,
## tags, and custom attributes can expose internal naming, ownership, addressing,
## or business metadata.
##
## collect_datastore_clusters, collect_vm_disks,
## collect_vm_disk_performance, collect_vm_nic_performance,
## collect_host_nic_performance, collect_host_disk_performance, and
## collect_host_storage_adapter_performance, and
## collect_host_storage_path_performance,
## collect_host_cpu_instance_performance, collect_power_metrics, and
## collect_vsan are opt-in metric collection groups.
## Datastore clusters add aggregate capacity/status for
## StoragePod objects. VM disks add one series per VM virtual disk for capacity
## and/or per-disk performance. VM NICs add one series per VM network interface
## for traffic, packets, and drops. Host NICs add one series per ESXi physical
## network interface for traffic, packets, drops, errors, and related frame
## counters. Host disks add one series per ESXi disk/LUN/device for throughput,
## IOPS, latency, queue depth, command events, and reservation conflicts. Host
## storage adapters add one series per ESXi storage adapter for I/O, command,
## latency, queue, and throughput metrics. Host storage paths add one series
## per ESXi storage path for I/O, command, latency, command-event, throughput,
## and aggregate maximum-latency metrics. Host CPU instances add one series per
## ESXi CPU/core/logical-CPU instance for utilization and used/idle time.
## collect_power_metrics adds aggregate host and VM power/energy plus host
## power-capacity performance counters. Use the include selectors and max caps
## to keep emitted series bounded and intentional.
## collect_vsan adds vSAN cluster capacity, vSAN cluster health, and vSAN
## cluster/host/VM performance metrics through vSAN APIs. It queries concrete
## discovered vSAN clusters, hosts, and VMs. Use vsan_*_include selectors and
## max_vsan_* caps to bound both emitted series and vSAN performance query
## scope. It requires vSAN and the vSAN Performance Service/API to be
## available.
## collect_network_topology is also opt-in, but it is not a metric group. It
## discovers vSphere Network and Distributed Virtual Port Group objects for the
## cached vSphere Topology function. It defaults to no so existing users do not
## get extra vCenter discovery calls unless they ask for network topology.
##
## discovery_interval controls inventory refreshes. Keep it reasonably high on
## large vCenters to avoid unnecessary vCenter load.

