#  - name: vcenter1
#    url: https://vcenter.local
#    username: admin@vsphere.local
#    password: "${file:/run/secrets/vsphere_password}"
#
#    # Optional. Defaults to 20 seconds.
#    #update_every: 20
#
#    # Optional. Defaults to 60 seconds. Set 0 to disable autodetection retry.
#    #autodetection_retry: 60
#
#    # Optional. Defaults to 5 minutes.
#    #discovery_interval: 300
#
#    # Optional power-state filters. Defaults preserve historical behavior.
#    # Non-powered-on hosts/VMs do not get real-time performance counters.
#    #host_power_states:
#    #  - poweredOn
#    #  - poweredOff
#    #  - standBy
#    #  - unknown
#    #vm_power_states:
#    #  - poweredOn
#    #  - poweredOff
#    #  - suspended
#
#    # Optional. Associate this job with a Netdata Virtual Node.
#    #vnode: vcenter1
#
#    # Optional. Defaults to false. Adds an inventory_path label to vSphere
#    # resource charts.
#    #collect_inventory_path_label: no
#
#    # Optional VM guest label allowlist. Defaults to empty.
#    # Valid values: guest_hostname, guest_ip, guest_os.
#    #vm_guest_labels:
#    #  - guest_hostname
#    #  - guest_ip
#    #  - guest_os
#
#    # Optional vSphere tag category allowlist. Defaults to empty. Each list
#    # item is one glob pattern matching category names, so names with spaces
#    # are supported. Use "*" only when all tag categories are intentional.
#    # Label keys become vsphere_tag_<sanitized_category>.
#    # Multiple tags in the same category are sorted and joined with "|".
#    #vsphere_tag_categories:
#    #  - "Environment"
#    #  - "Business Unit"
#
#    # Optional vSphere custom attribute allowlist. Defaults to empty. Each list
#    # item is one glob pattern matching attribute names, so names with spaces
#    # are supported. Custom attribute values are sent verbatim as labels. Use
#    # "*" only when all custom attributes are intentional and none of the
#    # matched values contain secrets.
#    # Label keys become vsphere_custom_attribute_<sanitized_name>.
#    #custom_attributes:
#    #  - "Owner"
#    #  - "Cost Center"
#
#    # Optional safety cap for vSphere tag and custom-attribute labels per
#    # resource. Defaults to 64 labels.
#    #max_user_metadata_labels: 64
#
#    # Optional. Defaults to false. Adds one capacity series per VM virtual
#    # disk. This can be high-cardinality in large vCenters.
#    #collect_vm_disks: no
#
#    # Optional. Defaults to false. Adds per-virtual-disk I/O, IOPS, latency,
#    # and outstanding-I/O metrics. This increases vCenter query load and can
#    # be high-cardinality in large vCenters.
#    #collect_vm_disk_performance: no
#
#    # Optional. Defaults to false. Adds aggregate datastore-cluster
#    # (StoragePod) capacity and Storage DRS status.
#    #collect_datastore_clusters: no
#
#    # Optional datastore-cluster selector. Defaults to all datastore clusters
#    # when collect_datastore_clusters is enabled. Patterns match
#    # /Datacenter/DatastoreCluster, datastore-cluster name, or vSphere ID.
#    #datastore_cluster_include:
#    #  - "/*"
#
#    # Optional safety cap for collect_datastore_clusters. Defaults to 256.
#    #max_datastore_clusters: 256
#
#    # Optional VM virtual disk selector. Defaults to all disks when
#    # collect_vm_disks or collect_vm_disk_performance is enabled. Capacity
#    # patterns match the vSphere disk label, numeric disk key, or
#    # key:<disk_key>. Performance patterns match the vSphere performance
#    # instance or instance:<disk_instance>.
#    #vm_disk_include:
#    #  - "*"
#
#    # Optional safety cap for collect_vm_disks and
#    # collect_vm_disk_performance. Defaults to 1024 disks.
#    #max_vm_disks: 1024
#
#    # Optional. Defaults to false. Adds per-vNIC traffic, packet, drop,
#    # broadcast, and multicast metrics. Packet error counters are not emitted
#    # for VMs because Broadcom's network counter table lists them for
#    # HostSystem only.
#    #collect_vm_nic_performance: no
#
#    # Optional VM network-interface selector. Defaults to all interfaces when
#    # collect_vm_nic_performance is enabled. Patterns match the vSphere
#    # performance instance or interface:<interface_instance>.
#    #vm_nic_include:
#    #  - "*"
#
#    # Optional safety cap for collect_vm_nic_performance. Defaults to 1024
#    # interfaces.
#    #max_vm_nics: 1024
#
#    # Optional. Defaults to false. Adds per-host-pNIC traffic, packet, drop,
#    # error, broadcast, multicast, unknown-protocol, and usage metrics.
#    #collect_host_nic_performance: no
#
#    # Optional host physical network-interface selector. Defaults to all
#    # interfaces when collect_host_nic_performance is enabled. Patterns match
#    # the vSphere performance instance or interface:<interface_instance>.
#    #host_nic_include:
#    #  - "*"
#
#    # Optional safety cap for collect_host_nic_performance. Defaults to 1024
#    # interfaces.
#    #max_host_nics: 1024
#
#    # Optional. Defaults to false. Adds per-host-disk/LUN/device throughput,
#    # IOPS, latency, queue depth, command event, and reservation-conflict
#    # metrics.
#    #collect_host_disk_performance: no
#
#    # Optional host disk/LUN/device selector. Defaults to all instances when
#    # collect_host_disk_performance is enabled. Patterns match the vSphere
#    # performance instance or instance:<disk_instance>.
#    #host_disk_include:
#    #  - "*"
#
#    # Optional safety cap for collect_host_disk_performance. Defaults to 1024
#    # disk/LUN/device instances.
#    #max_host_disks: 1024
#
#    # Optional. Defaults to false. Adds per-host-storage-adapter I/O, command,
#    # latency, queue, outstanding I/O percentage, throughput usage, throughput
#    # contention, and aggregate maximum-latency metrics.
#    #collect_host_storage_adapter_performance: no
#
#    # Optional host storage-adapter selector. Defaults to all instances when
#    # collect_host_storage_adapter_performance is enabled. Patterns match the
#    # vSphere performance instance, adapter:<adapter_instance>, or
#    # instance:<adapter_instance>.
#    #host_storage_adapter_include:
#    #  - "*"
#
#    # Optional safety cap for collect_host_storage_adapter_performance.
#    # Defaults to 1024 storage adapter instances.
#    #max_host_storage_adapters: 1024
#
#    # Optional. Defaults to false. Adds per-host-storage-path I/O, command,
#    # latency, command-event, throughput usage, throughput contention, and
#    # aggregate maximum-latency metrics.
#    #collect_host_storage_path_performance: no
#
#    # Optional host storage-path selector. Defaults to all instances when
#    # collect_host_storage_path_performance is enabled. Patterns match the
