licensing:
  - id: base_firewall
    MIB: SFOS-FIREWALL-MIB
    identity:
      id:
        value: base_firewall
      name:
        value: Base Firewall
      component:
        value: base_firewall
    descriptors:
      type:
        value: subscription
      impact:
        value: Sophos Base Firewall subscription state and expiry on the device
    state:
      OID: 1.3.6.1.4.1.2604.5.1.5.1.1.0
      name: sfosBaseFWLicRegStatus
      policy: sophos
      mapping:
        "0": "0"
        "1": "1"
        "2": "0"
        "3": "0"
        "4": "2"
        "5": "2"
    signals:
      expiry:
        timestamp:
          from: 1.3.6.1.4.1.2604.5.1.5.1.2.0
          name: sfosBaseFWLicExpiryDate
          format: text_date
