virtual_metrics:
  - name: bgpPeerAvailability
    per_row: true
    sources:
      - {metric: aristaBgp4V2PeerAdminStatus, table: aristaBgp4V2PeerTable, as: admin_enabled, dim: running}
      - {metric: aristaBgp4V2PeerState, table: aristaBgp4V2PeerTable, as: established, dim: established}
    chart_meta:
      description: BGP peer administrative and established availability
      family: 'Network/Routing/BGP/Peer/Availability'
      unit: "{status}"
  - name: bgpPeerUpdates
    per_row: true
    sources:
      - {metric: bgpPeerInUpdates, table: aristaBgp4V2PeerCountersTable, as: received}
      - {metric: bgpPeerOutUpdates, table: aristaBgp4V2PeerCountersTable, as: sent}
    chart_meta:
      description: BGP peer update traffic by direction
      family: 'Network/Routing/BGP/Peer/Message/Update'
      unit: "{message}"

metadata:
  device:
    fields:
      type:
        value: "Switch"

