# Vendor-native Juniper BGP visibility from BGP4-V2-MIB-JUNIPER.
# This augments the generic BGP4-MIB profile with richer per-peer state,
# timers, errors, message counters, and AFI/SAFI prefix gauges.

metrics:
  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PeerTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.3
        name: bgpPeerAdminStatus
        chart_meta:
          description: The desired state of the BGP connection
          family: 'Network/Routing/BGP/Peer/Admin/Status'
          unit: "{status}"
        mapping:
          1: halted
          2: running
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.2
        name: bgpPeerState
        chart_meta:
          description: The BGP peer connection state
          family: 'Network/Routing/BGP/Peer/Connection/Status'
          unit: "{status}"
        mapping:
          1: idle
          2: connect
          3: active
          4: opensent
          5: openconfirm
          6: established
    metric_tags:
      - tag: routing_instance
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
      - tag: neighbor_address_type
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.10
          name: jnxBgpM2PeerRemoteAddrType
        mapping:
          0: unknown
          1: ipv4
          2: ipv6
          3: ipv4z
          4: ipv6z
          16: dns
          25: l2vpn
      - tag: neighbor
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
      - tag: local_address
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.7
          name: jnxBgpM2PeerLocalAddr
          format: ip_address
      - tag: local_as
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.9
          name: jnxBgpM2PeerLocalAs
      - tag: remote_as
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs
      - tag: peer_identifier
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.1
          name: jnxBgpM2PeerIdentifier
          format: ip_address
      - tag: bgp_version
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.5
          name: jnxBgpM2PeerNegotiatedVersion

  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PeerErrorsTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.2.1
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.2.1.1.1
        name: bgpPeerLastErrorCode
        format: hex
        extract_value: '^([0-9a-f]{2})'
        chart_meta:
          description: The last BGP NOTIFICATION error code received on this connection
          family: 'Network/Routing/BGP/Peer/Error/Last/Code'
          unit: "{code}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.2.1.1.1
        name: bgpPeerLastErrorSubcode
        format: hex
        extract_value: '^[0-9a-f]{2}([0-9a-f]{2})'
        chart_meta:
          description: The last BGP NOTIFICATION error subcode received on this connection
          family: 'Network/Routing/BGP/Peer/Error/Last/Subcode'
          unit: "{subcode}"
    metric_tags:
      - tag: routing_instance
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
      - tag: neighbor
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
      - tag: local_address
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.7
          name: jnxBgpM2PeerLocalAddr
          format: ip_address
      - tag: remote_as
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs
      - tag: peer_identifier
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.1
          name: jnxBgpM2PeerIdentifier
          format: ip_address

  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PeerEventTimesTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.4.1
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.1.1.1
        name: bgpPeerFsmEstablishedTime
        chart_meta:
          description: Time in seconds this peer has been in the Established state or since last in Established state
          family: 'Network/Routing/BGP/Peer/FSM/Duration/Established'
          unit: "s"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.1.1.2
        name: bgpPeerInUpdateElapsedTime
        chart_meta:
          description: Time since the last BGP UPDATE message was received from the peer
          family: 'Network/Routing/BGP/Peer/Message/Update/In/Elapsed'
          unit: "s"
    metric_tags:
      - tag: routing_instance
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
      - tag: neighbor
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
      - tag: local_address
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.7
          name: jnxBgpM2PeerLocalAddr
          format: ip_address
      - tag: remote_as
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs

  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PeerConfiguredTimersTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.4.2
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.2.1.1
        name: bgpPeerConnectRetryInterval
        chart_meta:
          description: The configured interval for retrying TCP connection establishment to the peer
          family: 'Network/Routing/BGP/Peer/Timer/ConnectRetry/Configured'
          unit: "s"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.2.1.2
        name: bgpPeerHoldTimeConfigured
        chart_meta:
          description: The locally configured hold timer interval for the peer
          family: 'Network/Routing/BGP/Peer/Timer/Hold/Configured'
          unit: "s"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.2.1.3
        name: bgpPeerKeepAliveConfigured
        chart_meta:
          description: The locally configured keepalive timer interval for the peer
          family: 'Network/Routing/BGP/Peer/Timer/KeepAlive/Configured'
          unit: "s"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.2.1.4
        name: bgpPeerMinASOriginationInterval
        chart_meta:
          description: The minimum interval between originating AS routes to the peer
          family: 'Network/Routing/BGP/Peer/Timer/ASOrigination/Minimum'
          unit: "s"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.2.1.5
        name: bgpPeerMinRouteAdvertisementInterval
        chart_meta:
          description: The minimum interval between route advertisements to the peer
          family: 'Network/Routing/BGP/Peer/Timer/RouteAdvertisement/Minimum'
          unit: "s"
    metric_tags:
      - tag: routing_instance
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
      - tag: neighbor
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
      - tag: remote_as
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs

  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PeerNegotiatedTimersTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.4.3
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.3.1.1
        name: bgpPeerHoldTime
        chart_meta:
          description: The negotiated hold timer interval currently in use with the peer
          family: 'Network/Routing/BGP/Peer/Timer/Hold/Negotiated'
          unit: "s"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.4.3.1.2
        name: bgpPeerKeepAlive
        chart_meta:
          description: The negotiated keepalive timer interval currently in use with the peer
          family: 'Network/Routing/BGP/Peer/Timer/KeepAlive/Negotiated'
          unit: "s"
    metric_tags:
      - tag: routing_instance
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
      - tag: neighbor
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
      - tag: remote_as
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs

  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PeerCountersTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.6.1
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.1.1.1
        name: bgpPeerInUpdates
        chart_meta:
          description: The number of BGP UPDATE messages received on this connection
          family: 'Network/Routing/BGP/Peer/Message/Update/In'
          unit: "{message}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.1.1.2
        name: bgpPeerOutUpdates
        chart_meta:
          description: The number of BGP UPDATE messages transmitted on this connection
          family: 'Network/Routing/BGP/Peer/Message/Update/Out'
          unit: "{message}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.1.1.3
        name: bgpPeerInTotalMessages
        chart_meta:
          description: The total number of messages received from the remote peer on this connection
          family: 'Network/Routing/BGP/Peer/Message/Total/In'
          unit: "{message}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.1.1.4
        name: bgpPeerOutTotalMessages
        chart_meta:
          description: The total number of messages transmitted to the remote peer on this connection
          family: 'Network/Routing/BGP/Peer/Message/Total/Out'
          unit: "{message}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.1.1.5
        name: bgpPeerFsmEstablishedTransitions
        chart_meta:
          description: The total number of times the BGP FSM transitioned into the established state
          family: 'Network/Routing/BGP/Peer/FSM/Transition/Established/Count'
          unit: "{transition}"
    metric_tags:
      - tag: routing_instance
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
      - tag: neighbor
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
      - tag: local_address
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.7
          name: jnxBgpM2PeerLocalAddr
          format: ip_address
      - tag: remote_as
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs
      - tag: peer_identifier
        table: jnxBgpM2PeerTable
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.1
          name: jnxBgpM2PeerIdentifier
          format: ip_address

  - MIB: BGP4-V2-MIB-JUNIPER
    table:
      name: jnxBgpM2PrefixCountersTable
      OID: 1.3.6.1.4.1.2636.5.1.1.2.6.2
    symbols:
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.2.1.7
        name: bgpPeerPrefixesReceived
        chart_meta:
          description: The number of prefixes received from the peer and stored in Adj-RIBs-In
          family: 'Network/Routing/BGP/Peer/Prefix/Received'
          unit: "{prefix}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.2.1.8
        name: bgpPeerPrefixesAccepted
        chart_meta:
          description: The number of received prefixes eligible to become active in the Loc-RIB
          family: 'Network/Routing/BGP/Peer/Prefix/Accepted'
          unit: "{prefix}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.2.1.9
        name: bgpPeerPrefixesRejected
        chart_meta:
          description: The number of received prefixes that are not eligible to become active in the Loc-RIB
          family: 'Network/Routing/BGP/Peer/Prefix/Rejected'
          unit: "{prefix}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.2.1.10
        name: bgpPeerPrefixesAdvertised
        chart_meta:
          description: The number of prefixes installed in the peer Adj-RIBs-Out
          family: 'Network/Routing/BGP/Peer/Prefix/Advertised'
          unit: "{prefix}"
      - OID: 1.3.6.1.4.1.2636.5.1.1.2.6.2.1.11
        name: bgpPeerPrefixesActive
        chart_meta:
          description: The number of received prefixes that are currently active
          family: 'Network/Routing/BGP/Peer/Prefix/Active'
          unit: "{prefix}"
    metric_tags:
      - tag: routing_instance
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.15
          name: jnxBgpM2PeerRoutingInstance
        index_transform:
          - start: 0
            end: 0
      - tag: neighbor
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.11
          name: jnxBgpM2PeerRemoteAddr
          format: ip_address
        index_transform:
          - start: 0
            end: 0
      - tag: neighbor_address_type
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.10
          name: jnxBgpM2PeerRemoteAddrType
        mapping:
          0: unknown
          1: ipv4
          2: ipv6
          3: ipv4z
          4: ipv6z
          16: dns
          25: l2vpn
        index_transform:
          - start: 0
            end: 0
      - tag: local_address
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.7
          name: jnxBgpM2PeerLocalAddr
          format: ip_address
        index_transform:
          - start: 0
            end: 0
      - tag: local_as
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.9
          name: jnxBgpM2PeerLocalAs
        index_transform:
          - start: 0
            end: 0
      - tag: remote_as
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.13
          name: jnxBgpM2PeerRemoteAs
        index_transform:
          - start: 0
            end: 0
      - tag: peer_identifier
        table: jnxBgpM2PeerTable
        lookup_symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.14
          name: jnxBgpM2PeerIndex
        symbol:
          OID: 1.3.6.1.4.1.2636.5.1.1.2.1.1.1.1
          name: jnxBgpM2PeerIdentifier
          format: ip_address
        index_transform:
          - start: 0
            end: 0
      - tag: address_family
        index: 2
        mapping:
          0: unknown
          1: ipv4
          2: ipv6
          3: ipv4z
          4: ipv6z
          16: dns
          25: l2vpn
      - tag: subsequent_address_family
        index: 3
        mapping:
          1: unicast
          2: multicast
          4: labeled_unicast
          5: mvpn
          65: vpls
          70: evpn
          128: vpn
          132: rtfilter
          133: flow
