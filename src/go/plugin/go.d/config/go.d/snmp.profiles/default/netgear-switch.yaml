extends:
  - netgear.yaml
  - _std-lldp-mib.yaml
  - _std-topology-fdb-arp-mib.yaml
  - _std-topology-q-bridge-mib.yaml
  - _std-topology-stp-mib.yaml

selector:
  - sysobjectid:
      include:
        # Netgear switch product families (NETGEAR-INVENTORY-MIB).
        # See metadata/netgear.yaml for the full per-OID model list.
        # Excludes non-switch families: 100.5/100.6 (router/firewall),
        # 100.7 (access point), 100.8 (wireless controller), 100.16 (NAS).
        - 1.3.6.1.4.1.4526.100.1.*
        - 1.3.6.1.4.1.4526.100.2.*
        - 1.3.6.1.4.1.4526.100.3.*
        - 1.3.6.1.4.1.4526.100.4.*
        - 1.3.6.1.4.1.4526.100.10.*
        - 1.3.6.1.4.1.4526.100.11.*

metadata:
  device:
    fields:
      type:
        value: "Switch"

# NETGEAR-SWITCHING-MIB
# https://mibbrowser.online/mibdb_search.php?mib=NETGEAR-SWITCHING-MIB
# https://github.com/DanielleHuisman/observium-community-edition/blob/main/mibs/netgear/NETGEAR-SWITCHING-MIB

metric_tags:
  - tag: _agent_inventory_machine_model
    OID: 1.3.6.1.4.1.4526.10.1.1.1.3.0
    symbol: agentInventoryMachineModel
  - tag: _agent_inventory_software_version
    OID: 1.3.6.1.4.1.4526.10.1.1.1.13.0
    symbol: agentInventorySoftwareVersion

