extends:
  - _dell.yaml
  - _std-host-resources-mib-feat-base.yaml
  - _std-ucd-mib.yaml
#  - if32-mib.yaml  # TODO: later (NDM-1933)

virtual_metrics:
  - name: bgpPeerAvailability
    per_row: true
    sources:
      - {metric: dell.os10bgp4V2PeerAdminStatus, table: dell.os10bgp4V2PeerTable, as: admin_enabled, dim: running}
      - {metric: dell.os10bgp4V2PeerState, table: dell.os10bgp4V2PeerTable, as: established, dim: established}
    chart_meta:
      description: BGP peer administrative and established availability
      family: 'Network/Routing/BGP/Peer/Availability'
      unit: "{status}"
  - name: bgpPeerUpdates
    per_row: true
    sources:
      - {metric: bgpPeerInUpdates, table: dell.os10bgp4V2PeerCountersTable, as: received}
      - {metric: bgpPeerOutUpdates, table: dell.os10bgp4V2PeerCountersTable, as: sent}
    chart_meta:
      description: BGP peer update traffic by direction
      family: 'Network/Routing/BGP/Peer/Message/Update'
      unit: "{message}"

selector:
  - sysobjectid:
      include:
        - 1.3.6.1.4.1.674.11000.5000.100.2.*      # OS10 family
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.1    # s6000on
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.9    # s4128Ton
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.20   # s5232Fon
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.21   # s5248Fon

metadata:
  device:
    fields:
      type:
        value: "Switch"

# Tagging by column OID is not supported at the moment. Should be a table/columns metric + tags instead.
# metric_tags:
#   - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.3.1.6
