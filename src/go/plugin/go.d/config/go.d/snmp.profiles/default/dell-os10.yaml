extends:
  - _dell.yaml
  - _std-host-resources-mib-feat-base.yaml
  - _std-ucd-mib.yaml
#  - if32-mib.yaml  # TODO: later (NDM-1933)

bgp:
  - id: dell-os10-bgp-peer
    MIB: DELLEMC-OS10-BGP4V2-MIB
    kind: peer
    table: &dell_os10_bgp_peer_table
      name: dell.os10bgp4V2PeerTable
      OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2
    identity: &dell_os10_bgp_peer_identity
      routing_instance: &dell_os10_bgp_routing_instance
        index: 1
      neighbor: &dell_os10_bgp_neighbor
        index_transform:
          - start: 3
        name: dell.os10bgp4V2PeerRemoteAddrIndex
        format: ip_address
      remote_as: &dell_os10_bgp_remote_as
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.10, name: dell.os10bgp4V2PeerRemoteAs, format: uint32 }
    descriptors: &dell_os10_bgp_peer_descriptors
      local_address:
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.3, name: dell.os10bgp4V2PeerLocalAddr, format: ip_address }
      local_as:
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.7, name: dell.os10bgp4V2PeerLocalAs, format: uint32 }
      local_identifier:
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.8, name: dell.os10bgp4V2PeerLocalIdentifier, format: ip_address }
      peer_identifier:
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.11, name: dell.os10bgp4V2PeerRemoteIdentifier, format: ip_address }
      peer_type: &dell_os10_bgp_peer_type
        index: 2
        mapping:
          0: unknown
          1: ipv4
          2: ipv6
          3: ipv4z
          4: ipv6z
          16: dns
      description:
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.14, name: dell.os10bgp4V2PeerDescription }
    admin:
      enabled:
        symbol:
          OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.12
          name: dell.os10bgp4V2PeerAdminStatus
          mapping:
            1: halted
            2: running
    state:
      symbol:
        OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.13
        name: dell.os10bgp4V2PeerState
        mapping:
          1: idle
          2: connect
          3: active
          4: opensent
          5: openconfirm
          6: established
    connection:
      established_uptime:
        table: dell.os10bgp4V2PeerEventTimesTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.4.1.1, name: bgpPeerFsmEstablishedTime }
      last_received_update_age:
        table: dell.os10bgp4V2PeerEventTimesTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.4.1.2, name: bgpPeerInUpdateElapsedTime }
    traffic:
      messages:
        received:
          table: dell.os10bgp4V2PeerCountersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.7.1.3, name: bgpPeerInTotalMessages }
        sent:
          table: dell.os10bgp4V2PeerCountersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.7.1.4, name: bgpPeerOutTotalMessages }
      updates:
        received:
          table: dell.os10bgp4V2PeerCountersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.7.1.1, name: bgpPeerInUpdates }
        sent:
          table: dell.os10bgp4V2PeerCountersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.7.1.2, name: bgpPeerOutUpdates }
    transitions:
      established:
        table: dell.os10bgp4V2PeerCountersTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.7.1.5, name: bgpPeerFsmEstablishedTransitions }
    timers:
      negotiated:
        hold_time:
          table: dell.os10bgp4V2PeerNegotiatedTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.6.1.1, name: bgpPeerHoldTime }
        keepalive_time:
          table: dell.os10bgp4V2PeerNegotiatedTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.6.1.2, name: bgpPeerKeepAlive }
      configured:
        connect_retry:
          table: dell.os10bgp4V2PeerConfiguredTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.5.1.1, name: bgpPeerConnectRetryInterval }
        hold_time:
          table: dell.os10bgp4V2PeerConfiguredTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.5.1.2, name: bgpPeerHoldTimeConfigured }
        keepalive_time:
          table: dell.os10bgp4V2PeerConfiguredTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.5.1.3, name: bgpPeerKeepAliveConfigured }
        min_as_origination_interval:
          table: dell.os10bgp4V2PeerConfiguredTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.5.1.4, name: bgpPeerMinASOriginationInterval }
        min_route_advertisement_interval:
          table: dell.os10bgp4V2PeerConfiguredTimersTable
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.5.1.5, name: bgpPeerMinRouteAdvertisementInterval }
    last_error:
      code:
        table: dell.os10bgp4V2PeerErrorsTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.3.1.1, name: bgpPeerLastErrorCode }
      subcode:
        table: dell.os10bgp4V2PeerErrorsTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.3.1.2, name: bgpPeerLastErrorSubcode }

  - id: dell-os10-bgp-peer-family
    MIB: DELLEMC-OS10-BGP4V2-MIB
    kind: peer_family
    table:
      name: dell.os10bgp4V2PrefixGaugesTable
      OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.8
    identity:
      routing_instance: *dell_os10_bgp_routing_instance
      neighbor:
        index_transform:
          - start: 3
            drop_right: 2
        name: dell.os10bgp4V2PrefixPeerRemoteAddrIndex
        format: ip_address
      remote_as:
        <<: *dell_os10_bgp_remote_as
        table: dell.os10bgp4V2PeerTable
        index_transform: &dell_os10_bgp_peer_index_from_family
          - start: 0
            drop_right: 2
      address_family:
        index_from_end: 2
        mapping:
          1: ipv4
          2: ipv6
      subsequent_address_family:
        index_from_end: 1
        mapping:
          1: unicast
          2: multicast
          4: labeled_unicast
    descriptors:
      <<: *dell_os10_bgp_peer_descriptors
      local_address:
        table: dell.os10bgp4V2PeerTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.3, name: dell.os10bgp4V2PeerLocalAddr, format: ip_address }
        index_transform: *dell_os10_bgp_peer_index_from_family
      local_as:
        table: dell.os10bgp4V2PeerTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.7, name: dell.os10bgp4V2PeerLocalAs, format: uint32 }
        index_transform: *dell_os10_bgp_peer_index_from_family
      local_identifier:
        table: dell.os10bgp4V2PeerTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.8, name: dell.os10bgp4V2PeerLocalIdentifier, format: ip_address }
        index_transform: *dell_os10_bgp_peer_index_from_family
      peer_identifier:
        table: dell.os10bgp4V2PeerTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.11, name: dell.os10bgp4V2PeerRemoteIdentifier, format: ip_address }
        index_transform: *dell_os10_bgp_peer_index_from_family
      description:
        table: dell.os10bgp4V2PeerTable
        symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.2.1.14, name: dell.os10bgp4V2PeerDescription }
        index_transform: *dell_os10_bgp_peer_index_from_family
      peer_type: *dell_os10_bgp_peer_type
    routes:
      current:
        received:
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.8.1.3, name: bgpPeerPrefixesReceived }
        accepted:
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.8.1.4, name: bgpPeerPrefixesAccepted }
        advertised:
          symbol: { OID: 1.3.6.1.4.1.674.11000.5000.200.1.1.8.1.5, name: bgpPeerPrefixesAdvertised }

selector:
  - sysobjectid:
      include:
        - 1.3.6.1.4.1.674.11000.5000.100.2.*      # OS10 family
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.1    # s6000on
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.9    # s4128Ton
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.20   # s5232Fon
        - 1.3.6.1.4.1.674.11000.5000.100.2.1.21   # s5248Fon

metadata:
  device:
    fields:
      type:
        value: "Switch"

# Tagging by column OID is not supported at the moment. Should be a table/columns metric + tags instead.
# metric_tags:
#   - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.3.1.6
#     symbol: dell.os10ChassisHwRev
#     tag: dell_os10_chassis_hw_rev
#   - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.3.1.7
#     symbol: dell.os10ChassisServiceTag
#     tag: dell_os10_chassis_service_tag
#   - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.3.1.8
#     symbol: dell.os10ChassisExpServiceCode
#     tag: dell_os10_chassis_exp_service_code

metrics:
  - MIB: DELLEMC-OS10-CHASSIS-MIB
    symbol:
      name: dell.os10ChassisTemp
      OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.3.1.11
      chart_meta:
        family: 'Hardware/Chassis/Temperature/Value'
        description: "Temperature of the chassis"
        unit: "Cel"
  - MIB: DELLEMC-OS10-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.4
      name: dell.os10CardTable
    symbols:
      - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.4.1.5
        name: dell.os10CardTemp
        chart_meta:
          family: 'Hardware/Card/Temperature/Value'
          description: "Temperature of the card"
          unit: "Cel"
      - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.4.1.4
        name: dell.os10CardStatus
        chart_meta:
          family: 'Hardware/Card/Status'
          description: "Status of the card"
          unit: "{status}"
        mapping:
          1: ready
          2: card_mis_match
          3: card_problem
          4: diag_mode
          5: card_absent
          6: offline
    metric_tags:
      - tag: dell_os10_card_description
        symbol:
          OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.4.1.3
          name: dell.os10CardDescription
      - tag: dell_os10_card_service_tag
        symbol:
          OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.1.4.1.9
          name: dell.os10CardServiceTag

  - MIB: DELLEMC-OS10-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.1
      name: dell.os10PowerSupplyTable
    symbols:
      - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.1.1.4
        name: dell.os10PowerSupplyOperStatus
        chart_meta:
          family: 'Hardware/Power/Status/Operational'
          description: "Operational status of the power supply"
          unit: "{status}"
        mapping:
          1: up
          2: down
          3: testing
          4: unknown
          5: dormant
          6: not_present
          7: lower_layer_down
          8: failed
    metric_tags:
      - tag: dell_os10_power_supply_index
        symbol:
          OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.1.1.1
          name: dell.os10PowerSupplyIndex

  - MIB: DELLEMC-OS10-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.2
      name: dell.os10FanTrayTable
    symbols:
      - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.2.1.4
        name: dell.os10FanTrayOperStatus
        chart_meta:
          family: 'Hardware/FanTray/Status/Operational'
          description: "Operational status of the fan tray"
          unit: "{status}"
        mapping:
          1: up
          2: down
          3: testing
          4: unknown
          5: dormant
          6: not_present
          7: lower_layer_down
          8: failed
    metric_tags:
      - tag: dell_os10_fan_tray_index
        symbol:
          OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.2.1.1
          name: dell.os10FanTrayIndex

  - MIB: DELLEMC-OS10-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.3
      name: dell.os10FanTable
    symbols:
      - OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.3.1.7
        name: dell.os10FanOperStatus
        chart_meta:
          family: 'Hardware/Fan/Status/Operational'
          description: "Operational status of the fan"
          unit: "{status}"
        mapping:
          1: up
          2: down
          3: testing
          4: unknown
          5: dormant
          6: not_present
          7: lower_layer_down
          8: failed
    metric_tags:
      - tag: dell_os10_fan_index
        symbol:
          OID: 1.3.6.1.4.1.674.11000.5000.100.4.1.2.3.1.1
          name: dell.os10FanIndex
