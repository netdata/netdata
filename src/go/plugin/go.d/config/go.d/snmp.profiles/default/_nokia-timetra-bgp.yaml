      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.98
        name: bgpPeerPrefixesRejectedTotal
        metric_type: monotonic_count
        chart_meta:
          description: The total number of IPv4 prefixes rejected from this peer
          family: 'Network/Routing/BGP/Peer/Prefix/Rejected/Total'
          unit: "{prefix}"
    metric_tags: *nokia_bgp_peer_tags

  - MIB: TIMETRA-BGP-MIB
