          unit: "{prefix}"
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.7
        name: bgpPeerPrefixesActive
        metric_type: gauge
        chart_meta:
          description: The current number of active IPv4 prefixes learned from this peer
          family: 'Network/Routing/BGP/Peer/Prefix/Active'
