      - tag: peer_description
        table: tBgpPeerNgTable
        symbol:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.7
          name: tBgpPeerNgDescription

  - MIB: TIMETRA-BGP-MIB
    table:
      name: tBgpPeerNgOperTable
      OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8
    static_tags:
      - {tag: address_family, value: ipv4}
      - {tag: subsequent_address_family, value: unicast}
      - {tag: address_family_name, value: ipv4 unicast}
    symbols:
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.5
        name: bgpPeerPrefixesReceivedTotal
        metric_type: monotonic_count
        chart_meta:
          description: The total number of IPv4 prefixes received from this peer
          family: 'Network/Routing/BGP/Peer/Prefix/Received/Total'
          unit: "{prefix}"
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.6
        name: bgpPeerPrefixesAdvertisedTotal
