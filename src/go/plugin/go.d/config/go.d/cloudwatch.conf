## All available configuration options, their descriptions and default values:
## https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/collector/cloudwatch#readme
##
## Profile files:
##   stock: /usr/lib/netdata/conf.d/go.d/cloudwatch.profiles/default/
##   user:  /etc/netdata/go.d/cloudwatch.profiles/
## User profile files override stock files when the profile basename matches.
## The default profile catalog is loaded once per go.d process and cached after
## the first successful load. Changes under the default profile directories
## require a go.d process restart.
##
## Required IAM permissions:
##   cloudwatch:ListMetrics, cloudwatch:GetMetricData, sts:GetCallerIdentity
##   (plus sts:AssumeRole when auth.mode is assume_role)
##
## Authentication modes:
##   default     - AWS SDK default credential chain (env vars, shared config,
##                 instance profile / IRSA).
##   access_key  - static access_key_id + secret_access_key (+ optional session_token).
##   assume_role - assume one IAM role (role_arn + optional external_id).
##
## Namespace selection modes:
##   auto     - discover metrics for all default service profiles and emit charts
##              only for services that have live metrics (default).
##   exact    - collect only the explicitly listed namespaces.
##   combined - auto plus the deep-grain profiles (per-target-group, per-operation,
##              per-request-filter) that are disabled by default.

