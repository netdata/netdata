# netdata go.d.plugin configuration for Cato Networks
#
# This file is in YAML format.

jobs:
  - name: example
    account_id: "12345"
    api_key: "replace-with-cato-api-key"

    # Cato GraphQL endpoint. Production endpoints must use HTTPS.
    url: https://api.catonetworks.com/api/v1/graphql2

    # Collection interval. Cato API collection is intentionally not run faster
    # than once per minute.
    update_every: 60
    timeout: 30

    # Space-separated simple patterns. Match sites by site ID or site name,
    # interfaces by interface ID or interface name.
    site_selector: "*"
    interface_selector: "*"

    limits:
      # Set to 0 to disable a cap. Keep defaults bounded unless the account
      # scope is already narrowed with selectors.
      max_sites: 500
      max_interfaces_per_site: 32

    discovery:
      refresh_every: 300
      page_limit: 100

    metrics:
      enabled: auto
      time_frame: last.PT5M
      buckets: 5
      # auto leaves the Cato groupInterfaces argument unset.
      group_interfaces: auto
      max_sites_per_query: 50

    events:
      enabled: auto
      # Optional explicit marker path. Set this when multiple jobs intentionally
      # monitor the same account, endpoint, and vnode independently.
      # marker_file: /var/lib/netdata/cato_networks/example.events.marker
      max_pages_per_cycle: 10
      max_cardinality: 50

    bgp:
      enabled: auto
      refresh_every: 300
      max_sites_per_collection: 25
      # Match BGP peers by remote IP or remote ASN.
      peer_selector: "*"
      # Set to 0 to disable this cap.
      max_peers_per_site: 32

    topology:
      enabled: auto

    retry:
      attempts: 5
      wait_min: 5
      wait_max: 30
