## All available configuration options, their descriptions and default values:
## https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/collector/azure_monitor#readme
##
## Profile files:
##   stock: /usr/lib/netdata/conf.d/go.d/azure_monitor.profiles/default/
##   user:  /etc/netdata/go.d/azure_monitor.profiles/
## User profile files override stock files when the profile basename matches.
## The default profile catalog is loaded once per go.d process and cached after
## the first successful load. Changes under the default profile directories
## require a go.d process restart.
##
## Discovery modes:
##   filters - Netdata builds an Azure Resource Graph query from structured
##             filters and always projects tags.
##   query   - you provide Azure Resource Graph KQL. The result must project
##             id, name, type, resourceGroup, and location. Project tags too
##             when using virtual_nodes.by_resource_tag.
##
## Profile selection modes:
##   auto     - discovers resource types and enables matching profiles.
##   exact    - uses only explicitly listed profile entries.
##   combined - merges explicitly listed profile entries with auto-discovered
##              profiles.

