---
version: v1
display_name: AWS RDS
namespace: AWS/RDS
period: 300
instance:
  dimensions:
    - name: DBInstanceIdentifier
      label: db_instance_identifier
metrics:
  - id: cpu_utilization
    metric_name: CPUUtilization
    statistics: [average]
  - id: database_connections
    metric_name: DatabaseConnections
    statistics: [average]
  - id: freeable_memory
    metric_name: FreeableMemory
    statistics: [average]
  - id: free_storage_space
    metric_name: FreeStorageSpace
    statistics: [average]
  - id: read_throughput
    metric_name: ReadThroughput
    statistics: [average]
  - id: write_throughput
    metric_name: WriteThroughput
    statistics: [average]
  - id: read_iops
    metric_name: ReadIOPS
    statistics: [average]
  - id: write_iops
    metric_name: WriteIOPS
    statistics: [average]
  - id: read_latency
    metric_name: ReadLatency
    statistics: [average]
  - id: write_latency
    metric_name: WriteLatency
    statistics: [average]
  - id: replica_lag               # read replicas only, seconds
    metric_name: ReplicaLag
    statistics: [maximum]
  - id: maximum_used_transaction_ids  # PostgreSQL only
    metric_name: MaximumUsedTransactionIDs
    statistics: [average]
  - id: ebs_byte_balance          # RDS storage throughput credits, percent
    metric_name: EBSByteBalance%
    statistics: [average]
  - id: ebs_io_balance            # RDS storage I/O credits, percent
    metric_name: EBSIOBalance%
    statistics: [average]
  # ----------------------------------------------------------------------------------------
  # Optional metrics (disabled by default). To enable one, uncomment its block here AND the
  # matching chart in the charts: section below, then restart the go.d process. All are
  # published at the {DBInstanceIdentifier} grain, so no other change is needed.
  # ----------------------------------------------------------------------------------------
  # - id: disk_queue_depth
  #   metric_name: DiskQueueDepth
  #   statistics: [average]
  # - id: network_receive_throughput
  #   metric_name: NetworkReceiveThroughput
  #   statistics: [average]
  # - id: network_transmit_throughput
  #   metric_name: NetworkTransmitThroughput
  #   statistics: [average]
  # - id: swap_usage
  #   metric_name: SwapUsage
  #   statistics: [average]
  # - id: burst_balance             # gp2 storage burst credits, percent
  #   metric_name: BurstBalance
  #   statistics: [average]
  # - id: cpu_credit_usage          # burstable (db.t*) instances only
  #   metric_name: CPUCreditUsage
  #   statistics: [average]
  # - id: cpu_credit_balance        # burstable (db.t*) instances only
  #   metric_name: CPUCreditBalance
  #   statistics: [average]
  # Engine- and storage-specific metrics are also published at {DBInstanceIdentifier} and can be
  # added the same way: BinLogDiskUsage (MySQL/MariaDB); TempDb* and FailedSQLServerAgentJobsCount
  # (SQL Server); *ReplicationSlot*, TransactionLogs* (PostgreSQL); and the *LogVolume /
  # *LocalStorage families. See:
  # https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-metrics.html
template:
  family: RDS
  context_namespace: rds
  chart_defaults:
    instances:
      by_labels: [account_id, region, db_instance_identifier]
  charts:
    - id: aws_cloudwatch_rds_cpu
      context: cpu_utilization
      title: RDS CPU Utilization
      family: CPU
      units: percentage
      algorithm: absolute
      dimensions:
        - selector: cpu_utilization_average
          name: average
    - id: aws_cloudwatch_rds_connections
      context: database_connections
      title: RDS Database Connections
      family: Connections
      units: connections
      algorithm: absolute
      dimensions:
        - selector: database_connections_average
          name: connections
    - id: aws_cloudwatch_rds_memory
      context: freeable_memory
      title: RDS Freeable Memory
      family: Memory
      units: bytes
      algorithm: absolute
      dimensions:
        - selector: freeable_memory_average
          name: freeable
    - id: aws_cloudwatch_rds_storage
      context: free_storage_space
      title: RDS Free Storage Space
      family: Storage
      units: bytes
      algorithm: absolute
      dimensions:
        - selector: free_storage_space_average
          name: free
    - id: aws_cloudwatch_rds_throughput
      context: disk_throughput
      title: RDS Disk Throughput
      family: Throughput
      units: bytes/s
      algorithm: absolute
      dimensions:
        - selector: read_throughput_average
          name: read
        - selector: write_throughput_average
          name: write
    - id: aws_cloudwatch_rds_iops
      context: disk_iops
      title: RDS Disk IOPS
      family: Throughput
      units: ops/s
      algorithm: absolute
      dimensions:
        - selector: read_iops_average
          name: read
        - selector: write_iops_average
          name: write
    - id: aws_cloudwatch_rds_latency
      context: disk_latency
      title: RDS Disk Latency
      family: Latency
      units: seconds
      algorithm: absolute
      dimensions:
        - selector: read_latency_average
          name: read
        - selector: write_latency_average
          name: write
    - id: aws_cloudwatch_rds_replica_lag
      context: replica_lag
      title: RDS Replica Lag
      family: Replication
      units: seconds
      algorithm: absolute
      dimensions:
        - selector: replica_lag_maximum
          name: lag
    - id: aws_cloudwatch_rds_transaction_ids
      context: maximum_used_transaction_ids
      title: RDS Maximum Used Transaction IDs
      family: Transactions
      units: transactions
      algorithm: absolute
      dimensions:
        - selector: maximum_used_transaction_ids_average
          name: used
    - id: aws_cloudwatch_rds_ebs_balance
      context: ebs_balance
      title: RDS EBS Credit Balance
      family: Credits
      units: percentage
      algorithm: absolute
      dimensions:
        - selector: ebs_byte_balance_average
          name: byte
        - selector: ebs_io_balance_average
          name: io
    # ----------------------------------------------------------------------------------------
    # Charts for the optional metrics above. Uncomment a chart together with its metric.
    # ----------------------------------------------------------------------------------------
    # - id: aws_cloudwatch_rds_queue_depth
    #   context: disk_queue_depth
