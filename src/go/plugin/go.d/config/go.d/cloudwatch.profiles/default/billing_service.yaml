---
# ServiceName is an exact AWS/Billing dimension grain. It is intentionally a
# separate opt-in profile so operators choose its cardinality and query cost.
version: v1
display_name: AWS Billing Estimated Charges by Service
namespace: AWS/Billing
supported_regions: [us-east-1]
disabled: true
query:
  period: 10m
  lookback: 24h
instance:
  dimensions:
    - name: Currency
      constant: USD
    - name: ServiceName
      label: service_name
metrics:
  - id: estimated_charges
    metric_name: EstimatedCharges
    statistics: [maximum]
template:
  family: Billing
  context_namespace: billing_service
  chart_defaults:
    instances:
      by_labels: [account_id, region, service_name]
  charts:
    - id: aws_cloudwatch_billing_service_estimated_charges
      context: estimated_charges
      title: Latest AWS Estimated Charges by Service (Worldwide MTD)
      units: USD
      algorithm: absolute
      dimensions:
        - selector: estimated_charges_maximum
          name: estimated_charges
