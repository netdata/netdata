---
version: v1
display_name: AWS EC2
namespace: AWS/EC2
period: 300
instance:
  dimensions:
    - name: InstanceId
      label: instance_id
metrics:
  - id: cpu_utilization
    metric_name: CPUUtilization
    statistics: [average]
  - id: network_in
    metric_name: NetworkIn
    statistics: [sum]
    rate: true
  - id: network_out
    metric_name: NetworkOut
    statistics: [sum]
    rate: true
  - id: disk_read_ops
    metric_name: DiskReadOps
    statistics: [sum]
    rate: true
  - id: disk_write_ops
    metric_name: DiskWriteOps
    statistics: [sum]
    rate: true
  - id: status_check_failed
    metric_name: StatusCheckFailed
    statistics: [maximum]
  - id: status_check_failed_attached_ebs
    metric_name: StatusCheckFailed_AttachedEBS
    statistics: [maximum]
  # ----------------------------------------------------------------------------------------
  # Optional metrics (disabled by default). To enable one, uncomment its block here AND the
  # matching chart in the charts: section below, then restart the go.d process. All are
  # published at the {InstanceId} grain, so no other change is needed.
  # ----------------------------------------------------------------------------------------
  # - id: disk_read_bytes
  #   metric_name: DiskReadBytes
  #   statistics: [sum]
  #   rate: true
  # - id: disk_write_bytes
  #   metric_name: DiskWriteBytes
  #   statistics: [sum]
  #   rate: true
  # - id: network_packets_in
  #   metric_name: NetworkPacketsIn
  #   statistics: [sum]
  #   rate: true
  # - id: network_packets_out
  #   metric_name: NetworkPacketsOut
  #   statistics: [sum]
  #   rate: true
  # - id: status_check_failed_instance
  #   metric_name: StatusCheckFailed_Instance
  #   statistics: [maximum]
  # - id: status_check_failed_system
  #   metric_name: StatusCheckFailed_System
  #   statistics: [maximum]
  # - id: cpu_credit_usage           # burstable (T-family) instances only
  #   metric_name: CPUCreditUsage
  #   statistics: [average]
  # - id: cpu_credit_balance         # burstable (T-family) instances only
  #   metric_name: CPUCreditBalance
  #   statistics: [average]
  # - id: ebs_read_ops               # EBS-optimized (Nitro) instances only
  #   metric_name: EBSReadOps
  #   statistics: [sum]
  #   rate: true
  # - id: ebs_write_ops              # EBS-optimized (Nitro) instances only
  #   metric_name: EBSWriteOps
  #   statistics: [sum]
  #   rate: true
  # - id: ebs_read_bytes             # EBS-optimized (Nitro) instances only
  #   metric_name: EBSReadBytes
  #   statistics: [sum]
  #   rate: true
  # - id: ebs_write_bytes            # EBS-optimized (Nitro) instances only
  #   metric_name: EBSWriteBytes
  #   statistics: [sum]
  #   rate: true
  # Also published at {InstanceId}: EBSIOBalance% / EBSByteBalance% (burst balances),
  # GPUPowerUtilization (accelerated instances), MetadataNoToken*. Add them the same way. See:
  # https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/viewing_metrics_with_cloudwatch.html
template:
  family: EC2
  context_namespace: ec2
  chart_defaults:
    instances:
      by_labels: [account_id, region, instance_id]
  charts:
    - id: cw_ec2_cpu
      context: cpu_utilization
      title: EC2 CPU Utilization
      family: CPU
      units: percentage
      algorithm: absolute
      dimensions:
        - selector: cpu_utilization_average
          name: average
    - id: cw_ec2_network
      context: network_traffic
      title: EC2 Network Traffic
      family: Network
      units: bytes/s
      algorithm: absolute
      dimensions:
        - selector: network_in_sum
          name: in
        - selector: network_out_sum
          name: out
    - id: cw_ec2_disk_ops
      context: disk_ops
      title: EC2 Disk Operations
      family: Disk
      units: ops/s
      algorithm: absolute
      dimensions:
        - selector: disk_read_ops_sum
          name: read
        - selector: disk_write_ops_sum
          name: write
    - id: cw_ec2_status_check
      context: status_check_failed
      title: EC2 Status Check Failures
      family: Status
      units: status
      algorithm: absolute
      dimensions:
        - selector: status_check_failed_maximum
          name: failed
        - selector: status_check_failed_attached_ebs_maximum
          name: attached_ebs
    # ----------------------------------------------------------------------------------------
    # Charts for the optional metrics above. Uncomment a chart together with its metric.
    # ----------------------------------------------------------------------------------------
    # - id: cw_ec2_disk_bandwidth
