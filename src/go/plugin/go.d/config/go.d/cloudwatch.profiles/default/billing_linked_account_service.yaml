---
# This exact grain is the highest-cardinality Billing view: one series per
# observed linked-account/service pair.
version: v1
display_name: AWS Billing Estimated Charges by Linked Account and Service
namespace: AWS/Billing
supported_regions: [us-east-1]
disabled: true
query:
  period: 10m
  lookback: 24h
instance:
  dimensions:
    - name: Currency
      constant: USD
    - name: LinkedAccount
      label: linked_account_id
    - name: ServiceName
      label: service_name
metrics:
  - id: estimated_charges
    metric_name: EstimatedCharges
    statistics: [maximum]
template:
  family: Billing
  context_namespace: billing_linked_account_service
  chart_defaults:
    instances:
      by_labels: [account_id, region, linked_account_id, service_name]
  charts:
    - id: aws_cloudwatch_billing_linked_account_service_estimated_charges
      context: estimated_charges
      title: Latest AWS Estimated Charges by Account/Service (Worldwide MTD)
      units: USD
      algorithm: absolute
      dimensions:
        - selector: estimated_charges_maximum
          name: estimated_charges
