# netdata go.d.plugin configuration for Dell PowerStore
#
# This file is in YAML format. Generally the format is:
#
#  name: value
#
# There are 2 sections:
#  - GLOBAL
#  - JOBS
#
## GLOBAL section is commented out because the defaults are fine.
#
## Uncomment to override.
#update_every: 30
#autodetection_retry: 0
#priority: 70000
#
## JOBS section
#
# Every configuration file must contain a JOBS section.
# JOBS is a list of dicts, each dict has the following options:
#
#  name:                 STRING            # the JOB's name
#  url:                  STRING            # the PowerStore management URL
#  username:             STRING            # API username
#  password:             STRING            # API password
#  volume_selector:      STRING            # space-separated volume name patterns (* for all, !pattern to exclude)
#  tls_skip_verify:      BOOLEAN           # skip TLS verification (default: false)
#  timeout:              DURATION          # request timeout (default: 30s)
#
# Example:
#
#jobs:
#  - name: powerstore1
#    url: https://10.0.0.1
#    username: admin
#    password: password
#    tls_skip_verify: yes
#
#  - name: powerstore2
#    url: https://10.0.0.2
#    username: monitor
#    password: password
#    volume_selector: "prod-* !*-temp !*-test"
