## All available configuration options, their descriptions and default values:
## https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/collector/bgp#configuration

# WARNING:
# Configure the backend explicitly. FRR and BIRD do not share the same socket protocol or trust model.
# FRR VTY socket access is a privileged trust boundary, not a harmless read-only socket.
# The netdata user must be able to open /var/run/frr/bgpd.vty to execute FRR CLI commands.
# EVPN VNI charts use zebra.vty. If zebra_socket_path is omitted, Netdata derives it from socket_path.
# If zebra.vty is unavailable, Netdata still collects family, peer, and neighbor charts; only EVPN VNI queries fail.
# BIRD uses one direct control-socket query (`show protocols all`) in the normal loop.
# OpenBGPD uses a read-only HTTP JSON endpoint such as bgplgd or an equivalent state-server.
# GoBGP uses its gRPC API, usually on 127.0.0.1:50051. Leave TLS options unset unless the listener actually requires TLS.
# Optional OpenBGPD RIB summaries are disabled by default because full `/rib` responses can be expensive on large routers.
# Optional GoBGP validation summaries are disabled by default because `ListPath` can be much heavier than the normal `GetBgp` + `ListPeer` + `GetTable` path.
# Prefer controlled group-based socket access over broad filesystem permissions.
#
