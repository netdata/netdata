name: Azure App Service
resource_type: Microsoft.Web/sites
metrics:
  # HTTP Traffic
  - name: Requests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: HttpResponseTime
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: Http2xx
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http3xx
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http4xx
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http5xx
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  # Compute
  - name: CpuPercentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: CpuTime
    units: seconds
    aggregations: [total]
    time_grain: PT1M
  - name: AverageMemoryWorkingSet
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: MemoryWorkingSet
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: PrivateBytes
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  # Network
  - name: BytesReceived
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: BytesSent
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  # Health & Connections
  - name: HealthCheckStatus
    units: percentage
    aggregations: [average]
    time_grain: PT5M
  - name: AppConnections
    units: connections
    aggregations: [average]
    time_grain: PT1M
  # IO
  - name: IoReadBytesPerSecond
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: IoWriteBytesPerSecond
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: IoReadOperationsPerSecond
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  - name: IoWriteOperationsPerSecond
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  - name: IoOtherBytesPerSecond
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: IoOtherOperationsPerSecond
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  # Runtime
  - name: Threads
    units: threads
    aggregations: [average]
    time_grain: PT1M
  - name: Handles
    units: handles
    aggregations: [average]
    time_grain: PT1M
  - name: Gen0Collections
    units: collections/s
    aggregations: [total]
    time_grain: PT1M
  - name: Gen1Collections
    units: collections/s
    aggregations: [total]
    time_grain: PT1M
  - name: Gen2Collections
    units: collections/s
    aggregations: [total]
    time_grain: PT1M
  # HTTP Detail
  - name: Http101
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http401
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http403
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http404
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: Http406
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  # Queue & Scaling
  - name: RequestsInApplicationQueue
    units: requests
    aggregations: [average]
    time_grain: PT1M
  - name: InstanceCount
    units: instances
    aggregations: [average]
    time_grain: PT1M
  # .NET Runtime Detail
  - name: CurrentAssemblies
    units: assemblies
    aggregations: [average]
    time_grain: PT1M
  - name: TotalAppDomains
    units: domains
    aggregations: [average]
    time_grain: PT1M
  - name: TotalAppDomainsUnloaded
    units: domains
    aggregations: [average]
    time_grain: PT1M
  # Functions
  - name: FunctionExecutionCount
    units: executions/s
    aggregations: [total]
    time_grain: PT1M
  - name: FunctionExecutionUnits
    units: MB-milliseconds/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_app_service__requests
    title: Azure App Service Requests
    context: app_service.requests
    family: HTTP
    type: line
    priority: 1000
    units: requests/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Requests
        aggregation: total
        name: requests

  - id: am_azure_app_service__response_time
    title: Azure App Service Response Time
    context: app_service.response_time
    family: HTTP
    type: line
    priority: 1010
    units: seconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: HttpResponseTime
        aggregation: average
        name: average

  - id: am_azure_app_service__http_status
