name: Azure ExpressRoute Gateway
resource_type: Microsoft.Network/expressRouteGateways
metrics:
  # Traffic - Connection Throughput
  - name: ErGatewayConnectionBitsInPerSecond
    units: bits/s
    aggregations: [average]
    time_grain: PT1M
  - name: ErGatewayConnectionBitsOutPerSecond
    units: bits/s
    aggregations: [average]
    time_grain: PT1M
  # Performance - Gateway Throughput
  - name: ExpressRouteGatewayBitsPerSecond
    units: bits/s
    aggregations: [average, minimum, maximum]
    time_grain: PT5M
  # Performance - CPU
  - name: ExpressRouteGatewayCpuUtilization
    units: percentage
    aggregations: [average, minimum, maximum]
    time_grain: PT5M
  # Performance - Packets
  - name: ExpressRouteGatewayPacketsPerSecond
    units: packets/s
    aggregations: [average, minimum, maximum]
    time_grain: PT5M
  # Scalability - Active Flows
  - name: ExpressRouteGatewayActiveFlows
    units: flows
    aggregations: [average, minimum, maximum]
    time_grain: PT5M
  # Scalability - Routes Advertised
  - name: ExpressRouteGatewayCountOfRoutesAdvertisedToPeer
    units: routes
    aggregations: [maximum]
    time_grain: PT5M
  # Scalability - Routes Learned
  - name: ExpressRouteGatewayCountOfRoutesLearnedFromPeer
    units: routes
    aggregations: [maximum]
    time_grain: PT5M
  # Scalability - Route Changes
  - name: ExpressRouteGatewayFrequencyOfRoutesChanged
    units: changes/s
    aggregations: [total]
    time_grain: PT5M
  # Scalability - Max Flow Creation Rate
  - name: ExpressRouteGatewayMaxFlowsCreationRate
    units: flows/s
    aggregations: [maximum]
    time_grain: PT5M
  # Scalability - VMs in VNet
  - name: ExpressRouteGatewayNumberOfVmInVnet
    units: VMs
    aggregations: [maximum]
    time_grain: PT5M
charts:
  - id: am_azure_express_route_gateway__connection_throughput
    title: Azure ExpressRoute Gateway Connection Throughput
    context: express_route_gateway.connection_throughput
    family: Traffic
    type: line
    priority: 1000
    units: bits/s
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: ErGatewayConnectionBitsInPerSecond
        aggregation: average
        name: in
      - metric: ErGatewayConnectionBitsOutPerSecond
        aggregation: average
        name: out

  - id: am_azure_express_route_gateway__gateway_throughput
    title: Azure ExpressRoute Gateway Throughput
    context: express_route_gateway.gateway_throughput
    family: Performance
    type: line
    priority: 1010
    units: bits/s
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: ExpressRouteGatewayBitsPerSecond
        aggregation: average
        name: average

  - id: am_azure_express_route_gateway__cpu_utilization
    title: Azure ExpressRoute Gateway CPU Utilization
    context: express_route_gateway.cpu_utilization
    family: Performance
    type: line
    priority: 1020
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: ExpressRouteGatewayCpuUtilization
        aggregation: average
        name: average

  - id: am_azure_express_route_gateway__packets
    title: Azure ExpressRoute Gateway Packets
