name: Azure SQL Elastic Pool
resource_type: Microsoft.Sql/servers/elasticPools
metrics:
  # CPU Utilization
  - name: cpu_percent
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: cpu_used
    units: vCores
    aggregations: [average]
    time_grain: PT1M
  - name: cpu_limit
    units: vCores
    aggregations: [average]
    time_grain: PT1M
  # DTU Utilization
  - name: dtu_consumption_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: eDTU_used
    units: eDTU
    aggregations: [average]
    time_grain: PT1M
  - name: eDTU_limit
    units: eDTU
    aggregations: [average]
    time_grain: PT1M
  # Instance Utilization
  - name: sql_instance_cpu_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sql_instance_memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # I/O
  - name: physical_data_read_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: log_write_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Resource Limits
  - name: workers_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sessions_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sessions_count
    units: sessions
    aggregations: [average]
    time_grain: PT1M
  # Storage
  - name: allocated_data_storage
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: allocated_data_storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: storage_limit
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: xtp_storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Tempdb
  - name: tempdb_data_size
    units: KiB
    aggregations: [average]
    time_grain: PT1M
  - name: tempdb_log_size
    units: KiB
    aggregations: [average]
    time_grain: PT1M
  - name: tempdb_log_used_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Serverless
  - name: app_cpu_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: app_memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: app_cpu_billed
    units: vCore-seconds/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_sql_elastic_pool__cpu
    title: Azure SQL Elastic Pool CPU Utilization
    context: sql_elastic_pool.cpu
    family: Utilization
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: cpu_percent
        aggregation: average
        name: average
      - metric: cpu_percent
        aggregation: maximum
        name: maximum

  - id: am_azure_sql_elastic_pool__instance_cpu
    title: Azure SQL Elastic Pool Instance CPU Utilization
    context: sql_elastic_pool.instance_cpu
