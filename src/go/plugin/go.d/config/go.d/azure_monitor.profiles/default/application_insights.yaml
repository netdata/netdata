name: Azure Application Insights
resource_type: Microsoft.Insights/components
metrics:
  # Availability
  - name: availabilityResults/availabilityPercentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: availabilityResults/count
    units: tests/s
    aggregations: [count]
    time_grain: PT1M
  - name: availabilityResults/duration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  # Browser
  - name: browserTimings/networkDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: browserTimings/processingDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: browserTimings/receiveDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: browserTimings/sendDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: browserTimings/totalDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  # Server - Requests
  - name: requests/count
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  - name: requests/duration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: requests/failed
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  - name: requests/rate
    units: requests/s
    aggregations: [average]
    time_grain: PT1M
  # Server - Dependencies
  - name: dependencies/count
    units: calls/s
    aggregations: [count]
    time_grain: PT1M
  - name: dependencies/duration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: dependencies/failed
    units: calls/s
    aggregations: [count]
    time_grain: PT1M
  # Failures - Exceptions
  - name: exceptions/count
    units: exceptions/s
    aggregations: [count]
    time_grain: PT1M
  - name: exceptions/browser
    units: exceptions/s
    aggregations: [count]
    time_grain: PT1M
  - name: exceptions/server
    units: exceptions/s
    aggregations: [count]
    time_grain: PT1M
  # Performance Counters
  - name: performanceCounters/processCpuPercentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/processorCpuPercentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/memoryAvailableBytes
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/processPrivateBytes
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/processIOBytesPerSecond
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/exceptionsPerSecond
    units: exceptions/s
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/requestExecutionTime
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/requestsInQueue
    units: requests
    aggregations: [average]
    time_grain: PT1M
  - name: performanceCounters/requestsPerSecond
    units: requests/s
    aggregations: [average]
    time_grain: PT1M
  # Usage
  - name: pageViews/count
    units: views/s
    aggregations: [count]
    time_grain: PT1M
  - name: pageViews/duration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: traces/count
    units: traces/s
    aggregations: [count]
    time_grain: PT1M
charts:
  # ── Availability ──────────────────────────────────────────────────────────
  - id: am_azure_application_insights__availability_percentage
    title: Azure Application Insights Availability
    context: application_insights.availability_percentage
    family: Availability
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: availabilityResults/availabilityPercentage
        aggregation: average
        name: average

  - id: am_azure_application_insights__availability_tests
    title: Azure Application Insights Availability Tests
    context: application_insights.availability_tests
    family: Availability
    type: line
    priority: 1010
    units: tests/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: availabilityResults/count
        aggregation: count
        name: tests

  - id: am_azure_application_insights__availability_duration
    title: Azure Application Insights Availability Test Duration
    context: application_insights.availability_duration
    family: Availability
    type: line
    priority: 1020
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: availabilityResults/duration
        aggregation: average
        name: average

  # ── Requests ──────────────────────────────────────────────────────────────
  - id: am_azure_application_insights__server_requests
    title: Azure Application Insights Server Requests
    context: application_insights.server_requests
    family: Requests
    type: line
    priority: 1030
    units: requests/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: requests/count
        aggregation: count
        name: total
      - metric: requests/failed
        aggregation: count
        name: failed

  - id: am_azure_application_insights__server_request_rate
    title: Azure Application Insights Server Request Rate
    context: application_insights.server_request_rate
    family: Requests
    type: line
    priority: 1040
    units: requests/s
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: requests/rate
        aggregation: average
        name: average

  - id: am_azure_application_insights__server_response_time
    title: Azure Application Insights Server Response Time
    context: application_insights.server_response_time
    family: Requests
    type: line
    priority: 1050
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: requests/duration
        aggregation: average
        name: average

  # ── Dependencies ──────────────────────────────────────────────────────────
  - id: am_azure_application_insights__dependency_calls
    title: Azure Application Insights Dependency Calls
    context: application_insights.dependency_calls
    family: Dependencies
    type: line
    priority: 1060
    units: calls/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: dependencies/count
        aggregation: count
        name: total
      - metric: dependencies/failed
        aggregation: count
        name: failed

  - id: am_azure_application_insights__dependency_duration
    title: Azure Application Insights Dependency Duration
    context: application_insights.dependency_duration
    family: Dependencies
    type: line
    priority: 1070
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: dependencies/duration
        aggregation: average
        name: average

  # ── Exceptions ────────────────────────────────────────────────────────────
  - id: am_azure_application_insights__exceptions
    title: Azure Application Insights Exceptions
    context: application_insights.exceptions
    family: Exceptions
    type: line
    priority: 1080
    units: exceptions/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: exceptions/count
        aggregation: count
        name: total
      - metric: exceptions/browser
        aggregation: count
        name: browser
      - metric: exceptions/server
        aggregation: count
        name: server

  # ── Browser ───────────────────────────────────────────────────────────────
  - id: am_azure_application_insights__browser_page_load_time
    title: Azure Application Insights Browser Page Load Time
    context: application_insights.browser_page_load_time
    family: Browser
    type: line
