      - metric: browserTimings/sendDuration
        aggregation: average
        name: send
      - metric: browserTimings/receiveDuration
        aggregation: average
        name: receive
      - metric: browserTimings/processingDuration
        aggregation: average
        name: processing

  # ── Performance - CPU ─────────────────────────────────────────────────────
  - id: am_azure_application_insights__cpu_utilization
