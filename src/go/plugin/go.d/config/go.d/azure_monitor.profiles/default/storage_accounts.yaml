name: Azure Storage Account
resource_type: Microsoft.Storage/storageAccounts
metrics:
  - name: Availability
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: Transactions
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: Ingress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: Egress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: SuccessE2ELatency
    units: milliseconds
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: SuccessServerLatency
    units: milliseconds
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: UsedCapacity
    units: bytes
    aggregations: [average]
    time_grain: PT1H
charts:
  - id: am_azure_storage_accounts__availability
    title: Azure Storage Account Availability
    context: storage_accounts.availability
    family: Availability
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Availability
        aggregation: average
        name: average

  - id: am_azure_storage_accounts__transactions
    title: Azure Storage Account Transactions
    context: storage_accounts.transactions
    family: Throughput
    type: line
    priority: 1010
    units: transactions/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Transactions
        aggregation: total
        name: total

  - id: am_azure_storage_accounts__throughput
    title: Azure Storage Account Throughput
    context: storage_accounts.throughput
    family: Throughput
    type: line
    priority: 1020
    units: bytes/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Ingress
        aggregation: total
        name: ingress
      - metric: Egress
        aggregation: total
        name: egress

  - id: am_azure_storage_accounts__e2e_latency
    title: Azure Storage Account End-to-End Latency
    context: storage_accounts.e2e_latency
    family: Latency
    type: line
    priority: 1030
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: SuccessE2ELatency
        aggregation: average
        name: average
      - metric: SuccessE2ELatency
        aggregation: maximum
        name: maximum

  - id: am_azure_storage_accounts__server_latency
    title: Azure Storage Account Server Latency
    context: storage_accounts.server_latency
    family: Latency
    type: line
    priority: 1040
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: SuccessServerLatency
        aggregation: average
        name: average
      - metric: SuccessServerLatency
        aggregation: maximum
        name: maximum

  - id: am_azure_storage_accounts__used_capacity
    title: Azure Storage Account Used Capacity
    context: storage_accounts.used_capacity
    family: Capacity
    type: line
    priority: 1050
    units: bytes
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: UsedCapacity
        aggregation: average
        name: average
