charts:
  # Pipeline Runs
  - id: am_azure_data_factory__pipeline_runs
    title: Azure Data Factory Pipeline Runs
    context: data_factory.pipeline_runs
    family: Pipelines
    type: line
    priority: 1000
    units: runs/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: PipelineSucceededRuns
        aggregation: total
        name: succeeded
      - metric: PipelineFailedRuns
        aggregation: total
        name: failed
      - metric: PipelineCancelledRuns
