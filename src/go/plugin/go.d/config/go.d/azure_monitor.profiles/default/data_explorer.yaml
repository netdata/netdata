name: Azure Data Explorer Cluster
resource_type: Microsoft.Kusto/clusters
metrics:
  # Cluster Health
  - name: CPU
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: IngestionUtilization
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: CacheUtilizationFactor
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: KeepAlive
    units: count
    aggregations: [average]
    time_grain: PT1M
  - name: InstanceCount
    units: instances
    aggregations: [average, maximum, minimum]
    time_grain: PT1M
  - name: TotalNumberOfExtents
    units: extents
    aggregations: [average]
    time_grain: PT1M
  - name: TotalNumberOfThrottledCommands
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  - name: FollowerLatency
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  # Query Performance
  - name: QueryDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: QueryResult
    units: queries/s
    aggregations: [count]
    time_grain: PT1M
  - name: TotalNumberOfConcurrentQueries
    units: queries
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: TotalNumberOfThrottledQueries
    units: queries/s
    aggregations: [total]
    time_grain: PT1M
  - name: WeakConsistencyLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  # Ingestion Health and Performance
  - name: IngestionResult
    units: sources/s
    aggregations: [total]
    time_grain: PT1M
  - name: IngestionVolumeInMB
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: IngestionLatencyInSeconds
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: EventsProcessed
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  - name: EventsReceived
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  - name: EventsDropped
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  - name: BlobsProcessed
    units: blobs/s
    aggregations: [total]
    time_grain: PT1M
  - name: BlobsReceived
    units: blobs/s
    aggregations: [total]
    time_grain: PT1M
  - name: BlobsDropped
    units: blobs/s
    aggregations: [total]
    time_grain: PT1M
  - name: DiscoveryLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: StageLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: QueueLength
    units: messages
    aggregations: [average]
    time_grain: PT1M
  - name: QueueOldestMessage
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: ReceivedDataSizeBytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  # Batching
  - name: BatchesProcessed
    units: batches/s
    aggregations: [total]
    time_grain: PT1M
  - name: BatchBlobCount
    units: blobs
    aggregations: [average]
    time_grain: PT1M
  - name: BatchSize
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: BatchDuration
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  # Export Health and Performance
  - name: ExportUtilization
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: ContinuousExportNumOfRecordsExported
    units: records/s
    aggregations: [total]
    time_grain: PT1M
  - name: ContinuousExportResult
    units: results/s
    aggregations: [count]
    time_grain: PT1M
  - name: ContinuousExportPendingCount
    units: jobs
    aggregations: [maximum]
    time_grain: PT1M
  - name: ContinuousExportMaxLatenessMinutes
    units: minutes
    aggregations: [maximum]
    time_grain: PT1M
  # Streaming Ingest
  - name: StreamingIngestDataRate
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: StreamingIngestDuration
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: StreamingIngestResults
    units: results/s
    aggregations: [count]
    time_grain: PT1M
  - name: StreamingIngestUtilization
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Materialized View Health and Performance
  - name: MaterializedViewHealth
    units: status
    aggregations: [average]
    time_grain: PT1M
  - name: MaterializedViewAgeMinutes
    units: minutes
    aggregations: [average]
    time_grain: PT1M
  - name: MaterializedViewAgeSeconds
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: MaterializedViewRecordsInDelta
    units: records
    aggregations: [average]
    time_grain: PT1M
  - name: MaterializedViewExtentsRebuild
    units: extents
    aggregations: [average]
    time_grain: PT1M
  - name: MaterializedViewDataLoss
    units: status
    aggregations: [maximum]
    time_grain: PT1M
  - name: MaterializedViewResult
    units: status
    aggregations: [average]
    time_grain: PT1M
  # Partitioning
  - name: PartitioningPercentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: PartitioningPercentageHot
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: ProcessedPartitionedRecords
    units: records
    aggregations: [average]
    time_grain: PT1M
