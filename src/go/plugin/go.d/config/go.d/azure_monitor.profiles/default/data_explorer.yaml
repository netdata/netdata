    series:
      - aggregation: average
        kind: gauge
  - id: events_processed
    azure_name: EventsProcessed
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: events_received
    azure_name: EventsReceived
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: events_dropped
    azure_name: EventsDropped
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: blobs_processed
    azure_name: BlobsProcessed
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: blobs_received
    azure_name: BlobsReceived
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: blobs_dropped
    azure_name: BlobsDropped
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: discovery_latency
    azure_name: DiscoveryLatency
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: stage_latency
    azure_name: StageLatency
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: queue_length
    azure_name: QueueLength
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: queue_oldest_message
    azure_name: QueueOldestMessage
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: received_data_size_bytes
    azure_name: ReceivedDataSizeBytes
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: batches_processed
    azure_name: BatchesProcessed
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: batch_blob_count
    azure_name: BatchBlobCount
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: batch_size
    azure_name: BatchSize
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: batch_duration
    azure_name: BatchDuration
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: export_utilization
    azure_name: ExportUtilization
    time_grain: PT1M
    series:
      - aggregation: maximum
        kind: gauge
  - id: continuous_export_num_of_records_exported
    azure_name: ContinuousExportNumOfRecordsExported
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: continuous_export_result
    azure_name: ContinuousExportResult
    time_grain: PT1M
    series:
      - aggregation: count
        kind: counter
  - id: continuous_export_pending_count
    azure_name: ContinuousExportPendingCount
    time_grain: PT1M
    series:
      - aggregation: maximum
        kind: gauge
  - id: continuous_export_max_lateness_minutes
    azure_name: ContinuousExportMaxLatenessMinutes
    time_grain: PT1M
    series:
      - aggregation: maximum
        kind: gauge
  - id: streaming_ingest_data_rate
