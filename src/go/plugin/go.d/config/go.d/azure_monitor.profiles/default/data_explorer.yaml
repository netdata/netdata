    series:
      - aggregation: average
        kind: gauge
  - id: instance_count
    azure_name: InstanceCount
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
      - aggregation: maximum
        kind: gauge
      - aggregation: minimum
        kind: gauge
  - id: total_number_of_extents
    azure_name: TotalNumberOfExtents
