---
display_name: Azure Data Explorer Cluster
resource_type: Microsoft.Kusto/clusters
metrics:
  - id: cpu
    azure_name: CPU
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: ingestion_utilization
    azure_name: IngestionUtilization
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: cache_utilization_factor
    azure_name: CacheUtilizationFactor
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: keep_alive
