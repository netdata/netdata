name: Azure Cosmos DB Account
resource_type: Microsoft.DocumentDB/databaseAccounts
metrics:
  # Throughput
  - name: TotalRequests
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  - name: TotalRequestUnits
    units: RU/s
    aggregations: [total]
    time_grain: PT1M
  - name: NormalizedRUConsumption
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: MetadataRequests
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  # Latency
  - name: ServerSideLatencyDirect
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: ServerSideLatencyGateway
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: ReplicationLatency
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  # Capacity
  - name: DataUsage
    units: bytes
    aggregations: [maximum]
    time_grain: PT5M
  - name: IndexUsage
    units: bytes
    aggregations: [maximum]
    time_grain: PT5M
  - name: DocumentQuota
    units: bytes
    aggregations: [total]
    time_grain: PT5M
  - name: DocumentCount
    units: documents
    aggregations: [average]
    time_grain: PT5M
  - name: PhysicalPartitionSizeInfo
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: PhysicalPartitionCount
    units: partitions
    aggregations: [maximum]
    time_grain: PT5M
  - name: PhysicalPartitionThroughputInfo
    units: RU/s
    aggregations: [maximum]
    time_grain: PT5M
  # Provisioning
  - name: AutoscaledRU
    units: RU/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: ProvisionedThroughput
    units: RU/s
    aggregations: [maximum]
    time_grain: PT5M
  - name: AutoscaleMaxThroughput
    units: RU/s
    aggregations: [maximum]
    time_grain: PT5M
  # Availability
  - name: ServiceAvailability
    units: percentage
    aggregations: [average]
    time_grain: PT1H
  # API-specific requests
  - name: MongoRequests
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  - name: CassandraRequests
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  - name: GremlinRequests
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  # API-specific charges
  - name: MongoRequestCharge
    units: RU/s
    aggregations: [total]
    time_grain: PT1M
  - name: CassandraRequestCharges
    units: RU/s
    aggregations: [total]
    time_grain: PT1M
  - name: GremlinRequestCharges
    units: RU/s
    aggregations: [total]
    time_grain: PT1M
  # Dedicated Gateway
  - name: DedicatedGatewayCPUUsage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: DedicatedGatewayMemoryUsage
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: DedicatedGatewayRequests
    units: requests/s
    aggregations: [count]
    time_grain: PT1M
  # Integrated Cache
  - name: IntegratedCacheItemHitRate
    units: percentage
    aggregations: [average]
    time_grain: PT5M
  - name: IntegratedCacheQueryHitRate
    units: percentage
    aggregations: [average]
    time_grain: PT5M
  # Cassandra connections
  - name: CassandraConnectionClosures
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_cosmos_db__total_requests
    title: Azure Cosmos DB Total Requests
    context: cosmos_db.total_requests
    family: Throughput
    type: line
    priority: 1000
    units: requests/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: TotalRequests
        aggregation: count
        name: count

  - id: am_azure_cosmos_db__request_units
    title: Azure Cosmos DB Request Units Consumed
    context: cosmos_db.request_units
    family: Throughput
    type: line
    priority: 1010
    units: RU/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: TotalRequestUnits
        aggregation: total
        name: total

  - id: am_azure_cosmos_db__normalized_ru_consumption
    title: Azure Cosmos DB Normalized RU Consumption
