name: Azure Cosmos DB Account
resource_type: Microsoft.DocumentDB/databaseAccounts
metrics:
  - name: TotalRequests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: TotalRequestUnits
    units: RU/s
    aggregations: [total]
    time_grain: PT1M
  - name: NormalizedRUConsumption
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: ServerSideLatencyDirect
    units: milliseconds
    aggregations: [average]
    time_grain: PT5M
  - name: ServerSideLatencyGateway
    units: milliseconds
    aggregations: [average]
    time_grain: PT5M
  - name: ReplicationLatency
    units: milliseconds
    aggregations: [average]
    time_grain: PT5M
  - name: DataUsage
    units: bytes
    aggregations: [maximum]
    time_grain: PT1H
  - name: DocumentCount
    units: documents
    aggregations: [maximum]
    time_grain: PT1H
  - name: ProvisionedThroughput
    units: RU/s
    aggregations: [maximum]
    time_grain: PT1H
  - name: ServiceAvailability
    units: percentage
    aggregations: [average]
    time_grain: PT5M
  - name: MongoRequests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: CassandraRequests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_cosmos_db__totalrequests
    title: Azure Cosmos DB Account Total Requests
    context: cosmos_db.total_requests
    family: Throughput
    type: line
    priority: 1000
    units: requests/s
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: TotalRequests
        aggregation: total
        name: total

  - id: am_azure_cosmos_db__totalrequestunits
    title: Azure Cosmos DB Account Total Request Units
    context: cosmos_db.total_request_units
    family: Throughput
    type: line
