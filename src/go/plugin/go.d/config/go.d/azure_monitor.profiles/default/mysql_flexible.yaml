name: Azure MySQL Flexible Server
resource_type: Microsoft.DBforMySQL/flexibleServers
metrics:
  # Availability
  - name: HA_IO_status
    units: status
    aggregations: [maximum]
    time_grain: PT1M
  - name: HA_SQL_status
    units: status
    aggregations: [maximum]
    time_grain: PT1M
  - name: Replica_IO_Running
    units: status
    aggregations: [maximum]
    time_grain: PT1M
  - name: Replica_SQL_Running
    units: status
    aggregations: [maximum]
    time_grain: PT1M
  # Errors
  - name: aborted_connections
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  # Latency
  - name: HA_replication_lag
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: Innodb_row_lock_time
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: Innodb_row_lock_waits
    units: waits/s
    aggregations: [total]
    time_grain: PT1M
  - name: replication_lag
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: Uptime
    units: seconds
    aggregations: [maximum]
    time_grain: PT1M
  # Saturation - Utilization
  - name: cpu_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: io_consumption_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Saturation - CPU Credits
  - name: cpu_credits_consumed
    units: credits
    aggregations: [average]
    time_grain: PT15M
  - name: cpu_credits_remaining
    units: credits
    aggregations: [average]
    time_grain: PT15M
  # Saturation - Storage
  - name: storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: storage_limit
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: data_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: ibdata1_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: binlog_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: others_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: backup_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT15M
  - name: serverlog_storage_usage
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: serverlog_storage_limit
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: serverlog_storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Saturation - InnoDB Buffer Pool
  - name: Innodb_buffer_pool_pages_data
    units: pages
    aggregations: [maximum]
    time_grain: PT1M
  - name: Innodb_buffer_pool_pages_dirty
    units: pages
    aggregations: [maximum]
    time_grain: PT1M
  - name: Innodb_buffer_pool_pages_free
    units: pages
    aggregations: [maximum]
    time_grain: PT1M
  - name: Innodb_buffer_pool_read_requests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: Innodb_buffer_pool_reads
    units: reads/s
    aggregations: [total]
    time_grain: PT1M
  - name: Sort_merge_passes
    units: passes/s
    aggregations: [total]
    time_grain: PT1M
  - name: Threads_running
    units: threads
    aggregations: [maximum]
    time_grain: PT1M
  # Traffic - Connections
  - name: active_connections
    units: connections
    aggregations: [average]
    time_grain: PT1M
  - name: total_connections
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  - name: active_transactions
    units: transactions
    aggregations: [average]
    time_grain: PT1M
  # Traffic - Queries
  - name: Queries
    units: queries/s
    aggregations: [total]
    time_grain: PT1M
  - name: Slow_queries
    units: queries/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_select
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_insert
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_update
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_delete
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_create_table
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_alter_table
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_drop_table
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_create_db
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  - name: Com_drop_db
    units: statements/s
    aggregations: [total]
    time_grain: PT1M
  # Traffic - InnoDB Writes
  - name: Innodb_buffer_pool_pages_flushed
    units: pages
    aggregations: [average]
    time_grain: PT1M
  - name: Innodb_data_writes
    units: writes/s
    aggregations: [total]
    time_grain: PT1M
  # Traffic - Locks
  - name: lock_deadlocks
    units: deadlocks/s
    aggregations: [total]
    time_grain: PT1M
  - name: lock_timeouts
    units: timeouts/s
    aggregations: [total]
    time_grain: PT1M
  # Traffic - Network
  - name: network_bytes_ingress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: network_bytes_egress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  # Traffic - Storage IO
  - name: storage_io_count
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  # Traffic - History
  - name: trx_rseg_history_len
    units: entries
    aggregations: [maximum]
    time_grain: PT1M
