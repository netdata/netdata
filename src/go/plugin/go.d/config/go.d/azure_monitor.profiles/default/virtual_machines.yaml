name: Azure Virtual Machine
resource_type: Microsoft.Compute/virtualMachines
metrics:
  # CPU
  - name: Percentage CPU
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: CPU Credits Consumed
    units: credits
    aggregations: [average]
    time_grain: PT1M
  - name: CPU Credits Remaining
    units: credits
    aggregations: [average]
    time_grain: PT1M
  # Memory
  - name: Available Memory Bytes
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  # Availability
  - name: VmAvailabilityMetric
    units: state
    aggregations: [average]
    time_grain: PT1M
  # Network
  - name: Network In Total
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: Network Out Total
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: Inbound Flows
    units: flows
    aggregations: [average]
    time_grain: PT1M
  - name: Outbound Flows
    units: flows
    aggregations: [average]
    time_grain: PT1M
  # Aggregate Disk
  - name: Disk Read Bytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: Disk Write Bytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: Disk Read Operations/Sec
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: Disk Write Operations/Sec
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  # OS Disk
  - name: OS Disk Read Bytes/sec
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk Write Bytes/sec
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk Read Operations/Sec
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk Write Operations/Sec
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk Queue Depth
    units: operations
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk Latency
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk Bandwidth Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: OS Disk IOPS Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Data Disk
  - name: Data Disk Read Bytes/sec
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk Write Bytes/sec
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk Read Operations/Sec
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk Write Operations/Sec
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk Queue Depth
    units: operations
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk Latency
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk Bandwidth Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: Data Disk IOPS Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # VM-Level Throttling
  - name: VM Cached Bandwidth Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: VM Cached IOPS Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: VM Uncached Bandwidth Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: VM Uncached IOPS Consumed Percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
charts:
  - id: am_azure_virtual_machines__cpu
    title: Azure Virtual Machine CPU Utilization
    context: virtual_machines.cpu
    family: CPU
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Percentage CPU
        aggregation: average
        name: average

