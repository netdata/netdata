name: Azure Logic Apps Workflow
resource_type: Microsoft.Logic/workflows
metrics:
  - name: RunsStarted
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunsSucceeded
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunsFailed
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunLatency
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: RunSuccessLatency
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: RunFailurePercentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: ActionsStarted
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionsSucceeded
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionsFailed
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersStarted
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersFired
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersFailed
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TotalBillableExecutions
    units: executions/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunThrottledEvents
    units: events/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_logic_apps__runsstarted
    title: Azure Logic Apps Workflow Runs Started
    context: logic_apps.runs_started
    family: Runs
    type: line
    priority: 1000
    units: runs/s
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: RunsStarted
        aggregation: total
        name: total

