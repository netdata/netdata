name: Azure Logic Apps Workflow
resource_type: Microsoft.Logic/workflows
metrics:
  # Runs
  - name: RunsStarted
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunsCompleted
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunsSucceeded
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunsFailed
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunsCancelled
    units: runs/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: RunSuccessLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: RunFailurePercentage
    units: percentage
    aggregations: [total]
    time_grain: PT1M
  - name: RunThrottledEvents
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  - name: RunStartThrottledEvents
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  # Actions
  - name: ActionsStarted
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionsCompleted
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionsSucceeded
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionsFailed
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionsSkipped
    units: actions/s
    aggregations: [total]
    time_grain: PT1M
  - name: ActionLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: ActionSuccessLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: ActionThrottledEvents
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  # Triggers
  - name: TriggersStarted
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersCompleted
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersSucceeded
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersFired
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersFailed
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggersSkipped
    units: triggers/s
    aggregations: [total]
    time_grain: PT1M
  - name: TriggerLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: TriggerFireLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: TriggerSuccessLatency
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: TriggerThrottledEvents
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  # Billing
  - name: TotalBillableExecutions
    units: executions/s
    aggregations: [total]
    time_grain: PT1M
  - name: BillableActionExecutions
    units: executions/s
    aggregations: [total]
    time_grain: PT1M
  - name: BillableTriggerExecutions
    units: executions/s
    aggregations: [total]
    time_grain: PT1M
  - name: BillingUsageNativeOperation
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  - name: BillingUsageStandardConnector
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  - name: BillingUsageStorageConsumption
    units: operations/s
    aggregations: [total]
    time_grain: PT1M
  # Agent (AI-enabled Logic Apps)
  - name: AgentLoopExecution
    units: executions/s
    aggregations: [total]
    time_grain: PT1M
  - name: CompletionTokenOverflowUsage
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  - name: PromptTokenOverflowUsage
    units: events/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_logic_apps__run_lifecycle
    title: Azure Logic Apps Run Lifecycle
    context: logic_apps.run_lifecycle
    family: Runs
    type: line
    priority: 1000
    units: runs/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: RunsStarted
        aggregation: total
        name: started
      - metric: RunsCompleted
        aggregation: total
        name: completed
      - metric: RunsSucceeded
        aggregation: total
        name: succeeded
      - metric: RunsFailed
        aggregation: total
        name: failed
      - metric: RunsCancelled
        aggregation: total
        name: cancelled

