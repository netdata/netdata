  - id: am_azure_container_apps__resiliency_ejections
    title: Azure Container Apps Resiliency Host Ejections
    context: container_apps.resiliency_ejections
    family: Resiliency
    type: line
    priority: 1130
    units: ejections/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
