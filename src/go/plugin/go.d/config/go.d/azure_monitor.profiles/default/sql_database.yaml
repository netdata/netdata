    azure_name: cpu_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
      - aggregation: maximum
        kind: gauge
  - id: dtu_consumption_percent
    azure_name: dtu_consumption_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: sql_instance_cpu_percent
    azure_name: sql_instance_cpu_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: sql_instance_memory_percent
    azure_name: sql_instance_memory_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: physical_data_read_percent
    azure_name: physical_data_read_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: log_write_percent
    azure_name: log_write_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: workers_percent
    azure_name: workers_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: sessions_percent
    azure_name: sessions_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: sessions_count
    azure_name: sessions_count
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: availability
    azure_name: availability
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: connection_successful
    azure_name: connection_successful
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: connection_failed
    azure_name: connection_failed
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: connection_failed_user_error
    azure_name: connection_failed_user_error
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: blocked_by_firewall
    azure_name: blocked_by_firewall
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: deadlock
    azure_name: deadlock
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: storage
    azure_name: storage
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: allocated_data_storage
    azure_name: allocated_data_storage
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: storage_percent
    azure_name: storage_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: xtp_storage_percent
    azure_name: xtp_storage_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: tempdb_data_size
    azure_name: tempdb_data_size
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: tempdb_log_size
    azure_name: tempdb_log_size
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: tempdb_log_used_percent
    azure_name: tempdb_log_used_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: cpu_used
    azure_name: cpu_used
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: cpu_limit
    azure_name: cpu_limit
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: dtu_used
    azure_name: dtu_used
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: dtu_limit
    azure_name: dtu_limit
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: replication_lag_seconds
    azure_name: replication_lag_seconds
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: app_cpu_percent
    azure_name: app_cpu_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: app_memory_percent
    azure_name: app_memory_percent
    time_grain: PT1M
    series:
      - aggregation: average
        kind: gauge
  - id: app_cpu_billed
    azure_name: app_cpu_billed
