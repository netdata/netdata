    azure_name: free_amount_consumed
    time_grain: PT15M
    series:
      - aggregation: average
        kind: gauge
  - id: free_amount_remaining
    azure_name: free_amount_remaining
    time_grain: PT15M
    series:
      - aggregation: average
        kind: gauge
