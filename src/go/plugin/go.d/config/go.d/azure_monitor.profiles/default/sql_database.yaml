name: Azure SQL Database
resource_type: Microsoft.Sql/servers/databases
metrics:
  # Utilization
  - name: cpu_percent
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: dtu_consumption_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sql_instance_cpu_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sql_instance_memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # I/O
  - name: physical_data_read_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: log_write_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Resource Limits
  - name: workers_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sessions_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: sessions_count
    units: sessions
    aggregations: [average]
    time_grain: PT1M
  # Availability
  - name: availability
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Connections
  - name: connection_successful
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  - name: connection_failed
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  - name: connection_failed_user_error
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  - name: blocked_by_firewall
    units: events/s
    aggregations: [total]
    time_grain: PT1M
  # Locking
  - name: deadlock
    units: deadlocks/s
    aggregations: [total]
    time_grain: PT1M
  # Storage
  - name: storage
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: allocated_data_storage
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: xtp_storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Tempdb
  - name: tempdb_data_size
    units: KiB
    aggregations: [average]
    time_grain: PT1M
  - name: tempdb_log_size
    units: KiB
    aggregations: [average]
    time_grain: PT1M
  - name: tempdb_log_used_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Capacity
  - name: cpu_used
    units: vCores
    aggregations: [average]
    time_grain: PT1M
  - name: cpu_limit
    units: vCores
    aggregations: [average]
    time_grain: PT1M
  - name: dtu_used
    units: DTU
    aggregations: [average]
    time_grain: PT1M
  - name: dtu_limit
    units: DTU
    aggregations: [average]
    time_grain: PT1M
  # Replication
  - name: replication_lag_seconds
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  # Serverless
  - name: app_cpu_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: app_memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: app_cpu_billed
    units: vCore-seconds/s
    aggregations: [total]
    time_grain: PT1M
charts:
  - id: am_azure_sql_database__cpu
    title: Azure SQL Database CPU Utilization
    context: sql_database.cpu
    family: Utilization
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: cpu_percent
        aggregation: average
        name: average
      - metric: cpu_percent
        aggregation: maximum
        name: maximum

  - id: am_azure_sql_database__instance_cpu
    title: Azure SQL Database Instance CPU Utilization
