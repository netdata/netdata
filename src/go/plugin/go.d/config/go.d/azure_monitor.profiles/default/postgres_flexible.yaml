    aggregations: [total]
    time_grain: PT1M
  - name: network_bytes_ingress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: backup_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT30M
  - name: physical_replication_delay_in_seconds
    units: seconds
    aggregations: [average]
    time_grain: PT30M
charts:
  - id: am_azure_postgres_flexible__cpu_percent
    title: Azure PostgreSQL Flexible Server CPU Utilization
    context: postgres_flexible.cpu_percent
    family: Utilization
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: cpu_percent
        aggregation: average
        name: average

