    aggregations: [average]
    time_grain: PT1M
  - name: memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: iops
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: read_iops
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: write_iops
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: active_connections
    units: connections
    aggregations: [average]
    time_grain: PT1M
  - name: tps
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: deadlocks
    units: deadlocks/s
    aggregations: [total]
    time_grain: PT1M
  - name: xact_commit
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: xact_rollback
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: is_db_alive
    units: state
    aggregations: [average]
