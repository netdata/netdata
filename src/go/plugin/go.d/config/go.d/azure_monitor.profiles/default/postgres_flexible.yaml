name: Azure PostgreSQL Flexible Server
resource_type: Microsoft.DBforPostgreSQL/flexibleServers
metrics:
  # Utilization
  - name: cpu_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: memory_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Availability
  - name: is_db_alive
    units: state
    aggregations: [maximum]
    time_grain: PT1M
  # I/O
  - name: iops
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: read_iops
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: write_iops
    units: operations/s
    aggregations: [average]
    time_grain: PT1M
  - name: read_throughput
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: write_throughput
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: disk_bandwidth_consumed_percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: disk_iops_consumed_percentage
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: disk_queue_depth
    units: operations
    aggregations: [average]
    time_grain: PT1M
  # Buffer Cache
  - name: blks_hit
    units: blocks/s
    aggregations: [total]
    time_grain: PT1M
  - name: blks_read
    units: blocks/s
    aggregations: [total]
    time_grain: PT1M
  # Connections
  - name: active_connections
    units: connections
    aggregations: [average]
    time_grain: PT1M
  - name: connections_succeeded
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  - name: connections_failed
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  # Throughput
  - name: tps
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: xact_commit
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: xact_rollback
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  - name: deadlocks
    units: deadlocks/s
    aggregations: [total]
    time_grain: PT1M
  # Tuple Operations
  - name: tup_returned
    units: tuples/s
    aggregations: [total]
    time_grain: PT1M
  - name: tup_fetched
    units: tuples/s
    aggregations: [total]
    time_grain: PT1M
  - name: tup_inserted
    units: tuples/s
    aggregations: [total]
    time_grain: PT1M
  - name: tup_updated
    units: tuples/s
    aggregations: [total]
    time_grain: PT1M
  - name: tup_deleted
    units: tuples/s
    aggregations: [total]
    time_grain: PT1M
  # Temp
  - name: temp_files
    units: files/s
    aggregations: [total]
    time_grain: PT1M
  - name: temp_bytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  # Activity
  - name: longest_query_time_sec
    units: seconds
    aggregations: [maximum]
    time_grain: PT1M
  - name: longest_transaction_time_sec
    units: seconds
    aggregations: [maximum]
    time_grain: PT1M
  # Safety
  - name: maximum_used_transactionIDs
    units: transactions
    aggregations: [average]
    time_grain: PT1M
  - name: oldest_backend_xmin_age
    units: transactions
    aggregations: [maximum]
    time_grain: PT1M
  # Network
  - name: network_bytes_egress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: network_bytes_ingress
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  # Storage
  - name: storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: storage_free
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: storage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  - name: txlogs_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: database_size_bytes
    units: bytes
    aggregations: [average]
    time_grain: PT30M
  - name: backup_storage_used
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  # Activity (sessions)
  - name: oldest_backend_xmin
    units: transactions
    aggregations: [maximum]
    time_grain: PT1M
  - name: sessions_by_state
    units: sessions
    aggregations: [maximum]
    time_grain: PT1M
  - name: sessions_by_wait_event_type
    units: sessions
    aggregations: [maximum]
    time_grain: PT1M
  # Autovacuum
  - name: analyze_count_user_tables
    units: operations
    aggregations: [maximum]
    time_grain: PT30M
  - name: autoanalyze_count_user_tables
    units: operations
    aggregations: [maximum]
    time_grain: PT30M
  - name: autovacuum_count_user_tables
    units: operations
    aggregations: [maximum]
    time_grain: PT30M
  - name: bloat_percent
    units: percentage
    aggregations: [maximum]
    time_grain: PT30M
  - name: n_dead_tup_user_tables
    units: tuples
    aggregations: [maximum]
    time_grain: PT30M
  - name: n_live_tup_user_tables
    units: tuples
    aggregations: [maximum]
    time_grain: PT30M
  - name: n_mod_since_analyze_user_tables
    units: tuples
    aggregations: [maximum]
    time_grain: PT30M
  - name: tables_analyzed_user_tables
    units: tables
    aggregations: [maximum]
    time_grain: PT30M
  - name: tables_autoanalyzed_user_tables
    units: tables
    aggregations: [maximum]
    time_grain: PT30M
  - name: tables_autovacuumed_user_tables
    units: tables
    aggregations: [maximum]
    time_grain: PT30M
  - name: tables_counter_user_tables
    units: tables
    aggregations: [maximum]
    time_grain: PT30M
  - name: tables_vacuumed_user_tables
    units: tables
    aggregations: [maximum]
    time_grain: PT30M
  - name: vacuum_count_user_tables
    units: operations
    aggregations: [maximum]
    time_grain: PT30M
  # Database
  - name: numbackends
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  - name: xact_total
    units: transactions/s
    aggregations: [total]
    time_grain: PT1M
  # PgBouncer
  - name: client_connections_active
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  - name: client_connections_waiting
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  - name: num_pools
    units: pools
    aggregations: [maximum]
    time_grain: PT1M
  - name: server_connections_active
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  - name: server_connections_idle
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  - name: total_pooled_connections
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  # Saturation
  - name: cpu_credits_consumed
    units: credits
    aggregations: [average]
    time_grain: PT1M
  - name: cpu_credits_remaining
    units: credits
    aggregations: [average]
    time_grain: PT1M
  - name: postmaster_process_cpu_usage_percent
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # Traffic
  - name: max_connections
    units: connections
    aggregations: [maximum]
    time_grain: PT30M
  - name: tcp_connection_backlog
    units: connections
    aggregations: [maximum]
    time_grain: PT1M
  # Replication
  - name: physical_replication_delay_in_seconds
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: physical_replication_delay_in_bytes
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: logical_replication_delay_in_bytes
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
