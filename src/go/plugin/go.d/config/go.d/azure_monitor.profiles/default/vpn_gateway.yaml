          name: maximum
    - id: am_azure_vpn_gateway__scalable_er_routes_learned
      title: Azure VPN Gateway Scalable ExpressRoute Routes Learned
      context: scalable_er_routes_learned
      family: Scalable ExpressRoute
      type: line
