name: Azure VPN Gateway
resource_type: Microsoft.Network/virtualNetworkGateways
metrics:
  # Traffic - S2S Bandwidth
  - name: AverageBandwidth
    units: bytes/s
    aggregations: [average]
    time_grain: PT5M
  # Traffic - P2S Bandwidth
  - name: P2SBandwidth
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  # Traffic - P2S Connections
  - name: P2SConnectionCount
    units: connections
    aggregations: [total]
    time_grain: PT1M
  # Traffic - Gateway Flows
  - name: InboundFlowsCount
    units: flows
    aggregations: [maximum]
    time_grain: PT5M
  - name: OutboundFlowsCount
    units: flows
    aggregations: [maximum]
    time_grain: PT5M
  # Traffic - Tunnel Bandwidth
  - name: TunnelAverageBandwidth
    units: bytes/s
    aggregations: [average]
    time_grain: PT5M
  # Traffic - Tunnel Bytes
  - name: TunnelEgressBytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT5M
  - name: TunnelIngressBytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT5M
  # Traffic - Tunnel Packets
  - name: TunnelEgressPackets
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  - name: TunnelIngressPackets
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  # Traffic - Tunnel Peak PPS
  - name: TunnelPeakPackets
    units: packets/s
    aggregations: [maximum]
    time_grain: PT5M
  # Traffic - Tunnel Total Flows
  - name: TunnelTotalFlowCount
    units: flows/s
    aggregations: [total]
    time_grain: PT5M
  # Traffic - Tunnel NAT Allocations
  - name: TunnelNatAllocations
    units: allocations/s
    aggregations: [total]
    time_grain: PT5M
  # Traffic - Tunnel NATed Bytes
  - name: TunnelNatedBytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT5M
  - name: TunnelReverseNatedBytes
    units: bytes/s
    aggregations: [total]
    time_grain: PT5M
  # Traffic - Tunnel NATed Packets
  - name: TunnelNatedPackets
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  - name: TunnelReverseNatedPackets
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  # Traffic - Tunnel NAT Flows
  - name: TunnelNatFlowCount
    units: flows/s
    aggregations: [total]
    time_grain: PT5M
  # Errors - Tunnel Packet Drops
  - name: TunnelEgressPacketDropCount
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  - name: TunnelIngressPacketDropCount
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  # Errors - Tunnel TS Mismatch Drops
  - name: TunnelEgressPacketDropTSMismatch
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  - name: TunnelIngressPacketDropTSMismatch
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  # Errors - Tunnel NAT Packet Drops
  - name: TunnelNatPacketDrop
    units: packets/s
    aggregations: [total]
    time_grain: PT5M
  # IPsec - Security Associations
  - name: MmsaCount
    units: associations
    aggregations: [total]
    time_grain: PT5M
  - name: QmsaCount
    units: associations
    aggregations: [total]
    time_grain: PT5M
  # Routing - BGP
  - name: BgpPeerStatus
    units: status
    aggregations: [average]
    time_grain: PT5M
  - name: BgpRoutesAdvertised
    units: routes/s
    aggregations: [total]
    time_grain: PT5M
  - name: BgpRoutesLearned
    units: routes/s
    aggregations: [total]
    time_grain: PT5M
  # Routing - Route Counts
  - name: UserVpnRouteCount
    units: routes
    aggregations: [total]
    time_grain: PT5M
  - name: VnetAddressPrefixCount
    units: prefixes
    aggregations: [total]
    time_grain: PT5M
  # Performance - ExpressRoute Gateway
  - name: ExpressRouteGatewayBitsPerSecond
    units: bits/s
    aggregations: [average]
    time_grain: PT5M
  - name: ExpressRouteGatewayCpuUtilization
    units: percentage
    aggregations: [average]
    time_grain: PT5M
  - name: ExpressRouteGatewayPacketsPerSecond
    units: packets/s
    aggregations: [average]
    time_grain: PT5M
  # Scalability - ExpressRoute Gateway
  - name: ExpressRouteGatewayActiveFlows
    units: flows
    aggregations: [average]
    time_grain: PT5M
  - name: ExpressRouteGatewayCountOfRoutesAdvertisedToPeer
    units: routes
    aggregations: [maximum]
    time_grain: PT5M
  - name: ExpressRouteGatewayCountOfRoutesLearnedFromPeer
    units: routes
    aggregations: [maximum]
    time_grain: PT5M
  - name: ExpressRouteGatewayFrequencyOfRoutesChanged
    units: changes/s
    aggregations: [total]
    time_grain: PT5M
  - name: ExpressRouteGatewayMaxFlowsCreationRate
    units: flows/s
    aggregations: [maximum]
    time_grain: PT5M
  - name: ExpressRouteGatewayNumberOfVmInVnet
    units: VMs
    aggregations: [maximum]
    time_grain: PT5M
  # Performance - Scalable ExpressRoute Gateway
  - name: ScalableExpressRouteGatewayBitsPerSecond
    units: bits/s
    aggregations: [average]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayCpuUtilization
    units: percentage
    aggregations: [average]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayPacketsPerSecond
    units: packets/s
    aggregations: [average]
    time_grain: PT5M
  # Scalability - Scalable ExpressRoute Gateway
  - name: ScalableExpressRouteGatewayActiveFlows
    units: flows
    aggregations: [average]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayCountOfRoutesAdvertisedToPeer
    units: routes
    aggregations: [maximum]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayCountOfRoutesLearnedFromPeer
    units: routes
    aggregations: [maximum]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayFrequencyOfRoutesChanged
    units: changes/s
    aggregations: [total]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayMaxFlowsCreationRate
    units: flows/s
    aggregations: [maximum]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayNumberOfVmInVnet
    units: VMs
    aggregations: [maximum]
    time_grain: PT5M
  - name: ScalableExpressRouteGatewayScaleUnit
    units: units
    aggregations: [maximum]
    time_grain: PT5M
