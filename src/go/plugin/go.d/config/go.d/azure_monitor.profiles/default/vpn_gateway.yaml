    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: tunnel_nat_flow_count
    azure_name: TunnelNatFlowCount
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: tunnel_egress_packet_drop_count
    azure_name: TunnelEgressPacketDropCount
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: tunnel_ingress_packet_drop_count
    azure_name: TunnelIngressPacketDropCount
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: tunnel_egress_packet_drop_ts_mismatch
    azure_name: TunnelEgressPacketDropTSMismatch
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: tunnel_ingress_packet_drop_ts_mismatch
    azure_name: TunnelIngressPacketDropTSMismatch
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: tunnel_nat_packet_drop
    azure_name: TunnelNatPacketDrop
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: mmsa_count
    azure_name: MmsaCount
    time_grain: PT5M
    series:
      - aggregation: total
        kind: gauge
  - id: qmsa_count
    azure_name: QmsaCount
    time_grain: PT5M
    series:
      - aggregation: total
        kind: gauge
  - id: bgp_peer_status
    azure_name: BgpPeerStatus
    time_grain: PT5M
    series:
      - aggregation: average
        kind: gauge
  - id: bgp_routes_advertised
    azure_name: BgpRoutesAdvertised
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: bgp_routes_learned
    azure_name: BgpRoutesLearned
    time_grain: PT5M
    series:
      - aggregation: total
        kind: counter
  - id: user_vpn_route_count
    azure_name: UserVpnRouteCount
    time_grain: PT5M
