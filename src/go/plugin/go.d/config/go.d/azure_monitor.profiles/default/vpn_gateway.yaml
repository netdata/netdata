    time_grain: PT5M
    series:
      - aggregation: average
        kind: gauge
  - id: scalable_express_route_gateway_cpu_utilization
    azure_name: ScalableExpressRouteGatewayCpuUtilization
    time_grain: PT5M
    series:
      - aggregation: average
        kind: gauge
  - id: scalable_express_route_gateway_packets_per_second
