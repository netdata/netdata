        name: time_to_response
      - metric: AzureOpenAINormalizedTTFTInMS
        aggregation: average
        name: time_to_first_token
      - metric: AzureOpenAINormalizedTBTInMS
        aggregation: average
        name: time_between_tokens
      - metric: AzureOpenAITTLTInMS
        aggregation: average
        name: time_to_last_byte

  - id: am_azure_cognitive_services__openai_generation_speed
