        aggregation: total
        name: requests

  # =====================================================================
  # Azure OpenAI - Latency
  # =====================================================================

  - id: am_azure_cognitive_services__openai_latency
    title: Azure OpenAI Latency
    context: cognitive_services.openai_latency
    family: Azure OpenAI
    type: line
    priority: 1120
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
