charts:
  # =====================================================================
  # Cognitive Services - SLI & HTTP Requests
  # =====================================================================

  - id: am_azure_cognitive_services__availability
    title: Azure Cognitive Services Availability
    context: cognitive_services.availability
    family: Availability
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: SuccessRate
        aggregation: average
        name: availability

  - id: am_azure_cognitive_services__calls
    title: Azure Cognitive Services Calls
    context: cognitive_services.calls
    family: HTTP Requests
    type: line
    priority: 1010
    units: calls/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: TotalCalls
        aggregation: total
        name: total
      - metric: SuccessfulCalls
        aggregation: total
        name: successful
      - metric: BlockedCalls
        aggregation: total
        name: blocked
      - metric: TotalTokenCalls
        aggregation: total
        name: token

  - id: am_azure_cognitive_services__errors
    title: Azure Cognitive Services Errors
    context: cognitive_services.errors
    family: HTTP Requests
    type: line
    priority: 1020
    units: errors/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: TotalErrors
        aggregation: total
        name: total
      - metric: ClientErrors
        aggregation: total
        name: client
      - metric: ServerErrors
        aggregation: total
        name: server

  - id: am_azure_cognitive_services__latency
    title: Azure Cognitive Services Latency
    context: cognitive_services.latency
    family: Performance
    type: line
    priority: 1030
    units: milliseconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Latency
        aggregation: average
        name: average

  - id: am_azure_cognitive_services__data_transfer
    title: Azure Cognitive Services Data Transfer
    context: cognitive_services.data_transfer
    family: HTTP Requests
    type: line
    priority: 1040
    units: bytes/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: DataIn
        aggregation: total
        name: in
      - metric: DataOut
        aggregation: total
        name: out

  - id: am_azure_cognitive_services__rate_limit
    title: Azure Cognitive Services Rate Limit
    context: cognitive_services.rate_limit
    family: HTTP Requests
    type: line
    priority: 1050
    units: requests/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Ratelimit
        aggregation: total
        name: rate_limit

  # =====================================================================
  # Azure OpenAI - HTTP Requests
  # =====================================================================

  - id: am_azure_cognitive_services__openai_availability
    title: Azure OpenAI Availability
    context: cognitive_services.openai_availability
    family: Azure OpenAI
    type: line
    priority: 1100
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: AzureOpenAIAvailabilityRate
        aggregation: average
        name: availability

  - id: am_azure_cognitive_services__openai_requests
