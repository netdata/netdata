charts:
  # -------------------------------------------------------------------------
  # SLI / Workspace Health
  # -------------------------------------------------------------------------
  - id: am_azure_log_analytics__query_availability
    title: Azure Log Analytics Query Availability
    context: log_analytics.query_availability
    family: Availability
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: AvailabilityRate_Query
        aggregation: average
        name: availability

  - id: am_azure_log_analytics__ingestion_latency
    title: Azure Log Analytics Ingestion Latency
    context: log_analytics.ingestion_latency
    family: Ingestion
    type: line
    priority: 1010
    units: seconds
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Ingestion Time
        aggregation: average
        name: average
      - metric: Ingestion Time
        aggregation: maximum
        name: maximum
      - metric: Ingestion Time
        aggregation: minimum
        name: minimum

  - id: am_azure_log_analytics__ingestion_volume
    title: Azure Log Analytics Ingestion Volume
    context: log_analytics.ingestion_volume
    family: Ingestion
    type: line
    priority: 1020
    units: records/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Ingestion Volume
        aggregation: count
        name: records

  # -------------------------------------------------------------------------
  # User Queries
