name: Azure Log Analytics Workspace
resource_type: Microsoft.OperationalInsights/workspaces
metrics:
  # SLI - Availability
  - name: AvailabilityRate_Query
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # SLI - Ingestion
  - name: Ingestion Time
    units: seconds
    aggregations: [average, maximum, minimum]
    time_grain: PT1M
  - name: Ingestion Volume
    units: records/s
    aggregations: [count]
    time_grain: PT1M
  # User Queries
  - name: Query Count
    units: queries/s
    aggregations: [count]
    time_grain: PT1M
  - name: Query Failure Count
    units: queries/s
    aggregations: [count]
    time_grain: PT1M
  # DataExport
  - name: BytesExported
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: RecordsExported
    units: records/s
    aggregations: [total]
    time_grain: PT1M
  - name: ExportFailed
    units: exports/s
    aggregations: [total]
    time_grain: PT1M
  # Legacy Log-based - CPU
  - name: "Average_% Processor Time"
