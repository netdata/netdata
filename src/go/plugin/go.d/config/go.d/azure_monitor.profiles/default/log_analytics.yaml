    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Query Count
        aggregation: count
        name: total
      - metric: Query Failure Count
        aggregation: count
        name: failed

  # -------------------------------------------------------------------------
  # Data Export
  # -------------------------------------------------------------------------
  - id: am_azure_log_analytics__export_data
    title: Azure Log Analytics Exported Data
