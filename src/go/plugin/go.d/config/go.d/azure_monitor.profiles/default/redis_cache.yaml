name: Azure Cache for Redis
resource_type: Microsoft.Cache/redis
metrics:
  # Cache Effectiveness
  - name: cachehits
    units: hits/s
    aggregations: [total]
    time_grain: PT1M
  - name: cachemisses
    units: misses/s
    aggregations: [total]
    time_grain: PT1M
  # Throughput
  - name: cacheRead
    units: bytes/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: cacheWrite
    units: bytes/s
    aggregations: [maximum]
    time_grain: PT1M
  # Server
  - name: serverLoad
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: percentProcessorTime
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  # Memory
  - name: usedmemory
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: usedmemorypercentage
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: usedmemoryRss
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  # Clients
  - name: connectedclients
    units: clients
    aggregations: [maximum]
    time_grain: PT1M
  # Operations
  - name: operationsPerSecond
    units: operations/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: totalcommandsprocessed
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  - name: getcommands
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  - name: setcommands
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  # Latency
  - name: cacheLatency
    units: microseconds
    aggregations: [average]
    time_grain: PT1M
  # Keys
  - name: totalkeys
    units: keys
    aggregations: [maximum]
    time_grain: PT1M
  - name: evictedkeys
    units: keys/s
    aggregations: [total]
    time_grain: PT1M
  - name: expiredkeys
    units: keys/s
    aggregations: [total]
    time_grain: PT1M
  # Errors
  - name: errors
    units: errors
    aggregations: [maximum]
    time_grain: PT1M
  # Cache Miss Rate
  - name: cachemissrate
    units: percentage
    aggregations: [total]
    time_grain: PT1M
  # P99 Latency
  - name: LatencyP99
    units: microseconds
    aggregations: [average]
    time_grain: PT1M
  # Connection Rate
  - name: allConnectionsClosedPerSecond
    units: connections/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: allConnectionsCreatedPerSecond
    units: connections/s
    aggregations: [maximum]
    time_grain: PT1M
  # Security
  - name: ConnectedClientsUsingAADToken
    units: clients
    aggregations: [maximum]
    time_grain: PT1M
  # Instance-Based Cache (per-instance breakdowns)
  - name: allcachehits
    units: hits/s
    aggregations: [total]
    time_grain: PT1M
  - name: allcachemisses
    units: misses/s
    aggregations: [total]
    time_grain: PT1M
  - name: allcacheRead
    units: bytes/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: allcacheWrite
    units: bytes/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: allserverLoad
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: allpercentprocessortime
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: allusedmemory
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: allusedmemorypercentage
    units: percentage
    aggregations: [maximum]
    time_grain: PT1M
  - name: allusedmemoryRss
    units: bytes
    aggregations: [maximum]
    time_grain: PT1M
  - name: allconnectedclients
    units: clients
    aggregations: [maximum]
    time_grain: PT1M
  - name: alloperationsPerSecond
    units: operations/s
    aggregations: [maximum]
    time_grain: PT1M
  - name: alltotalcommandsprocessed
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  - name: allgetcommands
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  - name: allsetcommands
    units: commands/s
    aggregations: [total]
    time_grain: PT1M
  - name: alltotalkeys
    units: keys
    aggregations: [maximum]
    time_grain: PT1M
  - name: allevictedkeys
    units: keys/s
    aggregations: [total]
    time_grain: PT1M
  - name: allexpiredkeys
    units: keys/s
    aggregations: [total]
    time_grain: PT1M
  # Geo-Replication
  - name: GeoReplicationConnectivityLag
    units: seconds
    aggregations: [average]
    time_grain: PT1M
  - name: GeoReplicationDataSyncOffset
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: GeoReplicationFullSyncEventFinished
    units: events/s
    aggregations: [count]
    time_grain: PT1M
  - name: GeoReplicationFullSyncEventStarted
    units: events/s
    aggregations: [count]
    time_grain: PT1M
  - name: GeoReplicationHealthy
    units: status
    aggregations: [average]
    time_grain: PT1M
charts:
