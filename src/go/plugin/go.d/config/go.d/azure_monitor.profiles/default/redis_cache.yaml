  - id: allcachemisses
    azure_name: allcachemisses
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: allcache_read
    azure_name: allcacheRead
    time_grain: PT1M
    series:
      - aggregation: maximum
        kind: gauge
  - id: allcache_write
    azure_name: allcacheWrite
    time_grain: PT1M
    series:
      - aggregation: maximum
        kind: gauge
  - id: allserver_load
    azure_name: allserverLoad
    time_grain: PT1M
    series:
      - aggregation: maximum
        kind: gauge
  - id: allpercentprocessortime
    azure_name: allpercentprocessortime
    time_grain: PT1M
    series:
      - aggregation: maximum
