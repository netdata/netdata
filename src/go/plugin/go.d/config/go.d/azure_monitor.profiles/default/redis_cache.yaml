    azure_name: alltotalcommandsprocessed
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: allgetcommands
    azure_name: allgetcommands
    time_grain: PT1M
    series:
      - aggregation: total
        kind: counter
  - id: allsetcommands
    azure_name: allsetcommands
    time_grain: PT1M
    series:
