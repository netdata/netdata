name: Azure Application Gateway
resource_type: Microsoft.Network/applicationGateways
metrics:
  # Traffic
  - name: Throughput
    units: bytes/s
    aggregations: [average]
    time_grain: PT1M
  - name: BytesReceived
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  - name: BytesSent
    units: bytes/s
    aggregations: [total]
    time_grain: PT1M
  # Requests
  - name: TotalRequests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: FailedRequests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: ResponseStatus
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  - name: BackendResponseStatus
    units: responses/s
    aggregations: [total]
    time_grain: PT1M
  # Backend Health
  - name: HealthyHostCount
    units: hosts
    aggregations: [average]
    time_grain: PT1M
  - name: UnhealthyHostCount
    units: hosts
    aggregations: [average]
    time_grain: PT1M
  - name: AvgRequestCountPerHealthyHost
    units: requests
    aggregations: [average]
    time_grain: PT1M
  # Latency
  - name: ApplicationGatewayTotalTime
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: BackendConnectTime
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: BackendFirstByteResponseTime
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: BackendLastByteResponseTime
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  - name: ClientRtt
    units: milliseconds
    aggregations: [average]
    time_grain: PT1M
  # Connections
  - name: CurrentConnections
    units: connections
    aggregations: [total]
    time_grain: PT1M
  - name: NewConnectionsPerSecond
    units: connections/s
    aggregations: [average]
    time_grain: PT1M
  # Capacity
  - name: CapacityUnits
    units: units
    aggregations: [average]
    time_grain: PT1M
  - name: ComputeUnits
    units: units
    aggregations: [average]
    time_grain: PT1M
  - name: EstimatedBilledCapacityUnits
    units: units
    aggregations: [average]
    time_grain: PT1M
  - name: FixedBillableCapacityUnits
    units: units
    aggregations: [average]
    time_grain: PT1M
  - name: CpuUtilization
    units: percentage
    aggregations: [average]
    time_grain: PT1M
  # TLS
  - name: TlsProtocol
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  # WebSocket
  - name: WebSocketActiveConnections
    units: connections
    aggregations: [total]
    time_grain: PT1M
  - name: WebsocketSpecificCloseStatusCode
    units: connections/s
    aggregations: [total]
    time_grain: PT1M
  # WAF
  - name: AzwafTotalRequests
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: BlockedCount
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: MatchedCount
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzwafBotProtection
    units: matches/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzwafCustomRule
    units: matches/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzwafSecRule
    units: matches/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzWAFCaptchaChallengeRequestCount
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzWAFJSChallengeRequestCount
    units: requests/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzwafPenaltyBoxHits
    units: hits/s
    aggregations: [total]
    time_grain: PT1M
  - name: AzwafPenaltyBoxSize
    units: IPs
    aggregations: [average]
    time_grain: PT1M
charts:
  - id: am_azure_application_gateway__throughput
    title: Azure Application Gateway Throughput
    context: application_gateway.throughput
    family: Traffic
    type: line
    priority: 1000
    units: bytes/s
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: Throughput
        aggregation: average
        name: average

  - id: am_azure_application_gateway__traffic_volume
    title: Azure Application Gateway Traffic Volume
    context: application_gateway.traffic_volume
    family: Traffic
    type: line
    priority: 1005
    units: bytes/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: BytesReceived
        aggregation: total
        name: received
      - metric: BytesSent
        aggregation: total
        name: sent

  - id: am_azure_application_gateway__requests
    title: Azure Application Gateway Requests
    context: application_gateway.requests
    family: Traffic
    type: line
    priority: 1010
    units: requests/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: TotalRequests
        aggregation: total
        name: total
      - metric: FailedRequests
        aggregation: total
        name: failed

  - id: am_azure_application_gateway__response_status
    title: Azure Application Gateway Response Status
    context: application_gateway.response_status
    family: Traffic
    type: line
    priority: 1015
    units: responses/s
    algorithm: incremental
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
