      by_labels: [resource_uid]
    dimensions:
      - metric: ResponseStatus
        aggregation: total
        name: gateway
      - metric: BackendResponseStatus
        aggregation: total
        name: backend

  - id: am_azure_application_gateway__backend_health
    title: Azure Application Gateway Backend Health
    context: application_gateway.backend_health
    family: Backend
    type: line
    priority: 1020
    units: hosts
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: HealthyHostCount
