name: Azure Kubernetes Service Cluster
resource_type: Microsoft.ContainerService/managedClusters
metrics:
  # API Server
  - name: apiserver_cpu_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: apiserver_memory_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: apiserver_current_inflight_requests
    units: requests
    aggregations: [average]
    time_grain: PT1M
  # etcd
  - name: etcd_cpu_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: etcd_memory_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: etcd_database_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  # Pods
  - name: kube_pod_status_phase
    units: pods
    aggregations: [average]
    time_grain: PT1M
  - name: kube_pod_status_ready
    units: pods
    aggregations: [average]
    time_grain: PT1M
  # Capacity
  - name: kube_node_status_allocatable_cpu_cores
    units: cores
    aggregations: [average]
    time_grain: PT1M
  - name: kube_node_status_allocatable_memory_bytes
    units: bytes
    aggregations: [average]
    time_grain: PT1M
  - name: kube_node_status_condition
    units: nodes
    aggregations: [average]
    time_grain: PT1M
  # Autoscaler
  - name: cluster_autoscaler_cluster_safe_to_autoscale
    units: state
    aggregations: [average]
    time_grain: PT5M
  - name: cluster_autoscaler_unschedulable_pods_count
    units: pods
    aggregations: [average]
    time_grain: PT5M
  - name: cluster_autoscaler_unneeded_nodes_count
    units: nodes
    aggregations: [average]
    time_grain: PT5M
  - name: cluster_autoscaler_scale_down_in_cooldown
    units: state
    aggregations: [average]
    time_grain: PT5M
  # Nodes
  - name: node_cpu_usage_millicores
    units: millicores
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_cpu_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_memory_working_set_bytes
    units: bytes
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_memory_working_set_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_memory_rss_bytes
    units: bytes
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_memory_rss_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_disk_usage_bytes
    units: bytes
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_disk_usage_percentage
    units: percentage
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_network_in_bytes
    units: bytes
    aggregations: [average, maximum]
    time_grain: PT1M
  - name: node_network_out_bytes
    units: bytes
    aggregations: [average, maximum]
    time_grain: PT1M
charts:
  # API Server
  - id: am_azure_aks__apiserver_cpu
    title: AKS API Server CPU Utilization
    context: aks.apiserver_cpu
    family: API Server
    type: line
    priority: 1000
    units: percentage
    algorithm: absolute
    label_promotion: [resource_name, resource_group, region, resource_type, profile]
    instances:
      by_labels: [resource_uid]
    dimensions:
      - metric: apiserver_cpu_usage_percentage
        aggregation: average
        name: average
      - metric: apiserver_cpu_usage_percentage
        aggregation: maximum
        name: maximum

  - id: am_azure_aks__apiserver_memory
    title: AKS API Server Memory Utilization
