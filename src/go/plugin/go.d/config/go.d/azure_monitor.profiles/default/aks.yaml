    - id: am_azure_aks__node_disk_percentage
      title: AKS Node Disk Usage Percentage
      context: node_disk_percentage
      family: Nodes
      type: line
      units: percentage
      algorithm: absolute
      dimensions:
        - selector: aks.node_disk_usage_percentage_average
