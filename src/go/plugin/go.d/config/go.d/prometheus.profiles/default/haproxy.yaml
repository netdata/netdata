        - family: Sessions
          metrics:
            - haproxy_listener_current_sessions
            - haproxy_listener_sessions_total
          charts:
            - title: Listener Current Sessions
              context: listener_current_sessions
              units: sessions
              algorithm: absolute
              dimensions:
