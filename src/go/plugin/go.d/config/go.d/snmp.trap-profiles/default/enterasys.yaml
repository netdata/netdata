traps:
  - oid: 1.3.6.1.4.1.52.0.1
    name: ctdlswTConnUp
    category: state_change
    severity: info
    description: Transport connection enabled on {SNMP_DEVICE_HOSTNAME}
    mib: CABLETRON-TRAPS
  - oid: 1.3.6.1.4.1.52.0.1000
    name: snmpLostContact
    category: state_change
    severity: warning
    description: "Polling contact lost on {SNMP_DEVICE_HOSTNAME}\n  target device: {snmpPollDestination}\n  poll owner: {snmpPollOwner}"
    mib: CABLETRON-TRAPS
    varbinds:
    - snmpPollDestination
    - snmpPollOwner
  - oid: 1.3.6.1.4.1.52.0.1001
    name: snmpThresholdTrap
    category: diagnostic
    severity: warning
    description: "Threshold comparison failed during SNMP poll on {SNMP_DEVICE_HOSTNAME}\n  destination: {snmpOIDDestination}\n  owner: {snmpOIDOwner}\n  sequence: {snmpOIDSequence}\n  OID: {snmpOIDObject}"
    mib: CABLETRON-TRAPS
    varbinds:
    - snmpOIDDestination
    - snmpOIDOwner
    - snmpOIDSequence
    - snmpOIDObject
  - oid: 1.3.6.1.4.1.52.0.1002
    name: snmpReestabContact
    category: state_change
    severity: info
    description: "Contact reestablished on {SNMP_DEVICE_HOSTNAME}\n  destination host: {snmpPollDestination}\n  poll owner: {snmpPollOwner}"
    mib: CABLETRON-TRAPS
    varbinds:
    - snmpPollDestination
    - snmpPollOwner
  - oid: 1.3.6.1.4.1.52.0.1003
    name: ctBroadcastThresholdReached
    category: state_change
    severity: warning
    description: "Broadcast threshold reached on {SNMP_DEVICE_HOSTNAME}\n  slot: {ctBroadcastCtlSlotID}\n  interface: {ctBroadcastCtlInterface}\n  configured threshold (frames/sec): {ctBroadcastDesiredBroadcastThreshold}"
    mib: CABLETRON-TRAPS
    varbinds:
    - ctBroadcastDesiredBroadcastThreshold
    - ctBroadcastCtlSlotID
    - ctBroadcastCtlInterface
  - oid: 1.3.6.1.4.1.52.0.1004
    name: ctLecStatus
    category: state_change
    severity: notice
    description: "LAN Emulation Client operational state changed on {SNMP_DEVICE_HOSTNAME}\n  row status: {lecRowStatus}"
    mib: CABLETRON-TRAPS
    varbinds:
    - lecRowStatus
  - oid: 1.3.6.1.4.1.52.0.1024
    name: fddiPortConnectStateChange
    category: state_change
    severity: warning
    description: "FDDI port connection state changed on {SNMP_DEVICE_HOSTNAME}\n  SMT index: {fddimibSMTIndex}\n  PORT index: {fddimibPORTIndex}\n  new state: {fddimibPORTConnectState}"
    mib: CABLETRON-TRAPS
    varbinds:
    - fddimibSMTIndex
    - fddimibPORTIndex
    - fddimibPORTConnectState
  - oid: 1.3.6.1.4.1.52.0.1025
    name: fddiSMTMasterPortIncrease
    category: state_change
    severity: info
    description: "Number of SMT master ports increased on {SNMP_DEVICE_HOSTNAME}\n  SMT index: {fddimibSMTIndex}\n  Master port count: {fddimibSMTMasterCts}"
    mib: CABLETRON-TRAPS
    varbinds:
    - fddimibSMTIndex
    - fddimibSMTMasterCts
  - oid: 1.3.6.1.4.1.52.0.1026
    name: fddiSMTMasterPortDecrease
    category: state_change
    severity: warning
    description: "Number of SMT master ports decreased on {SNMP_DEVICE_HOSTNAME}\n  SMT index: {fddimibSMTIndex}\n  current master port count: {fddimibSMTMasterCts}"
    mib: CABLETRON-TRAPS
    varbinds:
    - fddimibSMTIndex
    - fddimibSMTMasterCts
  - oid: 1.3.6.1.4.1.52.0.1027
    name: fddiPortAction
    category: state_change
    severity: notice
    description: "FDDI port action executed on {SNMP_DEVICE_HOSTNAME}\n  SMT index: {fddimibSMTIndex}\n  PORT index: {fddimibPORTIndex}\n  action: {fddimibPORTAction}"
    mib: CABLETRON-TRAPS
    varbinds:
    - fddimibSMTIndex
    - fddimibPORTIndex
    - fddimibPORTAction
  - oid: 1.3.6.1.4.1.52.0.1028
    name: fddiPortLerAlarm
    category: diagnostic
    severity: warning
    description: "FDDI port LER (Link Error Rate) alarm on {SNMP_DEVICE_HOSTNAME}\n  SMT index: {fddimibSMTIndex}\n  PORT index: {fddimibPORTIndex}\n  current LER estimate: {fddimibPORTLerEstimate}\n  threshold exceeded"
    mib: CABLETRON-TRAPS
    varbinds:
    - fddimibSMTIndex
