traps:
  - oid: 1.3.6.1.4.1.4881.1.1.0.1
    name: RAISECOM-V1-TRAP::sysHardChangeDetected
    category: diagnostic
    severity: notice
    description: System hardware change detected on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.4881.1.1.0.2
    name: RAISECOM-V1-TRAP::portSecurityViolate
    category: security
    severity: warning
    description: Port security violation detected on interface {{first (value "ifIndex") "unknown"}} on {{hostname}}.
    status: current
    varbinds:
      - ifIndex
  - oid: 1.3.6.1.4.1.4881.1.1.0.3
    name: RAISECOM-V1-TRAP::stormViolationAlarm
    category: state_change
    severity: warning
    description: Storm violation detected on interface {{first (value "ifIndex") "link"}} on {{hostname}}.
    status: current
    varbinds:
      - ifIndex
      - stormViolationAlarmType
  - oid: 1.3.6.1.4.1.4881.1.1.0.4
    name: RAISECOM-V1-TRAP::macNotification
    category: state_change
    severity: notice
    description: MAC address change notification received on {{hostname}}.
    status: current
    varbinds:
      - ruijieMacNotiHisMacChangedMsg
  - oid: 1.3.6.1.4.1.4881.1.1.0.5
    name: RAISECOM-V1-TRAP::powerStateChange
    category: diagnostic
    severity: warning
    description: Power state changed on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.4881.1.1.0.6
    name: RAISECOM-V1-TRAP::fanStateChange
    category: diagnostic
    severity: warning
    description: Fan state changed on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.4881.1.1.0.7
    name: RAISECOM-V1-TRAP::pimNeighborLoss
    category: state_change
    severity: warning
    description: PIM neighbor adjacency lost on interface {{value "ifIndex"}} on {{hostname}}.
    status: current
    varbinds:
      - ifIndex
  - oid: 1.3.6.1.4.1.4881.1.1.0.8
    name: RAISECOM-V1-TRAP::igmpVersionConflicted
    category: state_change
    severity: warning
    description: IGMP version conflict detected between interface version {{value "ruijieIgmpInterfaceVersion"}} and host version {{value "ruijieIgmpInterfaceHostVersion"}} on {{hostname}}.
    status: current
    varbinds:
      - ruijieIgmpInterfaceIfIndex
      - ruijieIgmpInterfaceVersion
      - ruijieIgmpInterfaceHostVersion
  - oid: 1.3.6.1.4.1.4881.1.1.0.9
    name: RAISECOM-V1-TRAP::dvmrpRouteInformation
    category: diagnostic
    severity: warning
