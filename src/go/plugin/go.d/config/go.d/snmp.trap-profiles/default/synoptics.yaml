traps:
  - oid: 1.3.6.1.4.1.45.0.0
    name: SYNOPTICS-BASIC-ETHTOK-MIB::chassisPowerSupplyFailure
    category: diagnostic
    severity: crit
    description: Chassis power supply failure detected{{with value "s3ChassisPsStatus"}} status {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - s3ChassisPsStatus
  - oid: 1.3.6.1.4.1.45.0.1
    name: SYNOPTICS-BASIC-ETHTOK-MIB::chassisFanFailure
    category: diagnostic
    severity: crit
    description: Chassis fan failure detected on {{hostname}}.
    status: current
    varbinds:
      - s3ChassisFanStatus
  - oid: 1.3.6.1.4.1.45.0.4
    name: SYNOPTICS-BASIC-ETHTOK-MIB::portAutoPartition
    category: state_change
    severity: warning
    description: Port auto-partitioned due to jabbering{{with value "s3EnetPortJabberStatus"}} status {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - s3EnetPortPartStatus
      - s3EnetPortJabberStatus
  - oid: 1.3.6.1.4.1.45.0.5
    name: SYNOPTICS-BASIC-ETHTOK-MIB::portDTEJabbering
    category: diagnostic
    severity: warning
    description: Ethernet DTE jabbering detected on {{trap_interface}} on {{hostname}}.
    status: current
    varbinds:
      - s3EnetPortJabberStatus
  - oid: 1.3.6.1.4.1.45.0.8
    name: SYNOPTICS-BASIC-ETHTOK-MIB::localBridgeDiagnostic
    category: diagnostic
    severity: crit
    description: Bridge diagnostic failure detected with status {{value "s3EnetLocBridgeDiagSts"}} on {{hostname}}.
    status: current
    varbinds:
      - s3EnetLocBridgeDiagSts
  - oid: 1.3.6.1.4.1.45.0.9
    name: SYNOPTICS-BASIC-ETHTOK-MIB::remoteBridgePortOperationChanged
    category: state_change
    severity: notice
    description: Remote bridge port operation status changed to {{value "s3EnetRemBridgePortOpSts"}} on {{hostname}}.
    status: current
    varbinds:
      - s3EnetRemBridgePortOpSts
  - oid: 1.3.6.1.4.1.45.0.10
    name: SYNOPTICS-BASIC-ETHTOK-MIB::remoteBridgeDiagnostic
    category: diagnostic
    severity: warning
    description: Remote bridge diagnostic failure detected on {{hostname}}.
    status: current
    varbinds:
      - s3EnetRemBridgeDiagSts
  - oid: 1.3.6.1.4.1.45.0.11
    name: SYNOPTICS-BASIC-ETHTOK-MIB::boardLEDFailure
    category: diagnostic
    severity: warning
    description: Board LED failure detected with status {{value "s3CommonBoardStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - s3CommonBoardStatus
  - oid: 1.3.6.1.4.1.45.0.27
    name: SYNOPTICS-BASIC-ETHTOK-MIB::boardPowerSupplyFailure
