  - oid: 1.3.6.1.4.1.2272.1.206.1.0.1
    name: RAPID-CITY::rcVrrpTmpTrapNewMaster
    category: state_change
    severity: notice
    description: "VRRP state transition to Master on {SNMP_DEVICE_HOSTNAME}\n  new master IP: {rcVrrpTmpOperationsMasterIpAddr}\n  reason: {rcVrrpTmpNewMasterReason}"
    status: current
    varbinds:
    - rcVrrpTmpOperationsMasterIpAddr
    - rcVrrpTmpNewMasterReason
  - oid: 1.3.6.1.4.1.2272.1.206.1.0.3
    name: RAPID-CITY::rcVrrpTmpTrapProtoError
    category: state_change
    severity: err
    description: "VRRP protocol error detected on {SNMP_DEVICE_HOSTNAME}\n  error reason: {rcVrrpTmpTrapProtoErrReason}"
    status: current
    varbinds:
    - rcVrrpTmpTrapProtoErrReason
  - oid: 1.3.6.1.4.1.2272.1.206.2.2.1
    name: RAPID-CITY::rcVrrpExtTrapStateTransition
    category: state_change
    severity: notice
    description: "VRRP state transition on {SNMP_DEVICE_HOSTNAME}\n  interface: {ifIndex}\n  VRID: {rcVrrpExtOperationsVrId}\n  transition type: {rcVrrpExtTrapStateTransitionType}\n  cause: {rcVrrpExtTrapStateTransitionCause}\n  primary IP: {rcVrrpTmpOperationsPrimaryIpAddr}\n  master IP: {rcVrrpTmpOperationsMasterIpAddr}"
    status: current
    varbinds:
    - ifIndex
    - rcVrrpExtTrapStateTransitionType
    - rcVrrpExtTrapStateTransitionCause
    - rcVrrpExtOperationsVrId
    - rcVrrpTmpOperationsPrimaryIpAddr
    - rcVrrpTmpOperationsMasterIpAddr
