traps:
  - oid: 1.3.6.1.4.1.11.0.1
    name: HP-SN-TRAP-MIB::snTrapChasPwrSupply
    category: state_change
    severity: warning
    description: "Power supply status change on {SNMP_DEVICE_HOSTNAME}\n  combined status value: {snChasPwrSupplyStatus}\n  Bit 0: Power Supply 1 present (0=present, 1=not-present)\n  Bit 1: Power Supply 2 present (0=present, 1=not-present)\n  Bit 2: Power Supply 1 DC (0=bad, 1=good)\n  Bit 3: Power Supply 2 DC (0=bad, 1=good)"
    varbinds:
    - snChasPwrSupplyStatus
  - oid: 1.3.6.1.4.1.11.0.10
    name: HP-SN-ROUTER-TRAP-MIB::snOspfVirtIfAuthFailure
    category: auth
    severity: warning
    description: "OSPF virtual interface authentication failure on {SNMP_DEVICE_HOSTNAME}\n  Router ID: {snOspfRouterId}\n  Area ID: {snOspfVirtIfStatusAreaID}\n  Neighbor Router ID: {snOspfVirtIfStatusNeighbor}\n  Error Type: {snOspfConfigErrorType}\n  Packet Type: {snOspfPacketType}"
    varbinds:
    - snOspfRouterId
    - snOspfVirtIfStatusAreaID
    - snOspfVirtIfStatusNeighbor
    - snOspfConfigErrorType
    - snOspfPacketType
  - oid: 1.3.6.1.4.1.11.0.11
    name: HP-SN-ROUTER-TRAP-MIB::snOspfIfRxBadPacket
    category: state_change
    severity: err
    description: "OSPF bad packet received on {SNMP_DEVICE_HOSTNAME}\n  router ID: {snOspfRouterId}\n  interface IP: {snOspfIfStatusIpAddress}\n  packet source: {snOspfPacketSrc}\n  packet type: {snOspfPacketType}"
    varbinds:
    - snOspfRouterId
    - snOspfIfStatusIpAddress
    - snOspfPacketSrc
    - snOspfPacketType
  - oid: 1.3.6.1.4.1.11.0.12
    name: HP-SN-ROUTER-TRAP-MIB::snOspfVirtIfRxBadPacket
    category: state_change
    severity: warning
    description: "OSPF bad packet received on virtual interface on {SNMP_DEVICE_HOSTNAME}\n  router ID: {snOspfRouterId}\n  area ID: {snOspfVirtIfStatusAreaID}\n  neighbor router ID: {snOspfVirtIfStatusNeighbor}\n  packet type: {snOspfPacketType}"
    varbinds:
    - snOspfRouterId
    - snOspfVirtIfStatusAreaID
    - snOspfVirtIfStatusNeighbor
    - snOspfPacketType
  - oid: 1.3.6.1.4.1.11.0.13
    name: HP-SN-ROUTER-TRAP-MIB::snOspfTxRetransmit
    category: state_change
    severity: notice
    description: "OSPF packet retransmission on {SNMP_DEVICE_HOSTNAME}\n  router ID: {snOspfRouterId}\n  interface IP: {snOspfIfStatusIpAddress}\n  neighbor router ID: {snOspfNbrRtrId}\n  packet type: {snOspfPacketType}\n  LSDB type: {snOspfLsdbType}\n  LS ID: {snOspfLsdbLsId}\n  advertising router: {snOspfLsdbRouterId}"
    varbinds:
    - snOspfRouterId
    - snOspfIfStatusIpAddress
    - snOspfNbrRtrId
    - snOspfPacketType
    - snOspfLsdbType
    - snOspfLsdbLsId
    - snOspfLsdbRouterId
  - oid: 1.3.6.1.4.1.11.0.14
    name: HP-SN-ROUTER-TRAP-MIB::ospfVirtIfTxRetransmit
    category: state_change
    severity: warning
    description: "OSPF packet retransmit on virtual interface on {SNMP_DEVICE_HOSTNAME}\n  Router ID: {snOspfRouterId}\n  Area ID: {snOspfVirtIfStatusAreaID}\n  Virtual Neighbor: {snOspfVirtIfStatusNeighbor}\n  Packet type: {snOspfPacketType}\n  LSDB type: {snOspfLsdbType}\n  LS ID: {snOspfLsdbLsId}\n  Originating router: {snOspfLsdbRouterId}"
    varbinds:
    - snOspfRouterId
    - snOspfVirtIfStatusAreaID
    - snOspfVirtIfStatusNeighbor
    - snOspfPacketType
    - snOspfLsdbType
    - snOspfLsdbLsId
    - snOspfLsdbRouterId
  - oid: 1.3.6.1.4.1.11.0.15
    name: HP-SN-ROUTER-TRAP-MIB::snOspfOriginateLsa
    category: state_change
    severity: notice
    description: "OSPF topology change detected on {SNMP_DEVICE_HOSTNAME}\n  Router ID: {snOspfRouterId}\n  Area: {snOspfLsdbAreaId}\n  LSA Type: {snOspfLsdbType}\n  LSA ID: {snOspfLsdbLsId}\n  Originating Router: {snOspfLsdbRouterId}"
    varbinds:
    - snOspfRouterId
    - snOspfLsdbAreaId
    - snOspfLsdbType
    - snOspfLsdbLsId
    - snOspfLsdbRouterId
  - oid: 1.3.6.1.4.1.11.0.16
    name: HP-SN-ROUTER-TRAP-MIB::snOspfMaxAgeLsa
    category: state_change
    severity: notice
    description: "OSPF LSA reached MaxAge on {SNMP_DEVICE_HOSTNAME}\n  router ID: {snOspfRouterId}\n  area ID: {snOspfLsdbAreaId}\n  LSA type: {snOspfLsdbType}\n  link state ID: {snOspfLsdbLsId}\n  advertising router: {snOspfLsdbRouterId}"
    varbinds:
    - snOspfRouterId
    - snOspfLsdbAreaId
    - snOspfLsdbType
    - snOspfLsdbLsId
    - snOspfLsdbRouterId
  - oid: 1.3.6.1.4.1.11.0.17
    name: HP-SN-ROUTER-TRAP-MIB::snOspfLsdbOverflow
    category: state_change
    severity: err
    description: "OSPF link-state database overflow on {SNMP_DEVICE_HOSTNAME}\n  Router ID: {snOspfRouterId}\n  ExtLSDB Limit: {snOspfExtLsdbLimit}\n  The number of LSAs exceeds the configured limit."
    varbinds:
    - snOspfRouterId
    - snOspfExtLsdbLimit
  - oid: 1.3.6.1.4.1.11.0.18
    name: HP-SN-ROUTER-TRAP-MIB::snOspfLsdbApproachingOverflow
    category: diagnostic
    severity: warning
    description: "OSPF LSDB approaching overflow on {SNMP_DEVICE_HOSTNAME}\n  Router ID: {snOspfRouterId}\n  LSA limit: {snOspfExtLsdbLimit}\n  The number of LSAs has exceeded 90% of the configured limit."
    varbinds:
    - snOspfRouterId
    - snOspfExtLsdbLimit
  - oid: 1.3.6.1.4.1.11.0.19
    name: HP-SN-TRAP-MIB::snTrapL4MaxSessionLimitReached
    category: state_change
    severity: warning
    description: "Maximum L4 session limit reached on {SNMP_DEVICE_HOSTNAME}\n  limit: {snL4MaxSessionLimit}"
    varbinds:
    - snL4MaxSessionLimit
  - oid: 1.3.6.1.4.1.11.0.2
    name: HP-SN-TRAP-MIB::snTrapLockedAddressViolation
    category: security
    severity: warning
    description: "Locked address violation on {SNMP_DEVICE_HOSTNAME}\n  port: {snSwViolatorPortNumber}\n  violator MAC: {snSwViolatorMacAddress}\n  More source MAC addresses received than the configured maximum for this port."
    varbinds:
    - snSwViolatorPortNumber
    - snSwViolatorMacAddress
  - oid: 1.3.6.1.4.1.11.0.20
    name: HP-SN-TRAP-MIB::snTrapL4TcpSynLimitReached
    category: diagnostic
    severity: warning
    description: "TCP SYN limit reached on {SNMP_DEVICE_HOSTNAME}\n  current connections/sec: {snL4TcpSynLimit}\n  New connections may be dropped until the rate subsides."
    varbinds:
    - snL4TcpSynLimit
  - oid: 1.3.6.1.4.1.11.0.21
    name: HP-SN-TRAP-MIB::snTrapL4RealServerUp
    category: state_change
    severity: info
    description: Load balancing real server {snL4TrapRealServerName} ({snL4TrapRealServerIP}) is up on {SNMP_DEVICE_HOSTNAME}
    varbinds:
    - snL4TrapRealServerIP
    - snL4TrapRealServerName
  - oid: 1.3.6.1.4.1.11.0.22
    name: HP-SN-TRAP-MIB::snTrapL4RealServerDown
