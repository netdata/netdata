traps:
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.1
    name: IB-TRAP-MIB::ibEquipmentFailureTrap
    category: diagnostic
    severity: alert
    description: Equipment failure detected on {{value "ibObjectName"}} with cause {{value "ibProbableCause"}} on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibObjectName
      - ibProbableCause
      - ibTrapDesc
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.2
    name: IB-TRAP-MIB::ibProcessingFailureTrap
    category: diagnostic
    severity: err
    description: Software failure detected in {{value "ibSubsystemName"}} on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibSubsystemName
      - ibProbableCause
      - ibTrapDesc
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.3
    name: IB-TRAP-MIB::ibThresholdCrossingEvent
    category: state_change
    severity: warning
    description: Threshold crossing detected for {{value "ibObjectName"}} on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibObjectName
      - ibCurThresholdValue
      - ibThresholdHigh
      - ibThresholdLow
      - ibTrapDesc
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.4
    name: IB-TRAP-MIB::ibStateChangeEvent
    category: state_change
    severity: warning
    description: Object {{value "ibObjectName"}} state changed from {{value "ibPreviousState"}} to {{value "ibCurrentState"}} on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibObjectName
      - ibPreviousState
      - ibCurrentState
      - ibTrapDesc
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.5
    name: IB-TRAP-MIB::ibProcStartStopTrap
    category: diagnostic
    severity: notice
    description: Process {{value "ibSubsystemName"}} started or stopped on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibSubsystemName
      - ibTrapDesc
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.6
    name: IB-TRAP-MIB::ibRevokedLicenseTrap
    category: license
    severity: warning
    description: License revoked on {{value "ibSubsystemName"}} on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibSubsystemName
      - ibTrapDesc
  - oid: 1.3.6.1.4.1.7779.3.1.1.1.1.7
    name: IB-TRAP-MIB::ibOperationTrap
    category: diagnostic
    severity: warning
    description: Noteworthy software operation {{value "ibSubsystemName"}} on {{hostname}}.
    status: current
    varbinds:
      - ibNodeName
      - ibTrapSeverity
      - ibSubsystemName
      - ibProbableCause
      - ibTrapDesc
