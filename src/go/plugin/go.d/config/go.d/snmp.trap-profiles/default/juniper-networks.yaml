traps:
  - oid: 1.3.6.1.4.1.2636.0.1
    name: JUNIPER-V1-TRAPS-CHAS::jnxPowerSupplyFailureV1
    category: state_change
    severity: alert
    description: "Power supply failure detected on {SNMP_DEVICE_HOSTNAME}\n  The chassis has detected a bad DC output condition in one of the power supplies."
  - oid: 1.3.6.1.4.1.2636.0.2
    name: JUNIPER-V1-TRAPS-CHAS::jnxFanFailureV1
    category: diagnostic
    severity: alert
    description: "Cooling fan failure detected on {SNMP_DEVICE_HOSTNAME}\n  The specified cooling fan or impeller is not spinning."
  - oid: 1.3.6.1.4.1.2636.0.3
    name: JUNIPER-V1-TRAPS-CHAS::jnxOverTemperatureV1
    category: diagnostic
    severity: crit
    description: Over temperature condition detected on {SNMP_DEVICE_HOSTNAME}
  - oid: 1.3.6.1.4.1.2636.3.2.0.1
    name: MPLS-MIB::mplsLspInfoUp
    category: state_change
    severity: info
    description: "LSP {mplsLspInfoName} is up on {SNMP_DEVICE_HOSTNAME}\n  active path: {mplsPathInfoName}"
    status: current
    varbinds:
    - mplsLspInfoName
    - mplsPathInfoName
  - oid: 1.3.6.1.4.1.2636.3.2.0.2
    name: MPLS-MIB::mplsLspInfoDown
    category: state_change
    severity: warning
    description: "LSP {mplsLspInfoName} is down on {SNMP_DEVICE_HOSTNAME}\n  active path: {mplsPathInfoName}"
    status: current
    varbinds:
    - mplsLspInfoName
    - mplsPathInfoName
  - oid: 1.3.6.1.4.1.2636.3.2.0.3
    name: MPLS-MIB::mplsLspInfoChange
    category: state_change
    severity: notice
    description: LSP {mplsLspInfoName} switched traffic to new active path {mplsPathInfoName} on {SNMP_DEVICE_HOSTNAME}
    status: current
    varbinds:
    - mplsLspInfoName
    - mplsPathInfoName
  - oid: 1.3.6.1.4.1.2636.3.2.0.4
    name: MPLS-MIB::mplsLspInfoPathDown
