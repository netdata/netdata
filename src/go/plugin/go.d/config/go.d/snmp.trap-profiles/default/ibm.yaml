traps:
  - oid: 1.3.6.1.4.1.2.6.119.6.1.0.1
    name: IBMIROC-MIB::frrcvdFECN
    category: state_change
    severity: warning
    description: "Forward congestion detected on virtual circuit on {SNMP_DEVICE_HOSTNAME}\n  ifIndex: {frCircuitIfIndex}\n  DLCI: {frCircuitDlci}"
    varbinds:
    - frCircuitIfIndex
    - frCircuitDlci
  - oid: 1.3.6.1.4.1.2.6.119.6.1.0.2
    name: IBMIROC-MIB::frrcvdBECN
    category: state_change
    severity: err
    description: "Frame Relay backward explicit congestion notification (BECN) received on {SNMP_DEVICE_HOSTNAME}\n  ifIndex: {frCircuitIfIndex}\n  DLCI: {frCircuitDlci}"
    varbinds:
    - frCircuitIfIndex
    - frCircuitDlci
  - oid: 1.3.6.1.4.1.2.6.119.6.1.0.3
    name: IBMIROC-MIB::frrcvdCLLM
    category: diagnostic
    severity: info
    description: "Frame Relay CLLM message received on {SNMP_DEVICE_HOSTNAME}\n  interface ifIndex: {frCLLMCauseIfIndex}\n  cause code: {frCLLMCauseCode}\n  DLCI list: {frCLLMDlciList}"
    varbinds:
    - frCLLMCauseIfIndex
    - frCLLMCauseCode
    - frCLLMDlciList
