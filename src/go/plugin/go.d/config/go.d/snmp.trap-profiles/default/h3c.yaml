    name: hh3cStorCriticalLowerTemperatureThresholdNotification
    category: state_change
    severity: warning
    description: "Storage temperature below critical threshold on {SNMP_DEVICE_HOSTNAME}\n  component: {entPhysicalName}\n  current temperature: {hh3cEntityExtTemperature}\n  critical lower threshold: {hh3cEntityExtCriticalLowerTemperatureThreshold}\n  Physical index: {hh3cEntityExtPhysicalIndex}\n\nNote: Prolonged operation below this threshold may cause the entity to halt."
    mib: HH3C-STORAGE-MIB
    status: current
    varbinds:
    - hh3cEntityExtPhysicalIndex
    - entPhysicalName
    - hh3cEntityExtTemperature
    - hh3cEntityExtCriticalLowerTemperatureThreshold
