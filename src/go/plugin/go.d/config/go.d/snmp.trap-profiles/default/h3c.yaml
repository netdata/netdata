traps:
  - oid: 1.3.6.1.4.1.25506.2.1.1.3.1
    name: HH3C-FTM-MIB::hh3cFtmUnitIDChange
    category: state_change
    severity: notice
    description: Fabric unit {{value "hh3cFtmIndex"}} ID changed to {{value "hh3cFtmUnitID"}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cFtmIndex
      - hh3cFtmUnitID
  - oid: 1.3.6.1.4.1.25506.2.1.1.3.2
    name: HH3C-FTM-MIB::hh3cFtmUnitNameChange
    category: config_change
    severity: notice
    description: Fabric unit {{value "hh3cFtmIndex"}} name changed to {{value "hh3cFtmUnitName"}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cFtmIndex
      - hh3cFtmUnitName
  - oid: 1.3.6.1.4.1.25506.2.2.1.1.3.0.1
    name: HH3C-UI-MAN-MIB::hh3cLogIn
    category: auth
    severity: notice
    description: User {{value "hh3cTerminalUserName"}} logged in via {{value "hh3cTerminalSource"}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cTerminalUserName
      - hh3cTerminalSource
  - oid: 1.3.6.1.4.1.25506.2.2.1.1.3.0.2
    name: HH3C-UI-MAN-MIB::hh3cLogOut
    category: auth
    severity: notice
    description: User {{value "hh3cTerminalUserName"}} logged out via {{value "hh3cTerminalSource"}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cTerminalUserName
      - hh3cTerminalSource
  - oid: 1.3.6.1.4.1.25506.2.2.1.1.3.0.3
    name: HH3C-UI-MAN-MIB::hh3cLogInAuthenFailure
    category: auth
    severity: warning
    description: Authentication failure for user {{value "hh3cTerminalUserName"}} from {{value "hh3cTerminalSource"}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cTerminalUserName
      - hh3cTerminalSource
      - hh3cTerminalUserAuthFailureReason
  - oid: 1.3.6.1.4.1.25506.2.3.2.1
    name: HH3C-SYS-MAN-MIB::hh3cSysClockChangedNotification
    category: config_change
    severity: notice
    description: System clock changed to {{value "hh3cSysLocalClock"}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cSysLocalClock
  - oid: 1.3.6.1.4.1.25506.2.3.2.2
    name: HH3C-SYS-MAN-MIB::hh3cSysReloadNotification
    category: state_change
    severity: notice
    description: 'System reload notification received{{with value "hh3cSysReloadReason"}} reason: {{.}}{{end}} on {{hostname}}.'
    status: current
    varbinds:
      - hh3cSysReloadImage
      - hh3cSysReloadCfgFile
      - hh3cSysReloadReason
      - hh3cSysReloadScheduleTime
      - hh3cSysReloadAction
  - oid: 1.3.6.1.4.1.25506.2.3.2.3
    name: HH3C-SYS-MAN-MIB::hh3cSysStartUpNotification
    category: diagnostic
    severity: warning
    description: System startup failed main image, using {{value "hh3cSysImageType"}} image on {{hostname}}.
    status: current
    varbinds:
      - hh3cSysImageType
  - oid: 1.3.6.1.4.1.25506.2.4.2.1
    name: HH3C-CONFIG-MAN-MIB::hh3cCfgManEventlog
    category: config_change
    severity: notice
    description: Configuration checksum mismatch detected{{with value "hh3cCfgLogSrcCmd"}} via {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - hh3cCfgLogSrcCmd
      - hh3cCfgLogSrcData
      - hh3cCfgLogDesData
  - oid: 1.3.6.1.4.1.25506.2.4.2.2
    name: HH3C-CONFIG-MAN-MIB::hh3cCfgOperateCompletion
    category: config_change
    severity: notice
    description: Configuration operation completed successfully on {{hostname}}.
    status: current
    varbinds:
      - hh3cCfgOperateType
      - hh3cCfgOperateTime
