traps:
  - oid: 1.3.6.1.4.1.27338.40.5.3
    name: TITAN-MIB::alarm
    category: diagnostic
    severity: warning
    description: Alarm {alarmName} with level {alarmLevel} reported on {_HOSTNAME}.
    status: current
    varbinds:
      - alarmName
      - alarmLevel
      - alarmDescription
      - alarmType
      - alarmStatus
      - alarmUID
      - alarmIpAddress
      - alarmServiceName
      - alarmSystemTime
  - oid: 1.3.6.1.4.1.27338.50.2.1.2.1.1
    name: ATEME-TITAN-EDGE-MIB::titanEdgeApplianceMonitorLogSystemStartedNotification
    category: state_change
    severity: notice
    description: System started on {_HOSTNAME}.
    status: current
  - oid: 1.3.6.1.4.1.27338.50.2.1.2.1.2
    name: ATEME-TITAN-EDGE-MIB::titanEdgeApplianceMonitorLogSystemStoppedNotification
    category: state_change
    severity: alert
    description: System stopped on {_HOSTNAME}.
    status: current
  - oid: 1.3.6.1.4.1.27338.50.2.1.2.1.3
    name: ATEME-TITAN-EDGE-MIB::titanEdgeApplianceMonitorLogSystemEthernetIgmpVersionChangedNotification
    category: state_change
    severity: notice
    description: Ethernet IGMP version changed on {_HOSTNAME}.
    status: current
    varbinds:
      - titanEdgeApplianceMonitorLogSystemEthernetIgmpVersionChangedId
  - oid: 1.3.6.1.4.1.27338.50.2.1.2.1.11
