  - oid: 1.3.6.1.4.1.6486.801.1.1.1.1.3.0.1
    name: ALCATEL-IND1-MAC-SERVER-MIB::chassisTrapsMacOverlap
    category: security
    severity: warning
    description: MAC range overlap detected on physical index {physicalIndex} on {_HOSTNAME}.
    status: current
    varbinds:
      - physicalIndex
      - chasTrapMacRangeIndex
  - oid: 1.3.6.1.4.1.6486.801.1.1.1.1.3.0.2
    name: ALCATEL-IND1-MAC-SERVER-MIB::chassisTrapsPossibleDuplicateMac
    category: security
    severity: warning
    description: Possible duplicate MAC address {baseMacAddress} detected on chassis {physicalIndex} on {_HOSTNAME}.
    status: current
    varbinds:
      - physicalIndex
      - baseMacAddress
  - oid: 1.3.6.1.4.1.6486.801.1.1.1.1.3.0.3
    name: ALCATEL-IND1-MAC-SERVER-MIB::chassisTrapsDuplicateMacCleared
    category: state_change
    severity: notice
    description: Duplicate MAC cleared for {baseMacAddress} on {_HOSTNAME}.
    status: current
    varbinds:
      - physicalIndex
      - baseMacAddress
  - oid: 1.3.6.1.4.1.6486.801.1.1.1.2.1.4.0.1
    name: ALCATEL-IND1-SYSTEM-MIB::systemSwlogSizeTrap
    category: diagnostic
