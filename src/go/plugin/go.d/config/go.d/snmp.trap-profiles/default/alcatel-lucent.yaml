    name: ripngRouteMaxLimitReached
    category: diagnostic
    severity: warning
    description: RIPng routing database on {SNMP_DEVICE_HOSTNAME} has reached its maximum supported entry limit. RIPng will discard any new route updates.
    mib: ALCATEL-IND1-RIPNG-MIB
    status: current
