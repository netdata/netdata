  - oid: 1.3.6.1.4.1.6296.101.1.1.3.1
    name: SLE-SYSTEMMAINTENANCE-MIB::sleSystemSystemInfoProfileChanged
    category: config_change
    severity: notice
    description: "System configuration profile changed on {SNMP_DEVICE_HOSTNAME}\n  control request: {sleSystemControlRequest}\n  result: {sleSystemControlReqResult}\n  timestamp: {sleSystemControlTimeStamp}\n  hostname: {sleSystemHostName}"
    status: current
    varbinds:
    - sleSystemControlRequest
    - sleSystemControlTimeStamp
    - sleSystemControlReqResult
    - sleSystemHostName
  - oid: 1.3.6.1.4.1.6296.101.1.1.3.10
    name: SLE-SYSTEMMAINTENANCE-MIB::sleSystemOSProfileChanged
    category: config_change
    severity: notice
    description: "System OS profile changed on {SNMP_DEVICE_HOSTNAME}\n  control request: {sleSystemControlRequest}\n  timestamp: {sleSystemControlTimeStamp}\n  result: {sleSystemControlReqResult}\n  OS upgrade number: {sleSystemControlOSUpgradeNumber}"
    status: current
    varbinds:
    - sleSystemControlRequest
    - sleSystemControlTimeStamp
    - sleSystemControlReqResult
    - sleSystemControlOSUpgradeNumber
  - oid: 1.3.6.1.4.1.6296.101.1.1.3.11
    name: SLE-SYSTEMMAINTENANCE-MIB::sleSystemBackupChanged
    category: diagnostic
    severity: notice
    description: "System backup/maintenance operation executed on {SNMP_DEVICE_HOSTNAME}\n  request type: {sleSystemControlRequest}\n  timestamp: {sleSystemControlTimeStamp}\n  result: {sleSystemControlReqResult}\n  backup flag: {sleSystemControlBackupFlag}"
    status: current
    varbinds:
    - sleSystemControlRequest
    - sleSystemControlTimeStamp
    - sleSystemControlReqResult
    - sleSystemControlBackupFlag
