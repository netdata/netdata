    name: SLE-SYSTEMMAINTENANCE-MIB::sleSystemBackupIntervalChanged
    category: config_change
    severity: notice
    description: "System backup interval changed on {SNMP_DEVICE_HOSTNAME}\n  request type: {sleSystemControlRequest}\n  result: {sleSystemControlReqResult}\n  timestamp: {sleSystemControlTimeStamp}\n  new backup interval: {sleSystemBackupInterval}"
    status: current
    varbinds:
    - sleSystemControlRequest
    - sleSystemControlReqResult
