traps:
  - oid: 1.3.6.1.4.1.43.0.1
    name: LBHUB-BOOM-MIB::deprRptrHealth
    category: state_change
    severity: warning
    description: Repeater operational status changed to {{value "deprRptrOperStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - deprRptrOperStatus
  - oid: 1.3.6.1.4.1.43.0.2
    name: LBHUB-BOOM-MIB::deprRptrGroupChange
    category: state_change
    severity: notice
    description: Repeater group {{value "deprRptrGroupIndex"}} changed on {{hostname}}.
    status: current
    varbinds:
      - deprRptrGroupIndex
  - oid: 1.3.6.1.4.1.43.0.3
    name: LBHUB-BOOM-MIB::deprRptrResetEvent
    category: state_change
    severity: notice
    description: Repeater reset completed with status {{value "deprRptrOperStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - deprRptrOperStatus
  - oid: 1.3.6.1.4.1.43.0.13
    name: LBHUB-BOOM-MIB::heartbeatEvent
    category: diagnostic
    severity: info
    description: Heartbeat received confirming device is operational on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.43.0.14
    name: LBHUB-BOOM-MIB::localManagementUpdate
    category: config_change
    severity: notice
    description: Local management configuration updated on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.43.0.15
    name: LBHUB-BOOM-MIB::securityViolation
    category: auth
    severity: warning
    description: SNMP authentication failure for user {{value "ascUserNameForLastAttemptedLogin"}} on {{hostname}}.
    status: current
    varbinds:
      - ascUserNameForLastAttemptedLogin
      - ascLoginStatus
  - oid: 1.3.6.1.4.1.43.0.16
    name: LBHUB-BOOM-MIB::gaugesThresholdTrap
    category: diagnostic
    severity: warning
    description: Gauge threshold crossed for {{value "gaugeItemId"}} at level {{value "gaugeThresholdLevel"}} on {{hostname}}.
    status: current
    varbinds:
      - gaugeItemId
      - gaugeThresholdLevel
      - gaugeSamplePeriod
      - gaugeSamplesPerAverage
  - oid: 1.3.6.1.4.1.43.0.17
    name: LBHUB-BOOM-MIB::gaugesRecoveryTrap
    category: state_change
    severity: notice
    description: Gauge alarm recovered for {{value "gaugeItemId"}} on {{hostname}}.
    status: current
    varbinds:
      - gaugeItemId
      - gaugeRecoveryLevel
      - gaugeSamplePeriod
      - gaugeSamplesPerAverage
  - oid: 1.3.6.1.4.1.43.0.18
    name: LBHUB-BOOM-MIB::slFailed
    category: diagnostic
    severity: err
    description: System load failed with status {{value "slLoadStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - slLoadStatus
  - oid: 1.3.6.1.4.1.43.0.19
    name: LBHUB-BOOM-MIB::estStateChange
    category: state_change
    severity: notice
    description: End-station table state changed to modified on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.43.0.20
    name: LBHUB-BOOM-MIB::estTableFull
    category: diagnostic
    severity: warning
    description: End-station table is full on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.43.0.24
    name: LBHUB-BOOM-MIB::deprRpMauJabberTrap
    category: diagnostic
    severity: warning
    description: MAU entered jabber state on {{hostname}}.
    status: current
    varbinds:
      - deprRptrOperStatus
  - oid: 1.3.6.1.4.1.43.0.25
    name: LBHUB-BOOM-MIB::vmMauMediaAvailable
    category: state_change
    severity: notice
    description: MAU media available state changed to {{value "rpMauMediaAvailable"}} on {{hostname}}.
    status: current
    varbinds:
      - rpMauMediaAvailable
  - oid: 1.3.6.1.4.1.43.0.26
    name: LBHUB-BOOM-MIB::vmAutoPartitionState
    category: state_change
    severity: warning
    description: Port auto-partition state changed to {{value "rptrPortAutoPartitionState"}} on {{hostname}}.
    status: current
    varbinds:
      - rptrPortAutoPartitionState
  - oid: 1.3.6.1.4.1.43.0.27
    name: LBHUB-MSH-MIB::phyEntityInserted
    category: state_change
    severity: notice
    description: New physical entity {{value "phyEntityName"}} detected on {{hostname}}.
    status: current
    varbinds:
      - phyServiceType
      - phyEntityType
      - phyServiceId
      - phyNumberOfPorts
      - phyEntityName
  - oid: 1.3.6.1.4.1.43.0.28
    name: LBHUB-MSH-MIB::phyEntityRemoved
    category: diagnostic
    severity: warning
    description: Physical entity {{value "phyEntityName"}} removed on {{hostname}}.
    status: current
    varbinds:
      - phyServiceId
      - phyEntityName
  - oid: 1.3.6.1.4.1.43.0.29
    name: LBHUB-MSH-MIB::phyFacilityChanged
