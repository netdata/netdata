vendor: ixsystems
mib_count: 1
trap_count: 2
varbinds:
  alertId:
    oid: 1.3.6.1.4.1.50536.2.2.1
    type: DisplayString
    constraints: SIZE(0..255)
  alertLevel:
    oid: 1.3.6.1.4.1.50536.2.2.2
