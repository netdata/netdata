      - nmsERPSRingNodeID
      - nmsERPSRingRole
  - oid: 1.3.6.1.4.1.3320.2.231.8.2
    name: NMS-ERPS-MIB::nmsERPSRingStateChange
    category: state_change
    severity: warning
    description: ERPS ring {{value "nmsERPSRingID"}} state changed to {{value "nmsERPSRingState"}} on {{hostname}}.
    status: current
    varbinds:
      - nmsERPSRingID
      - nmsERPSRingNodeID
      - nmsERPSRingRole
      - nmsERPSRingState
  - oid: 1.3.6.1.4.1.3320.2.234.7.1
