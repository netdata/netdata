traps:
  - oid: 1.3.6.1.4.1.3320.0.0
    name: BDCOMTRAP-MIB::adslConnection
    category: state_change
    severity: notice
    description: ADSL line connection established for {{value "adslLineUser"}} on {{hostname}}.
    status: current
    varbinds:
      - adslLineUser
      - adslProductID
      - adslConfigAddr
  - oid: 1.3.6.1.4.1.3320.0.1
    name: BDCOMTRAP-MIB::adslPeriod
    category: diagnostic
    severity: info
    description: ADSL port status report received on {{hostname}}.
    status: current
    varbinds:
      - adslMemLoad
      - adslCPULoad
      - adslPtInCRC
      - adslPtStatus
      - adslPtSpeed
      - adslPtOutPkts
      - adslPtInPkts
      - adslPtOutError
      - adslPtInError
      - adslPtOutSpeed
      - adslPtInSpeed
      - adslPtOutDrop
      - adslPtInDrop
  - oid: 1.3.6.1.4.1.3320.2.221.3.1
    name: BDCOM-REMOTE-PING-MIB::rPingNotification
    category: diagnostic
    severity: info
    description: Remote ping to {{value "pingIpAddr"}} completed on {{hostname}}.
    status: current
    varbinds:
      - pingIpAddr
      - pingResult
      - pkgSize
      - timeOut
  - oid: 1.3.6.1.4.1.3320.2.222.2.1
    name: BDCOM-FILTER-TRAP::bdFilterNotification
    category: security
    severity: notice
    description: Filter action {{value "Action"}} for {{value "filterIpAddress"}} on {{value "portNum"}} on {{hostname}}.
    status: current
    varbinds:
      - timeOcr
      - timeHold
      - filterIpAddress
      - filterPhyAddress
      - portNum
      - message
      - vlanID
      - Action
  - oid: 1.3.6.1.4.1.3320.2.224.2.1
    name: BDCOM-ETHERRING::bdEtherRingNotification
    category: security
    severity: notice
    description: Ether ring package {{value "status"}} on interface {{first (value "index") "ring"}} on {{hostname}}.
    status: current
    varbinds:
      - index
      - type
      - status
      - time
  - oid: 1.3.6.1.4.1.3320.2.230.6.1
    name: BDCOM-EAPS-MIB::bdEAPSRingNotification
    category: state_change
    severity: warning
    description: EAPS ring state changed to {{value "bdEAPSRingState"}} on ring {{value "bdEAPSRingID"}} on {{hostname}}.
    status: current
    varbinds:
      - bdEAPSRingID
      - bdEAPSRingNodeType
      - bdEAPSRingState
  - oid: 1.3.6.1.4.1.3320.2.231.8.1
    name: NMS-ERPS-MIB::nmsERPSRingRoleChange
    category: state_change
    severity: notice
    description: ERPS ring node role changed on {{hostname}}.
    status: current
    varbinds:
