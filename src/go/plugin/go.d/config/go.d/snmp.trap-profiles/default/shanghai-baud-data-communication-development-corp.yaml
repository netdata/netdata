  - oid: 1.3.6.1.4.1.3320.9.184.6.1
    name: BDCOM-CARD-OPERATION-MIB::cardInitSucceedNotification
    category: state_change
    severity: notice
    description: Card {{first (value "bdcardDescr") "card"}} initialized successfully on {{hostname}}.
    status: current
    varbinds:
      - bdcardIndex
      - bdcardType
      - bdcardDescr
      - bdcardSerial
      - bdcardHwVersion
      - bdcardSwVersion
      - bdcardSlotNumber
  - oid: 1.3.6.1.4.1.3320.9.187.2.1
