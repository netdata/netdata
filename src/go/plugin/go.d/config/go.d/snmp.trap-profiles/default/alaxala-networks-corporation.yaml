  - oid: 1.3.6.1.4.1.21839.1.1.2.0.1
    name: AX7800R-TRAP::ax7800rSystemMsgTrap
    category: diagnostic
    severity: notice
    description: System message {{value "ax7800rSystemMsgText"}} on {{hostname}}.
    status: current
    varbinds:
      - ax7800rSystemMsgType
      - ax7800rSystemMsgTimeStamp
      - ax7800rSystemMsgLevel
      - ax7800rSystemMsgEventPoint
      - ax7800rSystemMsgEventInterfaceID
      - ax7800rSystemMsgEventCode
