traps:
  - oid: 1.3.6.1.4.1.644.2.0.1
    name: ERI-DNX-SMC-MIB::alarmTrap
    category: diagnostic
    severity: warning
    description: Alarm {{value "trapType"}} reported on {{value "trapResourceAddress"}} on {{hostname}}.
    status: current
    varbinds:
      - trapSequence
      - trapResourceKey
      - trapTime
      - trapResourceAddress
      - trapResourceType
      - trapType
      - trapState
      - trapSeverity
  - oid: 1.3.6.1.4.1.644.2.0.2
