    category: state_change
    severity: warning
    description: Line card state changed to {{value "chasBrdState"}} on slot {{value "chasBrdSlotNum"}} on {{hostname}}.
    status: current
    varbinds:
      - chasBrdSlotNum
      - chasBrdType
