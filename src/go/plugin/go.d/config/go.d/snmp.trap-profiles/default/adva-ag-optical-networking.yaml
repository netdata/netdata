  - oid: 1.3.6.1.4.1.2544.1.3.100.0.1
    name: METRO1500-MIB::metro1500HardwareAdded
    category: state_change
    severity: notice
    description: New module inserted into slot {{value "metro1500SlotNumber"}} on {{hostname}}.
    status: current
    varbinds:
      - metro1500SlotNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.2
    name: METRO1500-MIB::metro1500HardwareDeleted
    category: state_change
    severity: notice
    description: Hardware module removed from slot {{value "metro1500SlotNumber"}} on {{hostname}}.
    status: current
    varbinds:
      - metro1500SlotNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.3
    name: METRO1500-MIB::metro1500PSNotFail
    category: state_change
    severity: notice
    description: Power supply {{value "metro1500PSNumber"}} started working on {{hostname}}.
    status: current
    varbinds:
      - metro1500PSNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.4
    name: METRO1500-MIB::metro1500PSFail
    category: diagnostic
    severity: crit
    description: Power supply {{value "metro1500PSNumber"}} failed on {{hostname}}.
    status: current
    varbinds:
      - metro1500PSNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.5
    name: METRO1500-MIB::metro1500FanNotFail
    category: diagnostic
    severity: warning
    description: Fan {{value "metro1500FanNumber"}} started working on {{hostname}}.
    status: current
    varbinds:
      - metro1500FanNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.6
    name: METRO1500-MIB::metro1500FanFail
    category: diagnostic
    severity: alert
    description: Fan {{value "metro1500FanNumber"}} failed on {{hostname}}.
    status: current
    varbinds:
      - metro1500FanNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.7
    name: METRO1500-MIB::metro1500BusNotFail
    category: diagnostic
    severity: notice
    description: Internal bus recovered and is working again on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.8
    name: METRO1500-MIB::metro1500BusFail
    category: diagnostic
    severity: crit
    description: Internal bus failure detected on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.20
    name: METRO1500-MIB::metro1500RxLocOn
    category: diagnostic
    severity: warning
    description: Local receiver signal loss detected on slot {{value "metro1500SlotNumber"}} on {{hostname}}.
    status: current
    varbinds:
      - metro1500SlotNumber
  - oid: 1.3.6.1.4.1.2544.1.3.100.0.21
    name: METRO1500-MIB::metro1500RxLocOff
