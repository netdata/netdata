  - oid: 1.3.6.1.4.1.6876.0.1
    name: VMWARE-OBSOLETE-MIB::vmPoweredOn
    category: state_change
    severity: info
    description: "Virtual machine powered on at {SNMP_DEVICE_HOSTNAME}\n  VM ID: {vmwVmID}\n  Config path: {vmwVmConfigFilePath}"
    status: obsolete
    varbinds:
    - vmwVmID
    - vmwVmConfigFilePath
  - oid: 1.3.6.1.4.1.6876.0.2
    name: VMWARE-OBSOLETE-MIB::vmPoweredOff
    category: state_change
    severity: notice
    description: "Virtual machine powered off on {SNMP_DEVICE_HOSTNAME}\n  VM ID: {vmwVmID}\n  Config path: {vmwVmConfigFilePath}"
    status: obsolete
    varbinds:
    - vmwVmID
    - vmwVmConfigFilePath
  - oid: 1.3.6.1.4.1.6876.0.201
    name: VMWARE-OBSOLETE-MIB::vpxdTrap
    category: state_change
    severity: notice
    description: "Entity status changed on {SNMP_DEVICE_HOSTNAME}\n  host: {vpxdHostName}\n  VM: {vpxdVMName}\n  old status: {vpxdOldStatus}\n  new status: {vpxdNewStatus}\n  object value: {vpxdObjValue}"
    status: obsolete
    varbinds:
