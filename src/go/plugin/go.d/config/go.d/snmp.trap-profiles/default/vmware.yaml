    description: "Virtual machine lost guest heartbeat on {SNMP_DEVICE_HOSTNAME}\n  VM ID: {vmwVmID}\n  Config file: {vmwVmConfigFilePath}"
    status: obsolete
    varbinds:
    - vmwVmID
    - vmwVmConfigFilePath
  - oid: 1.3.6.1.4.1.6876.0.301
    name: VMWARE-ENV-MIB::vmwEnvHardwareEvent
    category: state_change
    severity: warning
    description: "Environmental hardware state change detected on {SNMP_DEVICE_HOSTNAME}\n  subsystem type: {vmwSubsystemType}\n  current status: {vmwHardwareStatus}\n  event: {vmwEventDescription}\n  timestamp: {vmwEnvHardwareTime}"
