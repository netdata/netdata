# SNMP trap profile - vendor: qlogic
# Generated by snmptrapprofilegen. Do not edit by hand;
# operator overrides belong in /etc/netdata/go.d/snmp.trap-profiles/.
vendor: qlogic
mib_count: 2
trap_count: 2
varbinds:
  qlgcMPEpromStatus:
    oid: 1.3.6.1.4.1.3873.3.2.1.1.1
    type: MPEpromStatus
    enum:
      "1": ok
      "2": alarm
  trapAdapterActivityCause:
    oid: 1.3.6.1.4.1.3873.1.2.3.4
    type: INTEGER
    enum:
      "1": none
      "2": linkChange
      "3": adapterEnabledOrDisabled
      "4": adapterAddedOrRemoved
  trapAdapterName:
    oid: 1.3.6.1.4.1.3873.1.2.3.1
    type: DisplayString
    constraints: SIZE(0..255)
  trapCauseDirection:
    oid: 1.3.6.1.4.1.3873.1.2.3.3
    type: INTEGER
    enum:
      "1": adapterActive
      "2": adapterInactive
  trapTeamName:
    oid: 1.3.6.1.4.1.3873.1.2.3.2
    type: DisplayString
    constraints: SIZE(0..255)
traps:
  - oid: 1.3.6.1.4.1.3873.1.2.3.0.1
    name: QLGC-QLASPTrap-MIB::failoverEvent
    category: state_change
    severity: warning
    description: Adapter failover event occurred on {{first (value "trapAdapterName") "adapter"}} on {{hostname}}.
    status: current
    varbinds:
      - trapAdapterName
      - trapTeamName
      - trapCauseDirection
      - trapAdapterActivityCause
  - oid: 1.3.6.1.4.1.3873.3.2.0.1
    name: QLGC-MP-MIB::qlgcMPStatusChange
    category: diagnostic
    severity: warning
    description: Maintenance panel EPROM monitor status changed to {{value "qlgcMPEpromStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - qlgcMPEpromStatus
