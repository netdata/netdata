traps:
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.3.0.1
    name: BTI-7000-MIB::shelfInvPluginEvt
    category: state_change
    severity: notice
    description: Shelf {{value "shelfInvShortName"}} detected on {{hostname}}.
    status: current
    varbinds:
      - shelfInvIdx
      - shelfInvType
      - shelfInvShortName
      - shelfInvName
      - shelfInvChassisPEC
      - shelfInvChassisCLEI
      - shelfInvRev
      - shelfInvConfig
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
      - evtCodeType
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.3.0.2
    name: BTI-7000-MIB::shelfInvUnpluginEvt
    category: diagnostic
    severity: warning
    description: Shelf {{value "shelfInvIdx"}} is no longer detected on {{hostname}}.
    status: current
    varbinds:
      - shelfInvIdx
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
      - evtCodeType
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.4.0.1
    name: BTI-7000-MIB::slotInvPluginEvt
    category: state_change
    severity: notice
    description: Circuit pack {{value "slotInvPackShortName"}} inserted into slot {{value "slotInvSlotIdx"}} on {{hostname}}.
    status: current
    varbinds:
      - slotInvShelfIdx
      - slotInvSlotTypeIdx
      - slotInvSlotIdx
      - slotInvPackShortName
      - slotInvPackName
      - slotInvPackPEC
      - slotInvPackCLEI
      - slotInvPackSerialNum
      - slotInvPackRev
      - slotInvPackMfgDate
      - slotInvPackMfgLoc
      - slotInvPackTestDate
      - slotInvPackTestLoc
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
      - evtCodeType
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.4.0.2
    name: BTI-7000-MIB::slotInvUnpluginEvt
    category: state_change
    severity: notice
    description: Circuit pack removed from slot {{value "slotInvSlotIdx"}} on {{hostname}}.
    status: current
    varbinds:
      - slotInvShelfIdx
      - slotInvSlotTypeIdx
      - slotInvSlotIdx
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
      - evtCodeType
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.4.0.3
    name: BTI-7000-MIB::slotInvUpgradeStageResultEvt
    category: diagnostic
    severity: notice
    description: Circuit pack upgrade stage completed on slot {{value "slotInvSlotIdx"}} on {{hostname}}.
    status: current
    varbinds:
      - slotInvShelfIdx
      - slotInvSlotTypeIdx
      - slotInvSlotIdx
      - slotInvUpgradeStage
      - slotInvUpgradeResult
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
      - evtCodeType
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.5.0.1
    name: BTI-7000-MIB::shelfStatusChangeEvt
    category: state_change
    severity: warning
    description: Shelf {{value "shelfIdx"}} operational status changed to {{value "shelfOperStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - shelfIdx
      - shelfOperStatus
      - shelfOperStatQlfr
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
      - evtCodeType
  - oid: 1.3.6.1.4.1.18070.2.2.2.1.6.0.1
    name: BTI-7000-MIB::cpStatusChangeEvt
    category: state_change
    severity: warning
    description: Circuit pack {{value "cpSlotIdx"}} operational status changed on {{hostname}}.
    status: current
    varbinds:
      - cpTypeIdx
      - cpShelfIdx
      - cpSlotIdx
      - cpOperStatus
      - cpOperStatQlfr
      - evtDateAndTime
      - trapSeqNum
      - evtDescription
      - evtObjectType
