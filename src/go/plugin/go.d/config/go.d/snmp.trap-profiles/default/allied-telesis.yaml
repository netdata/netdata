traps:
  - oid: 1.3.6.1.4.1.207.0.101
    name: newRoot
    category: mobility
    severity: notice
    description: Device {SNMP_DEVICE_HOSTNAME} elected as new STP root bridge
    mib: AtiL2-MIB
  - oid: 1.3.6.1.4.1.207.0.102
    name: topologyChange
    category: mobility
    severity: notice
    description: Topology change detected on {SNMP_DEVICE_HOSTNAME}. One or more STP ports have transitioned either from Learning to Forwarding state, or from Forwarding to Blocking state.
    mib: AtiL2-MIB
  - oid: 1.3.6.1.4.1.207.0.103
    name: atiL2FanStopTrap
    category: diagnostic
    severity: crit
    description: "Fan stopped on {SNMP_DEVICE_HOSTNAME}\n  module ID: {atiL2TrapAttrModuleId}"
    mib: AtiL2-MIB
    varbinds:
    - atiL2TrapAttrModuleId
  - oid: 1.3.6.1.4.1.207.0.104
    name: atiL2TemperatureAbnormalTrap
    category: state_change
    severity: warning
    description: Temperature abnormality detected on module {atiL2TrapAttrModuleId} of {SNMP_DEVICE_HOSTNAME}
    mib: AtiL2-MIB
    varbinds:
    - atiL2TrapAttrModuleId
  - oid: 1.3.6.1.4.1.207.0.105
    name: atiL2PowerSupplyOutage
    category: diagnostic
    severity: crit
    description: "Power supply outage on {SNMP_DEVICE_HOSTNAME}\n  module ID: {atiL2TrapAttrModuleId}"
    mib: AtiL2-MIB
    varbinds:
    - atiL2TrapAttrModuleId
  - oid: 1.3.6.1.4.1.207.0.106
    name: atiL2IntruderAlert
    category: security
    severity: warning
    description: "Layer 2 intruder detected on {SNMP_DEVICE_HOSTNAME}\n  module: {atiL2TrapAttrModuleId}\n  port: {atiL2TrapAttrPortId}"
    mib: AtiL2-MIB
    varbinds:
    - atiL2TrapAttrModuleId
    - atiL2TrapAttrPortId
  - oid: 1.3.6.1.4.1.207.8.15.9.1
    name: atiswitchFanStopTrap
    category: diagnostic
    severity: warning
    description: Fan operation error detected on {SNMP_DEVICE_HOSTNAME}. The fan has stopped or is malfunctioning.
    mib: AtiSwitch-MIB
    status: current
  - oid: 1.3.6.1.4.1.207.8.15.9.2
    name: atiswitchTemperatureAbnormalTrap
    category: state_change
    severity: warning
    description: Abnormal temperature detected on {SNMP_DEVICE_HOSTNAME}. Temperature has exceeded the normal operating threshold.
    mib: AtiSwitch-MIB
    status: current
  - oid: 1.3.6.1.4.1.207.8.4.4.2.1.1
    name: igmpGeneralQueryNotReceivedEvent
    category: diagnostic
    severity: warning
    description: "No IGMP General Query received on {SNMP_DEVICE_HOSTNAME}\n  interface: {ifName}\n  Expected periodic IGMP queries have stopped on this interface."
    mib: AT-INTERFACES-MIB
    status: current
    varbinds:
    - ifName
  - oid: 1.3.6.1.4.1.207.8.4.4.3.1.0.1
    name: fanAndPsRpsConnectionTrap
    category: state_change
    severity: warning
    description: "Redundant Power Supply (RPS) connection status changed on {SNMP_DEVICE_HOSTNAME}\n  RPS connection status: {fanAndPsRpsConnectionStatus}"
    mib: AT-SYSINFO-MIB
    status: current
    varbinds:
