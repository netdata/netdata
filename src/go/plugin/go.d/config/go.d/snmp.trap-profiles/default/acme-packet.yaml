traps:
  - oid: 1.3.6.1.4.1.9148.3.1.2.0.1
    name: APSYSLOG-MIB::apSyslogMessageGenerated
    category: diagnostic
    severity: warning
    description: 'Syslog message {{value "apSyslogHistType"}} generated: {{value "apSyslogHistContent"}} on {{hostname}}.'
    status: current
    varbinds:
      - apSyslogHistFrom
      - apSyslogHistLevel
      - apSyslogHistType
      - apSyslogHistContent
      - apSyslogHistTimestamp
  - oid: 1.3.6.1.4.1.9148.3.2.3.0.1
    name: APSYSMGMT-MIB::apSysMgmtGroupTrap
    category: diagnostic
    severity: warning
    description: Monitoring threshold exceeded for {{value "apSysMgmtTrapType"}} with value {{value "apSysMgmtTrapValue"}} on {{hostname}}.
    status: current
    varbinds:
      - apSysMgmtTrapType
      - apSysMgmtTrapValue
  - oid: 1.3.6.1.4.1.9148.3.2.3.0.2
    name: APSYSMGMT-MIB::apSysMgmtGroupClearTrap
    category: state_change
    severity: notice
    description: Alarm cleared for monitoring object {{value "apSysMgmtTrapType"}} on {{hostname}}.
    status: current
    varbinds:
      - apSysMgmtTrapType
  - oid: 1.3.6.1.4.1.9148.3.2.3.0.3
    name: APSYSMGMT-MIB::apSysMgmtSingleUnitRedundancyTrap
    category: state_change
    severity: notice
    description: Redundancy state changed to {{value "apSysMgmtSingleUnitRedundancyState"}} on slot {{value "apSysMgmtSlotID"}} on {{hostname}}.
    status: current
    varbinds:
      - apSysMgmtSlotID
      - apSysMgmtSlotType
      - apSysMgmtSingleUnitRedundancyState
  - oid: 1.3.6.1.4.1.9148.3.2.6.0.1
    name: APSYSMGMT-MIB::apSysMgmtPowerTrap
    category: diagnostic
    severity: warning
    description: Power supply {{value "apSysMgmtPowerLocation"}} status changed to {{value "apSysMgmtPowerPresence"}} on {{hostname}}.
    status: current
    varbinds:
      - apSysMgmtPowerLocation
      - apSysMgmtPowerPresence
  - oid: 1.3.6.1.4.1.9148.3.2.6.0.2
    name: APSYSMGMT-MIB::apSysMgmtTempTrap
    category: diagnostic
    severity: warning
    description: System temperature {{value "apSysMgmtTempValue"}} fell below threshold on {{hostname}}.
    status: current
    varbinds:
      - apSysMgmtTempValue
  - oid: 1.3.6.1.4.1.9148.3.2.6.0.3
    name: APSYSMGMT-MIB::apSysMgmtFanTrap
    category: diagnostic
    severity: warning
    description: Fan {{first (value "apSysMgmtFanLocation") "unit"}} speed is below threshold on {{hostname}}.
    status: current
    varbinds:
      - apSysMgmtFanLocation
      - apSysMgmtFanSpeed
  - oid: 1.3.6.1.4.1.9148.3.2.6.0.4
    name: APSYSMGMT-MIB::apSysMgmtTaskSuspendTrap
