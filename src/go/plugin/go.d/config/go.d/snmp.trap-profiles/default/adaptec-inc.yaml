    category: state_change
    severity: notice
    description: Host adapter {{value "cycHostAdapterNumber"}} changed ID to {{value "cycHostAdapterID"}} on {{hostname}}.
    status: current
    varbinds:
      - cycHostAdapterNumber
      - cycHostAdapterID
      - cycManagerID
