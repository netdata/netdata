    name: HPNSATRAP-MIB::cycSNMPAgentIsUp
    category: state_change
    severity: notice
    description: SNMP agent is up on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.795.2.5.0.102
    name: HPNSATRAP-MIB::cycSNMPAgentIsDown
    category: diagnostic
    severity: crit
