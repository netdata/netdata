traps:
  - oid: 1.3.6.1.4.1.485.0.800
    name: SYNC-RESEARCH-MIB::configChanged
    category: config_change
    severity: notice
    description: Configuration changed to {{value "configId"}} on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
      - configId
  - oid: 1.3.6.1.4.1.485.0.801
    name: SYNC-RESEARCH-MIB::configError
    category: config_change
    severity: err
    description: Configuration activation failed with error code {{value "lastInstallErrCode"}} on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
      - lastInstallErrCode
  - oid: 1.3.6.1.4.1.485.0.802
    name: SYNC-RESEARCH-MIB::dumpExists
    category: diagnostic
    severity: alert
    description: Memory core dump {{value "dumpFileName"}} exists on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
      - dumpFileName
  - oid: 1.3.6.1.4.1.485.0.803
    name: SYNC-RESEARCH-MIB::dumpArchived
    category: diagnostic
    severity: notice
    description: Memory dump file archived on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
  - oid: 1.3.6.1.4.1.485.0.804
    name: SYNC-RESEARCH-MIB::lineStatusChanged
    category: state_change
    severity: warning
    description: Line status changed to {{value "lineStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
      - lineStatus
      - lineControlFailureCode
      - linePhysicalIndex
  - oid: 1.3.6.1.4.1.485.0.805
    name: SYNC-RESEARCH-MIB::lanStatusChanged
    category: state_change
    severity: warning
    description: LAN port status changed to {{value "lanStatus"}}{{with value "lanControlFailureCode"}} (failure code {{.}}){{end}} on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
      - lanStatus
      - lanControlFailureCode
  - oid: 1.3.6.1.4.1.485.0.806
    name: SYNC-RESEARCH-MIB::lineQuality
    category: diagnostic
    severity: warning
    description: Line quality errors detected on port {{value "linePhysicalIndex"}} on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
      - lineQualityFrameCount
      - lineQualityCRCErrors
      - lineQualityAborts
      - linePhysicalIndex
  - oid: 1.3.6.1.4.1.485.0.807
    name: SYNC-RESEARCH-MIB::puStatusChanged
    category: state_change
    severity: warning
    description: PU {{value "puControlPUAddress"}} status changed to {{value "puStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - lastTrapSeqNumber
