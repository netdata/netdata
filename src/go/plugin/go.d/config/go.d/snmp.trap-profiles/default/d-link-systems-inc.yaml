traps:
  - oid: 1.3.6.1.4.1.171.0.1
    name: DES2218-MIB::linkChangeEvent
    category: state_change
    severity: warning
    description: Port {{first (value "swPortInfoIndex") "link"}} link status changed to {{value "swPortInfoLinkStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - swPortInfoIndex
      - swPortInfoType
      - swPortInfoPartitionStatus
      - swPortInfoLinkStatus
      - swPortInfoDuplexMode
  - oid: 1.3.6.1.4.1.171.0.2
    name: DES2218-MIB::portPartition
    category: state_change
    severity: warning
    description: Port {{first (value "swPortInfoIndex") "link"}} entered partition mode due to excessive collisions on {{hostname}}.
    status: current
    varbinds:
      - swPortInfoIndex
      - swPortInfoType
      - swPortInfoPartitionStatus
      - swPortInfoLinkStatus
      - swPortInfoDuplexMode
  - oid: 1.3.6.1.4.1.171.10.24.1.0.1
    name: DES3225G-MIB::portPartition
    category: diagnostic
    severity: warning
    description: Port partitioned due to excessive collisions on module {{value "swPortInfoModuleIndex"}} port {{value "swPortInfoPortIndex"}} on {{hostname}}.
    status: current
    varbinds:
      - swPortInfoModuleIndex
      - swPortInfoPortIndex
  - oid: 1.3.6.1.4.1.171.10.24.1.0.2
    name: DES3225G-MIB::linkChangeEvent
    category: state_change
    severity: warning
    description: Link state changed on port {{value "swPortInfoModuleIndex"}}/{{value "swPortInfoPortIndex"}} on {{hostname}}.
    status: current
    varbinds:
      - swPortInfoModuleIndex
      - swPortInfoPortIndex
  - oid: 1.3.6.1.4.1.171.10.24.1.0.3
    name: DES3225G-MIB::broadcastRisingStorm
    category: security
    severity: warning
    description: Broadcast storm detected on port {{first (value "swPortInfoModuleIndex")}}/{{value "swPortInfoPortIndex"}} on {{hostname}}.
    status: current
    varbinds:
      - swPortInfoModuleIndex
      - swPortInfoPortIndex
  - oid: 1.3.6.1.4.1.171.10.24.1.0.4
    name: DES3225G-MIB::broadcastFallingStorm
    category: diagnostic
    severity: warning
    description: Broadcast storm falling threshold exceeded on port {{first (value "swPortInfoModuleIndex")}}/{{first (value "swPortInfoPortIndex")}} on {{hostname}}.
    status: current
    varbinds:
      - swPortInfoModuleIndex
      - swPortInfoPortIndex
  - oid: 1.3.6.1.4.1.171.10.37.20.5.7.1.1
    name: DWL-3200::trapSSHLogin
    category: auth
    severity: notice
    description: SSH login event detected on {{hostname}}.
    status: current
    varbinds:
      - trapAPMACaddr
      - trapAlarmLevel
      - trapPCIPAddr
      - swNotiResult
  - oid: 1.3.6.1.4.1.171.10.37.20.5.7.1.2
    name: DWL-3200::trapWebLogin
    category: auth
    severity: notice
    description: Web login event detected{{with value "trapPCIPAddr"}} from {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - trapAPMACaddr
      - trapAlarmLevel
      - trapPCIPAddr
      - swNotiResult
  - oid: 1.3.6.1.4.1.171.10.37.20.5.7.1.3
