traps:
  - oid: 1.3.6.1.4.1.1588.2.1.1.1.0.1
    name: SW-MIB::swFault
    category: diagnostic
    severity: crit
    description: Switch diagnostics detected a fault on {{first (value "swSsn") "switch"}} on {{hostname}}.
    status: obsolete
    varbinds:
      - swDiagResult
      - swSsn
      - swGroupName
      - swGroupType
      - swGroupMemPos
  - oid: 1.3.6.1.4.1.1588.2.1.1.1.0.2
    name: SW-MIB::swSensorScn
    category: diagnostic
    severity: warning
    description: Environmental sensor {{value "swSensorInfo"}} status changed to {{value "swSensorStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - swSensorStatus
      - swSensorIndex
      - swSensorType
      - swSensorValue
      - swSensorInfo
      - swSsn
      - swGroupName
      - swGroupType
      - swGroupMemPos
  - oid: 1.3.6.1.4.1.1588.2.1.1.1.0.3
    name: SW-MIB::swFCPortScn
    category: state_change
    severity: warning
    description: FC port {{value "swFCPortName"}} operational status changed on {{hostname}}.
    status: current
    varbinds:
      - swFCPortOpStatus
      - swFCPortIndex
      - swFCPortName
      - swSsn
      - swFCPortFlag
      - swGroupName
      - swGroupType
      - swGroupMemPos
      - swVfId
  - oid: 1.3.6.1.4.1.1588.2.1.1.1.0.4
    name: SW-MIB::swEventTrap
    category: diagnostic
    severity: warning
    description: Switch event {{value "swEventDescr"}} occurred on {{hostname}}.
    status: current
    varbinds:
      - swEventIndex
      - swEventTimeInfo
      - swEventLevel
      - swEventRepeatCount
      - swEventDescr
      - swSsn
      - swGroupName
      - swGroupType
      - swGroupMemPos
      - swVfId
  - oid: 1.3.6.1.4.1.1588.2.1.1.1.0.5
