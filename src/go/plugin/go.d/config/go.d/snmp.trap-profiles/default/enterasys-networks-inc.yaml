    name: CABLETRON-TRAPS::ctdlswTConnUp
    category: state_change
    severity: notice
    description: DLSw transport connection enabled on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.52.0.2
    name: CABLETRON-TRAPS::ctdlswTConnDown
    category: state_change
    severity: warning
    description: DLSw transport connection disabled on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.52.0.257
    name: CABLETRON-TRAPS::portSegmenting
    category: state_change
    severity: warning
    description: Port {{first (value "rptrPortMgmtPortId") "link"}} went to segmented state on {{hostname}}.
    status: current
    varbinds:
      - rptrPortGrpMgmtGrpId
      - rptrPortMgmtPortId
  - oid: 1.3.6.1.4.1.52.0.258
    name: CABLETRON-TRAPS::portUnsegementing
    category: state_change
    severity: notice
    description: Port {{first (value "rptrPortMgmtPortId") "segmented port"}} has gone operational on {{hostname}}.
    status: current
    varbinds:
      - rptrPortGrpMgmtGrpId
      - rptrPortMgmtPortId
  - oid: 1.3.6.1.4.1.52.0.259
    name: CABLETRON-TRAPS::portLinkUp
    category: state_change
    severity: notice
    description: Port link up on {{first (value "rptrPortMgmtPortId") "link"}} on {{hostname}}.
    status: current
    varbinds:
      - rptrPortGrpMgmtGrpId
      - rptrPortMgmtPortId
  - oid: 1.3.6.1.4.1.52.0.260
    name: CABLETRON-TRAPS::portLinkDown
    category: state_change
    severity: warning
    description: Port {{first (value "rptrPortMgmtPortId") "link"}} went down on {{hostname}}.
    status: current
    varbinds:
      - rptrPortGrpMgmtGrpId
      - rptrPortMgmtPortId
  - oid: 1.3.6.1.4.1.52.0.261
    name: CABLETRON-TRAPS::srcaddrNew
    category: security
    severity: notice
    description: New source address {{value "rptrPortSrcAddrAddressList"}} detected on port {{first (value "rptrPortMgmtPortId") "unknown"}} on {{hostname}}.
    status: current
    varbinds:
      - rptrPortGrpMgmtGrpId
      - rptrPortMgmtPortId
      - rptrPortSrcAddrAddressList
  - oid: 1.3.6.1.4.1.52.0.262
    name: CABLETRON-TRAPS::srcaddrTimeout
    category: diagnostic
    severity: warning
    description: Source address {{value "rptrPortSrcAddrAddressList"}} timeout on port {{value "rptrPortMgmtPortId"}} on {{hostname}}.
    status: current
    varbinds:
      - rptrPortGrpMgmtGrpId
      - rptrPortMgmtPortId
      - rptrPortSrcAddrAddressList
