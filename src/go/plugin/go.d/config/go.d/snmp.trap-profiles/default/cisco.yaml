    name: cospfIfConfigError
    category: state_change
    severity: warning
    description: "OSPF configuration mismatch detected on {SNMP_DEVICE_HOSTNAME}\n  interface IP: {ospfIfIpAddress}\n  local router ID: {ospfRouterId}\n  source of mismatched packet: {cospfPacketSrc}\n  error type: {cospfConfigErrorType}\n  packet type: {cospfPacketType}"
    mib: CISCO-OSPF-TRAP-MIB
    varbinds:
    - ospfRouterId
    - ospfIfIpAddress
    - ospfAddressLessIf
    - cospfPacketSrc
    - cospfConfigErrorType
    - cospfPacketType
  - oid: 1.3.6.1.4.1.9.10.101.0.10
    name: cospfShamLinkConfigError
    category: config_change
    severity: warning
    description: "OSPF sham-link configuration error on {SNMP_DEVICE_HOSTNAME}\n  local router ID: {ospfRouterId}\n  area ID: {cospfShamLinksAreaId}\n  local endpoint: {cospfShamLinksLocalIpAddr}\n  remote endpoint: {cospfShamLinksRemoteIpAddr}\n  config error type: {cospfConfigErrorType}\n  offending packet type: {cospfPacketType}"
    mib: CISCO-OSPF-TRAP-MIB
    varbinds:
    - ospfRouterId
    - cospfShamLinksAreaId
    - cospfShamLinksLocalIpAddrType
    - cospfShamLinksLocalIpAddr
    - cospfShamLinksRemoteIpAddrType
    - cospfShamLinksRemoteIpAddr
    - cospfConfigErrorType
    - cospfPacketType
  - oid: 1.3.6.1.4.1.9.10.101.0.11
    name: cospfShamLinkAuthFailure
    category: security
    severity: warning
    description: "OSPF sham-link authentication failure on {SNMP_DEVICE_HOSTNAME}\n  remote router ID: {ospfRouterId}\n  area ID: {cospfShamLinksAreaId}\n  local endpoint: {cospfShamLinksLocalIpAddr}\n  remote endpoint: {cospfShamLinksRemoteIpAddr}\n  error type: {cospfConfigErrorType}\n  packet type: {cospfPacketType}"
    mib: CISCO-OSPF-TRAP-MIB
    varbinds:
    - ospfRouterId
    - cospfShamLinksAreaId
    - cospfShamLinksLocalIpAddrType
    - cospfShamLinksLocalIpAddr
    - cospfShamLinksRemoteIpAddrType
