  - oid: 1.3.6.1.4.1.9.0.0
    name: CISCOTRAP-MIB::reload
    category: state_change
    severity: notice
    description: "Device {SNMP_DEVICE_HOSTNAME} reloaded\n  uptime at reload: {sysUpTime}\n  reload reason: {whyReload}"
    varbinds:
    - sysUpTime
    - whyReload
  - oid: 1.3.6.1.4.1.9.0.1
    name: CISCOTRAP-MIB::tcpConnectionClose
    category: state_change
    severity: notice
    description: "TCP session terminated on {SNMP_DEVICE_HOSTNAME}\n  session type: {tslineSesType}\n  user: {tsLineUser}\n  duration: {loctcpConnElapsed}s\n  bytes in: {loctcpConnInBytes}\n  bytes out: {loctcpConnOutBytes}\n  final state: {tcpConnState}"
    varbinds:
    - tslineSesType
    - tcpConnState
    - loctcpConnElapsed
    - loctcpConnInBytes
    - loctcpConnOutBytes
    - tsLineUser
  - oid: 1.3.6.1.4.1.9.10.101.0.1
    name: CISCO-OSPF-TRAP-MIB::cospfIfConfigError
    category: state_change
    severity: err
    description: "OSPF configuration error on interface {ospfIfIpAddress} (router ID {ospfRouterId})\n  Error type: {cospfConfigErrorType}\n  Packet type: {cospfPacketType}\n  Source IP: {cospfPacketSrc}\n  Interface index: {ospfAddressLessIf}"
    varbinds:
    - ospfRouterId
    - ospfIfIpAddress
    - ospfAddressLessIf
    - cospfPacketSrc
    - cospfConfigErrorType
    - cospfPacketType
  - oid: 1.3.6.1.4.1.9.10.101.0.10
    name: CISCO-OSPF-TRAP-MIB::cospfShamLinkConfigError
    category: config_change
    severity: warning
    description: "OSPF sham-link configuration mismatch detected on {SNMP_DEVICE_HOSTNAME}\n  router ID: {ospfRouterId}\n  area ID: {cospfShamLinksAreaId}\n  local endpoint: {cospfShamLinksLocalIpAddr}\n  remote endpoint: {cospfShamLinksRemoteIpAddr}\n  error type: {cospfConfigErrorType}\n  packet type: {cospfPacketType}"
    varbinds:
    - ospfRouterId
    - cospfShamLinksAreaId
    - cospfShamLinksLocalIpAddrType
    - cospfShamLinksLocalIpAddr
    - cospfShamLinksRemoteIpAddrType
    - cospfShamLinksRemoteIpAddr
    - cospfConfigErrorType
    - cospfPacketType
  - oid: 1.3.6.1.4.1.9.10.101.0.11
    name: CISCO-OSPF-TRAP-MIB::cospfShamLinkAuthFailure
    category: auth
    severity: warning
    description: "OSPF sham-link authentication failure on {SNMP_DEVICE_HOSTNAME}\n  router ID: {ospfRouterId}\n  area ID: {cospfShamLinksAreaId}\n  local endpoint: {cospfShamLinksLocalIpAddr}\n  remote endpoint: {cospfShamLinksRemoteIpAddr}\n  error type: {cospfConfigErrorType}\n  packet type: {cospfPacketType}"
    varbinds:
    - ospfRouterId
    - cospfShamLinksAreaId
    - cospfShamLinksLocalIpAddrType
    - cospfShamLinksLocalIpAddr
    - cospfShamLinksRemoteIpAddrType
    - cospfShamLinksRemoteIpAddr
    - cospfConfigErrorType
    - cospfPacketType
  - oid: 1.3.6.1.4.1.9.10.101.0.12
