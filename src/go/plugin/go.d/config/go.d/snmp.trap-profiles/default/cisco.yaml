    category: state_change
    severity: warning
    description: "OSPF sham link received bad packet on {SNMP_DEVICE_HOSTNAME}\n  Router ID: {ospfRouterId}\n  Area: {cospfShamLinksAreaId}\n  Local IP: {cospfShamLinksLocalIpAddr}\n  Remote IP: {cospfShamLinksRemoteIpAddr}\n  Packet Type: {cospfPacketType}"
