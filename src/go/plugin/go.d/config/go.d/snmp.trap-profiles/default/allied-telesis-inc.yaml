traps:
  - oid: 1.3.6.1.4.1.207.0.101
    name: AtiL2-MIB::newRoot
    category: state_change
    severity: notice
    description: Device elected as new Spanning Tree root on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.207.0.102
    name: AtiL2-MIB::topologyChange
    category: state_change
    severity: notice
    description: Bridge topology change detected on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.207.0.103
    name: AtiL2-MIB::atiL2FanStopTrap
    category: diagnostic
    severity: alert
    description: Fan stopped on module {{value "atiL2TrapAttrModuleId"}} on {{hostname}}.
    status: current
    varbinds:
      - atiL2TrapAttrModuleId
  - oid: 1.3.6.1.4.1.207.0.104
    name: AtiL2-MIB::atiL2TemperatureAbnormalTrap
    category: diagnostic
    severity: warning
    description: Module {{value "atiL2TrapAttrModuleId"}} temperature is abnormal on {{hostname}}.
    status: current
    varbinds:
      - atiL2TrapAttrModuleId
  - oid: 1.3.6.1.4.1.207.0.105
    name: AtiL2-MIB::atiL2PowerSupplyOutage
    category: diagnostic
    severity: alert
    description: Power supply outage detected on module {{value "atiL2TrapAttrModuleId"}} on {{hostname}}.
    status: current
    varbinds:
      - atiL2TrapAttrModuleId
  - oid: 1.3.6.1.4.1.207.0.106
    name: AtiL2-MIB::atiL2IntruderAlert
    category: security
    severity: alert
    description: Intruder detected on module {{value "atiL2TrapAttrModuleId"}} port {{value "atiL2TrapAttrPortId"}} on {{hostname}}.
    status: current
    varbinds:
      - atiL2TrapAttrModuleId
      - atiL2TrapAttrPortId
  - oid: 1.3.6.1.4.1.207.1.2.0.20
    name: ATI-MIB::intruderProtectionTrap
    category: security
    severity: warning
    description: Intruder protection alert due to unauthorized MAC {{value "rptrAddrTrackNewLastSrcAddress"}} on {{hostname}}.
    status: current
    varbinds:
      - rptrAddrTrackNewLastSrcAddress
  - oid: 1.3.6.1.4.1.207.1.2.0.21
    name: ATI-MIB::atiIntruderProtectionTrap
    category: security
    severity: alert
    description: 'Intruder protection alert: unauthorized MAC {{value "atiTrapIntruderMacAddress"}} detected on module {{value "atiTrapIntruderModuleNumber"}} port {{value "atiTrapIntruderPortNumber"}} on {{hostname}}.'
    status: current
    varbinds:
      - atiTrapIntruderModuleNumber
      - atiTrapIntruderPortNumber
      - atiTrapIntruderMacAddress
  - oid: 1.3.6.1.4.1.207.1.2.0.22
    name: ATI-MIB::atiRedundantPortChangeTrap
    category: state_change
    severity: notice
    description: Redundant port role changed{{with value "atiPortChangeDirection"}} to {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - atiPortGroupIndex
      - atiPortIndex
      - portRedundantPort
      - atiPortChangeDirection
  - oid: 1.3.6.1.4.1.207.1.4.165.116.0.1
    name: AT-GS950-8-MIB::newRoot
    category: state_change
    severity: notice
    description: Device elected as new Spanning Tree root on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.207.1.4.165.116.0.2
    name: AT-GS950-8-MIB::topologyChange
    category: state_change
    severity: notice
    description: Network topology change detected on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.207.1.4.165.118.3.0.1
    name: AT-GS950-8-MIB::dot1sGlobalErrTrap
