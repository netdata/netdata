    description: "Performance alarm threshold crossed on {SNMP_DEVICE_HOSTNAME}\n  alarm index: {prialarmIndex}\n  symptom: {prialarmSympol}\n  sample type: {prialarmSampleType}\n  current value: {prialarmValue}\n  rising threshold: {prialarmRisingThreshold}"
