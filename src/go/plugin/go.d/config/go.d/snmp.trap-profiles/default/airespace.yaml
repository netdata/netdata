    name: multipleUsersTrap
    category: auth
    severity: info
    description: Multiple users logged into {SNMP_DEVICE_HOSTNAME}
    mib: AIRESPACE-SWITCHING-MIB
  - oid: 1.3.6.1.4.1.14179.1.50.0.10
