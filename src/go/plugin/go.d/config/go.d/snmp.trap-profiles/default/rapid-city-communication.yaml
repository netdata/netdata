traps:
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.1
    name: RAPID-CITY::rcIpBgpTmpEstablishedNotification
    category: state_change
    severity: notice
    description: BGP peer {bgpPeerRemoteAddr} reached established state on {_HOSTNAME}.
    status: deprecated
    varbinds:
      - bgpPeerRemoteAddr
      - bgpPeerLastError
      - bgpPeerState
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.2
    name: RAPID-CITY::rcIpBgpTmpBackwardTransNotification
    category: state_change
    severity: warning
    description: BGP peer {bgpPeerRemoteAddr} state transitioned to {bgpPeerState} on {_HOSTNAME}.
    status: deprecated
    varbinds:
      - bgpPeerRemoteAddr
      - bgpPeerLastError
      - bgpPeerState
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.3
    name: RAPID-CITY::rcIpBgpTmpAfEstablishedNotification
    category: state_change
    severity: notice
    description: BGP peer connection established with state {rcIpBgpTmpPeerAfPeerState} on {_HOSTNAME}.
    status: current
    varbinds:
      - rcIpBgpTmpPeerAfPeerState
      - rcIpBgpTmpPeerAfLocalPort
      - rcIpBgpTmpPeerAfRemotePort
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.4
    name: RAPID-CITY::rcIpBgpTmpAfBackwardTransitionNotification
    category: state_change
    severity: warning
    description: BGP peer state transitioned to {rcIpBgpTmpPeerAfPeerState} on {_HOSTNAME}.
    status: current
    varbinds:
      - rcIpBgpTmpPeerAfPeerState
      - rcIpBgpTmpPeerAfLocalPort
      - rcIpBgpTmpPeerAfRemotePort
      - rcIpBgpTmpPeerAfLastErrorCodeReceived
      - rcIpBgpTmpPeerAfLastErrorSubCodeReceived
      - rcIpBgpTmpPeerAfLastErrorReceivedText
  - oid: 1.3.6.1.4.1.2272.1.21.0.1
    name: RAPID-CITY::rcnCardDown
    category: state_change
    severity: crit
    description: Card {rcCardIndex} operational status changed to {rcCardOperStatus} on {_HOSTNAME}.
    status: current
    varbinds:
      - rcCardIndex
      - rcCardAdminStatus
      - rcCardOperStatus
  - oid: 1.3.6.1.4.1.2272.1.21.0.2
    name: RAPID-CITY::rcnCardUp
    category: state_change
    severity: notice
    description: Card {rcCardIndex} operational status changed to {rcCardOperStatus} on {_HOSTNAME}.
    status: current
    varbinds:
      - rcCardIndex
      - rcCardAdminStatus
      - rcCardOperStatus
  - oid: 1.3.6.1.4.1.2272.1.21.0.3
    name: RAPID-CITY::rcnErrorNotification
    category: diagnostic
    severity: err
    description: 'Error {rcErrorCode} with level {rcErrorLevel} reported: {rcErrorText} on {_HOSTNAME}.'
    status: current
    varbinds:
      - rcErrorLevel
      - rcErrorCode
      - rcErrorText
  - oid: 1.3.6.1.4.1.2272.1.21.0.4
    name: RAPID-CITY::rcnStpNewRoot
    category: state_change
    severity: notice
