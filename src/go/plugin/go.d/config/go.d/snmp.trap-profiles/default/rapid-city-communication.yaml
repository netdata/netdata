traps:
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.1
    name: RAPID-CITY::rcIpBgpTmpEstablishedNotification
    category: state_change
    severity: notice
    description: BGP peer {{value "bgpPeerRemoteAddr"}} established on {{hostname}}.
    status: deprecated
    varbinds:
      - bgpPeerRemoteAddr
      - bgpPeerLastError
      - bgpPeerState
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.2
    name: RAPID-CITY::rcIpBgpTmpBackwardTransNotification
    category: state_change
    severity: warning
    description: BGP peer {{value "bgpPeerRemoteAddr"}} state transitioned to {{value "bgpPeerState"}} on {{hostname}}.
    status: deprecated
    varbinds:
      - bgpPeerRemoteAddr
      - bgpPeerLastError
      - bgpPeerState
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.3
    name: RAPID-CITY::rcIpBgpTmpAfEstablishedNotification
    category: state_change
    severity: notice
    description: BGP session established with peer {{value "rcIpBgpTmpPeerAfPeerState"}} on {{hostname}}.
    status: current
    varbinds:
      - rcIpBgpTmpPeerAfPeerState
      - rcIpBgpTmpPeerAfLocalPort
      - rcIpBgpTmpPeerAfRemotePort
  - oid: 1.3.6.1.4.1.2272.1.8.101.17.0.4
    name: RAPID-CITY::rcIpBgpTmpAfBackwardTransitionNotification
    category: state_change
    severity: warning
    description: BGP peer state backward transition detected on {{hostname}}.
    status: current
    varbinds:
      - rcIpBgpTmpPeerAfPeerState
      - rcIpBgpTmpPeerAfLocalPort
      - rcIpBgpTmpPeerAfRemotePort
      - rcIpBgpTmpPeerAfLastErrorCodeReceived
      - rcIpBgpTmpPeerAfLastErrorSubCodeReceived
      - rcIpBgpTmpPeerAfLastErrorReceivedText
  - oid: 1.3.6.1.4.1.2272.1.21.0.59
    name: RAPID-CITY::rcnFdbProtectViolation
    category: security
    severity: warning
    description: FDB entry limit violated on {{first (value "rcPortIndex") "port"}}{{with value "rcVlanId"}} VLAN {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - rcPortIndex
      - rcVlanId
  - oid: 1.3.6.1.4.1.2272.1.21.0.60
    name: RAPID-CITY::rcnLogMsgControl
    category: diagnostic
    severity: warning
    description: Log message repetition threshold exceeded for {{value "rcSysMsgLogText"}} on {{hostname}}.
    status: current
    varbinds:
      - rcSysMsgLogFrequency
      - rcSysMsgLogText
  - oid: 1.3.6.1.4.1.2272.1.21.0.61
    name: RAPID-CITY::rcnSaveConfigFile
    category: config_change
    severity: notice
    description: Configuration file saved{{with value "rcSysConfigFileName"}} as {{.}}{{end}} on {{hostname}}.
