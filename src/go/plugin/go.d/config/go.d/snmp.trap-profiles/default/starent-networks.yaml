  - oid: 1.3.6.1.4.1.8164.2.1
    name: STARENT-MIB::starCardTempOverheat
    category: diagnostic
    severity: crit
    description: Card in slot {{value "starSlotNum"}} reached overheat temperature {{value "starCardTemperature"}} on {{hostname}}.
    status: current
    varbinds:
      - starSlotNum
      - starCardTemperature
  - oid: 1.3.6.1.4.1.8164.2.2
    name: STARENT-MIB::starCardTempOK
    category: diagnostic
    severity: notice
    description: Card temperature returned to safe range on {{hostname}}.
    status: current
    varbinds:
      - starSlotNum
      - starCardTemperature
  - oid: 1.3.6.1.4.1.8164.2.3
    name: STARENT-MIB::starCardReset
    category: state_change
    severity: notice
    description: Card reset operation invoked on slot {{value "starSlotNum"}} on {{hostname}}.
    status: obsolete
    varbinds:
      - starSlotNum
      - starCardType
  - oid: 1.3.6.1.4.1.8164.2.4
    name: STARENT-MIB::starCardRebootRequest
