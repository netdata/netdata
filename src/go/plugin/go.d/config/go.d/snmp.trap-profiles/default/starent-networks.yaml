    name: STARENT-MIB::starCardTempOverheat
    category: diagnostic
    severity: crit
    description: Card temperature {starCardTemperature} exceeded safe operating range on slot {starSlotNum} on {_HOSTNAME}.
    status: current
    varbinds:
      - starSlotNum
      - starCardTemperature
  - oid: 1.3.6.1.4.1.8164.2.2
