    category: diagnostic
    severity: notice
    description: Card temperature {starCardTemperature} returned to safe range on {_HOSTNAME}.
    status: current
    varbinds:
      - starSlotNum
      - starCardTemperature
  - oid: 1.3.6.1.4.1.8164.2.3
    name: STARENT-MIB::starCardReset
    category: state_change
    severity: notice
    description: Card reset operation invoked on slot {starSlotNum} ({starCardType}) on {_HOSTNAME}.
    status: obsolete
    varbinds:
      - starSlotNum
      - starCardType
