traps:
  - oid: 1.3.6.1.2.1.1.0.1
    name: T11-ZONE-SERVER-MIB::t11ZsRequestRejectNotify
    category: diagnostic
    severity: warning
    description: "Fibre Channel Zone Server rejected a request on {SNMP_DEVICE_HOSTNAME}\n  local switch WWN: {t11FamLocalSwitchWwn}\n  request source: {t11ZsRejectRequestSource}\n  reason code: {t11ZsRejectReasonCode}\n  reason explanation: {t11ZsRejectReasonCodeExp}"
    status: current
    varbinds:
    - t11FamLocalSwitchWwn
    - t11ZsRejectRequestSource
    - t11ZsRejectCtCommandString
    - t11ZsRejectReasonCode
    - t11ZsRejectReasonCodeExp
  - oid: 1.3.6.1.2.1.1.0.2
    name: T11-ZONE-SERVER-MIB::t11ZsMergeFailureNotify
    category: security
    severity: warning
    description: "Zone merge failure on {SNMP_DEVICE_HOSTNAME}\n  ifIndex: {ifIndex}\n  fabric index: {t11ZsFabricIndex}\n\nA Zone merge failure indicates the local switch could not synchronize its zone database with an adjacent switch. This may result in inconsistent zoning policies across the fabric."
    status: current
    varbinds:
    - ifIndex
    - t11ZsFabricIndex
  - oid: 1.3.6.1.2.1.1.0.3
    name: T11-ZONE-SERVER-MIB::t11ZsMergeSuccessNotify
    category: state_change
    severity: notice
    description: "Zone merge completed successfully on {SNMP_DEVICE_HOSTNAME}\n  interface: {ifIndex}\n  fabric index: {t11ZsFabricIndex}"
    status: current
    varbinds:
    - ifIndex
    - t11ZsFabricIndex
  - oid: 1.3.6.1.2.1.1.0.4
    name: T11-ZONE-SERVER-MIB::t11ZsDefZoneChangeNotify
    category: config_change
    severity: notice
    description: "Default zone setting changed on {SNMP_DEVICE_HOSTNAME}\n  new default zone action: {t11ZsServerDefaultZoneSetting}"
    status: current
    varbinds:
    - t11ZsServerDefaultZoneSetting
  - oid: 1.3.6.1.2.1.1.0.5
    name: T11-ZONE-SERVER-MIB::t11ZsActivateNotify
    category: config_change
    severity: notice
    description: "Fibre Channel Zone Set activation/deactivation on {SNMP_DEVICE_HOSTNAME}\n  Local Switch WWN: {t11FamLocalSwitchWwn}\n  Result: {t11ZsActivateResult}"
    status: current
    varbinds:
    - t11FamLocalSwitchWwn
    - t11ZsActivateResult
  - oid: 1.3.6.1.2.1.1.1000.0.0
    name: NSCRTV-EXTENSION-GY::gyHeartBeat
    category: diagnostic
    severity: info
    description: "Heartbeat received from {SNMP_DEVICE_HOSTNAME}\n  MAC: {gyhbMacAddress}\n  IP: {gyhbIpAddress}\n  Logical ID: {gyhbLogicalID}\n  Model: {gyhbModelNumber}\n  Serial: {gyhbSerialNumber}\n  Location: {sysLocation}\n  Name: {sysName}"
    varbinds:
    - gyhbMacAddress
    - gyhbIpAddress
    - gyhbLogicalID
    - gyhbModelNumber
    - gyhbSerialNumber
    - gyhbROCommunity
    - gyhbRWCommunity
    - sysObjectID
    - sysLocation
    - sysName
  - oid: 1.3.6.1.2.1.10.166.11.0.1
    name: MPLS-L3VPN-STD-MIB::mplsL3VpnVrfUp
    category: state_change
    severity: info
    description: "VRF {mplsL3VpnVrfOperStatus} on {SNMP_DEVICE_HOSTNAME} is now operational.\n  Row status: {mplsL3VpnIfConfRowStatus}"
    status: current
    varbinds:
    - mplsL3VpnIfConfRowStatus
    - mplsL3VpnVrfOperStatus
  - oid: 1.3.6.1.2.1.10.166.11.0.2
    name: MPLS-L3VPN-STD-MIB::mplsL3VpnVrfDown
    category: state_change
    severity: warning
    description: "MPLS L3VPN VRF operational state changed to down on {SNMP_DEVICE_HOSTNAME}\n  VRF operational status: {mplsL3VpnVrfOperStatus}\n  row status: {mplsL3VpnIfConfRowStatus}"
    status: current
    varbinds:
    - mplsL3VpnIfConfRowStatus
    - mplsL3VpnVrfOperStatus
  - oid: 1.3.6.1.2.1.10.166.11.0.3
    name: MPLS-L3VPN-STD-MIB::mplsL3VpnVrfRouteMidThreshExceeded
    category: diagnostic
    severity: warning
    description: "VRF route count exceeded mid-level threshold on {SNMP_DEVICE_HOSTNAME}\n  current routes: {mplsL3VpnVrfPerfCurrNumRoutes}\n  threshold: {mplsL3VpnVrfConfMidRteThresh}"
    status: current
    varbinds:
    - mplsL3VpnVrfPerfCurrNumRoutes
    - mplsL3VpnVrfConfMidRteThresh
  - oid: 1.3.6.1.2.1.10.166.11.0.4
    name: MPLS-L3VPN-STD-MIB::mplsL3VpnVrfNumVrfRouteMaxThreshExceeded
    category: state_change
    severity: warning
    description: "VRF route count threshold exceeded on {SNMP_DEVICE_HOSTNAME}\n  current routes: {mplsL3VpnVrfPerfCurrNumRoutes}\n  high threshold: {mplsL3VpnVrfConfHighRteThresh}"
    status: current
    varbinds:
    - mplsL3VpnVrfPerfCurrNumRoutes
    - mplsL3VpnVrfConfHighRteThresh
