    name: MPLS-L3VPN-STD-MIB::mplsL3VpnNumVrfSecIllglLblThrshExcd
    category: security
    severity: warning
    description: "MPLS L3VPN illegal label violation threshold exceeded on {SNMP_DEVICE_HOSTNAME}\n  illegal label violations count: {mplsL3VpnVrfSecIllegalLblVltns}"
    status: current
    varbinds:
    - mplsL3VpnVrfSecIllegalLblVltns
