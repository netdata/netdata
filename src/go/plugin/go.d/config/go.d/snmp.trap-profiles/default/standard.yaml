traps:
  - oid: 1.3.6.1.2.1.1.1000.0.0
    name: gyHeartBeat
    category: diagnostic
    severity: info
    description: "Heartbeat trap received from {SNMP_DEVICE_HOSTNAME}\n  MAC: {gyhbMacAddress}\n  IP Address: {gyhbIpAddress}\n  Logical ID: {gyhbLogicalID}\n  Model: {gyhbModelNumber}\n  Serial: {gyhbSerialNumber}\n  Location: {sysLocation}\n  SysName: {sysName}"
    mib: NSCRTV-EXTENSION-GY
    varbinds:
    - gyhbMacAddress
    - gyhbIpAddress
    - gyhbLogicalID
    - gyhbModelNumber
    - gyhbSerialNumber
    - gyhbROCommunity
    - gyhbRWCommunity
    - sysObjectID
    - sysLocation
    - sysName
  - oid: 1.3.6.1.2.1.10.166.11.0.1
    name: mplsL3VpnVrfUp
    category: state_change
    severity: info
    description: "VRF became operational on {SNMP_DEVICE_HOSTNAME}\n  VRF operational status: {mplsL3VpnVrfOperStatus}\n  Interface row status: {mplsL3VpnIfConfRowStatus}"
    mib: MPLS-L3VPN-STD-MIB
    status: current
    varbinds:
    - mplsL3VpnIfConfRowStatus
    - mplsL3VpnVrfOperStatus
  - oid: 1.3.6.1.2.1.10.166.11.0.2
    name: mplsL3VpnVrfDown
    category: state_change
    severity: crit
    description: "VRF went down on {SNMP_DEVICE_HOSTNAME}\n  VRF operational status: {mplsL3VpnVrfOperStatus}\n  Interface row status: {mplsL3VpnIfConfRowStatus}\n\nThis notification indicates that a VRF has become operationally down because:\n  - An associated interface's ifOperStatus changed from up to down, OR\n  - The last remaining up interface was disassociated from the VRF"
    mib: MPLS-L3VPN-STD-MIB
    status: current
    varbinds:
    - mplsL3VpnIfConfRowStatus
    - mplsL3VpnVrfOperStatus
  - oid: 1.3.6.1.2.1.10.166.11.0.3
    name: mplsL3VpnVrfRouteMidThreshExceeded
    category: diagnostic
    severity: warning
    description: "VRF route mid-threshold exceeded on {SNMP_DEVICE_HOSTNAME}\n  current routes: {mplsL3VpnVrfPerfCurrNumRoutes}\n  mid-route threshold: {mplsL3VpnVrfConfMidRteThresh}"
    mib: MPLS-L3VPN-STD-MIB
    status: current
    varbinds:
    - mplsL3VpnVrfPerfCurrNumRoutes
    - mplsL3VpnVrfConfMidRteThresh
  - oid: 1.3.6.1.2.1.10.166.11.0.4
    name: mplsL3VpnVrfNumVrfRouteMaxThreshExceeded
    category: diagnostic
    severity: warning
    description: "VRF route count threshold exceeded on {SNMP_DEVICE_HOSTNAME}\n  current routes: {mplsL3VpnVrfPerfCurrNumRoutes}\n  high-route threshold: {mplsL3VpnVrfConfHighRteThresh}"
    mib: MPLS-L3VPN-STD-MIB
    status: current
    varbinds:
    - mplsL3VpnVrfPerfCurrNumRoutes
    - mplsL3VpnVrfConfHighRteThresh
  - oid: 1.3.6.1.2.1.10.166.11.0.5
    name: mplsL3VpnNumVrfSecIllglLblThrshExcd
    category: security
    severity: warning
    description: "MPLS L3VPN security threshold exceeded on {SNMP_DEVICE_HOSTNAME}: illegal label violations detected\n  violation count: {mplsL3VpnVrfSecIllegalLblVltns}\nThreshold for mplsL3VpnIllLblRcvThrsh has been exceeded"
    mib: MPLS-L3VPN-STD-MIB
    status: current
    varbinds:
    - mplsL3VpnVrfSecIllegalLblVltns
  - oid: 1.3.6.1.2.1.10.166.11.0.6
    name: mplsL3VpnNumVrfRouteMaxThreshCleared
    category: diagnostic
    severity: notice
    description: "VRF route count has fallen below the maximum threshold on {SNMP_DEVICE_HOSTNAME}, indicating the prior overload condition has cleared\n  current routes: {mplsL3VpnVrfPerfCurrNumRoutes}\n  high threshold: {mplsL3VpnVrfConfHighRteThresh}"
    mib: MPLS-L3VPN-STD-MIB
    status: current
    varbinds:
    - mplsL3VpnVrfPerfCurrNumRoutes
    - mplsL3VpnVrfConfHighRteThresh
  - oid: 1.3.6.1.2.1.10.166.13.0.1
    name: gmplsTunnelDown
    category: state_change
    severity: err
    description: "GMPLS tunnel went down on {SNMP_DEVICE_HOSTNAME}\n  previous operational status: {mplsTunnelOperStatus}\n  admin status: {mplsTunnelAdminStatus}\n  error type: {gmplsTunnelErrorLastErrorType}\n  error reporter: {gmplsTunnelErrorReporter}\n  error code: {gmplsTunnelErrorCode}\n  error subcode: {gmplsTunnelErrorSubcode}"
    mib: GMPLS-TE-STD-MIB
    status: current
    varbinds:
    - mplsTunnelAdminStatus
