  - oid: 1.3.6.1.2.1.1.0.1
    name: T11-ZONE-SERVER-MIB::t11ZsRequestRejectNotify
    category: security
    severity: warning
    description: Zone Server rejected request {t11ZsRejectCtCommandString} from {t11ZsRejectRequestSource} on {_HOSTNAME}.
    status: current
    varbinds:
      - t11FamLocalSwitchWwn
      - t11ZsRejectRequestSource
      - t11ZsRejectCtCommandString
      - t11ZsRejectReasonCode
      - t11ZsRejectReasonCodeExp
  - oid: 1.3.6.1.2.1.1.0.2
    name: T11-ZONE-SERVER-MIB::t11ZsMergeFailureNotify
    category: state_change
    severity: warning
    description: Zone merge failure on interface {ifIndex} for fabric {t11ZsFabricIndex} on {_HOSTNAME}.
    status: current
    varbinds:
      - ifIndex
      - t11ZsFabricIndex
  - oid: 1.3.6.1.2.1.1.0.3
    name: T11-ZONE-SERVER-MIB::t11ZsMergeSuccessNotify
    category: state_change
    severity: notice
    description: Zone merge completed on interface {ifIndex} for fabric {t11ZsFabricIndex} on {_HOSTNAME}.
    status: current
    varbinds:
      - ifIndex
      - t11ZsFabricIndex
  - oid: 1.3.6.1.2.1.1.0.4
    name: T11-ZONE-SERVER-MIB::t11ZsDefZoneChangeNotify
    category: config_change
    severity: notice
    description: Default zone setting changed to {t11ZsServerDefaultZoneSetting} on {_HOSTNAME}.
    status: current
    varbinds:
      - t11ZsServerDefaultZoneSetting
  - oid: 1.3.6.1.2.1.1.0.5
    name: T11-ZONE-SERVER-MIB::t11ZsActivateNotify
    category: state_change
    severity: notice
    description: Zone Set activation completed with result {t11ZsActivateResult} on switch {t11FamLocalSwitchWwn} on {_HOSTNAME}.
    status: current
    varbinds:
      - t11FamLocalSwitchWwn
      - t11ZsActivateResult
