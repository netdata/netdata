    category: state_change
    severity: notice
    description: "VRF route count threshold cleared on {SNMP_DEVICE_HOSTNAME}\n  current routes: {mplsL3VpnVrfPerfCurrNumRoutes}\n  high threshold: {mplsL3VpnVrfConfHighRteThresh}"
    status: current
    varbinds:
    - mplsL3VpnVrfPerfCurrNumRoutes
    - mplsL3VpnVrfConfHighRteThresh
  - oid: 1.3.6.1.2.1.10.166.13.0.1
    name: GMPLS-TE-STD-MIB::gmplsTunnelDown
    category: state_change
    severity: err
    description: "GMPLS tunnel down on {SNMP_DEVICE_HOSTNAME}\n  admin status: {mplsTunnelAdminStatus}\n  operational status: {mplsTunnelOperStatus}\n  last error type: {gmplsTunnelErrorLastErrorType}\n  error reporter: {gmplsTunnelErrorReporter}\n  error code: {gmplsTunnelErrorCode}\n  error subcode: {gmplsTunnelErrorSubcode}"
    status: current
    varbinds:
