traps:
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.1
    name: Juniper-System-MIB::juniSystemHighMemUtil
    category: diagnostic
    severity: warning
    description: High memory utilization {{value "juniSystemMemUtilPct"}}% reached on {{hostname}}.
    status: current
    varbinds:
      - juniSystemMemCapacity
      - juniSystemMemUtilPct
      - juniSystemAbatedMemUtilThreshold
      - juniSystemHighMemUtilThreshold
      - juniSystemMemKBytesCapacity
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.2
    name: Juniper-System-MIB::juniSystemAbatedMemUtil
    category: diagnostic
    severity: warning
    description: System memory utilization has abated on {{hostname}}.
    status: current
    varbinds:
      - juniSystemMemCapacity
      - juniSystemMemUtilPct
      - juniSystemAbatedMemUtilThreshold
      - juniSystemHighMemUtilThreshold
      - juniSystemMemKBytesCapacity
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.3
    name: Juniper-System-MIB::juniSystemModuleOperStatusChange
    category: state_change
    severity: warning
    description: System module {{value "juniSystemModuleDescr"}} operational status changed to {{value "juniSystemModuleOperStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - juniSystemModuleCurrentType
      - juniSystemModuleAdminStatus
      - juniSystemModuleOperStatus
      - juniSystemModuleDisableReason
      - juniSystemModuleDescr
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.4
    name: Juniper-System-MIB::juniSystemPowerStatusChange
    category: diagnostic
    severity: warning
    description: Power element {{value "entPhysicalDescr"}} status changed to {{value "juniSystemPowerStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - entPhysicalDescr
      - juniSystemPowerStatus
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.5
    name: Juniper-System-MIB::juniSystemFanStatusChange
    category: diagnostic
    severity: crit
    description: Fan subsystem {{value "juniSystemFanStatus"}} on {{first (value "entPhysicalDescr") "fan"}} on {{hostname}}.
    status: current
    varbinds:
      - entPhysicalDescr
      - juniSystemFanStatus
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.6
    name: Juniper-System-MIB::juniSystemTempStatusChange
    category: diagnostic
    severity: alert
    description: System temperature status changed to {{value "juniSystemTempStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - juniSystemTempStatus
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.7
    name: Juniper-System-MIB::juniSystemTempProtectionStatusChange
    category: diagnostic
    severity: warning
    description: Thermal protection status changed to {{value "juniSystemTempProtectionStatus"}} on {{hostname}}.
    status: current
    varbinds:
      - juniSystemTempProtectionStatus
      - juniSystemTempProtectionHoldOffTimeRemaining
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.8
    name: Juniper-System-MIB::juniSystemReloadCommand
    category: state_change
    severity: notice
    description: System reload command received on {{hostname}}.
    status: current
  - oid: 1.3.6.1.4.1.4874.2.2.2.0.9
    name: Juniper-System-MIB::juniSystemUtilizationThreshold
    category: diagnostic
    severity: warning
    description: System resource utilization threshold exceeded on {{hostname}}.
    status: current
    varbinds:
      - juniSystemUtilizationThresholdDirection
      - juniSystemUtilizationMaxCapacity
      - juniSystemUtilizationCurrentValue
      - juniSystemUtilizationThresholdRising
      - juniSystemUtilizationThresholdFalling
      - juniSystemUtilizationHoldDownTime
