    name: ZXR10-MPLS-L2VPN::mplsL2vpnGenericInterfaceTrap
    category: state_change
    severity: warning
    description: L2VPN interface {{value "zxr10MplsL2vpnTrapIfName"}} status changed on {{hostname}}.
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapIfIndex
      - zxr10MplsL2vpnTrapIfName
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapVcid
