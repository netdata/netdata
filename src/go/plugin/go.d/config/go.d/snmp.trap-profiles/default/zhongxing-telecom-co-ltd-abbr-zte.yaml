  - oid: 1.3.6.1.4.1.3902.3.8.8.1
    name: ZXR10-SNMP-SECURITY-MIB::failureTrap
    category: auth
    severity: warning
    description: Failed login attempt from {{value "secIP"}} on {{hostname}}.
    status: current
    varbinds:
      - secBadCommunity
      - secIP
      - secCurrentStage
  - oid: 1.3.6.1.4.1.3902.3.8.8.2
    name: ZXR10-SNMP-SECURITY-MIB::changestageTrap
    category: auth
    severity: warning
    description: 'Failed login attempt{{with value "secTryCount"}} (count: {{.}}){{end}} on {{hostname}}.'
    status: current
    varbinds:
      - secTime
      - secChangeStage
      - secChangeReason
      - secTryCount
  - oid: 1.3.6.1.4.1.3902.3.101.7.11.1
    name: ZXR10-TELNET-MIB::zxr10TelnetACLFilter
    category: security
    severity: warning
    description: Telnet login blocked by ACL filter from {{value "zxr10TelnetSrcIPAddress"}} on {{hostname}}.
    status: current
    varbinds:
      - zxr10TelnetAclAppType
      - zxr10TelnetProtocolType
      - zxr10TelnetAddressType
      - zxr10TelnetSrcIPAddress
      - zxr10TelnetSrcPort
      - zxr10TelnetDestIPAddress
      - zxr10TelnetDestPort
