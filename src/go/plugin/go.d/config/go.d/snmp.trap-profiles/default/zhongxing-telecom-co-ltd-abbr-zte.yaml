    name: ZXR10-MIB::zxr10StatisticsAlarmTrap
    category: diagnostic
    severity: warning
    description: Statistics alarm {{value "zxr10StatisticsAlarmDescrip"}} on slot {{value "zxr10StatisticsAlarmSlotNo"}} port {{value "zxr10StatisticsAlarmPortNo"}} on {{hostname}}.
    status: current
    varbinds:
      - zxr10StatisticsAlarmRackNo
      - zxr10StatisticsAlarmShelfNo
      - zxr10StatisticsAlarmSlotNo
      - zxr10StatisticsAlarmPortNo
      - zxr10StatisticsAlarmCode
      - zxr10StatisticsAlarmLevel
      - zxr10StatisticsAlarmTime
      - zxr10StatisticsAlarmStatus
