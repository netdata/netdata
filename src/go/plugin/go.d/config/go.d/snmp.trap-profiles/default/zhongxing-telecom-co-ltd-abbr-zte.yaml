  - oid: 1.3.6.1.4.1.3902.3.4.20.1
    name: ZXR10-MIB::zxr10HardwareAlarmTrap
    category: diagnostic
    severity: warning
    description: Hardware alarm {{value "zxr10HardwareAlarmType"}} occurred on {{first (value "zxr10HardwareAlarmSlotNo") "slot"}} on {{hostname}}.
    status: current
    varbinds:
      - zxr10HardwareAlarmRackNo
      - zxr10HardwareAlarmShelfNo
      - zxr10HardwareAlarmSlotNo
      - zxr10HardwareAlarmPortNo
