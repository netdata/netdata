    name: ZXR10-MPLS-L2VPN::mplsL2vpnGenericProtocolTrap
    category: state_change
    severity: warning
    description: 'MPLS L2VPN protocol event occurred{{with value "zxr10MplsL2vpnTrapDetail"}}: {{.}}{{end}} on {{hostname}}.'
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapVcid
      - zxr10MplsL2vpnTrapPeerAddress
      - zxr10MplsL2vpnTrapVpnType
  - oid: 1.3.6.1.4.1.3902.3.104.1.3.4
    name: ZXR10-MPLS-L2VPN::mplsL2vpnSessionDownTrap
    category: state_change
    severity: crit
    description: MPLS L2VPN session to peer {{value "zxr10MplsL2vpnTrapPeerAddress"}} is down on {{hostname}}.
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapPeerAddress
  - oid: 1.3.6.1.4.1.3902.3.104.1.3.5
    name: ZXR10-MPLS-L2VPN::mplsL2vpnVplsDeleteTrap
    category: state_change
    severity: notice
    description: VPLS instance deleted{{with value "zxr10MplsL2vpnTrapVcid"}} for VCID {{.}}{{end}} on {{hostname}}.
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapVcid
  - oid: 1.3.6.1.4.1.3902.3.104.1.3.6
    name: ZXR10-MPLS-L2VPN::mplsL2vpnLinkTrap
    category: state_change
    severity: crit
    description: MPLS L2VPN link failure due to PSN route or label unavailability on {{hostname}}.
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapVcid
      - zxr10MplsL2vpnTrapPeerAddress
      - zxr10MplsL2vpnTrapVpnType
  - oid: 1.3.6.1.4.1.3902.3.104.1.3.7
    name: ZXR10-MPLS-L2VPN::mplsL2vpnPsnRouteDownTrap
    category: state_change
    severity: crit
    description: MPLS L2VPN PSN route to {{value "zxr10MplsL2vpnTrapPeerAddress"}} is down on {{hostname}}.
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapPeerAddress
  - oid: 1.3.6.1.4.1.3902.3.104.1.3.8
    name: ZXR10-MPLS-L2VPN::mplsL2vpnTETunnelDownTrap
    category: state_change
    severity: crit
    description: MPLS TE Tunnel {{value "zxr10MplsL2vpnTrapTETunnelId"}} went down on {{hostname}}.
    status: current
    varbinds:
      - zxr10MplsL2vpnTrapLevel
      - zxr10MplsL2vpnTrapDetail
      - zxr10MplsL2vpnTrapTETunnelId
