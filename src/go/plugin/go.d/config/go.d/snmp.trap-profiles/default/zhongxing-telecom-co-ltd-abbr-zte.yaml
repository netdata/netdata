    name: ZXR10-MIB::zxr10SoftProtocolAlarmTrap
    category: diagnostic
    severity: warning
    description: Softprotocol alarm {{value "zxr10SoftProtocolAlarmType"}} on slot {{value "zxr10SoftProtocolAlarmSlotNo"}} on {{hostname}}.
    status: current
    varbinds:
      - zxr10SoftProtocolAlarmRackNo
