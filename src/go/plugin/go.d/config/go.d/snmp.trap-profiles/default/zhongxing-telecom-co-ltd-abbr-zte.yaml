    name: ZXR10-MPLS-L2VPN::mplsL2vpnMatchInterfaceTrap
    category: state_change
    severity: warning
    description: L2VPN interface {{value "zxr10MplsL2vpnTrapIfName"}} went down on {{hostname}}.
