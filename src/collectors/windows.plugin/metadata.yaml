            - name: ipv6.tcppackets
              description: IPv6 TCP Packets
              unit: "packets/s"
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: ipv6.udppackets
              description: IPv6 UDP Packets
              unit: "packets/s"
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: ipv6.icmp
              description: IPv6 ICMP Packets
              unit: "packets/s"
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: ipv6.errors
              description: IPv6 Errors
