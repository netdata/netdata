          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: "netdata.conf"
          section_name: "[plugin:windows:PerflibStorage]"
          description: "The Netdata main configuration file"
        options:
          description: ""
          folding:
            title: "Config option"
            enabled: false
          list:
            - name: update every
              description: Data collection frequency.
              default_value: 1
              required: false
        examples:
          folding:
            enabled: true
            title: ""
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: System
          description: "These metrics refer to the entire System."
          labels: []
          metrics:
            - name: system.io
              description: Disk I/O
              unit: "KiB/s"
              chart_type: area
              dimensions:
                - name: reads
                - name: writes
        - name: Logical Disk
          description: "These metrics refer to Logical Disks."
          labels:
            - name: mount_point
              description: "Drive letter or mount point path assigned by Windows (e.g., 'C:', 'D:')."
            - name: driver_type
              description: "Classification of the disk device (e.g., norootdir, removable, cdrom, ramdisk)."
            - name: filesystem
              description: "File system format used on the volume (e.g., NTFS, FAT32)."
            - name: rw_mode
              description: "Current read/write permissions status of the volume (read-only access, read and write access)."
          metrics:
            - name: disk.space
              description: Disk Space Usage
              unit: "GiB"
              chart_type: stacked
              dimensions:
                - name: avail
                - name: used
        - name: Physical Disk
          description: "These metrics refer to Physical Disks."
          labels:
            - name: mount_point
              description: "Drive letter or mount point path assigned by Windows (e.g., 'C:', 'D:')."
            - name: device
              description: Manufacturer model name.
            - name: model
              description: The device model.
            - name: device_id
              description: Unique hardware identifier for the storage device within the system.
          metrics:
            - name: disk.io
              description: Disk I/O Bandwidth
              unit: "KiB/s"
              chart_type: area
              dimensions:
                - name: reads
                - name: writes
            - name: disk.avgsz
              description: Average Completed I/O Operation Bandwidth
              unit: "KiB/operation"
              chart_type: area
              dimensions:
                - name: reads
                - name: writes
            - name: disk.ops
              description: Disk Completed I/O Operations
              unit: "operations/s"
              chart_type: line
              dimensions:
                - name: reads
                - name: writes
            - name: disk.split
              description: Split I/O Operations
              unit: "operations/s"
              chart_type: line
              dimensions:
                - name: discards
            - name: disk.await
              description: Average Completed I/O Operation Time
              unit: "milliseconds/operation"
              chart_type: line
              dimensions:
                - name: reads
                - name: writes
            - name: disk.svctm
              description: Average Service Time
              unit: "milliseconds/operation"
              chart_type: line
              dimensions:
                - name: svctm
            - name: disk.util
              description: Disk Utilization Time
              unit: "percent"
              chart_type: area
              dimensions:
                - name: utilization
            - name: disk.busy
              description: Disk Busy Time
              unit: "milliseconds"
              chart_type: area
              dimensions:
                - name: busy
            - name: disk.iotime
              description: Disk Total I/O Time
              unit: "milliseconds/s"
              chart_type: area
              dimensions:
                - name: reads
                - name: writes
            - name: disk.qops
              description: Disk Current I/O Operations
              unit: "operations"
              chart_type: line
              dimensions:
                - name: operations
