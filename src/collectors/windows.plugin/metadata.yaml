        metrics_description: |
          Detailed statistics for all disk devices and volumes.
        method_description: |
          It queries 'LogicalDisk' and 'PhysicalDisk' objects from Perflib in order to gather the metrics.
      supported_platforms:
        include: ["windows"]
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
