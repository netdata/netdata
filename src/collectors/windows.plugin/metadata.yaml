              description: TCP Packets
              unit: "packets/s"
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: ipv4.packets
              description: IPv4 Packets
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
