                - name: out
            - name: mem.system_pool_size
              description: System Memory Pool
              unit: "bytes"
              chart_type: stacked
              dimensions:
                - name: paged
                - name: non-paged
            - name: mem.system_pool_paged
              description: Paged System Memory Pool
              unit: "bytes"
              chart_type: line
              dimensions:
                - name: resident
            - name: mem.system_pool_allocs
              description: System Pool Allocations
              unit: "allocations/s"
              chart_type: line
              dimensions:
                - name: paged
                - name: non-paged
            - name: mem.system_page_table_entries
              description: Unused page table entries.
              unit: "pages"
              chart_type: line
              dimensions:
                - name: free
            - name: mem.committed
              description: Committed Memory
              unit: "bytes"
              chart_type: line
              dimensions:
                - name: committed
                - name: limit
            - name: mem.system_cache
              description: System Cache Memory
              unit: "bytes"
              chart_type: line
              dimensions:
                - name: cache
                - name: peak
                - name: resident
            - name: mem.page_lists
              description: Memory Page Lists
              unit: "bytes"
              chart_type: stacked
              dimensions:
                - name: free
                - name: modified
                - name: standby_core
                - name: standby_normal
                - name: standby_reserve
            - name: mem.system_code
              description: System Code Memory
              unit: "bytes"
              chart_type: line
              dimensions:
                - name: resident
                - name: total
            - name: mem.system_drivers
              description: System Driver Memory
              unit: "bytes"
              chart_type: line
              dimensions:
                - name: resident
                - name: total
            - name: mem.page_faults_breakdown
              description: Memory Page Fault Breakdown
              unit: "faults/s"
              chart_type: line
              dimensions:
                - name: cache
                - name: demand_zero
                - name: transition
                - name: write_copies
            - name: mem.transition_repurposed
              description: Transition Pages Repurposed
              unit: "pages/s"
              chart_type: line
              dimensions:
                - name: repurposed
