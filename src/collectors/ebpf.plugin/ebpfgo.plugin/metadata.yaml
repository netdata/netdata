plugin_name: ebpf-go.plugin
modules:
  - meta:
      plugin_name: ebpf-go.plugin
      module_name: cachestat
      monitored_instance:
        name: eBPF Cachestat
        link: "https://kernel.org/"
        categories:
          - data-collection.operating-systems
        icon_filename: "ebpf.jpg"
      related_resources:
        integrations:
          list:
            - plugin_name: apps.plugin
              module_name: apps
            - plugin_name: cgroups.plugin
              module_name: /sys/fs/cgroup
              monitored_instance_name: Containers
      info_provided_to_referring_integrations:
        description: ""
      keywords:
        - Page cache
        - Hit ratio
        - eBPF
    overview:
      data_collection:
        metrics_description: "Monitor Linux page cache events giving for users a general vision about how his kernel is manipulating files."
        method_description: "Attach tracing (kprobe, trampoline) to internal kernel functions according options used to compile kernel."
      supported_platforms:
        include:
          - Linux
        exclude: []
      multi_instance: true
      additional_permissions:
        description: "The plugin needs setuid because it loads data inside kernel. Netdata sets necessary permission during installation time."
      default_behavior:
        auto_detection:
          description: "The plugin checks kernel compilation flags (CONFIG_KPROBES, CONFIG_BPF, CONFIG_BPF_SYSCALL, CONFIG_BPF_JIT), presence of BTF files, and the configured object flavor to decide which eBPF program will be attached."
        limits:
          description: ""
        performance_impact:
          description: "This thread will add overhead every time that an internal kernel function monitored by this thread is called. The estimated additional period of time is between 90-200ns per call on kernels that do not have BTF technology."
    setup:
      prerequisites:
        list:
          - title: Compile kernel
            description: |
              Check if your kernel was compiled with necessary options (CONFIG_KPROBES, CONFIG_BPF, CONFIG_BPF_SYSCALL, CONFIG_BPF_JIT) in `/proc/config.gz` or inside /boot/config file. Some cited names can be different according to the preferences of Linux distributions.
              When you do not have options set, it is necessary to get the kernel source code from https://kernel.org or a kernel package from your distribution, this last is preferred. The kernel compilation has a well defined pattern, but distributions can deliver their configuration files
              with different names.

              Now follow steps:
              1. Copy the configuration file to /usr/src/linux/.config.
              2. Select the necessary options: make oldconfig
              3. Compile your kernel image: make bzImage
              4. Compile your modules: make modules
              5. Copy your new kernel image for boot loader directory
              6. Install the new modules: make modules_install
              7. Generate an initial ramdisk image (`initrd`) if it is necessary.
              8. Update your boot loader
      configuration:
        file:
          name: "ebpf.d.conf"
          description: "Primary configuration file for ebpf-go.plugin. The collector also accepts the legacy `ebpf.d/cachestat.conf` overlay for backward compatibility."
        options:
          description: |
            All options are defined inside section `[global]`.
          folding:
            title: "Config options"
            enabled: true
          list:
            - name: update every
              description: Data collection frequency. When Netdata provides a pluginsd interval, the collector follows it and uses this value only as a fallback.
              default_value: 10
              required: false
            - name: ebpf load mode
              description: Define whether plugin will monitor the call (`entry`) for the functions or it will also monitor the return (`return`).
              default_value: entry
              required: false
            - name: apps
              description: Enable or disable integration with apps.plugin
              default_value: no
              required: false
            - name: cgroups
              description: Enable or disable integration with cgroup.plugin
              default_value: no
              required: false
            - name: pid table size
              description: Number of elements stored inside hash tables used to monitor calls per PID.
              default_value: 32768
              required: false
            - name: ebpf object flavor
              description: "Select the cachestat object flavor to load. Available values are `arena`, `buffer ring` (also accepted as `buffer`), and `legacy` (also accepted as `tracing`). The default is `buffer`, and the collector falls back when the requested flavor is not available on the system."
              default_value: buffer
              required: false
            - name: ebpf type format
              description: "Define the file type to load an eBPF program. Three options are available: `legacy` (Attach only `kprobe`), `co-re` (Plugin tries to use `trampoline` when available), and `auto` (plugin check OS configuration before to load)."
              default_value: auto
              required: false
            - name: ebpf co-re tracing
              description: "Select the attach method used by plugin when `co-re` is defined in previous option. Two options are available: `trampoline` (Option with lowest overhead), and `probe` (the same of legacy code)."
              default_value: trampoline
              required: false
            - name: maps per core
              description: Define how plugin will load their hash maps. When enabled (`yes`) plugin will load one hash table per core, instead to have centralized information.
              default_value: yes
              required: false
            - name: lifetime
              description: Set default lifetime for thread when enabled by cloud.
              default_value: 300
              required: false
        examples:
          folding:
            enabled: true
            title: ""
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: global
          description: "These metrics show total number of calls to functions inside kernel."
          labels: []
          metrics:
            - name: mem.cachestat_ratio
              description: Hit ratio
              unit: "%"
              chart_type: line
              dimensions:
                - name: ratio
            - name: mem.cachestat_dirties
              description: Number of dirty pages
              unit: "page/s"
              chart_type: line
              dimensions:
                - name: dirty
            - name: mem.cachestat_hits
              description: Number of accessed files
              unit: "hits/s"
              chart_type: line
              dimensions:
                - name: hit
            - name: mem.cachestat_misses
              description: Files out of page cache
              unit: "misses/s"
              chart_type: line
              dimensions:
                - name: miss
  - meta:
      plugin_name: ebpf-go.plugin
      module_name: dns
      monitored_instance:
        name: eBPF DNS
        link: "https://kernel.org/"
        categories:
          - data-collection.operating-systems
        icon_filename: "ebpf.jpg"
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
      keywords:
        - DNS
        - mDNS
        - Network monitoring
        - eBPF
    overview:
      data_collection:
        metrics_description: "Monitor DNS query and response traffic at the kernel level, broken down by transport protocol (UDP/TCP) and IP family (IPv4/IPv6). Data is exposed through the on-demand `dns-queries` function consumed by the network-viewer."
        method_description: "Attach a BPF socket filter to a raw AF_PACKET socket to capture and count DNS packets on port 53 (standard DNS) and port 5353 (mDNS). The filter runs entirely in the kernel; only per-packet counters are copied to userspace."
      supported_platforms:
        include:
          - Linux
        exclude: []
      multi_instance: true
      additional_permissions:
        description: "The plugin needs setuid because it loads data inside the kernel. Netdata sets the necessary permissions during installation."
      default_behavior:
        auto_detection:
          description: "The plugin checks kernel compilation flags (CONFIG_KPROBES, CONFIG_BPF, CONFIG_BPF_SYSCALL, CONFIG_BPF_JIT) and selects the best available BPF object flavor (arena, buffer, or base) for the running kernel."
        limits:
          description: ""
        performance_impact:
          description: "The BPF socket filter runs in the kernel for every received Ethernet frame. Overhead is proportional to DNS traffic volume and is negligible on typical hosts."
    setup:
      prerequisites:
        list:
          - title: Compile kernel
            description: |
              Check if your kernel was compiled with necessary options (CONFIG_KPROBES, CONFIG_BPF, CONFIG_BPF_SYSCALL, CONFIG_BPF_JIT) in `/proc/config.gz` or inside /boot/config file. Some cited names can be different according to the preferences of Linux distributions.
              When you do not have options set, it is necessary to get the kernel source code from https://kernel.org or a kernel package from your distribution, this last is preferred. The kernel compilation has a well defined pattern, but distributions can deliver their configuration files
              with different names.

              Now follow steps:
              1. Copy the configuration file to /usr/src/linux/.config.
              2. Select the necessary options: make oldconfig
              3. Compile your kernel image: make bzImage
              4. Compile your modules: make modules
              5. Copy your new kernel image for boot loader directory
              6. Install the new modules: make modules_install
              7. Generate an initial ramdisk image (`initrd`) if it is necessary.
              8. Update your boot loader
      configuration:
        file:
          name: "ebpf.d.conf"
          description: "Primary configuration file for ebpf-go.plugin. Enable the dns module in the `[ebpf programs]` section. The module also accepts the legacy `ebpf.d/dns.conf` overlay for per-module overrides."
        options:
          description: |
            The `dns` option in section `[ebpf programs]` controls whether the module is loaded.
            Per-module overrides (`update every`, `ebpf object flavor`) belong in `ebpf.d/dns.conf`.
          folding:
            title: "Config options"
            enabled: true
          list:
            - name: dns
              description: Enable (`yes`) or disable (`no`) the DNS monitoring module.
              default_value: "no"
              required: false
            - name: update every
              description: Data collection frequency in seconds.
              default_value: 10
              required: false
            - name: ebpf object flavor
              description: "Select the BPF object flavor. Available values are `arena`, `buffer ring` (also accepted as `buffer`), and `legacy` (also accepted as `tracing`). The collector falls back to the next available flavor when the requested one is not supported by the running kernel."
              default_value: buffer
              required: false
        examples:
          folding:
            enabled: true
            title: ""
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: "The DNS module does not publish standalone Netdata charts. It writes DNS flow data to a POSIX shared-memory segment; the `network-viewer.plugin` reads that segment and registers the `dns-queries` on-demand function (FUNCTIONGLOBAL). The function returns a table with four rows (one per transport-and-IP-family combination) and the following columns: `Transport` (UDP or TCP), `IPFamily` (IPv4 or IPv6), `Queries` (DNS queries/s), `Responses` (DNS responses/s)."
      availability: []
      scopes: []
  - meta:
      plugin_name: ebpf-go.plugin
      module_name: socket
      monitored_instance:
        name: eBPF Socket
        link: "https://kernel.org/"
        categories:
          - data-collection.operating-systems
        icon_filename: "ebpf.jpg"
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
      keywords:
        - TCP
        - UDP
        - Network monitoring
        - eBPF
    overview:
      data_collection:
        metrics_description: "Monitor TCP and UDP function calls, bandwidth, errors, and connection counts. Data is exposed through the on-demand `network-protocols` function consumed by the network-viewer."
        method_description: "Attach kprobe or fentry/fexit trampolines to the kernel functions `tcp_sendmsg`, `tcp_cleanup_rbuf`, `tcp_connect` (IPv4 and IPv6), `tcp_close`, `udp_sendmsg`, and `udp_recvmsg`. Per-cycle deltas and byte counts are computed in userspace from the BPF map snapshots."
      supported_platforms:
        include:
          - Linux
        exclude: []
      multi_instance: true
      additional_permissions:
        description: "The plugin needs setuid because it loads data inside the kernel. Netdata sets the necessary permissions during installation."
      default_behavior:
        auto_detection:
          description: "The plugin checks kernel compilation flags (CONFIG_KPROBES, CONFIG_BPF, CONFIG_BPF_SYSCALL, CONFIG_BPF_JIT), presence of BTF files, and the configured object flavor to decide which eBPF program will be attached."
        limits:
          description: ""
        performance_impact:
          description: "This thread adds overhead every time a monitored kernel TCP or UDP function is called. The estimated additional period of time is between 90-200ns per call on kernels that do not have BTF technology."
    setup:
      prerequisites:
        list:
          - title: Compile kernel
            description: |
              Check if your kernel was compiled with necessary options (CONFIG_KPROBES, CONFIG_BPF, CONFIG_BPF_SYSCALL, CONFIG_BPF_JIT) in `/proc/config.gz` or inside /boot/config file. Some cited names can be different according to the preferences of Linux distributions.
              When you do not have options set, it is necessary to get the kernel source code from https://kernel.org or a kernel package from your distribution, this last is preferred. The kernel compilation has a well defined pattern, but distributions can deliver their configuration files
              with different names.

              Now follow steps:
              1. Copy the configuration file to /usr/src/linux/.config.
              2. Select the necessary options: make oldconfig
              3. Compile your kernel image: make bzImage
              4. Compile your modules: make modules
              5. Copy your new kernel image for boot loader directory
              6. Install the new modules: make modules_install
              7. Generate an initial ramdisk image (`initrd`) if it is necessary.
              8. Update your boot loader
      configuration:
        file:
          name: "ebpf.d.conf"
          description: "Primary configuration file for ebpf-go.plugin. Enable the socket module in the `[ebpf programs]` section. Per-module overrides belong in `ebpf.d/socket.conf`."
        options:
          description: |
            The `socket` option in section `[ebpf programs]` controls whether the module is loaded.
            Per-module overrides (`update every`, `maps per core`, `btf path`, `ebpf object flavor`) belong in `ebpf.d/socket.conf`.
          folding:
            title: "Config options"
            enabled: true
          list:
            - name: socket
              description: Enable (`yes`) or disable (`no`) the socket monitoring module.
              default_value: "no"
              required: false
            - name: update every
              description: Data collection frequency in seconds.
              default_value: 10
              required: false
            - name: maps per core
              description: When enabled (`yes`), the plugin allocates one BPF hash table per CPU core instead of a single shared table. Improves throughput on multi-core systems; ignored on kernels older than 4.15.
              default_value: "yes"
              required: false
            - name: btf path
              description: Path to the directory containing BTF files used for CO-RE (Compile Once, Run Everywhere) loading.
              default_value: /sys/kernel/btf/
              required: false
            - name: ebpf object flavor
              description: "Select the BPF object flavor. Available values are `arena`, `buffer ring` (also accepted as `buffer`), and `legacy` (also accepted as `tracing`). The collector falls back to the next available flavor when the requested one is not supported by the running kernel."
              default_value: buffer
              required: false
        examples:
          folding:
            enabled: true
            title: ""
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: "The socket module does not publish standalone Netdata charts. It registers the `network-protocols` on-demand function (FUNCTIONGLOBAL) consumed by the network-viewer. The function returns a table with two rows (TCP and UDP) and the following columns: `Transport` (TCP or UDP), `Family` (IPv4+IPv6 combined), `Received` (segments or datagrams/s), `Sent` (segments or datagrams/s), `Errors` (send/receive errors), `ConnActive` (active connections opened), `ConnEstablished` (currently established connections), `ConnPassive` (passive connections opened), `ConnReset` (reset connections), `SegsTotal` (total segments/s), `SegsRetransmitted` (retransmitted segments/s), `DatagramsNoPort` (datagrams with no destination port/s)."
      availability: []
      scopes: []
