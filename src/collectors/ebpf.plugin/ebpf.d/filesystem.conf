# The `ebpf load mode` option accepts the following values :
#  `entry` : The eBPF collector only monitors calls for the functions, and does not show charts related to errors.
#  `return : In the `return` mode, the eBPF collector monitors the same kernel functions as `entry`, but also creates
#            new charts for the return of these functions, such as errors.
#
# The `ebpf object flavor` option selects the eBPF object file family:
#  `arena`      : Use the BPF arena object flavor when available.
#  `buffer ring`: Use the ring-buffer object flavor when available.
#  `legacy`     : Use the legacy tracing object files.
# If the requested flavor is not available, eBPFGo falls back to the next supported flavor.
# Legacy C modules accept this key for compatibility; `legacy` forces the legacy path.
#
# The `lifetime` defines the time length a thread will run when it is enabled by a function.
#
# The eBPF collector also creates charts for each running application through an integration with the `apps plugin`.
# If you want to disable the integration with `apps.plugin` along with the above charts, change the setting `apps` to
# 'no'.
#  
[global]
#    ebpf load mode = entry
    ebpf object flavor = buffer
#    update every = 10
    lifetime = 300

# All filesystems are named as 'NAMEdist' where NAME is the filesystem name while 'dist' is a reference for distribution.
[filesystem]
    btrfsdist = yes
    ext4dist = yes
    nfsdist = yes
    xfsdist = yes
    zfsdist = yes
