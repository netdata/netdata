# The `ebpf object flavor` option selects the eBPF object file family:
#  `arena`  : Use the BPF arena object flavor when available.
#  `buffer` : Use the ring-buffer object flavor when available (aliases: `buffer ring`, `ring buffer`).
#  `legacy` : Use the legacy tracing object files (alias: `tracing`).
# If the requested flavor is not available, eBPFGo falls back to the next supported flavor.
# Legacy C modules accept this key for compatibility; `legacy` forces the legacy path.
#
# The legacy `ebpf type format` option is still accepted for compatibility:
#  `auto`  : Let the collector choose the load path.
#  `legacy`: Use the legacy tracing object files.
#  `co-re` : Use CO-RE when available.
#
# Uncomment lines to define specific options for the dns thread.
[global]
    update every = 10
    ebpf object flavor = buffer
    ebpf type format = auto
