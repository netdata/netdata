plugin_name: macos.plugin
modules:
  - meta:
      plugin_name: macos.plugin
      module_name: mach_smi
      monitored_instance:
        name: macOS
        link: "https://www.apple.com/macos"
        categories:
          - data-collection.operating-systems
        icon_filename: "macos.svg"
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
      keywords:
        - macos
        - apple
        - darwin
    overview:
      data_collection:
        metrics_description: "Monitor macOS metrics for efficient operating system performance, power sources, thermal pressure, sensors, fans, storage, and networking."
        method_description: |
          The plugin uses six different methods to collect data:
            - The function `sysctlbyname` is called to collect network, swap, loadavg, and boot time.
            - The function `host_statistics` is called to collect CPU and virtual memory data.
            - The function `IOServiceGetMatchingServices` is called to collect storage information.
            - The function `IOPSCopyPowerSourcesInfo` is called to collect battery and UPS power source data.
            - The native Apple `powermetrics` command is sampled in the background to collect thermal pressure, SMC temperatures, and fan speed when available.
            - The native IOKit NVMe SMART user client is sampled to collect NVMe health data when macOS exposes SMART-capable NVMe services.
      supported_platforms:
        include:
          - macOS
        exclude: []
      multi_instance: false
      additional_permissions:
        description: "Battery, UPS power-source, and native NVMe SMART metrics use public IOKit APIs and do not require external tools. Exact thermal and fan readings use the native Apple `powermetrics` command, which requires `netdata` to run with sufficient macOS privileges; without those privileges, the thermal/fan sampler disables itself after repeated failures."
      default_behavior:
        auto_detection:
          description: "The collector auto-detects macOS power sources and NVMe SMART-capable services, and only creates charts for values exposed by the hardware and operating system."
        limits:
          description: "Power-source and NVMe SMART enumeration are capped internally to avoid unexpected chart cardinality. The `powermetrics` sampler is rate-limited and cached so it does not run in the one-second collection hot path."
        performance_impact:
          description: "Power-source collection is lightweight. Native NVMe SMART reads default to the same ten-second cadence as the existing NVMe collector, while device discovery is rate-limited. Thermal and fan collection runs `powermetrics` at a configurable interval, defaulting to once per minute with a one-second sample window."
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: "netdata.conf"
          description: "The netdata main configuration file."
        options:
          description: |
            There are six sections in the file which you can configure:

            - `[plugin:macos:sysctl]` - Enable or disable monitoring for network, swap, loadavg, and boot time.
            - `[plugin:macos:mach_smi]` - Enable or disable monitoring for CPU and Virtual memory.
            - `[plugin:macos:iokit]` - Enable or disable monitoring for storage device.
            - `[plugin:macos:power_sources]` - Enable or disable battery and UPS power-source metrics.
            - `[plugin:macos:powermetrics]` - Configure thermal and fan sampling through native Apple `powermetrics`.
            - `[plugin:macos:nvme_smart]` - Configure native IOKit NVMe SMART sampling.
          folding:
            title: "Config options"
            enabled: true
          list:
            - name: enable load average
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of load average metrics (load1, load5, load15).
              default_value: yes
              required: false
            - name: system swap
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of system swap metrics (free, used).
              default_value: yes
              required: false
            - name: bandwidth
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of network bandwidth metrics (received, sent).
              default_value: yes
              required: false
            - name: ipv4 TCP packets
              description: Enable or disable monitoring of IPv4 TCP total packets metrics (received, sent).
              section_name: plugin:macos:sysctl
              default_value: yes
              required: false
            - name: ipv4 TCP errors
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv4 TCP packets metrics (Input Errors, Checksum, Retransmission segments).
              default_value: yes
              required: false
            - name: ipv4 TCP handshake issues
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv4 TCP handshake metrics (Established Resets, Active Opens, Passive Opens, Attempt Fails).
              default_value: yes
              required: false
            - name: ECN packets
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ECN statistics metrics (InCEPkts, InNoECTPkts).
              default_value: auto
              required: false
            - name: TCP SYN cookies
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of TCP SYN cookies metrics (received, sent, failed).
              default_value: auto
              required: false
            - name: TCP out-of-order queue
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of TCP out-of-order queue metrics (inqueue).
              default_value: auto
              required: false
            - name: TCP connection aborts
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of TCP connection aborts metrics (Bad Data, User closed, No memory, Timeout).
              default_value: auto
              required: false
            - name: ipv4 UDP packets
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ipv4 UDP packets metrics (sent, received.).
              default_value: yes
              required: false
            - name: ipv4 UDP errors
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ipv4 UDP errors metrics (Recieved Buffer error, Input Errors, No Ports, IN Checksum Errors, Ignore Multi).
              default_value: yes
              required: false
            - name: ipv4 icmp packets
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv4 ICMP packets metrics (sent, received, in error, OUT error, IN Checksum error).
              default_value: yes
              required: false
            - name: ipv4 icmp messages
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ipv4 ICMP messages metrics (I/O messages, I/O Errors, In Checksum).
              default_value: yes
              required: false
            - name: ipv4 packets
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ipv4 packets metrics (received, sent, forwarded, delivered).
              default_value: yes
              required: false
            - name: ipv4 fragments sent
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv4 fragments sent metrics (ok, fails, creates).
              default_value: yes
              required: false
            - name: ipv4 fragments assembly
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv4 fragments assembly metrics (ok, failed, all).
              default_value: yes
              required: false
            - name: ipv4 errors
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv4 errors metrics (I/O discard, I/O HDR errors, In Addr errors, In Unknown protos, OUT No Routes).
              default_value: yes
              required: false
            - name: ipv6 packets
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv6 packets metrics (received, sent, forwarded, delivered).
              default_value: auto
              required: false
            - name: ipv6 fragments sent
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv6 fragments sent metrics (ok, failed, all).
              default_value: auto
              required: false
            - name: ipv6 fragments assembly
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv6 fragments assembly metrics (ok, failed, timeout, all).
              default_value: auto
              required: false
            - name: ipv6 errors
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of IPv6 errors metrics (I/O Discards, In Hdr Errors, In Addr Errors, In Truncaedd Packets, I/O No Routes).
              default_value: auto
              required: false
            - name: icmp
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP metrics (sent, received).
              default_value: auto
              required: false
            - name: icmp redirects
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP redirects metrics (received, sent).
              default_value: auto
              required: false
            - name: icmp errors
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP metrics (I/O Errors, In Checksums, In Destination Unreachable, In Packet too big, In Time Exceeds, In Parm Problem, Out Dest Unreachable, Out Timee Exceeds, Out Parm Problems.).
              default_value: auto
              required: false
            - name: icmp echos
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP echos metrics (I/O Echos, I/O Echo Reply).
              default_value: auto
              required: false
            - name: icmp router
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP router metrics (I/O Solicits, I/O Advertisements).
              default_value: auto
              required: false
            - name: icmp neighbor
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP neighbor metrics (I/O Solicits, I/O Advertisements).
              default_value: auto
              required: false
            - name: icmp types
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of ICMP types metrics (I/O Type1, I/O Type128, I/O Type129, Out Type133, Out Type135, In Type136, Out Type145).
              default_value: auto
              required: false
            - name: space usage for all disks
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of space usage for all disks metrics (available, used, reserved for root).
              default_value: yes
              required: false
            - name: inodes usage for all disks
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of inodes usage for all disks metrics (available, used, reserved for root).
              default_value: yes
              required: false
            - name: bandwidth
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of bandwidth metrics (received, sent).
              default_value: yes
              required: false
            - name: system uptime
              section_name: plugin:macos:sysctl
              description: Enable or disable monitoring of system uptime metrics (uptime).
              default_value: yes
              required: false
            - name: cpu utilization
              section_name: plugin:macos:mach_smi
              description: Enable or disable monitoring of CPU utilization metrics (user, nice, system, idel).
              default_value: yes
              required: false
            - name: system ram
              section_name: plugin:macos:mach_smi
              description: Enable or disable monitoring of system RAM metrics (Active, Wired, throttled, compressor, inactive, purgeable, speculative, free).
              default_value: yes
              required: false
            - name: swap i/o
              section_name: plugin:macos:mach_smi
              description: Enable or disable monitoring of SWAP I/O metrics (I/O Swap).
              default_value: yes
              required: false
            - name: memory page faults
              section_name: plugin:macos:mach_smi
              description: Enable or disable monitoring of memory page faults metrics (memory, cow, I/O page, compress, decompress, zero fill, reactivate, purge).
              default_value: yes
              required: false
            - name: disk i/o
              section_name: plugin:macos:iokit
              description: Enable or disable monitoring of disk I/O metrics (In, Out).
              default_value: yes
              required: false
            - name: battery capacity
              section_name: plugin:macos:power_sources
              description: Enable or disable monitoring of battery capacity metrics.
              default_value: yes
              required: false
            - name: power supply voltage
              section_name: plugin:macos:power_sources
              description: Enable or disable monitoring of battery and UPS voltage metrics.
              default_value: yes
              required: false
            - name: power supply current
              section_name: plugin:macos:power_sources
              description: Enable or disable monitoring of battery and UPS current metrics.
              default_value: yes
              required: false
            - name: battery temperature
              section_name: plugin:macos:power_sources
              description: Enable or disable monitoring of battery temperature metrics when exposed by macOS.
              default_value: yes
              required: false
            - name: battery cycle count
              section_name: plugin:macos:power_sources
              description: Enable or disable monitoring of battery cycle count metrics when exposed by macOS.
              default_value: yes
              required: false
            - name: sample every
              section_name: plugin:macos:powermetrics
              description: How often to run the native `powermetrics` thermal and fan sampler.
              default_value: 60s
              required: false
            - name: sample window
              section_name: plugin:macos:powermetrics
              description: Sampling window passed to `powermetrics`.
              default_value: 1000ms
              required: false
            - name: command timeout
              section_name: plugin:macos:powermetrics
              description: Maximum time to wait for one `powermetrics` sample before terminating it.
              default_value: 5000ms
              required: false
            - name: command path
              section_name: plugin:macos:powermetrics
              description: Path to the native Apple `powermetrics` command.
              default_value: /usr/bin/powermetrics
              required: false
            - name: thermal pressure
              section_name: plugin:macos:powermetrics
              description: Enable or disable monitoring of macOS thermal pressure state.
              default_value: yes
              required: false
            - name: SMC fan speed
              section_name: plugin:macos:powermetrics
              description: Enable or disable monitoring of SMC fan speed when available.
              default_value: yes
              required: false
            - name: SMC temperatures
              section_name: plugin:macos:powermetrics
              description: Enable or disable monitoring of SMC CPU and GPU die temperatures when available.
              default_value: yes
              required: false
            - name: SMC thermal levels
              section_name: plugin:macos:powermetrics
              description: Enable or disable monitoring of SMC thermal levels when available.
              default_value: yes
              required: false
            - name: SMC prochot
              section_name: plugin:macos:powermetrics
              description: Enable or disable monitoring of SMC processor-hot assertion flags when available.
              default_value: yes
              required: false
            - name: sample every
              section_name: plugin:macos:nvme_smart
              description: How often to read native NVMe SMART data through IOKit.
              default_value: 10s
              required: false
            - name: discovery every
              section_name: plugin:macos:nvme_smart
              description: How often to rescan IORegistry for NVMe SMART-capable services.
              default_value: 300s
              required: false
        examples:
          folding:
            enabled: false
            title: "Config"
          list:
            - name: Disable swap monitoring.
              folding:
                enabled: true
              description: A basic example that discards swap monitoring
              config: |
                [plugin:macos:sysctl]
                  system swap = no
                [plugin:macos:mach_smi]
                  swap i/o = no
            - name: Disable complete Machine SMI section.
              folding:
                enabled: true
              description: A basic example that discards swap monitoring
              config: |
                [plugin:macos:mach_smi]
                  cpu utilization = no
                  system ram = no
                  swap i/o = no
                  memory page faults = no
                  disk i/o = no
            - name: Disable thermal and fan sampling.
              folding:
                enabled: true
              description: Disable the privileged `powermetrics` sampler while keeping the rest of `macos.plugin` enabled.
              config: |
                [plugin:macos]
                  powermetrics = no
            - name: Disable native NVMe SMART sampling.
              folding:
                enabled: true
              description: Disable native IOKit NVMe SMART health monitoring while keeping generic disk I/O monitoring enabled.
              config: |
                [plugin:macos]
                  nvme smart = no
    troubleshooting:
      problems:
        list:
          - name: Thermal and fan charts are missing
            description: |
              The thermal and fan charts depend on the native Apple `powermetrics` command. On macOS, `powermetrics` requires sufficient privileges; if `netdata` cannot run it, the sampler disables itself after repeated failures to avoid log noise.

              Battery and UPS power-source charts do not depend on `powermetrics` and should still appear when macOS exposes power-source data.
          - name: NVMe health charts are missing
            description: |
              Native NVMe health charts appear only when macOS exposes NVMe SMART-capable services through IOKit. The collector does not use `nvme-cli` or any external NVMe tool on macOS.

              If generic disk I/O charts are present but NVMe health charts are absent, the device, controller, or macOS driver may not expose the native NVMe SMART user client.
    alerts:
      - name: interface_speed
        link: https://github.com/netdata/netdata/blob/master/src/health/health.d/net.conf
        metric: net.net
        info: network interface ${label:device} current speed
        os: "*"
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: global
          description: |
            These metrics refer to hardware and network monitoring.
          labels: []
          metrics:
            - name: system.cpu
              description: Total CPU utilization
              unit: "percentage"
              chart_type: stacked
              dimensions:
                - name: user
                - name: nice
                - name: system
                - name: idle
            - name: system.ram
              description: System RAM
              unit: "MiB"
              chart_type: stacked
              dimensions:
                - name: active
                - name: wired
                - name: throttled
                - name: compressor
                - name: inactive
                - name: purgeable
                - name: speculative
                - name: free
            - name: mem.swapio
              description: Swap I/O
              unit: "KiB/s"
              chart_type: area
              dimensions:
                - name: io
                - name: out
            - name: mem.pgfaults
              description: Memory Page Faults
              unit: "faults/s"
              chart_type: line
              dimensions:
                - name: memory
                - name: cow
                - name: pagein
                - name: pageout
                - name: compress
                - name: decompress
                - name: zero_fill
                - name: reactivate
                - name: purge
            - name: system.load
              description: System Load Average
              unit: "load"
              chart_type: line
              dimensions:
                - name: load1
                - name: load5
                - name: load15
            - name: mem.swap
              description: System Swap
              unit: "MiB"
              chart_type: stacked
              dimensions:
                - name: free
                - name: used
            - name: system.ipv4
              description: IPv4 Bandwidth
              unit: "kilobits/s"
              chart_type: area
              dimensions:
                - name: received
                - name: sent
            - name: ipv4.tcppackets
              description: IPv4 TCP Packets
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: ipv4.tcperrors
              description: IPv4 TCP Errors
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: InErrs
                - name: InCsumErrors
                - name: RetransSegs
            - name: ipv4.tcphandshake
              description: IPv4 TCP Handshake Issues
              unit: "events/s"
              chart_type: line
              dimensions:
                - name: EstabResets
                - name: ActiveOpens
                - name: PassiveOpens
                - name: AttemptFails
            - name: ipv4.tcpconnaborts
              description: TCP Connection Aborts
              unit: "connections/s"
              chart_type: line
              dimensions:
                - name: baddata
                - name: userclosed
                - name: nomemory
                - name: timeout
            - name: ipv4.tcpofo
              description: TCP Out-Of-Order Queue
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: inqueue
            - name: ipv4.tcpsyncookies
              description: TCP SYN Cookies
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
                - name: failed
            - name: ipv4.ecnpkts
              description: IPv4 ECN Statistics
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: CEP
                - name: NoECTP
            - name: ipv4.udppackets
              description: IPv4 UDP Packets
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: ipv4.udperrors
              description: IPv4 UDP Errors
              unit: "events/s"
              chart_type: line
              dimensions:
                - name: RcvbufErrors
                - name: InErrors
                - name: NoPorts
                - name: InCsumErrors
                - name: IgnoredMulti
            - name: ipv4.icmp
              description: IPv4 ICMP Packets
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: ipv4.icmp_errors
              description: IPv4 ICMP Errors
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: InErrors
                - name: OutErrors
                - name: InCsumErrors
            - name: ipv4.icmpmsg
              description: IPv4 ICMP Messages
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: InEchoReps
                - name: OutEchoReps
                - name: InEchos
                - name: OutEchos
            - name: ipv4.packets
              description: IPv4 Packets
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
                - name: forwarded
                - name: delivered
            - name: ipv4.fragsout
              description: IPv4 Fragments Sent
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: ok
                - name: failed
                - name: created
            - name: ipv4.fragsin
              description: IPv4 Fragments Reassembly
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: ok
                - name: failed
                - name: all
            - name: ipv4.errors
              description: IPv4 Errors
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: InDiscards
                - name: OutDiscards
                - name: InHdrErrors
                - name: OutNoRoutes
                - name: InAddrErrors
                - name: InUnknownProtos
            - name: ipv6.packets
              description: IPv6 Packets
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
                - name: forwarded
                - name: delivers
            - name: ipv6.fragsout
              description: IPv6 Fragments Sent
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: ok
                - name: failed
                - name: all
            - name: ipv6.fragsin
              description: IPv6 Fragments Reassembly
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: ok
                - name: failed
                - name: timeout
                - name: all
            - name: ipv6.errors
              description: IPv6 Errors
              unit: "packets/s"
              chart_type: line
              dimensions:
                - name: InDiscards
                - name: OutDiscards
                - name: InHdrErrors
                - name: InAddrErrors
                - name: InTruncatedPkts
                - name: InNoRoutes
                - name: OutNoRoutes
            - name: ipv6.icmp
              description: IPv6 ICMP Messages
              unit: "messages/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: ipv6.icmpredir
              description: IPv6 ICMP Redirects
              unit: "redirects/s"
              chart_type: line
              dimensions:
                - name: received
                - name: sent
            - name: ipv6.icmperrors
              description: IPv6 ICMP Errors
              unit: "errors/s"
              chart_type: line
              dimensions:
                - name: InErrors
                - name: OutErrors
                - name: InCsumErrors
                - name: InDestUnreachs
                - name: InPktTooBigs
                - name: InTimeExcds
                - name: InParmProblems
                - name: OutDestUnreachs
                - name: OutTimeExcds
                - name: OutParmProblems
            - name: ipv6.icmpechos
              description: IPv6 ICMP Echo
              unit: "messages/s"
              chart_type: line
              dimensions:
