                - name: InType129
                - name: InType136
                - name: OutType1
                - name: OutType128
                - name: OutType129
                - name: OutType133
                - name: OutType135
                - name: OutType143
            - name: system.uptime
              description: System Uptime
              unit: "seconds"
              chart_type: line
              dimensions:
                - name: uptime
            - name: system.io
              description: Disk I/O
              unit: "KiB/s"
              chart_type: area
              dimensions:
                - name: in
                - name: out
            - name: macos.thermal_pressure
              description: macOS thermal pressure state
              unit: "state"
              chart_type: line
              dimensions:
