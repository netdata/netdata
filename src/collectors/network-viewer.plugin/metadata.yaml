plugin_name: network-viewer.plugin
modules:
  - meta:
      id: collector-network-viewer.plugin
      plugin_name: network-viewer.plugin
      module_name: network-viewer.plugin
      monitored_instance:
        name: Network Connections
        link: ""
        categories:
          - data-collection.networking
        icon_filename: network.svg
      alternative_monitored_instances: []
      keywords:
        - network
        - connections
        - sockets
        - tcp
        - udp
        - ports
        - freebsd
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: ""
        method_description: |
          This plugin reads the system's socket tables to enumerate all active network connections,
          including TCP and UDP sockets in all states, for both IPv4 and IPv6.

          On Linux it consumes `NETLINK_INET_DIAG` and the `/proc` socket tables;
          on FreeBSD it walks `KERN_PROC_FILEDESC` and consults `net.inet.tcp.pcblist`
          to attribute sockets to processes.
      supported_platforms:
        include:
          - Linux
          - FreeBSD
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The plugin automatically detects all active network connections on the system.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: "netdata.conf"
          section_name: "[plugin:network-viewer]"
          description: "The netdata main configuration file."
        options:
          description: "Optional APPS_LOOKUP cache-warming controls for topology and aggregated network-connection Functions."
          folding:
            title: "Config options"
            enabled: true
          list:
            - name: apps lookup cache size
              description: Maximum number of per-PID APPS_LOOKUP cache entries kept by network-viewer.plugin.
              default_value: 8192
              required: false
            - name: apps lookup generation refresh seconds
              description: How often the background worker probes APPS_LOOKUP generation changes when the cache is otherwise warm.
              default_value: 30
              required: false
        examples:
          folding:
            title: "Config"
            enabled: true
          list:
            - name: APPS_LOOKUP cache warming
              description: Keep the default cache size and generation refresh cadence.
              config: |
                [plugin:network-viewer]
                  apps lookup cache size = 8192
                  apps lookup generation refresh seconds = 30
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: network-viewer plugin IPC
          description: network-viewer.plugin APPS_LOOKUP client cache-warming health and latency.
          labels: []
          metrics:
            - name: netdata.collector.ipc.apps_lookup.client.requests
              description: APPS_LOOKUP client request outcomes
              unit: "requests/s"
              chart_type: line
              dimensions:
                - name: requests_sent
                - name: requests_responded
                - name: requests_failed
            - name: netdata.collector.ipc.apps_lookup.client.cache
              description: APPS_LOOKUP client cache outcomes
              unit: "events/s"
              chart_type: line
              dimensions:
                - name: cache_hits
                - name: cache_misses_unknown
                - name: cache_misses_intake_dropped
                - name: cache_evictions_pid_reuse
                - name: cache_evictions_lru
                - name: cache_evictions_generation_bump
                - name: cache_evictions_unknown_permanent
            - name: netdata.collector.ipc.apps_lookup.client.peer
              description: APPS_LOOKUP client peer connection events
              unit: "events/s"
              chart_type: line
              dimensions:
                - name: peer_connect_attempts
                - name: peer_disconnects
                - name: worker_refresh_probes
            - name: netdata.collector.ipc.apps_lookup.client.worker_request_duration_ms
              description: APPS_LOOKUP worker request duration cumulative histogram
              unit: "requests/s"
              chart_type: stacked
              dimensions:
                - name: le_1ms
                - name: le_5ms
                - name: le_10ms
                - name: le_50ms
                - name: le_100ms
                - name: le_500ms
                - name: le_1000ms
                - name: gt_1000ms
            - name: netdata.collector.ipc.apps_lookup.client.function_handler_overhead_ms
              description: APPS_LOOKUP Function handler cache-check and intake-enqueue overhead cumulative histogram
              unit: "calls/s"
              chart_type: stacked
              dimensions:
                - name: le_1ms
                - name: le_5ms
                - name: le_10ms
                - name: le_50ms
                - name: le_100ms
                - name: le_500ms
                - name: le_1000ms
                - name: gt_1000ms
            - name: netdata.collector.ipc.apps_lookup.client.intake_depth
              description: APPS_LOOKUP client queued PIDs awaiting worker lookup
              unit: "pids"
              chart_type: line
              dimensions:
                - name: intake_depth
    functions:
      description: |
        This plugin exposes real-time functions for viewing active network connections and,
        on FreeBSD, system-wide TCP and UDP stack statistics.
      list:
        - id: network-connections
          name: Network Connections
          description: |
            Shows active network connections with protocol details, states, addresses, ports, and performance metrics.

            Provides both aggregated and detailed views of TCP and UDP connections for IPv4 and IPv6,
            including connection direction (listen, inbound, outbound, local), process information,
            and TCP performance metrics (RTT, retransmissions).

            On Linux, connections are classified as system or container based on network namespace.
            On FreeBSD, namespaces are not exposed to userspace and the classification is omitted.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
        - id: network-protocols
          name: Network Protocols
          description: |
            Shows FreeBSD TCP and UDP stack statistics grouped by transport protocol.

            Each row covers one transport (TCP or UDP) and reports IPv4+IPv6 combined
            traffic counters (received, sent, errors), TCP-specific connection counters
            (active opens, currently established, passive opens, resets, total segments,
            retransmitted segments), and the UDP-specific datagrams-with-no-port counter.

            Values are per-second deltas sampled from `net.inet.tcp.stats`,
            `net.inet.tcp.states`, and `net.inet.udp.stats`. The first call after the
            plugin starts returns zeros because there is no previous sample to diff against.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: "FreeBSD only."
        - id: topology:network-connections
          name: Network Connections Topology
          description: |
            Shows active network connections as a topology graph with self, process, and endpoint actors.

            Process actors expose container and orchestrator grouping columns when APPS_LOOKUP cache data is available:
            cgroup path, cgroup name, orchestrator, Kubernetes pod, namespace, workload, Docker/container name,
            Docker image, and systemd unit name.

            Supported topology groupings are pid, process_name, cgroup, container, orchestrator, pod, namespace,
            workload, and service. Free-form labels are hidden by default and can be allowed per request with
            labels:<pattern>, where patterns are pipe-separated. Full cgroup paths are shown by default and can be
            hidden per request with cgroup-paths:hide.

            In the default processes:by_name mode, container and orchestrator columns reflect the first PID observed
            for each process name. Use processes:by_pid when exact per-container attribution is required.
          parameters:
            - id: processes
              name: Processes
              description: "Use processes:by_name or processes:by_pid. by_pid gives exact per-PID container attribution."
              type: select
              required: false
              default: by_name
              options:
                - id: by_name
                  name: by_name
                  default: true
                - id: by_pid
                  name: by_pid
            - id: labels
              name: Labels
              description: "Optional pipe-separated simple-pattern whitelist for free-form actor labels. Omitted means deny all free-form labels."
              type: string
              required: false
              default: ""
              options: []
            - id: cgroup-paths
              name: Cgroup Paths
              description: "Use cgroup-paths:show or cgroup-paths:hide to control the full cgroup_path column."
              type: select
              required: false
              default: show
              options:
                - id: show
                  name: show
                  default: true
                - id: hide
                  name: hide
          returns:
            description: "Topology payload using netdata.topology.v1."
            columns:
              - name: cgroup_path
                type: string
                unit: ""
                description: "Full cgroup path. Use cgroup-paths:hide to suppress it."
              - name: cgroup_name
                type: string
                unit: ""
                description: "Cgroup or container display name."
              - name: orchestrator
                type: string
                unit: ""
                description: "Container/orchestrator family, such as systemd, docker, k8s, kvm, lxc, podman, nspawn, host_root, or unknown."
              - name: k8s_pod_name
                type: string
                unit: ""
                description: "Kubernetes pod name from cgroup labels."
              - name: k8s_namespace
                type: string
                unit: ""
                description: "Kubernetes namespace from cgroup labels."
              - name: k8s_workload
                type: string
                unit: ""
                description: "Kubernetes controller name, or a workload name derived from pod-name suffixes."
              - name: docker_container_name
                type: string
                unit: ""
                description: "Kubernetes container name, Docker/Podman container name, or cgroup name fallback."
              - name: docker_image
                type: string
                unit: ""
                description: "Docker/Podman image label when available."
              - name: systemd_unit_name
                type: string
                unit: ""
                description: "systemd unit name extracted from the cgroup path."
          performance: "Adds nullable string columns to process actor rows; APPS_LOOKUP cache warming runs asynchronously."
          security: "Free-form labels are denied by default. cgroup_path may expose operator-chosen path segments and can be hidden with cgroup-paths:hide."
          availability: "Container columns are populated only when apps.plugin and cgroups.plugin provide APPS_LOOKUP data for the PID."
  - meta:
      plugin_name: network-viewer.plugin
      module_name: PerflibNetworkProtocols
      monitored_instance:
        name: Windows Network Protocols
        link: "https://learn.microsoft.com/en-us/windows/win32/networking"
        categories:
          - data-collection.networking
        icon_filename: windows.svg
      alternative_monitored_instances: []
      keywords:
        - network
        - tcp
        - udp
        - windows
        - perflib
        - segments
        - datagrams
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          This collector exposes TCP and UDP stack statistics on Windows systems via a real-time table function.
        method_description: |
          It queries the TCPv4, TCPv6, UDPv4, and UDPv6 objects from Windows Perflib,
          combining the results into a single table grouped by transport protocol and IP family.
      supported_platforms:
        include:
          - windows
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The collector automatically detects all of the metrics, no further configuration is required.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: ""
        options:
          description: ""
          folding:
            title: ""
            enabled: false
          list: []
        examples:
          folding:
            title: ""
            enabled: false
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes: []
    functions:
      description: |
        This collector exposes real-time functions for viewing Windows network connections and TCP/UDP stack statistics.
      list:
        - id: network-connections
          name: Network Connections
          description: |
            Shows active network connections on Windows with protocol details, states, addresses,
            ports, and process information.

            Each row represents one TCP connection or UDP endpoint and includes the socket direction
            (listen/inbound/outbound), protocol (tcp4/tcp6/udp4/udp6), TCP state, owning process
            (PID and name), username, server port name, local and remote addresses and ports,
            address space classification (loopback/private/public/multicast/zero), and server port number.

            Data is collected using the Windows IP Helper API (GetExtendedTcpTable,
            GetExtendedUdpTable) with process and user resolution via standard Windows APIs.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
        - id: network-protocols
          name: Network Protocols
          description: |
            Shows Windows TCP and UDP stack counters grouped by transport protocol (TCP/UDP)
            and IP family (IPv4/IPv6).

            Each row covers one transport+family combination (TCPv4, TCPv6, UDPv4, UDPv6) and includes
            traffic counters (received, sent, errors), TCP-specific connection counters
            (active opens, established, passive opens, resets, total segments, retransmitted segments),
            and the UDP-specific datagrams-with-no-port counter.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
