      default_behavior:
        auto_detection:
          description: |
            The collector automatically detects all of the metrics, no further configuration is required.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: ""
        options:
          description: ""
          folding:
            title: ""
            enabled: false
          list: []
        examples:
          folding:
            title: ""
            enabled: false
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: Per UDP Stack
          description: |
            These metrics refer to the UDP stack for each address family.
          labels:
            - name: af
              description: The address family. On Windows systems, this collector exposes `ipv4` and `ipv6`.
          metrics:
            - name: udp.datagrams
              description: UDP datagram counters.
              unit: datagrams/s
              chart_type: line
              dimensions:
