plugin_name: network-viewer.plugin
modules:
  - meta:
      id: collector-network-viewer.plugin
      plugin_name: network-viewer.plugin
      module_name: network-viewer.plugin
      monitored_instance:
        name: Network Connections
        link: ""
        categories:
          - data-collection.networking
        icon_filename: network.svg
      alternative_monitored_instances: []
      keywords:
        - network
        - connections
        - sockets
        - tcp
        - udp
        - ports
        - freebsd
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: ""
        method_description: |
          This plugin reads the system's socket tables to enumerate all active network connections,
          including TCP and UDP sockets in all states, for both IPv4 and IPv6.

          On Linux it consumes `NETLINK_INET_DIAG` and the `/proc` socket tables;
          on FreeBSD it walks `KERN_PROC_FILEDESC` and consults `net.inet.tcp.pcblist`
          to attribute sockets to processes.
      supported_platforms:
        include:
          - Linux
          - FreeBSD
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The plugin automatically detects all active network connections on the system.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: "netdata.conf"
          section_name: "[plugin:network-viewer]"
          description: "The netdata main configuration file."
        options:
          description: "Optional APPS_LOOKUP cache-warming controls for topology and aggregated network-connection Functions."
          folding:
            title: "Config options"
            enabled: true
          list:
            - name: apps lookup cache size
              description: Maximum number of per-PID APPS_LOOKUP cache entries kept by network-viewer.plugin.
              default_value: 8192
              required: false
        examples:
          folding:
            title: "Config"
            enabled: true
          list:
            - name: APPS_LOOKUP cache warming
              description: Keep the default APPS_LOOKUP cache size.
              config: |
                [plugin:network-viewer]
                  apps lookup cache size = 8192
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes:
        - name: network-viewer plugin IPC
          description: network-viewer.plugin APPS_LOOKUP client cache-warming health and latency.
          labels: []
          metrics:
            - name: netdata.collector.ipc.apps_lookup.client.requests
              description: APPS_LOOKUP client request outcomes
              unit: "requests/s"
              chart_type: line
              dimensions:
                - name: requests_sent
                - name: requests_responded
                - name: requests_failed
            - name: netdata.collector.ipc.apps_lookup.client.cache
              description: APPS_LOOKUP client cache outcomes
              unit: "events/s"
              chart_type: line
              dimensions:
                - name: cache_hits
                - name: cache_misses_unknown
                - name: cache_misses_intake_dropped
                - name: cache_evictions_pid_reuse
                - name: cache_evictions_lru
            - name: netdata.collector.ipc.apps_lookup.client.peer
              description: APPS_LOOKUP client peer connection events
              unit: "events/s"
              chart_type: line
              dimensions:
                - name: peer_connect_attempts
                - name: peer_disconnects
            - name: netdata.collector.ipc.apps_lookup.client.worker_request_duration_ms
              description: APPS_LOOKUP worker request duration buckets
              unit: "requests/s"
              chart_type: stacked
              dimensions:
                - name: le_1ms
                - name: le_5ms
                - name: le_10ms
                - name: le_50ms
                - name: le_100ms
                - name: le_500ms
                - name: le_1000ms
                - name: gt_1000ms
            - name: netdata.collector.ipc.apps_lookup.client.function_handler_overhead_ms
              description: APPS_LOOKUP Function handler cache-check and intake-enqueue overhead buckets
              unit: "calls/s"
              chart_type: stacked
              dimensions:
                - name: le_1ms
                - name: le_5ms
                - name: le_10ms
                - name: le_50ms
                - name: le_100ms
                - name: le_500ms
                - name: le_1000ms
                - name: gt_1000ms
            - name: netdata.collector.ipc.apps_lookup.client.intake_depth
              description: APPS_LOOKUP client queued PIDs awaiting worker lookup
              unit: "pids"
              chart_type: line
              dimensions:
                - name: intake_depth
    functions:
      description: |
        This plugin exposes real-time functions for viewing active network connections and,
        on FreeBSD, system-wide TCP and UDP stack statistics.
      list:
        - id: network-connections
          name: Network Connections
          description: |
            Shows active network connections with protocol details, states, addresses, ports, and performance metrics.

            Provides both aggregated and detailed views of TCP and UDP connections for IPv4 and IPv6,
            including connection direction (listen, inbound, outbound), process information,
            cgroup/container/service enrichment when available, and TCP performance metrics (RTT, retransmissions).

            On Linux, connections are classified as system or container based on network namespace.
            On FreeBSD, namespaces are not exposed to userspace and the classification is omitted.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
        - id: network-protocols
          name: Network Protocols
          description: |
            Shows FreeBSD TCP and UDP stack statistics grouped by transport protocol.

            Each row covers one transport (TCP or UDP) and reports IPv4+IPv6 combined
            traffic counters (received, sent, errors), TCP-specific connection counters
            (active opens, currently established, passive opens, resets, total segments,
            retransmitted segments), and the UDP-specific datagrams-with-no-port counter.

            Values are per-second deltas sampled from `net.inet.tcp.stats`,
            `net.inet.tcp.states`, and `net.inet.udp.stats`. The first call after the
            plugin starts returns zeros because there is no previous sample to diff against.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: "FreeBSD only."
        - id: topology:network-connections
          name: Network Connections Topology
          description: |
            Shows active network connections as a topology graph with self, process or container, and endpoint actors.

            The group_by selector controls the actor level. process_name groups sockets by process name, pid shows
            one actor per PID with scalar per-PID information, and container groups sockets by canonical
            container_name. For systemd services, container_name is the service name. For non-container,
            non-service processes, container_name falls back to the process name. Unresolved cgroup
            namespace-relative paths remain pending or process fallback identities instead of being
            displayed as raw `cri-containerd-*.scope` systemd scope names.

            Fields that can vary across grouped processes, such as PID, UID, network namespace, command line,
            cgroup path, and detailed container metadata, are scalar columns in group_by:pid and merged actor
            labels in grouped views. Free-form labels are hidden by default and can be allowed per request with
            `labels:<pattern>`, where patterns are pipe-separated. Actor modals also expose producer-declared
            Processes and CGroups tables for the selected actor.
          parameters:
            - id: group_by
              name: Group By
              description: "Use group_by:process_name, group_by:pid, or group_by:container to select the topology actor level."
              type: select
              required: false
              default: process_name
              options:
                - id: process_name
                  name: process_name
                  default: true
                - id: pid
                  name: pid
                - id: container
                  name: container
            - id: labels
              name: Labels
              description: "Optional pipe-separated simple-pattern whitelist for free-form actor labels. Omitted means deny all free-form labels."
              type: string
              required: false
              default: ""
              options: []
          returns:
            description: "Topology payload using netdata.topology.v1."
            columns:
              - name: container_name
                type: string
                unit: ""
                description: "Canonical container/service actor name used by group_by:container."
              - name: cgroup_path
                type: string
                unit: ""
                description: "Full cgroup path; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: cgroup_name
                type: string
                unit: ""
                description: "Cgroup or container display name; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: cgroup_status
                type: string
                unit: ""
                description: "Cgroup enrichment status: known, host_root, retry_later, unknown_permanent, or unknown."
              - name: orchestrator
                type: string
                unit: ""
                description: "Container/orchestrator family; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: k8s_pod_name
                type: string
                unit: ""
                description: "Kubernetes pod name; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: k8s_namespace
                type: string
                unit: ""
                description: "Kubernetes namespace; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: k8s_workload
                type: string
                unit: ""
                description: "Kubernetes controller name; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: docker_container_name
                type: string
                unit: ""
                description: "Kubernetes container, Docker/Podman container, or cgroup fallback name; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: docker_image
                type: string
                unit: ""
                description: "Docker/Podman image label; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: systemd_unit_name
                type: string
                unit: ""
                description: "systemd unit name; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: systemd_unit_kind
                type: string
                unit: ""
                description: "systemd unit kind such as service, scope, or slice; scalar in group_by:pid and merged as actor labels in grouped views."
              - name: actor_kind
                type: string
                unit: ""
                description: "Producer-derived actor kind used to classify containers, services, slices, scopes, VMs, and process fallbacks."
          performance: "group_by:container performs APPS_LOOKUP cache reads to derive canonical container_name; cache warming runs asynchronously."
          security: "Free-form labels are denied by default. Raw cgroup paths may expose operator-chosen path segments and are hidden in table views by default."
          availability: "container_name uses APPS_LOOKUP data when available, keeps retry-later lookups pending, and falls back to process name for host/root, permanently unknown, and unresolved namespace-relative cgroup cases."
  - meta:
      plugin_name: network-viewer.plugin
      module_name: PerflibNetworkProtocols
      monitored_instance:
        name: Windows Network Protocols
        link: "https://learn.microsoft.com/en-us/windows/win32/networking"
        categories:
          - data-collection.networking
        icon_filename: windows.svg
      alternative_monitored_instances: []
      keywords:
        - network
        - tcp
        - udp
        - windows
        - perflib
        - segments
        - datagrams
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          This collector exposes TCP and UDP stack statistics on Windows systems via a real-time table function.
        method_description: |
          It queries the TCPv4, TCPv6, UDPv4, and UDPv6 objects from Windows Perflib,
          combining the results into a single table grouped by transport protocol and IP family.
      supported_platforms:
        include:
          - windows
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The collector automatically detects all of the metrics, no further configuration is required.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: ""
        options:
          description: ""
          folding:
            title: ""
            enabled: false
          list: []
        examples:
          folding:
            title: ""
            enabled: false
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes: []
    functions:
      description: |
        This collector exposes real-time functions for viewing Windows network connections and TCP/UDP stack statistics.
      list:
        - id: network-connections
          name: Network Connections
          description: |
            Shows active network connections on Windows with protocol details, states, addresses,
            ports, and process information.

            Each row represents one TCP connection or UDP endpoint and includes the socket direction
            (listen/inbound/outbound), protocol (tcp4/tcp6/udp4/udp6), TCP state, owning process
            (PID and name), username, server port name, local and remote addresses and ports,
            address space classification (loopback/private/public/multicast/zero), and server port number.

            Data is collected using the Windows IP Helper API (GetExtendedTcpTable,
            GetExtendedUdpTable) with process and user resolution via standard Windows APIs.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
        - id: network-protocols
          name: Network Protocols
          description: |
            Shows Windows TCP and UDP stack counters grouped by transport protocol (TCP/UDP)
            and IP family (IPv4/IPv6), and per-share SMB Server Shares traffic.

            Each row covers one transport+family combination (TCPv4, TCPv6, UDPv4, UDPv6) or one
            SMB share, and includes the transport's traffic counters (TCP/UDP: received, sent, errors;
            SMB: received bytes, sent bytes, active tree connections), the TCP-specific connection
            counters (active opens, established, passive opens, resets, total segments, retransmitted
            segments), the UDP-specific datagrams-with-no-port counter, and the SMB-specific
            active tree connections, received bytes, and sent bytes columns.

            Two stacked-bar charts are exposed: "Traffic" (TCP/UDP segments/datagrams, grouped by
            transport or IP family) and "SMB Traffic" (per-share bytes, grouped by share name).
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
