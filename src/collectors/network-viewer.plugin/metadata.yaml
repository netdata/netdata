plugin_name: network-viewer.plugin
modules:
  - meta:
      id: collector-network-viewer.plugin
      plugin_name: network-viewer.plugin
      module_name: network-viewer.plugin
      monitored_instance:
        name: Network Connections
        link: ""
        categories:
          - data-collection.networking
        icon_filename: network.svg
      alternative_monitored_instances: []
      keywords:
        - network
        - connections
        - sockets
        - tcp
        - udp
        - ports
        - freebsd
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: ""
        method_description: |
          This plugin reads the system's socket tables to enumerate all active network connections,
          including TCP and UDP sockets in all states, for both IPv4 and IPv6.

          On Linux it consumes `NETLINK_INET_DIAG` and the `/proc` socket tables;
          on FreeBSD it walks `KERN_PROC_FILEDESC` and consults `net.inet.tcp.pcblist`
          to attribute sockets to processes.
      supported_platforms:
        include:
          - Linux
          - FreeBSD
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The plugin automatically detects all active network connections on the system.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: ""
        options:
          description: ""
          folding:
            title: ""
            enabled: false
          list: []
        examples:
          folding:
            enabled: false
            title: ""
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes: []
    functions:
      description: |
        This plugin exposes real-time functions for viewing active network connections and,
        on FreeBSD, system-wide TCP and UDP stack statistics.
      list:
        - id: network-connections
          name: Network Connections
          description: |
            Shows active network connections with protocol details, states, addresses, ports, and performance metrics.

            Provides both aggregated and detailed views of TCP and UDP connections for IPv4 and IPv6,
            including connection direction (listen, inbound, outbound, local), process information,
            and TCP performance metrics (RTT, retransmissions).

            On Linux, connections are classified as system or container based on network namespace.
            On FreeBSD, namespaces are not exposed to userspace and the classification is omitted.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
        - id: network-protocols
          name: Network Protocols
          description: |
            Shows FreeBSD TCP and UDP stack statistics grouped by transport protocol.

            Each row covers one transport (TCP or UDP) and reports IPv4+IPv6 combined
            traffic counters (received, sent, errors), TCP-specific connection counters
            (active opens, currently established, passive opens, resets, total segments,
            retransmitted segments), and the UDP-specific datagrams-with-no-port counter.

            Values are per-second deltas sampled from `net.inet.tcp.stats`,
            `net.inet.tcp.states`, and `net.inet.udp.stats`. The first call after the
            plugin starts returns zeros because there is no previous sample to diff against.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: "FreeBSD only."
  - meta:
      plugin_name: network-viewer.plugin
      module_name: PerflibNetworkProtocols
      monitored_instance:
        name: Windows Network Protocols
        link: "https://learn.microsoft.com/en-us/windows/win32/networking"
        categories:
          - data-collection.networking
        icon_filename: windows.svg
      alternative_monitored_instances: []
      keywords:
        - network
        - tcp
        - udp
        - windows
        - perflib
        - segments
        - datagrams
      related_resources:
        integrations:
          list: []
      info_provided_to_referring_integrations:
        description: ""
    overview:
      data_collection:
        metrics_description: |
          This collector exposes TCP and UDP stack statistics on Windows systems via a real-time table function.
        method_description: |
          It queries the TCPv4, TCPv6, UDPv4, and UDPv6 objects from Windows Perflib,
          combining the results into a single table grouped by transport protocol and IP family.
      supported_platforms:
        include:
          - windows
        exclude: []
      multi_instance: false
      additional_permissions:
        description: ""
      default_behavior:
        auto_detection:
          description: |
            The collector automatically detects all of the metrics, no further configuration is required.
        limits:
          description: ""
        performance_impact:
          description: ""
    setup:
      prerequisites:
        list: []
      configuration:
        file:
          name: ""
        options:
          description: ""
          folding:
            title: ""
            enabled: false
          list: []
        examples:
          folding:
            title: ""
            enabled: false
          list: []
    troubleshooting:
      problems:
        list: []
    alerts: []
    metrics:
      folding:
        title: Metrics
        enabled: false
      description: ""
      availability: []
      scopes: []
    functions:
      description: |
        This collector exposes real-time functions for viewing Windows network connections and TCP/UDP stack statistics.
      list:
        - id: network-connections
          name: Network Connections
          description: |
            Shows active network connections on Windows with protocol details, states, addresses,
            ports, and process information.

            Each row represents one TCP connection or UDP endpoint and includes the socket direction
            (listen/inbound/outbound), protocol (tcp4/tcp6/udp4/udp6), TCP state, owning process
            (PID and name), username, server port name, local and remote addresses and ports,
            address space classification (loopback/private/public/multicast/zero), and server port number.

            Data is collected using the Windows IP Helper API (GetExtendedTcpTable,
            GetExtendedUdpTable) with process and user resolution via standard Windows APIs.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
        - id: network-protocols
          name: Network Protocols
          description: |
            Shows Windows TCP and UDP stack counters grouped by transport protocol (TCP/UDP)
            and IP family (IPv4/IPv6).

            Each row covers one transport+family combination (TCPv4, TCPv6, UDPv4, UDPv6) and includes
            traffic counters (received, sent, errors), TCP-specific connection counters
            (active opens, established, passive opens, resets, total segments, retransmitted segments),
            and the UDP-specific datagrams-with-no-port counter.
          parameters: []
          returns:
            description: ""
            columns: []
          performance: ""
          security: ""
          availability: ""
