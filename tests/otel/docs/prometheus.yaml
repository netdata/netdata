receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: "my-application"
          scrape_interval: 10s
          static_configs:
            - targets: ["localhost:9090"]

exporters:
  otlp:
    endpoint: "localhost:4317"
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [otlp]

