name: SOW

on:
  pull_request:
    branches:
      - master
    paths:
      - ".agents/sow/**"
      - ".agents/skills/**"
      - ".agents/skill-verification/**"
      - ".agents/ENV.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"

permissions:
  contents: read

jobs:
  no-working-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Reject committed SOW working files and specs
        run: |
          set -euo pipefail

          # SOW working memory and specs are local-only and gitignored. Anything
          # tracked under these paths was force-added and must not be merged.
          tracked=$(git ls-files -- \
            .agents/sow/q \
            .agents/sow/specs \
            .agents/sow/active .agents/sow/pending .agents/sow/current .agents/sow/done \
            || true)

          if [ -n "$tracked" ]; then
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              echo "::error file=${file}::SOW working files and specs are local-only and must not be committed (see AGENTS.md, SOW System)."
            done <<< "$tracked"
            exit 1
          fi

          echo "No committed SOW working files or specs."

  sensitive-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan changed durable artifacts for sensitive data
        run: |
          set -euo pipefail

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "$base...$head" -- \
              .agents/sow .agents/skills .agents/skill-verification .agents/ENV.md \
              AGENTS.md CLAUDE.md GEMINI.md \
              | while IFS= read -r file; do
                  [ -f "$file" ] && printf '%s\n' "$file"
                done
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed durable artifacts to scan."
            exit 0
          fi

          bash .agents/sow/scan-sensitive.sh "${files[@]}"
